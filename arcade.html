      <div style="font-size:11px;color:#888;">←/→ move &nbsp;·&nbsp; Space shoots</div>
    </div>`;
  const cv = host.querySelector('#cv'), ctx = cv.getContext('2d');
  const sEl = host.querySelector('#s'), lEl = host.querySelector('#l');

  function reset() {
    ship = { x: W/2, y: H-40, w: 38, h: 14, speed: 320 };
    bullets = []; bombs = []; aliens = [];
    const cols = 9, rows = 4;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      aliens.push({ x: 60 + c*45, y: 60 + r*38, w: 28, h: 20, alive: true, row: r });
    }
    dir = 1; score = 0; lives = 3; dead = false; fireCool = 0;
    lastT = performance.now()/1000;
    update();
  }
  function update() { sEl.innerText = score; lEl.innerText = lives; }
  function gameOver(won) {
    dead = true;
    if (score > best) localStorage.setItem('invaders_best', score);
    showResult(host, {
      title: won ? 'Cleared!' : 'Game Over',
      kind: won ? 'win' : 'lose',
      stat: 'Score ' + score,
      onRetry: () => { reset(); loop(); }
    });
  }

  function loop() {
    if (pauseCtl.isPaused()) { raf = requestAnimationFrame(loop); return; }
    const now = performance.now()/1000;
    const dt = Math.min(0.05, now - lastT);
    lastT = now;
    if (dead) return;

    if (keys['ArrowLeft']) ship.x -= ship.speed * dt;
    if (keys['ArrowRight']) ship.x += ship.speed * dt;
    ship.x = Math.max(ship.w/2, Math.min(W-ship.w/2, ship.x));

    fireCool -= dt;
    if (keys[' '] && fireCool <= 0) {
      bullets.push({ x: ship.x, y: ship.y - 8, vy: -480 });
      fireCool = 0.32;
      sfx('shoot');
    }

    const alive = aliens.filter(a => a.alive);
    const boost = 1 + (aliens.length - alive.length) / aliens.length * 3;
    let minX = Infinity, maxX = -Infinity;
    for (const a of alive) { if (a.x < minX) minX = a.x; if (a.x > maxX) maxX = a.x; }
    const moveX = dir * 40 * dt * boost;
    let flip = (maxX + moveX > W - 20) || (minX + moveX < 20);
    for (const a of alive) {
      if (flip) a.y += 18;
      else a.x += moveX;
    }
    if (flip) dir *= -1;

    if (Math.random() < 0.012 * boost && alive.length) {
      const a = alive[Math.floor(Math.random()*alive.length)];
      bombs.push({ x: a.x, y: a.y + 12, vy: 220 });
    }

    for (const b of bullets) b.y += b.vy * dt;
    for (const b of bombs) b.y += b.vy * dt;

    for (const b of bullets) {
      if (b.y < 0) { b.dead = true; continue; }
      for (const a of alive) {
        if (Math.abs(b.x - a.x) < a.w/2 && Math.abs(b.y - a.y) < a.h/2) {
          a.alive = false; b.dead = true;
          score += (4 - a.row) * 10;
          sfx('hit');
          break;
        }
      }
    }
    bullets = bullets.filter(b => !b.dead);

    for (const b of bombs) {
      if (b.y > H) { b.dead = true; continue; }
      if (Math.abs(b.x - ship.x) < ship.w/2 && Math.abs(b.y - ship.y) < ship.h/2) {
        b.dead = true; lives--; sfx('explode');
        if (lives <= 0) { update(); gameOver(false); return; }
      }
    }
    bombs = bombs.filter(b => !b.dead);

    for (const a of alive) {
      if (a.y > H - 60) { gameOver(false); return; }
    }
    if (alive.length === 0) { gameOver(true); return; }

    update();

    ctx.fillStyle = '#0a0d12';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#222';
    for (let i = 0; i < 40; i++) ctx.fillRect((i*73)%W, (i*131)%H, 1, 1);
    const colors = ['#f87171','#fbbf24','#34d399','#a78bfa'];
    for (const a of alive) {
      ctx.fillStyle = colors[a.row];
      ctx.fillRect(a.x - a.w/2, a.y - a.h/2, a.w, a.h);
      ctx.fillStyle = '#000';
      ctx.fillRect(a.x - 6, a.y - 2, 4, 4);
      ctx.fillRect(a.x + 2, a.y - 2, 4, 4);
    }
    ctx.fillStyle = '#fff';
    for (const b of bullets) ctx.fillRect(b.x - 2, b.y - 8, 4, 12);
    ctx.fillStyle = '#ef4444';
    for (const b of bombs) ctx.fillRect(b.x - 2, b.y - 6, 4, 10);
    ctx.fillStyle = '#34d399';
    ctx.fillRect(ship.x - ship.w/2, ship.y - 4, ship.w, 8);
    ctx.fillRect(ship.x - 4, ship.y - 12, 8, 8);

    raf = requestAnimationFrame(loop);
  }

  function onKey(e) {
    if (['ArrowLeft','ArrowRight',' '].includes(e.key)) {
      keys[e.key] = (e.type === 'keydown');
      e.preventDefault();
    }
  }
  addL(window, 'keydown', onKey);
  addL(window, 'keyup', onKey);
  const pauseCtl = attachPause(host, { onResume: () => { lastT = performance.now()/1000; } });
  attachTouchControls(host, {
    directional: 'leftright',
    actions: [{ key: ' ', label: 'Fire' }]
  });

  reset(); loop();
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

function startInvadersMP(host, shim) {
  const scope = shim.scope();
  // Co-op: two ships, doubled aliens, shared score + lives.
  // Host is authoritative — runs the simulation and broadcasts state.
  // Guest sends input changes only.
  const W = 600, H = 600;
  const isHost = shim.role === 'host';
  let raf = null;
  let rematchUI = null;
  let ended = false;
  // Simulation state (host owns; guest mirrors)
  const COLS = 12, ROWS = 6;
  let ships = [
    { x: W * 0.33, y: H - 40, w: 38, h: 14, alive: true, color: '#34d399', cool: 0 }, // P1 (host)
    { x: W * 0.67, y: H - 40, w: 38, h: 14, alive: true, color: '#6ea8fe', cool: 0 }  // P2 (guest)
  ];
  let bullets = []; // {x, y, owner: 0|1}
  let bombs = [];
  let aliens = [];
  function buildAliens() {
    aliens.length = 0;
    const startX = (W - (COLS - 1) * 36) / 2;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      aliens.push({ id: r * COLS + c, x: startX + c * 36, y: 50 + r * 30, w: 24, h: 18, alive: true, row: r % 4 });
    }
  }
  buildAliens();
  let dir = 1, score = 0, lives = 5, lastT = 0;
  // Local input flags (each side has its own)
  const myInput = { left: false, right: false, fire: false };
  const remoteInput = { left: false, right: false, fire: false };
  // Snapshot received by guest
  let snapshot = null;
  // Throttle for guest input
  let lastInputSent = '';
  function snapshotState() {
    return {
      ships: ships.map(s => ({ x: s.x, alive: s.alive })),
      bullets: bullets.map(b => ({ x: b.x, y: b.y, o: b.owner })),
      bombs: bombs.map(b => ({ x: b.x, y: b.y })),
      aliens: aliens.filter(a => a.alive).map(a => ({ id: a.id, x: a.x, y: a.y, r: a.row })),
      score, lives, ended, t: performance.now()
    };
  }
  function applyInput(side, inp) {
    const target = side === 'host' ? (isHost ? myInput : remoteInput) : (isHost ? remoteInput : myInput);
    target.left = !!inp.left; target.right = !!inp.right; target.fire = !!inp.fire;
  }
  function emitInputIfChanged() {
    const sig = (myInput.left?'L':'') + (myInput.right?'R':'') + (myInput.fire?'F':'');
    if (sig === lastInputSent) return;
    lastInputSent = sig;
    try { shim.emit('game', { type: 'inv-input', left: myInput.left, right: myInput.right, fire: myInput.fire }); } catch (e) {}
  }
  function step(dt) {
    if (ended) return;
    // Move ships
    const inputs = isHost ? [myInput, remoteInput] : [remoteInput, myInput];
    for (let i = 0; i < 2; i++) {
      const s = ships[i]; if (!s.alive) continue;
      const inp = inputs[i];
      if (inp.left) s.x -= 280 * dt;
      if (inp.right) s.x += 280 * dt;
      s.x = Math.max(s.w/2, Math.min(W - s.w/2, s.x));
      s.cool -= dt;
      if (inp.fire && s.cool <= 0) {
        bullets.push({ x: s.x, y: s.y - 8, vy: -480, owner: i });
        s.cool = 0.32;
      }
    }
    // Aliens move
    const alive = aliens.filter(a => a.alive);
    if (!alive.length) { gameOver(true); return; }
    const boost = 1 + (aliens.length - alive.length) / aliens.length * 3;
    let minX = Infinity, maxX = -Infinity;
    for (const a of alive) { if (a.x < minX) minX = a.x; if (a.x > maxX) maxX = a.x; }
    const moveX = dir * 32 * dt * boost;
    let flip = (maxX + moveX > W - 20) || (minX + moveX < 20);
    for (const a of alive) {
      if (flip) a.y += 14;
      else a.x += moveX;
    }
    if (flip) dir *= -1;
    // Bombs spawn
    if (Math.random() < 0.018 * boost && alive.length) {
      const a = alive[Math.floor(Math.random()*alive.length)];
      bombs.push({ x: a.x, y: a.y + 10, vy: 220 });
    }
    // Move projectiles
    for (const b of bullets) b.y += b.vy * dt;
    for (const b of bombs) b.y += b.vy * dt;
    // Bullet hits
    for (const b of bullets) {
      if (b.y < 0) { b.dead = true; continue; }
      for (const a of alive) {
        if (Math.abs(b.x - a.x) < a.w/2 && Math.abs(b.y - a.y) < a.h/2) {
          a.alive = false; b.dead = true;
          score += (4 - a.row) * 10;
          break;
        }
      }
    }
    bullets = bullets.filter(b => !b.dead);
    // Bomb hits ships
    for (const b of bombs) {
      if (b.y > H) { b.dead = true; continue; }
      for (const s of ships) {
        if (!s.alive) continue;
        if (Math.abs(b.x - s.x) < s.w/2 && Math.abs(b.y - s.y) < s.h/2) {
          b.dead = true; lives--;
          if (lives <= 0) { gameOver(false); return; }
          break;
        }
      }
    }
    bombs = bombs.filter(b => !b.dead);
    // Alien reach bottom
    for (const a of alive) if (a.y > H - 60) { gameOver(false); return; }
  }
  function gameOver(won) {
    if (ended) return;
    ended = true;
    try { shim.emit('game', { type: 'inv-state', state: snapshotState(), over: won ? 'win' : 'lose' }); } catch (e) {}
    finalize(won);
  }
  function finalize(won) {
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: won ? 'Cleared!' : 'Game Over',
        sub: 'Score ' + score + ' (co-op)',
        kind: won ? 'win' : 'lose',
        stat: 'Score ' + score,
        dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 300);
  }
  function render() {
    if (!ctx) return;
    ctx.fillStyle = '#0a0d12'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#222';
    for (let i = 0; i < 50; i++) ctx.fillRect((i*73)%W, (i*131)%H, 1, 1);
    let drawAliens, drawShips, drawBullets, drawBombs;
    if (isHost) {
      drawAliens = aliens.filter(a => a.alive).map(a => ({ x: a.x, y: a.y, r: a.row }));
      drawShips = ships.map(s => ({ x: s.x, alive: s.alive }));
      drawBullets = bullets.map(b => ({ x: b.x, y: b.y, o: b.owner }));
      drawBombs = bombs.map(b => ({ x: b.x, y: b.y }));
    } else if (snapshot) {
      drawAliens = snapshot.aliens;
      drawShips = snapshot.ships;
      drawBullets = snapshot.bullets;
      drawBombs = snapshot.bombs;
    } else {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('Waiting for host…', W/2, H/2);
      return;
    }
    const colors = ['#f87171','#fbbf24','#34d399','#a78bfa'];
    if (drawAliens) for (const a of drawAliens) {
      ctx.fillStyle = colors[a.r % 4];
      ctx.fillRect(a.x - 12, a.y - 9, 24, 18);
      ctx.fillStyle = '#000';
      ctx.fillRect(a.x - 5, a.y - 2, 3, 3);
      ctx.fillRect(a.x + 2, a.y - 2, 3, 3);
    }
    if (drawBullets) for (const b of drawBullets) {
      ctx.fillStyle = b.o === 0 ? '#34d399' : '#6ea8fe';
      ctx.fillRect(b.x - 2, b.y - 8, 4, 12);
    }
    if (drawBombs) { ctx.fillStyle = '#ef4444'; for (const b of drawBombs) ctx.fillRect(b.x - 2, b.y - 6, 4, 10); }
    if (drawShips) {
      const colorsShip = ['#34d399', '#6ea8fe'];
      for (let i = 0; i < drawShips.length; i++) {
        const s = drawShips[i]; if (!s.alive) continue;
        ctx.fillStyle = colorsShip[i];
        ctx.fillRect(s.x - 19, H - 44, 38, 8);
        ctx.fillRect(s.x - 4, H - 52, 8, 8);
        const isMe = (isHost && i === 0) || (!isHost && i === 1);
        if (isMe) {
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fillRect(s.x - 19, H - 30, 38, 2);
        }
      }
    }
  }
  let lastBroadcast = 0;
  function tick() {
    const now = performance.now() / 1000;
    const dt = Math.min(0.05, now - lastT);
    lastT = now;
    if (isHost) {
      step(dt);
      // Broadcast snapshot at ~15Hz
      if ((now * 1000) - lastBroadcast > 67) {
        lastBroadcast = now * 1000;
        try { shim.emit('game', { type: 'inv-state', state: snapshotState() }); } catch (e) {}
      }
    } else {
      emitInputIfChanged();
    }
    // Update HUD
    const sEl = host.querySelector('#inv-s'); const lEl = host.querySelector('#inv-l');
    if (sEl) sEl.innerText = isHost ? score : (snapshot ? snapshot.score : 0);
    if (lEl) lEl.innerText = isHost ? lives : (snapshot ? snapshot.lives : 0);
    render();
    if (!ended) raf = requestAnimationFrame(tick);
  }

  host.innerHTML = `
    <div class="game-region">
      <div class="mp-layout">
        <div class="mp-side" style="align-items:center;">
          <div style="display:flex;gap:18px;font-family:sans-serif;color:#cfd2d6;font-size:14px;">
            <div>Score: <b id="inv-s">0</b></div>
            <div>Lives: <b id="inv-l" style="color:#ef4444;">5</b></div>
            <div>You: <b style="color:${isHost ? '#34d399' : '#6ea8fe'};">${isHost ? 'Green ship (P1)' : 'Blue ship (P2)'}</b></div>
          </div>
          <canvas id="inv-cv" width="${W}" height="${H}" style="background:#0a0d12;border-radius:10px;"></canvas>
          <div style="font-size:11px;color:#888;">←/→ move &nbsp;·&nbsp; Space shoots &nbsp;·&nbsp; Co-op (shared score &amp; lives)</div>
          <div id="inv-status"></div>
        </div>
        <div class="mp-side" id="inv-chat-host"></div>
      </div>
    </div>`;
  const cv = host.querySelector('#inv-cv');
  const ctx = cv.getContext('2d');
  const statusBar = makeMpStatusBar(shim);
  host.querySelector('#inv-status').appendChild(statusBar.element);
  const chat = makeChatPanel(shim);
  host.querySelector('#inv-chat-host').appendChild(chat.element);
  chat.appendSystem(`You're the ${isHost ? 'Green' : 'Blue'} ship. ${isHost ? 'You host the simulation.' : 'Host runs the simulation; your input syncs over the wire.'}`);

  function onKey(e) {
    if (e.key === 'ArrowLeft') { myInput.left = (e.type === 'keydown'); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { myInput.right = (e.type === 'keydown'); e.preventDefault(); }
    else if (e.key === ' ') { myInput.fire = (e.type === 'keydown'); e.preventDefault(); }
  }
  addL(window, 'keydown', onKey);
  addL(window, 'keyup', onKey);
  attachTouchControls(host, {
    directional: 'leftright',
    actions: [{ key: ' ', label: 'Fire' }]
  });

  scope.on('game', (m) => {
    if (!m) return;
    if (m.type === 'inv-input' && isHost) {
      remoteInput.left = !!m.left; remoteInput.right = !!m.right; remoteInput.fire = !!m.fire;
    } else if (m.type === 'inv-state' && !isHost) {
      snapshot = m.state;
      if (m.over && !ended) { ended = true; finalize(m.over === 'win'); }
    }
  });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    startInvadersMP(host, shim);
  });
  scope.on('closed', () => {
    if (ended) return;
    ended = true;
    chat.appendSystem('Partner disconnected.');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Co-op partner left.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startInvaders(host)
      });
    }, 250);
  });

  lastT = performance.now() / 1000;
  tick();

  activeCleanup = () => {
    if (raf) cancelAnimationFrame(raf);
    statusBar.destroy(); chat.destroy();
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}

/* ============================================================
   TYPE RACER — type the prompt, WPM + accuracy
   ============================================================ */
function startType(host) {
  const SENTENCES = [
    "The quick brown fox jumps over the lazy dog.",
    "Pack my box with five dozen liquor jugs.",
    "How vexingly quick daft zebras jump!",
    "Sphinx of black quartz, judge my vow.",
    "The five boxing wizards jump quickly.",
    "Jackdaws love my big sphinx of quartz.",
    "Bright vixens jump dozy fowl quack.",
    "Crazy Fredrick bought many very exquisite opal jewels.",
    "Heavy boxes perform quick waltzes and jigs.",
    "We promptly judged antique ivory buckles for the next prize."
  ];
  const best = parseInt(localStorage.getItem('type_best') || '0');
  const prompt = SENTENCES[Math.floor(Math.random()*SENTENCES.length)];
  let startT = null, ended = false;

  host.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:640px;">
      <div style="display:flex;gap:20px;font-family:sans-serif;color:#cfd2d6;font-size:14px;">
        <div>WPM: <span id="wpm" style="color:#34d399;font-weight:bold;">0</span></div>
        <div>Acc: <span id="acc" style="color:#6ea8fe;font-weight:bold;">100%</span></div>
        <div>Best WPM: <span style="color:#fbbf24;font-weight:bold;">${best}</span></div>
      </div>
      <div id="prompt" style="font-family:'Courier New',monospace;font-size:22px;line-height:1.6;background:#1a1d22;padding:20px;border-radius:10px;width:100%;box-sizing:border-box;letter-spacing:0.5px;"></div>
      <input id="inp" autofocus style="width:100%;box-sizing:border-box;padding:14px;font-family:'Courier New',monospace;font-size:18px;background:#1a1d22;color:#fff;border:1px solid #333;border-radius:8px;outline:none;" placeholder="Start typing...">
    </div>`;
  const promptEl = host.querySelector('#prompt');
  const inp = host.querySelector('#inp');
  const wpmEl = host.querySelector('#wpm'), accEl = host.querySelector('#acc');

  function render() {
    const typed = inp.value;
    let html = '';
    for (let i = 0; i < prompt.length; i++) {
      const ch = prompt[i];
      if (i < typed.length) {
        if (typed[i] === ch) html += `<span style="color:#34d399;">${ch === ' ' ? '&nbsp;' : ch}</span>`;
        else html += `<span style="color:#ef4444;background:#3a1818;">${ch === ' ' ? '&nbsp;' : ch}</span>`;
      } else if (i === typed.length) {
        html += `<span style="background:#fbbf24;color:#000;">${ch === ' ' ? '&nbsp;' : ch}</span>`;
      } else {
        html += `<span style="color:#666;">${ch === ' ' ? '&nbsp;' : ch}</span>`;
      }
    }
    promptEl.innerHTML = html;
  }
  function stats() {
    const typed = inp.value;
    let correct = 0;
    for (let i = 0; i < typed.length && i < prompt.length; i++) if (typed[i] === prompt[i]) correct++;
    const acc = typed.length ? Math.round(correct / typed.length * 100) : 100;
    let wpm = 0;
    if (startT) {
      const mins = (performance.now() - startT) / 60000;
      if (mins > 0) wpm = Math.round((correct / 5) / mins);
    }
    wpmEl.innerText = wpm;
    accEl.innerText = acc + '%';
    return { wpm, acc };
  }

  // No cheating — pasting (and drag-drop) the prompt would skip the actual typing.
  inp.addEventListener('paste', (e) => { e.preventDefault(); });
  inp.addEventListener('drop', (e) => { e.preventDefault(); });

  let prevLen = 0;
  inp.addEventListener('input', () => {
    if (ended) return;
    if (!startT && inp.value.length > 0) startT = performance.now();
    const typed = inp.value;
    // SFX only when a character was added (not on backspace)
    if (typed.length > prevLen) {
      const i = typed.length - 1;
      if (i < prompt.length && typed[i] === prompt[i]) {
        tone(820, 0.025, 'square', 0.05);
      } else {
        tone(180, 0.06, 'sawtooth', 0.10);
      }
    }
    prevLen = typed.length;
    render();
    const s = stats();
    // End once the user has typed all the way to the end of the prompt — even with mistakes
    if (typed.length >= prompt.length) {
      ended = true;
      inp.disabled = true;
      const isPerfect = typed === prompt;
      if (s.wpm > best) localStorage.setItem('type_best', s.wpm);
      showResult(host, {
        title: isPerfect ? 'Perfect!' : 'Done!',
        kind: isPerfect ? 'win' : (s.acc >= 80 ? 'win' : 'draw'),
        stat: s.wpm + ' WPM',
        sub: 'Accuracy ' + s.acc + '%',
        onRetry: () => startType(host)
      });
    }
  });

  // Update WPM ticker
  const tick = setInterval(() => { if (!ended) stats(); }, 200);
  render();
  setTimeout(() => inp.focus(), 50);
  activeCleanup = () => { clearInterval(tick); };
}

/* ============================================================
   SIMON SAYS — repeat the color sequence
   ============================================================ */
function startSimon(host) {
  host.innerHTML = `
    <div class="party-card">
      <div style="font-size:28px;font-weight:bold;">🟥 Simon</div>
      <div style="color:var(--sub);font-size:13px;text-align:center;">Pick a mode</div>
      <button class="btn" id="sm-classic" style="width:100%;">Classic — colors + tones</button>
      <button class="btn secondary" id="sm-echo" style="width:100%;">Echo — tones only (no flash)</button>
    </div>`;
  host.querySelector('#sm-classic').onclick = () => startSimonGame(host, 'classic');
  host.querySelector('#sm-echo').onclick    = () => startSimonGame(host, 'echo');
}

function startSimonGame(host, mode) {
  const COLORS = [
    { name: 'green',  on: '#34d399', off: '#0f3a2a', freq: 329.63 },
    { name: 'red',    on: '#ef4444', off: '#3a1212', freq: 261.63 },
    { name: 'yellow', on: '#fbbf24', off: '#3a2a08', freq: 440.00 },
    { name: 'blue',   on: '#6ea8fe', off: '#15243a', freq: 196.00 }
  ];
  const isEcho = mode === 'echo';
  const bestKey = isEcho ? 'simon_echo_best' : 'simon_best';
  const best = parseInt(localStorage.getItem(bestKey) || '0');
  let seq = [], userIdx = 0, playing = false, dead = false, level = 0, lit = -1, pendingTimers = [];

  host.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="display:flex;gap:20px;font-family:sans-serif;color:#cfd2d6;font-size:14px;">
        <div>Mode: <b style="color:${isEcho ? '#fbbf24' : '#fff'};">${isEcho ? 'Echo' : 'Classic'}</b></div>
        <div>Level: <span id="lv" style="color:#fff;font-weight:bold;">0</span></div>
        <div>Best: <span style="color:#fbbf24;font-weight:bold;">${best}</span></div>
      </div>
      <div id="board" style="display:grid;grid-template-columns:160px 160px;grid-template-rows:160px 160px;gap:14px;">
        ${COLORS.map((c,i)=>`<div data-i="${i}" class="simbtn" style="background:${c.off};border-radius:18px;cursor:pointer;transition:background 0.08s;"></div>`).join('')}
      </div>
      <div id="status" style="font-family:sans-serif;color:#a3a8b1;font-size:13px;height:18px;">${isEcho ? 'Listen carefully — no visual cues.' : 'Press Start'}</div>
      <button id="go" class="btn">Start</button>
    </div>`;
  const board = host.querySelector('#board');
  const lvEl = host.querySelector('#lv'), statusEl = host.querySelector('#status');
  const goBtn = host.querySelector('#go');
  const btns = [...board.querySelectorAll('.simbtn')];

  // visual=true does the color flash; in echo playback we skip the visual so only the tone plays.
  function flash(i, dur, visual) {
    if (visual) btns[i].style.background = COLORS[i].on;
    tone(COLORS[i].freq, dur/1000, 'sine', 0.18);
    if (visual) setTimeout(() => { if (!dead) btns[i].style.background = COLORS[i].off; }, dur);
  }
  function clearTimers() { for (const t of pendingTimers) clearTimeout(t); pendingTimers = []; }
  function playSeq() {
    playing = true; userIdx = 0;
    statusEl.innerText = isEcho ? 'Listen...' : 'Watch...';
    const step = Math.max(280, 600 - seq.length * 25);
    clearTimers();
    seq.forEach((idx, i) => {
      // Echo: silent (no visual flash) during playback. User clicks always flash visually.
      pendingTimers.push(setTimeout(() => flash(idx, step * 0.7, !isEcho), i * step + 400));
    });
    pendingTimers.push(setTimeout(() => {
      playing = false;
      statusEl.innerText = 'Your turn';
    }, seq.length * step + 400));
  }
  function nextLevel() {
    seq.push(Math.floor(Math.random() * 4));
    level = seq.length;
    lvEl.innerText = level;
    playSeq();
  }
  function gameOver() {
    dead = true;
    sfx('lose');
    if (level - 1 > best) localStorage.setItem(bestKey, level - 1);
    showResult(host, {
      title: 'Wrong!', kind: 'lose',
      stat: 'Reached level ' + (level - 1),
      sub: isEcho ? 'Echo mode — by ear only.' : '',
      onRetry: () => startSimonGame(host, mode)
    });
  }

  btns.forEach((b, i) => {
    b.addEventListener('mousedown', () => {
      if (playing || dead || seq.length === 0) return;
      flash(i, 220, true);   // user click always flashes for feedback, even in echo mode
      if (seq[userIdx] === i) {
        userIdx++;
        if (userIdx >= seq.length) {
          statusEl.innerText = 'Nice!';
          setTimeout(() => { if (!dead) nextLevel(); }, 700);
        }
      } else {
        gameOver();
      }
    });
  });
  goBtn.addEventListener('click', () => {
    seq = []; userIdx = 0; level = 0; dead = false;
    goBtn.style.display = 'none';
    nextLevel();
  });

  activeCleanup = () => { clearTimers(); };
}

function startWordleSolo(host) {
  const ROWS = 6;
  const word = WORDLE_WORDS[Math.floor(Math.random()*WORDLE_WORDS.length)].toUpperCase();
  let row = 0, col = 0, dead = false, revealing = false;
  const grid = Array.from({length: ROWS}, () => Array(5).fill(''));
  const states = Array.from({length: ROWS}, () => Array(5).fill(null));
  const letterStates = {};

  host.innerHTML = `
    <style>
      @keyframes wordle-flip {
        0% { transform: rotateX(0deg); }
        50% { transform: rotateX(-90deg); }
        100% { transform: rotateX(0deg); }
      }
      @keyframes wordle-pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.12); }
        100% { transform: scale(1); }
      }
      @keyframes wordle-shake {
        0%,100% { transform: translateX(0); }
        20% { transform: translateX(-8px); }
        40% { transform: translateX(8px); }
        60% { transform: translateX(-6px); }
        80% { transform: translateX(6px); }
      }
      .wordle-cell {
        width:58px; height:58px; display:flex; align-items:center; justify-content:center;
        font-size:28px; font-weight:bold; border-radius:4px; border:2px solid #333;
        background:#1a1d22; color:#fff;
      }
      .wordle-cell.filled { border-color:#666; animation: wordle-pop 0.12s ease; }
      .wordle-cell.green  { background:#34d399; border-color:#34d399; color:#000; }
      .wordle-cell.yellow { background:#fbbf24; border-color:#fbbf24; color:#000; }
      .wordle-cell.gray   { background:#3a3a3a; border-color:#3a3a3a; color:#fff; }
      .wordle-row.shake   { animation: wordle-shake 0.45s ease; }
    </style>
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;font-family:sans-serif;">
      <div id="msg" style="height:18px;font-size:13px;color:#fbbf24;font-weight:bold;"></div>
      <div id="grid" style="display:grid;grid-template-rows:repeat(${ROWS},58px);gap:6px;"></div>
      <div id="kb" style="display:flex;flex-direction:column;gap:6px;align-items:center;"></div>
      <button class="btn secondary" id="wd-hint-btn" style="font-size:12px;padding:6px 14px;">💡 Hint (costs 1 guess)</button>
    </div>`;
  const gridEl = host.querySelector('#grid');
  const kbEl = host.querySelector('#kb');
  const msgEl = host.querySelector('#msg');

  function buildGrid() {
    gridEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      const rowEl = document.createElement('div');
      rowEl.className = 'wordle-row';
      rowEl.style.cssText = 'display:grid;grid-template-columns:repeat(5,58px);gap:6px;';
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'wordle-cell';
        const ch = grid[r][c];
        const st = states[r][c];
        if (st) cell.classList.add(st);
        else if (ch) cell.classList.add('filled');
        cell.innerText = ch;
        rowEl.appendChild(cell);
      }
      gridEl.appendChild(rowEl);
    }
  }
  function buildKb() {
    kbEl.innerHTML = '';
    const rows = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
    rows.forEach((rs, i) => {
      const r = document.createElement('div');
      r.style.cssText = 'display:flex;gap:5px;';
      if (i === 2) {
        const enter = document.createElement('div');
        enter.dataset.k = 'ENTER';
        enter.style.cssText = 'min-width:48px;padding:0 10px;height:44px;background:#444;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;';
        enter.innerText = 'ENTER';
        r.appendChild(enter);
      }
      for (const ch of rs) {
        const k = document.createElement('div');
        k.dataset.k = ch;
        const st = letterStates[ch];
        let bg = '#666';
        if (st === 'green') bg = '#34d399';
        else if (st === 'yellow') bg = '#fbbf24';
        else if (st === 'gray') bg = '#2a2a2a';
        const fg = (st === 'green' || st === 'yellow') ? '#000' : '#fff';
        k.style.cssText = `min-width:32px;width:32px;height:44px;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:bold;cursor:pointer;transition:background 0.2s;`;
        k.innerText = ch;
        r.appendChild(k);
      }
      if (i === 2) {
        const back = document.createElement('div');
        back.dataset.k = 'BACK';
        back.style.cssText = 'min-width:48px;padding:0 10px;height:44px;background:#444;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:18px;cursor:pointer;';
        back.innerText = '⌫';
        r.appendChild(back);
      }
      kbEl.appendChild(r);
    });
  }

  function showMsg(text, ms = 1400) {
    msgEl.innerText = text;
    setTimeout(() => { if (msgEl.innerText === text) msgEl.innerText = ''; }, ms);
  }

  function press(k) {
    if (dead || revealing) return;
    if (k === 'ENTER') {
      if (col !== 5) { showMsg('Not enough letters'); return; }
      submit();
    } else if (k === 'BACK') {
      if (col > 0) { col--; grid[row][col] = ''; buildGrid(); }
    } else if (/^[A-Z]$/.test(k)) {
      if (col < 5) { grid[row][col] = k; col++; buildGrid(); }
    }
  }

  function submit() {
    const guess = grid[row].join('');
    if (!WORDLE_VALID.has(guess.toLowerCase())) {
      showMsg('Not in word list');
      tone(180, 0.08, 'sawtooth', 0.10);
      const rowEl = gridEl.children[row];
      rowEl.classList.remove('shake');
      void rowEl.offsetWidth;
      rowEl.classList.add('shake');
      return;
    }
    // Compute coloring
    const wArr = word.split(''), gArr = guess.split('');
    const result = Array(5).fill('gray');
    const taken = Array(5).fill(false);
    for (let i = 0; i < 5; i++) if (gArr[i] === wArr[i]) { result[i] = 'green'; taken[i] = true; }
    for (let i = 0; i < 5; i++) {
      if (result[i] === 'green') continue;
      for (let j = 0; j < 5; j++) {
        if (!taken[j] && gArr[i] === wArr[j]) { result[i] = 'yellow'; taken[j] = true; break; }
      }
    }
    revealRow(row, result, gArr, () => {
      // After all flips done — update kb + check win/lose
      buildKb();
      if (guess === word) {
        dead = true;
        setTimeout(() => {
          showResult(host, {
            title: 'Solved!', kind: 'win',
            stat: (row + 1) + '/' + ROWS,
            sub: 'Word was ' + word,
            onRetry: () => startWordleSolo(host)
          });
        }, 300);
        return;
      }
      row++; col = 0;
      if (row >= ROWS) {
        dead = true;
        setTimeout(() => {
          showResult(host, {
            title: 'Out of guesses', kind: 'lose',
            stat: 'Word was ' + word,
            onRetry: () => startWordleSolo(host)
          });
        }, 300);
      }
    });
  }

  function revealRow(rowIdx, result, gArr, done) {
    revealing = true;
    const rowEl = gridEl.children[rowIdx];
    const STEP = 280; // ms between each cell starting
    const FLIP_DUR = 500;
    result.forEach((res, i) => {
      setTimeout(() => {
        const cell = rowEl.children[i];
        cell.style.animation = `wordle-flip ${FLIP_DUR}ms ease-in-out`;
        // Tone per letter — slightly different pitch per state
        const f = res === 'green' ? 720 : res === 'yellow' ? 540 : 360;
        tone(f, 0.08, 'sine', 0.12);
        // At halfway through the flip, swap in the colored class
        setTimeout(() => {
          states[rowIdx][i] = res;
          cell.classList.remove('filled');
          cell.classList.add(res);
        }, FLIP_DUR / 2);
        // Update letter state for keyboard tracking
        const ch = gArr[i];
        const cur = letterStates[ch];
        const rank = { green: 3, yellow: 2, gray: 1 };
        if (!cur || rank[res] > rank[cur]) letterStates[ch] = res;
      }, i * STEP);
    });
    setTimeout(() => {
      revealing = false;
      if (done) done();
    }, (result.length - 1) * STEP + FLIP_DUR + 50);
  }

  kbEl.addEventListener('click', (e) => {
    const t = e.target.closest('[data-k]');
    if (t) press(t.dataset.k);
  });
  function onKey(e) {
    if (dead) return;
    if (e.key === 'Enter') press('ENTER');
    else if (e.key === 'Backspace') press('BACK');
    else if (/^[a-zA-Z]$/.test(e.key)) press(e.key.toUpperCase());
    else return;
    e.preventDefault();
  }
  addL(window, 'keydown', onKey);

  // Hint button: reveals one letter at its true position. Costs the current guess (row advances).
  let hintUsed = false;
  function useHint() {
    const btn = host.querySelector('#wd-hint-btn');
    if (hintUsed || dead || revealing) return;
    if (row >= ROWS - 1) { showMsg('Last guess — too late for a hint'); return; }
    // Pick a position that isn't already known-green from a previous row
    const greenSet = new Set();
    for (let r2 = 0; r2 < row; r2++) for (let c2 = 0; c2 < 5; c2++) {
      if (states[r2][c2] === 'green') greenSet.add(c2);
    }
    const candidates = [];
    for (let i = 0; i < 5; i++) if (!greenSet.has(i)) candidates.push(i);
    if (!candidates.length) { showMsg('You\'re basically done!'); return; }
    const idx = candidates[Math.floor(Math.random() * candidates.length)];
    hintUsed = true;
    // Mark current row as a "hint row" — the revealed cell is green, others are blank
    for (let i = 0; i < 5; i++) { grid[row][i] = (i === idx) ? word[idx] : ''; states[row][i] = (i === idx) ? 'green' : 'gray'; }
    col = 0;
    // Update letter state for keyboard tracking
    const ch = word[idx];
    const cur = letterStates[ch];
    const rank = { green: 3, yellow: 2, gray: 1 };
    if (!cur || rank.green > rank[cur]) letterStates[ch] = 'green';
    buildGrid(); buildKb();
    showMsg('💡 Position ' + (idx+1) + ' is "' + word[idx] + '"', 3000);
    sfx('goodguess');
    row++;
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.innerText = '💡 Hint used';
  }
  host.querySelector('#wd-hint-btn').addEventListener('click', useHint);

  buildGrid(); buildKb();
  activeCleanup = () => {};
}

        @keyframes wordle-flip { 0%{transform:rotateX(0deg);} 50%{transform:rotateX(-90deg);} 100%{transform:rotateX(0deg);} }
        @keyframes wordle-pop { 0%{transform:scale(1);} 50%{transform:scale(1.12);} 100%{transform:scale(1);} }
        @keyframes wordle-shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);} }
        .wd-cell { width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;border-radius:4px;border:2px solid #333;background:#1a1d22;color:#fff; }
        .wd-cell.filled { border-color:#666; animation:wordle-pop 0.12s ease; }
        .wd-cell.green  { background:#34d399; border-color:#34d399; color:#000; }
        .wd-cell.yellow { background:#fbbf24; border-color:#fbbf24; color:#000; }
        .wd-cell.gray   { background:#3a3a3a; border-color:#3a3a3a; color:#fff; }
        .wd-mini-cell { width:14px; height:14px; border-radius:2px; background:#333; }
        .wd-mini-cell.green { background:#34d399; }
        .wd-mini-cell.yellow { background:#fbbf24; }
        .wd-mini-cell.gray { background:#555; }
        .wordle-row.shake { animation: wordle-shake 0.45s ease; }
      </style>
      <div class="game-region">
        <div class="mp-layout">
          <div class="mp-side" style="align-items:center;">
            <div id="wm-msg" style="height:18px;font-size:13px;color:#fbbf24;font-weight:bold;"></div>
            <div id="wm-grid" style="display:grid;grid-template-rows:repeat(${ROWS},48px);gap:5px;"></div>
            <div id="wm-kb" style="display:flex;flex-direction:column;gap:5px;align-items:center;"></div>
            <div style="font-size:12px;color:var(--sub);">Opponent progress:</div>
            <div id="wm-mini" style="display:grid;grid-template-rows:repeat(${ROWS},16px);gap:2px;"></div>
            <div id="wm-status"></div>
          </div>
          <div class="mp-side" id="wm-chat-host"></div>
        </div>
      </div>`;
  }
  buildUI();
  const gridEl = host.querySelector('#wm-grid');
  const kbEl = host.querySelector('#wm-kb');
  const msgEl = host.querySelector('#wm-msg');
  const miniEl = host.querySelector('#wm-mini');
  const statusBar = makeMpStatusBar(shim);
  host.querySelector('#wm-status').appendChild(statusBar.element);
  const chat = makeChatPanel(shim);
  host.querySelector('#wm-chat-host').appendChild(chat.element);
  chat.appendSystem('Same word, race to solve. First to guess wins.');

  function buildGrid() {
    gridEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      const rowEl = document.createElement('div');
      rowEl.className = 'wordle-row';
      rowEl.style.cssText = 'display:grid;grid-template-columns:repeat(5,48px);gap:5px;';
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'wd-cell';
        const ch = grid[r][c]; const st = states[r][c];
        if (st) cell.classList.add(st);
        else if (ch) cell.classList.add('filled');
        cell.innerText = ch;
        rowEl.appendChild(cell);
      }
      gridEl.appendChild(rowEl);
    }
  }
  function buildKb() {
    kbEl.innerHTML = '';
    const rows = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
    rows.forEach((rs, i) => {
      const r = document.createElement('div'); r.style.cssText = 'display:flex;gap:4px;';
      if (i === 2) {
        const enter = document.createElement('div');
        enter.dataset.k = 'ENTER';
        enter.style.cssText = 'min-width:42px;padding:0 8px;height:38px;background:#444;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:10px;font-weight:bold;cursor:pointer;';
        enter.innerText = 'ENTER';
        r.appendChild(enter);
      }
      for (const ch of rs) {
        const k = document.createElement('div');
        k.dataset.k = ch;
        const st = letterStates[ch];
        let bg = '#666';
        if (st === 'green') bg = '#34d399';
        else if (st === 'yellow') bg = '#fbbf24';
        else if (st === 'gray') bg = '#2a2a2a';
        const fg = (st === 'green' || st === 'yellow') ? '#000' : '#fff';
        k.style.cssText = `min-width:28px;width:28px;height:38px;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:bold;cursor:pointer;font-size:13px;`;
        k.innerText = ch;
        r.appendChild(k);
      }
      if (i === 2) {
        const back = document.createElement('div');
        back.dataset.k = 'BACK';
        back.style.cssText = 'min-width:42px;padding:0 8px;height:38px;background:#444;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:16px;cursor:pointer;';
        back.innerText = '⌫';
        r.appendChild(back);
      }
      kbEl.appendChild(r);
    });
  }
  function buildMini() {
    miniEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      const rowEl = document.createElement('div');
      rowEl.style.cssText = 'display:grid;grid-template-columns:repeat(5,14px);gap:2px;';
      const rowRes = theirResults[r];
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'wd-mini-cell';
        if (rowRes && (rowRes[c] === 'green' || rowRes[c] === 'yellow' || rowRes[c] === 'gray')) {
          cell.classList.add(rowRes[c]);
        } else if (r < theirRow) {
          // Fallback if a result wasn't received (e.g., older client): show muted gray
          cell.classList.add('gray');
          cell.style.opacity = '0.6';
        }
        rowEl.appendChild(cell);
      }
      miniEl.appendChild(rowEl);
    }
  }
  function showMsg(text, ms = 1400) {
    msgEl.innerText = text;
    setTimeout(() => { if (msgEl.innerText === text) msgEl.innerText = ''; }, ms);
  }
  function press(k) {
    if (dead || revealing || !word) return;
    if (k === 'ENTER') { if (col !== 5) { showMsg('Not enough letters'); return; } submit(); }
    else if (k === 'BACK') { if (col > 0) { col--; grid[row][col] = ''; buildGrid(); } }
    else if (/^[A-Z]$/.test(k)) { if (col < 5) { grid[row][col] = k; col++; buildGrid(); } }
  }
  function submit() {
    const guess = grid[row].join('');
    if (!WORDLE_VALID.has(guess.toLowerCase())) {
      showMsg('Not in word list'); tone(180, 0.08, 'sawtooth', 0.10);
      const rowEl = gridEl.children[row]; rowEl.classList.remove('shake'); void rowEl.offsetWidth; rowEl.classList.add('shake');
      return;
    }
    const wArr = word.split(''), gArr = guess.split('');
    const result = Array(5).fill('gray');
    const taken = Array(5).fill(false);
    for (let i = 0; i < 5; i++) if (gArr[i] === wArr[i]) { result[i] = 'green'; taken[i] = true; }
    for (let i = 0; i < 5; i++) {
      if (result[i] === 'green') continue;
      for (let j = 0; j < 5; j++) {
        if (!taken[j] && gArr[i] === wArr[j]) { result[i] = 'yellow'; taken[j] = true; break; }
      }
    }
    const submittedRow = row;
    const submittedResult = result.slice();
    revealRow(row, result, gArr, () => {
      buildKb();
      if (guess === word) {
        dead = true; myFinishedAt = Date.now();
        try { shim.emit('game', { type: 'wd-progress', row: row + 1, solved: true, t: myFinishedAt, rowIdx: submittedRow, result: submittedResult }); } catch (e) {}
        decideWinner();
        return;
      }
      row++; col = 0;
      try { shim.emit('game', { type: 'wd-progress', row, solved: false, rowIdx: submittedRow, result: submittedResult }); } catch (e) {}
      if (row >= ROWS) {
        dead = true;
        try { shim.emit('game', { type: 'wd-progress', row, solved: false, out: true, t: Date.now() }); } catch (e) {}
        decideWinner();
      }
    });
  }
  function revealRow(rowIdx, result, gArr, done) {
    revealing = true;
    const rowEl = gridEl.children[rowIdx];
    const STEP = 240, FLIP_DUR = 420;
    result.forEach((res, i) => {
      setTimeout(() => {
        const cell = rowEl.children[i];
        cell.style.animation = `wordle-flip ${FLIP_DUR}ms ease-in-out`;
        const f = res === 'green' ? 720 : res === 'yellow' ? 540 : 360;
        tone(f, 0.08, 'sine', 0.12);
        setTimeout(() => { states[rowIdx][i] = res; cell.classList.remove('filled'); cell.classList.add(res); }, FLIP_DUR / 2);
        const ch = gArr[i];
        const cur = letterStates[ch];
        const rank = { green: 3, yellow: 2, gray: 1 };
        if (!cur || rank[res] > rank[cur]) letterStates[ch] = res;
      }, i * STEP);
    });
    setTimeout(() => { revealing = false; if (done) done(); }, (result.length - 1) * STEP + FLIP_DUR + 50);
  }
  function decideWinner() {
    // We act when both sides are 'done' (solved or out of guesses)
    const meDone = dead;
    const themDone = theirSolved || theirRow >= ROWS;
    if (!(meDone && themDone)) return;
    let kind, title, sub;
    const meSolved = !!myFinishedAt && (states[row] || []).some(s => false) ? false : true; // we set myFinishedAt only if solved (not on out)
    const iSolved = !!myFinishedAt && row < ROWS;
    if (iSolved && theirSolved) {
      // Tie-break by time
      if (myFinishedAt < theirFinishedAt) { kind = 'win'; title = 'You won the race!'; }
      else if (myFinishedAt > theirFinishedAt) { kind = 'lose'; title = 'They were faster!'; }
      else { kind = 'draw'; title = 'Photo finish!'; }
      sub = 'Word was ' + word;
    } else if (iSolved) { kind = 'win'; title = 'You solved it!'; sub = 'Word was ' + word; }
    else if (theirSolved) { kind = 'lose'; title = 'They solved it'; sub = 'Word was ' + word; }
    else { kind = 'draw'; title = 'Both ran out'; sub = 'Word was ' + word; }
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title, sub, kind, dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 600);
  }

  scope.on('game', (m) => {
    if (!m) return;
    if (m.type === 'wd-init' && !word) {
      word = String(m.word).toUpperCase();
      try { shim.emit('game', { type: 'wd-ready' }); } catch (e) {}
      buildGrid(); buildKb(); buildMini();
      msgEl.innerText = 'Go!';
      setTimeout(() => { if (msgEl.innerText === 'Go!') msgEl.innerText = ''; }, 800);
    } else if (m.type === 'wd-ready') {
      // host sees that guest is ready — no-op (host already started)
    } else if (m.type === 'wd-progress') {
      if (typeof m.rowIdx === 'number' && Array.isArray(m.result) && m.rowIdx >= 0 && m.rowIdx < ROWS) {
        const sanitized = m.result.slice(0, 5).map(x => (x === 'green' || x === 'yellow' || x === 'gray') ? x : 'gray');
        if (sanitized.length === 5) theirResults[m.rowIdx] = sanitized;
      }
      theirRow = Math.max(0, Math.min(ROWS, m.row|0));
      if (m.solved) { theirSolved = true; theirFinishedAt = m.t || Date.now(); }
      else if (m.out) { theirFinishedAt = m.t || Date.now(); }
      buildMini();
      decideWinner();
    }
  });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    startWordleMP(host, shim);
  });
  scope.on('closed', () => {
    if (dead) return;
    dead = true;
    chat.appendSystem('Opponent disconnected.');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Opponent left.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startWordle(host)
      });
    }, 250);
  });

  kbEl.addEventListener('click', (e) => { const t = e.target.closest('[data-k]'); if (t) press(t.dataset.k); });
  function onKey(e) {
    if (dead) return;
    // Don't intercept keys while the user is typing into an input (e.g., chat).
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.key === 'Enter') press('ENTER');
    else if (e.key === 'Backspace') press('BACK');
    else if (/^[a-zA-Z]$/.test(e.key)) press(e.key.toUpperCase());
    else return;
    e.preventDefault();
  }
  addL(window, 'keydown', onKey);

  // Bootstrap: host picks a word and broadcasts. Guest waits.
  if (isHost) {
    word = WORDLE_WORDS[Math.floor(Math.random() * WORDLE_WORDS.length)].toUpperCase();
    try { shim.emit('game', { type: 'wd-init', word }); } catch (e) {}
    buildGrid(); buildKb(); buildMini();
    msgEl.innerText = 'Go!';
    setTimeout(() => { if (msgEl.innerText === 'Go!') msgEl.innerText = ''; }, 800);
  } else {
    buildGrid(); buildKb(); buildMini();
    msgEl.innerText = 'Waiting for host…';
  }

  activeCleanup = () => {
    statusBar.destroy(); chat.destroy();
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}

/* ============================================================
   ANAGRAM RUSH — unscramble against the clock
   ============================================================ */
function startAnagram(host) {
  showPartyLobby(host, {
    gameId: 'ana', gameTitle: 'Anagram Rush', icon: '🔤',
    soloLabel: 'Solo (60s)',
    onSolo: () => startAnagramSolo(host),
    onConnected: (h, shim, settings) => startAnagramMP(h, shim)
  });
}

const ANAGRAM_POOL = (typeof WORDLE_WORDS !== 'undefined' ? WORDLE_WORDS : []).concat([
  'cat','dog','run','sky','red','big','sun','moon','star','tree',
  'book','fish','jump','play','ring','song','wind','fire','snow','rain',
  'happy','dance','peace','smile','laugh','sweet','quick','brave','sharp','clean'
]);

function startAnagramSolo(host) {
  const POOL = ANAGRAM_POOL;
  const DUR = 60;
  let timeLeft = DUR, score = 0, current = '', scrambled = '', lastT=0, raf=null, started=false, ended=false, skips=3;
  const best = parseInt(localStorage.getItem('anagram_best') || '0');

  host.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;font-family:sans-serif;">
      <div style="display:flex;gap:20px;color:#cfd2d6;font-size:14px;">
        <div>Time: <span id="t" style="color:#fff;font-weight:bold;">${DUR.toFixed(1)}</span></div>
        <div>Score: <span id="s" style="color:#34d399;font-weight:bold;">0</span></div>
        <div>Skips: <span id="sk" style="color:#fbbf24;font-weight:bold;">3</span></div>
        <div>Best: <span style="color:#fbbf24;font-weight:bold;">${best}</span></div>
      </div>
      <div id="word" style="font-family:'Courier New',monospace;font-size:48px;letter-spacing:14px;color:#fbbf24;background:#1a1d22;padding:24px 30px;border-radius:10px;font-weight:bold;"></div>
      <input id="inp" autofocus style="width:300px;padding:12px;font-size:20px;background:#1a1d22;color:#fff;border:1px solid #333;border-radius:8px;outline:none;text-align:center;font-family:'Courier New',monospace;text-transform:uppercase;" placeholder="Type the word">
      <div style="display:flex;gap:10px;">
        <button id="skip" class="btn secondary" style="font-size:13px;padding:8px 14px;">Skip (-1)</button>
      </div>
      <div style="font-size:11px;color:#888;">Type the unscrambled word and press Enter. 60 seconds.</div>
    </div>`;
  const tEl = host.querySelector('#t'), sEl = host.querySelector('#s'), skEl = host.querySelector('#sk');
  const wordEl = host.querySelector('#word'), inp = host.querySelector('#inp'), skipBtn = host.querySelector('#skip');

  function scramble(w) {
    const a = w.split('');
    let s;
    do {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      s = a.join('');
    } while (s === w && w.length > 1);
    return s;
  }
  function next() {
    current = POOL[Math.floor(Math.random() * POOL.length)].toLowerCase();
    scrambled = scramble(current);
    wordEl.innerText = scrambled.toUpperCase();
    inp.value = '';
  }
  function update() {
    tEl.innerText = timeLeft.toFixed(1);
    sEl.innerText = score;
    skEl.innerText = skips;
  }
  function end() {
    ended = true;
    if (score > best) localStorage.setItem('anagram_best', score);
    showResult(host, {
      title: 'Time!', kind: 'win',
      stat: score + ' words',
      onRetry: () => startAnagram(host)
    });
  }
  function tick() {
    const now = performance.now()/1000;
    const dt = Math.min(0.1, now - lastT);
    lastT = now;
    if (started && !ended) {
      timeLeft -= dt;
      if (timeLeft <= 0) { timeLeft = 0; update(); end(); return; }
    }
    update();
    raf = requestAnimationFrame(tick);
  }

  inp.addEventListener('input', () => {
    if (ended) return;
    if (!started) { started = true; lastT = performance.now()/1000; }
    if (inp.value.toLowerCase() === current) {
      score++;
      sfx('pop');
      next();
    }
  });
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') e.preventDefault();
  });
  skipBtn.addEventListener('click', () => {
    if (ended || skips <= 0) return;
    skips--;
    score = Math.max(0, score - 1);
    next(); update();
    inp.focus();
  });

  next(); update(); tick();
  setTimeout(() => inp.focus(), 50);
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

function startAnagramMP(host, shim) {
  const scope = shim.scope();
  // Both players race the SAME word list. Host shuffles the seed and sends.
  // Whoever gets the most words in 60s wins.
  const DUR = 60;
  let pool;
  let timeLeft = DUR, myScore = 0, theirScore = 0, current = '', scrambled = '', lastT = 0, raf = null, started = false, ended = false;
  let wordIdx = 0;
  let countdown = 3;     // 3-2-1 sync start
  let starting = false;
  let opponentReady = false;
  let myReady = false;
  let rematchUI = null;

  function scramble(w) {
    const a = w.split('');
    let s;
    do {
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i],a[j]] = [a[j],a[i]]; }
      s = a.join('');
    } while (s === w && w.length > 1);
    return s;
  }
  function pickPool() {
    // Both sides need the same word sequence. Host picks ~80 words and sends.
    if (shim.role === 'host') {
      const list = [];
      for (let i = 0; i < 80; i++) list.push(ANAGRAM_POOL[Math.floor(Math.random() * ANAGRAM_POOL.length)].toLowerCase());
      try { shim.emit('game', { type: 'ana-pool', list }); } catch (e) {}
      return list;
    }
    return null; // wait for host
  }
  function buildUI() {
    host.innerHTML = `
      <div class="game-region">
        <div class="mp-layout">
          <div class="mp-side" style="align-items:center;min-width:380px;">
            <div style="display:flex;gap:24px;color:#cfd2d6;font-size:14px;">
              <div>Time: <b id="ana-t">${DUR.toFixed(1)}</b></div>
              <div>You: <b id="ana-my" style="color:#34d399;">0</b></div>
              <div>Them: <b id="ana-their" style="color:#f87171;">0</b></div>
            </div>
            <div id="ana-word" style="font-family:'Courier New',monospace;font-size:48px;letter-spacing:14px;color:#fbbf24;background:#1a1d22;padding:24px 30px;border-radius:10px;font-weight:bold;min-height:60px;text-align:center;">…</div>
            <input id="ana-inp" autocomplete="off" style="width:300px;padding:12px;font-size:20px;background:#1a1d22;color:#fff;border:1px solid #333;border-radius:8px;outline:none;text-align:center;font-family:'Courier New',monospace;text-transform:uppercase;" placeholder="Waiting…" disabled>
            <div id="ana-msg" style="font-size:13px;color:var(--sub);min-height:18px;"></div>
            <div id="ana-status"></div>
          </div>
          <div class="mp-side" id="ana-chat-host"></div>
        </div>
      </div>`;
  }
  function updateScore() {
    const m = host.querySelector('#ana-my'); const t = host.querySelector('#ana-their');
    if (m) m.innerText = myScore;
    if (t) t.innerText = theirScore;
    const tEl = host.querySelector('#ana-t'); if (tEl) tEl.innerText = timeLeft.toFixed(1);
  }
  function nextWord() {
    if (!pool || wordIdx >= pool.length) { current = ''; scrambled = ''; }
    else { current = pool[wordIdx++]; scrambled = scramble(current); }
    const w = host.querySelector('#ana-word'); if (w) w.innerText = scrambled.toUpperCase();
    const inp = host.querySelector('#ana-inp'); if (inp) inp.value = '';
  }
  function tick() {
    const now = performance.now()/1000;
    const dt = Math.min(0.1, now - lastT);
    lastT = now;
    if (started && !ended) {
      timeLeft -= dt;
      if (timeLeft <= 0) { timeLeft = 0; updateScore(); finish(); return; }
    }
    updateScore();
    raf = requestAnimationFrame(tick);
  }
  function finish() {
    if (ended) return;
    ended = true;
    try { shim.emit('game', { type: 'ana-final', score: myScore }); } catch (e) {}
    // Reveal result based on what we have
    const kind = myScore > theirScore ? 'win' : myScore < theirScore ? 'lose' : 'draw';
    const title = kind === 'win' ? 'You win!' : kind === 'lose' ? 'You lose' : 'Tie';
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title, sub: `You: ${myScore} · Them: ${theirScore}`, kind, dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 350);
  }
  function startCountdown() {
    if (starting) return;
    starting = true;
    const w = host.querySelector('#ana-word');
    const inp = host.querySelector('#ana-inp');
    inp.disabled = true;
    let n = 3;
    const tick2 = () => {
      if (n === 0) {
        nextWord();
        inp.disabled = false; inp.placeholder = 'Type the word'; inp.focus();
        started = true; lastT = performance.now()/1000; tick();
        const msg = host.querySelector('#ana-msg'); if (msg) msg.innerText = 'Go!';
        setTimeout(() => { const m2 = host.querySelector('#ana-msg'); if (m2 && m2.innerText==='Go!') m2.innerText = ''; }, 800);
        return;
      }
      w.innerText = String(n);
      n--; setTimeout(tick2, 800);
    };
    tick2();
  }
  function maybeBegin() {
    if (myReady && opponentReady && pool) startCountdown();
  }

  buildUI();
  const statusBar = makeMpStatusBar(shim);
  host.querySelector('#ana-status').appendChild(statusBar.element);
  const chat = makeChatPanel(shim);
  host.querySelector('#ana-chat-host').appendChild(chat.element);
  chat.appendSystem('Race: 60 seconds. Type each scrambled word.');

  const inp = host.querySelector('#ana-inp');
  inp.addEventListener('input', () => {
    if (!started || ended) return;
    if (inp.value.toLowerCase() === current) {
      myScore++;
      sfx('pop');
      try { shim.emit('game', { type: 'ana-score', score: myScore }); } catch (e) {}
      nextWord();
      updateScore();
    }
  });
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });

  scope.on('game', (m) => {
    if (!m) return;
    if (m.type === 'ana-pool' && Array.isArray(m.list) && !pool) {
      pool = m.list.slice();
      myReady = true; opponentReady = true;
      try { shim.emit('game', { type: 'ana-ready' }); } catch (e) {}
      maybeBegin();
    } else if (m.type === 'ana-ready') {
      opponentReady = true; maybeBegin();
    } else if (m.type === 'ana-score') {
      theirScore = m.score|0; updateScore();
    } else if (m.type === 'ana-final' && !ended) {
      theirScore = m.score|0;
      updateScore();
      // wait for our own timer to fire finish
    }
  });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    startAnagramMP(host, shim);
  });
  scope.on('closed', () => {
    if (ended) return;
    ended = true;
    chat.appendSystem('Opponent disconnected.');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Opponent left.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startAnagram(host)
      });
    }, 250);
  });

  // Bootstrap word pool
  if (shim.role === 'host') {
    pool = pickPool();
    myReady = true;
    try { shim.emit('game', { type: 'ana-ready' }); } catch (e) {}
    maybeBegin();
  } else {
    myReady = true;
    try { shim.emit('game', { type: 'ana-ready' }); } catch (e) {}
    const msg = host.querySelector('#ana-msg'); if (msg) msg.innerText = 'Waiting for host to send words…';
  }

  activeCleanup = () => {
    if (raf) cancelAnimationFrame(raf);
    statusBar.destroy(); chat.destroy();
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}

function startHangman(host) {
  const MAX_WRONG = 6;
  let word = '', revealed = new Set(), wrong = new Set(), hintStrikes = 0, ended = false, hintsLeft = 2;
  function totalStrikes() { return wrong.size + hintStrikes; }
  function pick() {
    word = HANGMAN_WORDS[Math.floor(Math.random() * HANGMAN_WORDS.length)].toLowerCase();
    revealed = new Set(); wrong = new Set(); hintStrikes = 0; ended = false; hintsLeft = 2;
    render();
  }
  function useHint() {
    if (ended || hintsLeft <= 0) return;
    if (totalStrikes() >= MAX_WRONG - 1) return; // would be insta-death; refuse
    const candidates = [];
    for (const ch of new Set(word)) if (!revealed.has(ch)) candidates.push(ch);
    if (!candidates.length) return;
    const ch = candidates[Math.floor(Math.random() * candidates.length)];
    revealed.add(ch);
    hintStrikes++;
    hintsLeft--;
    sfx('goodguess');
    if (word.split('').every(c => revealed.has(c))) finish('win');
    else if (totalStrikes() >= MAX_WRONG) finish('lose');
    render();
  }
  function display() {
    return word.split('').map(c => revealed.has(c) ? c.toUpperCase() : '_').join(' ');
  }
  function guess(letter) {
    if (ended) return;
    letter = letter.toLowerCase();
    if (!/^[a-z]$/.test(letter)) return;
    if (revealed.has(letter) || wrong.has(letter)) return;
    if (word.includes(letter)) {
      revealed.add(letter); sfx('goodguess');
      if (word.split('').every(c => revealed.has(c))) finish('win');
    } else {
      wrong.add(letter); sfx('badguess');
      if (totalStrikes() >= MAX_WRONG) finish('lose');
    }
    render();
  }
  function finish(kind) {
    ended = true;
    sfx(kind === 'win' ? 'win' : 'lose');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: kind === 'win' ? 'Saved!' : 'Hung!',
        sub: kind === 'win' ? `You guessed "${word}".` : `The word was "${word}".`,
        kind, dismissable: true,
        onRetry: pick
      });
    }, 350);
  }
  function drawHangman(ctx, stage) {
    const W = 200, H = 220;
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = '#cfd2d6'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    // Gallows base + post + beam + rope (always present)
    ctx.beginPath();
    ctx.moveTo(20, H - 10); ctx.lineTo(150, H - 10);              // base
    ctx.moveTo(50, H - 10); ctx.lineTo(50, 20);                   // post
    ctx.lineTo(140, 20);                                           // beam
    ctx.lineTo(140, 40);                                           // rope
    ctx.stroke();
    if (stage >= 1) { // head
      ctx.beginPath(); ctx.arc(140, 55, 14, 0, Math.PI*2); ctx.stroke();
    }
    if (stage >= 2) { // body
      ctx.beginPath(); ctx.moveTo(140, 69); ctx.lineTo(140, 130); ctx.stroke();
    }
    if (stage >= 3) { // left arm
      ctx.beginPath(); ctx.moveTo(140, 85); ctx.lineTo(120, 110); ctx.stroke();
    }
    if (stage >= 4) { // right arm
      ctx.beginPath(); ctx.moveTo(140, 85); ctx.lineTo(160, 110); ctx.stroke();
    }
    if (stage >= 5) { // left leg
      ctx.beginPath(); ctx.moveTo(140, 130); ctx.lineTo(120, 160); ctx.stroke();
    }
    if (stage >= 6) { // right leg + face
      ctx.beginPath(); ctx.moveTo(140, 130); ctx.lineTo(160, 160); ctx.stroke();
      ctx.strokeStyle = '#f87171'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(135, 51); ctx.lineTo(141, 57); ctx.moveTo(141, 51); ctx.lineTo(135, 57); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(145, 51); ctx.lineTo(151, 57); ctx.moveTo(151, 51); ctx.lineTo(145, 57); ctx.stroke();
    }
  }
  function render() {
    host.querySelector('#hm-word').innerText = display();
    host.querySelector('#hm-wrong').innerText = wrong.size ? [...wrong].map(c => c.toUpperCase()).sort().join(' ') : '—';
    host.querySelector('#hm-left').innerText = MAX_WRONG - totalStrikes();
    drawHangman(host.querySelector('#hm-cv').getContext('2d'), totalStrikes());
    // Update letter buttons
    host.querySelectorAll('.hm-letter').forEach(btn => {
      const l = btn.dataset.letter;
      const used = revealed.has(l) || wrong.has(l);
      btn.disabled = used || ended;
      btn.style.opacity = used ? '0.35' : '1';
      btn.style.background = revealed.has(l) ? '#1f3a2e' : (wrong.has(l) ? '#3a1f1f' : 'var(--panel-2)');
    });
    const hb = host.querySelector('#hm-hint');
    if (hb) {
      const canUse = !ended && hintsLeft > 0 && totalStrikes() < MAX_WRONG - 1;
      hb.disabled = !canUse;
      hb.style.opacity = canUse ? '1' : '0.4';
      hb.innerText = `💡 Hint (${hintsLeft} left, costs 1 strike)`;
    }
  }
  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:14px;font-family:sans-serif;">
      <div style="display:flex;gap:24px;align-items:center;">
        <canvas id="hm-cv" width="200" height="220" style="background:#1a1d22;border-radius:10px;border:1px solid var(--border);"></canvas>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div id="hm-word" style="font-family:monospace;font-size:34px;letter-spacing:8px;color:#fbbf24;text-align:center;min-width:300px;background:var(--panel-2);padding:14px 18px;border-radius:8px;border:1px solid var(--border);"></div>
          <div style="display:flex;justify-content:space-between;color:var(--sub);font-size:13px;">
            <div>Wrong: <span id="hm-wrong" style="color:#f87171;font-weight:bold;letter-spacing:3px;">—</span></div>
            <div>Tries left: <b id="hm-left" style="color:#34d399;">6</b></div>
          </div>
          <div id="hm-letters" style="display:grid;grid-template-columns:repeat(13,1fr);gap:4px;"></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn secondary" id="hm-hint">💡 Hint (2 left, costs 1 strike)</button>
        <button class="btn secondary" id="hm-reset">New Word</button>
      </div>
    </div>`;
  // Build letter buttons
  const letEl = host.querySelector('#hm-letters');
  for (let i = 0; i < 26; i++) {
    const l = String.fromCharCode(65 + i);
    const b = document.createElement('button');
    b.className = 'btn secondary hm-letter';
    b.dataset.letter = l.toLowerCase();
    b.innerText = l;
    b.style.cssText = 'padding:8px 0;font-size:13px;font-weight:bold;min-width:32px;';
    b.addEventListener('click', () => guess(l));
    letEl.appendChild(b);
  }
  host.querySelector('#hm-reset').addEventListener('click', pick);
  host.querySelector('#hm-hint').addEventListener('click', useHint);
  function onKey(e) {
    if (e.repeat) return;
    if (/^[a-zA-Z]$/.test(e.key)) guess(e.key);
  }
  addL(window, 'keydown', onKey);
  pick();
  activeCleanup = () => {};
}

/* ============================================================
   WATER SORT — pour-puzzle. Sort colored liquids into single-color tubes.
   ============================================================ */
function startWaterSort(host) {
  const TUBE_CAP = 4;       // each tube holds 4 segments
  const COLORS = [
    '#ef4444',  // red
    '#fbbf24',  // amber
    '#34d399',  // green
    '#22d3ee',  // cyan
    '#3b82f6',  // blue
    '#a78bfa',  // violet
    '#f472b6',  // pink
    '#fb923c',  // orange
    '#a3e635'   // lime
  ];
  let tubes = [];           // tubes[i] = array of color indices, bottom→top
  let selected = -1;
  let moves = 0, ended = false;
  let history = [];
  let level = 1;
  let animating = false;    // block input during pour animation
  let hintsLeft = 3;

  function buildLevel(lv) {
    const numColors = Math.min(3 + lv, COLORS.length);
    tubes = [];
    hintsLeft = 3;
    const allSegments = [];
    for (let c = 0; c < numColors; c++) for (let k = 0; k < TUBE_CAP; k++) allSegments.push(c);
    for (let i = allSegments.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [allSegments[i], allSegments[j]] = [allSegments[j], allSegments[i]]; }
    for (let i = 0; i < numColors; i++) tubes.push(allSegments.slice(i * TUBE_CAP, (i+1) * TUBE_CAP));
    tubes.push([]); tubes.push([]);
    moves = 0; selected = -1; history = []; ended = false; animating = false;
  }
  function clone(arr) { return arr.map(a => a.slice()); }
  function topColor(t) { return t.length ? t[t.length - 1] : -1; }
  function topRunLen(t) {
    if (!t.length) return 0;
    const c = t[t.length - 1];
    let n = 0;
    for (let i = t.length - 1; i >= 0 && t[i] === c; i--) n++;
    return n;
  }
  function canPour(srcIdx, dstIdx) {
    if (srcIdx === dstIdx) return 0;
    const src = tubes[srcIdx], dst = tubes[dstIdx];
    if (!src.length || dst.length >= TUBE_CAP) return 0;
    const c = topColor(src);
    if (dst.length && topColor(dst) !== c) return 0;
    return Math.min(topRunLen(src), TUBE_CAP - dst.length);
  }
  function isSolved() {
    return tubes.every(t => t.length === 0 || (t.length === TUBE_CAP && t.every(x => x === t[0])));
  }
  function isTubeComplete(t) {
    return t.length === TUBE_CAP && t.every(x => x === t[0]);
  }
  function undo() {
    if (!history.length || ended || animating) return;
    tubes = history.pop();
    moves = Math.max(0, moves - 1);
    selected = -1;
    sfx('click');
    render();
  }

  // --- Pour animation: src tube tilts toward dst, water "stream" appears, dst fills ---
  function animatePour(srcIdx, dstIdx, count, color, onDone) {
    animating = true;
    const wrap = host.querySelector('#ws-wrap');
    const srcEl = wrap.children[srcIdx];
    const dstEl = wrap.children[dstIdx];
    if (!srcEl || !dstEl) { onDone(); return; }
    const srcRect = srcEl.getBoundingClientRect();
    const dstRect = dstEl.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();
    // Direction: dst is to which side of src?
    const goingRight = dstRect.left > srcRect.left;
    // Tilt source toward dst
    srcEl.style.transformOrigin = goingRight ? '100% 100%' : '0% 100%';
    srcEl.style.transition = 'transform 0.18s ease-in';
    srcEl.style.transform = `translateY(-50px) rotate(${goingRight ? -55 : 55}deg)`;
    srcEl.style.zIndex = '5';

    // Water stream — a thin rectangle from source mouth to dst mouth
    const stream = document.createElement('div');
    const c = COLORS[color];
    const streamX = (goingRight ? srcRect.right : srcRect.left) - wrapRect.left;
    const streamY = srcRect.top - wrapRect.top + 10;
    stream.style.cssText = `position:absolute;left:${streamX}px;top:${streamY}px;width:5px;height:0;background:${c};pointer-events:none;transition:height 0.18s linear;`;
    wrap.style.position = 'relative';
    wrap.appendChild(stream);
    sfx('pour');

    setTimeout(() => {
      // Fill stream height to reach dst tube top
      const dstTopY = dstRect.top - wrapRect.top + 10;
      const streamHeight = Math.max(20, dstTopY - streamY);
      stream.style.height = streamHeight + 'px';
      // Apply pour to data structure progressively (one drop at a time)
      let dropped = 0;
      const dropInterval = setInterval(() => {
        // Move one segment from src to dst
        tubes[srcIdx].pop();
        tubes[dstIdx].push(color);
        dropped++;
        // Update just those two tubes visually
        renderSingleTube(srcIdx);
        renderSingleTube(dstIdx);
        if (dropped >= count) {
          clearInterval(dropInterval);
          // Untilt source
          srcEl.style.transition = 'transform 0.22s ease-out';
          srcEl.style.transform = '';
          stream.style.transition = 'opacity 0.15s';
          stream.style.opacity = '0';
          setTimeout(() => {
            try { stream.remove(); } catch (e) {}
            srcEl.style.zIndex = '';
            srcEl.style.transformOrigin = '';
            // If dst tube is now complete, celebrate
            if (isTubeComplete(tubes[dstIdx])) {
              dstEl.classList.add('complete');
              sfx('tubedone');
              spawnSparkles(dstEl);
            }
            animating = false;
            onDone();
          }, 250);
        }
      }, 120);
    }, 180);
  }

  function spawnSparkles(tubeEl) {
    const wrap = host.querySelector('#ws-wrap');
    const r = tubeEl.getBoundingClientRect();
    const wr = wrap.getBoundingClientRect();
    const cx = r.left - wr.left + r.width/2;
    const cy = r.top - wr.top + 10;
    for (let i = 0; i < 8; i++) {
      const sp = document.createElement('div');
      const ang = (Math.PI * 2 * i / 8) + Math.random() * 0.2;
      const dist = 22 + Math.random() * 18;
      sp.style.cssText = `position:absolute;left:${cx-3}px;top:${cy-3}px;width:6px;height:6px;background:#fde047;border-radius:50%;pointer-events:none;box-shadow:0 0 8px #fbbf24;transition:transform 0.6s ease-out, opacity 0.6s;`;
      wrap.appendChild(sp);
      requestAnimationFrame(() => {
        sp.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist - 10}px)`;
        sp.style.opacity = '0';
      });
      setTimeout(() => { try { sp.remove(); } catch (e) {} }, 700);
    }
  }

  function clickTube(idx) {
    if (ended || animating) return;
    const wrap = host.querySelector('#ws-wrap');
    if (selected === -1) {
      if (tubes[idx].length === 0) { sfx('invalid'); return; }
      selected = idx;
      wrap.children[idx].classList.add('selected');
      sfx('tubeup');
    } else if (selected === idx) {
      wrap.children[idx].classList.remove('selected');
      selected = -1;
      sfx('click');
    } else {
      const room = canPour(selected, idx);
      if (room > 0) {
        const snapshot = clone(tubes);
        history.push(snapshot);
        moves++;
        const color = topColor(tubes[selected]);
        const fromIdx = selected;
        wrap.children[fromIdx].classList.remove('selected');
        selected = -1;
        animatePour(fromIdx, idx, room, color, () => {
          host.querySelector('#ws-moves').innerText = moves;
          if (isSolved()) finish('win');
        });
      } else {
        sfx('invalid');
        wrap.children[selected].classList.remove('selected');
        if (tubes[idx].length) {
          selected = idx;
          wrap.children[idx].classList.add('selected');
          sfx('tubeup');

/* ============================================================
   CHECKERS — 8x8, mandatory jumps, kings. Solo (vs AI) or 1v1 MP.
   ============================================================ */
// --- Module-level rule helpers (shared by solo + MP) ---
function ckEmptyBoard() { return Array.from({length: 8}, () => Array(8).fill(null)); }
function ckInitialBoard() {
  const b = ckEmptyBoard();
  for (let r = 0; r < 3; r++) for (let c = 0; c < 8; c++) if ((r + c) % 2 === 1) b[r][c] = 'b';
  for (let r = 5; r < 8; r++) for (let c = 0; c < 8; c++) if ((r + c) % 2 === 1) b[r][c] = 'r';
  return b;
}
function ckIsOpp(p, side) { return p && p.toLowerCase() !== side; }
function ckIsOwn(p, side) { return p && p.toLowerCase() === side; }
function ckDirs(piece) {
  if (piece === 'r') return [[-1,-1],[-1,1]];
  if (piece === 'b') return [[1,-1],[1,1]];
  return [[-1,-1],[-1,1],[1,-1],[1,1]];
}
function ckInB(r, c) { return r >= 0 && r < 8 && c >= 0 && c < 8; }
function ckFindJumps(b, r, c, piece, visited) {
  const ds = ckDirs(piece);
  const side = piece.toLowerCase();
  const sequences = [];
  visited = visited || new Set();
  for (const [dr, dc] of ds) {
    const mr = r + dr, mc = c + dc;
    const lr = r + 2*dr, lc = c + 2*dc;
    if (!ckInB(lr, lc)) continue;
    const mid = b[mr][mc];
    if (!mid || !ckIsOpp(mid, side)) continue;
    if (b[lr][lc] !== null) continue;
    const key = mr + ',' + mc;
    if (visited.has(key)) continue;
    const captured = mid;
    b[lr][lc] = piece; b[r][c] = null; b[mr][mc] = null;
    const newVisited = new Set(visited); newVisited.add(key);
    const further = ckFindJumps(b, lr, lc, piece, newVisited);
    if (further.length === 0) sequences.push([{ from: [r, c], to: [lr, lc], cap: [mr, mc] }]);
    else for (const f of further) sequences.push([{ from: [r, c], to: [lr, lc], cap: [mr, mc] }, ...f]);
    b[r][c] = piece; b[lr][lc] = null; b[mr][mc] = captured;
  }
  return sequences;
}
function ckAllLegalMoves(b, side) {
  const out = [];
  let hasJumps = false;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const p = b[r][c];
    if (!p || !ckIsOwn(p, side)) continue;
    const jumps = ckFindJumps(b, r, c, p);
    if (jumps.length) { hasJumps = true; for (const seq of jumps) out.push({ kind: 'jump', from: [r, c], seq }); }
  }
  if (hasJumps) return out;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const p = b[r][c];
    if (!p || !ckIsOwn(p, side)) continue;
    for (const [dr, dc] of ckDirs(p)) {
      const nr = r + dr, nc = c + dc;
      if (!ckInB(nr, nc) || b[nr][nc] !== null) continue;
      out.push({ kind: 'move', from: [r, c], to: [nr, nc] });
    }
  }
  return out;
}
// Returns whether the move resulted in a king promotion (so caller can play the fanfare)
function ckApplyMove(b, m) {
  let promoted = false;
  if (m.kind === 'move') {
    const [r, c] = m.from, [nr, nc] = m.to;
    let p = b[r][c]; b[r][c] = null;
    if (p === 'r' && nr === 0) { p = 'R'; promoted = true; }
    if (p === 'b' && nr === 7) { p = 'B'; promoted = true; }
    b[nr][nc] = p;
  } else {
    let cur = m.from;
    let p = b[cur[0]][cur[1]];
    const wasKing = p === p.toUpperCase();
    b[cur[0]][cur[1]] = null;
    for (const step of m.seq) {
      b[step.cap[0]][step.cap[1]] = null;
      cur = step.to;
    }
    if (p === 'r' && cur[0] === 0) { p = 'R'; promoted = !wasKing; }
    if (p === 'b' && cur[0] === 7) { p = 'B'; promoted = !wasKing; }
    b[cur[0]][cur[1]] = p;
  }
  return promoted;
}
function ckCountSide(b, side) {
  let n = 0;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) if (b[r][c] && ckIsOwn(b[r][c], side)) n++;
  return n;
}
function ckClone(b) { return b.map(r => r.slice()); }
const CK_BOARD_HTML = `
  <style>
    .ck-board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: min(560px, 92vw, calc(100vh - 180px));
      aspect-ratio: 1;
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .ck-sq { position: relative; cursor: pointer; overflow: hidden; }
    .ck-sq.light { background: #f1d3a4; }
    .ck-sq.dark  { background: #8b4513; }
    .ck-sq.sel { background: #f6e87f !important; }
    .ck-sq.move::after {
      content: ''; position: absolute;
      left: 36%; top: 36%; width: 28%; height: 28%; border-radius: 50%;
      background: rgba(0,128,0,0.55); pointer-events: none;
    }
    .ck-sq.flipped { transform: rotate(180deg); }
    .ck-piece {
      position: absolute; left: 11%; top: 11%; width: 78%; height: 78%;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; line-height: 1; color: #ffd700;
