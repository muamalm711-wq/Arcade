function startSnakeClassic(host) {
  const SIZE = 22, CELL = 24;
  let snake, dir, queuedDir, food, score, dead, interval, foodPulse = 0, raf, ended;
  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="font-size:20px;">Score: <b id="s-score">0</b></div>
      <canvas class="game-canvas" id="snake" width="${SIZE*CELL}" height="${SIZE*CELL}"></canvas>
      <div style="font-size:11px;color:var(--sub);">Arrow keys to move • R to restart</div>
    </div>
  `;
  const c = host.querySelector('#snake').getContext('2d');
  function randFood() {
    while (true) {
      const f = {x: Math.floor(Math.random()*SIZE), y: Math.floor(Math.random()*SIZE)};
      if (!snake.some(s => s.x===f.x && s.y===f.y)) return f;
    }
  }
  function step() {
    if (dead || pauseCtl.isPaused()) return;
    if (!(queuedDir.x === -dir.x && queuedDir.y === -dir.y) || (queuedDir.x === 0 && queuedDir.y === 0)) {
      dir = queuedDir;
    }
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0||head.x>=SIZE||head.y<0||head.y>=SIZE||snake.some(s=>s.x===head.x&&s.y===head.y)) {
      dead = true;
      sfx('hit');
      if (!ended) {
        ended = true;
        setTimeout(() => {
          showResult(host.querySelector('.game-region'), {
            title: 'Game Over',
            sub: 'Score: ' + score,
            kind: 'lose',
            stat: score >= 25 ? 'Nice run!' : '',
            onRetry: reset
          });
        }, 300);
      }
      return;
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) {
      score++;
      host.querySelector('#s-score').innerText = score;
      food = randFood();
      sfx('eat');
    } else {
      snake.pop();
    }
  }
  function draw() {
    // Background with subtle grid
    c.fillStyle = '#0a0d12'; c.fillRect(0,0,SIZE*CELL,SIZE*CELL);
    c.strokeStyle = 'rgba(255,255,255,0.03)';
    c.lineWidth = 1;
    for (let i=1;i<SIZE;i++) {
      c.beginPath(); c.moveTo(i*CELL, 0); c.lineTo(i*CELL, SIZE*CELL); c.stroke();
      c.beginPath(); c.moveTo(0, i*CELL); c.lineTo(SIZE*CELL, i*CELL); c.stroke();
    }
    // Food (apple) with pulse
    foodPulse += 0.08;
    const fp = 1 + Math.sin(foodPulse) * 0.08;
    const fx = food.x*CELL + CELL/2, fy = food.y*CELL + CELL/2;
    const fr = (CELL/2 - 3) * fp;
    const grad = c.createRadialGradient(fx-3, fy-3, 1, fx, fy, fr);
    grad.addColorStop(0, '#ff8b8b'); grad.addColorStop(1, '#dc2626');
    c.fillStyle = grad;
    c.beginPath(); c.arc(fx, fy, fr, 0, Math.PI*2); c.fill();
    // Stem
    c.fillStyle = '#22c55e';
    c.fillRect(fx-1, fy-fr-3, 2, 4);

    // Snake body
    snake.forEach((s, i) => {
      const t = i / Math.max(snake.length, 1);
      const isHead = i === 0;
      const x = s.x*CELL + 1, y = s.y*CELL + 1;
      const w = CELL - 2;
      // Body color gradient
      const r = Math.round(52 + (16 - 52) * t);
      const g = Math.round(211 + (185 - 211) * t);
      const b = Math.round(153 + (129 - 153) * t);
      c.fillStyle = `rgb(${r},${g},${b})`;
      const radius = isHead ? 8 : Math.max(3, 6 - i*0.1);
      roundRect(c, x, y, w, w, radius);
      c.fill();
      // Highlight
      c.fillStyle = `rgba(255,255,255,${isHead ? 0.2 : 0.08})`;
      c.fillRect(x+2, y+2, w-4, 3);
      // Eyes on head
      if (isHead) {
        const cx = s.x*CELL + CELL/2, cy = s.y*CELL + CELL/2;
        const eo = 5;
        let ex1, ey1, ex2, ey2;
        if (dir.x === 1) { ex1=cx+2; ey1=cy-eo; ex2=cx+2; ey2=cy+eo; }
        else if (dir.x === -1) { ex1=cx-2; ey1=cy-eo; ex2=cx-2; ey2=cy+eo; }
        else if (dir.y === 1) { ex1=cx-eo; ey1=cy+2; ex2=cx+eo; ey2=cy+2; }
        else { ex1=cx-eo; ey1=cy-2; ex2=cx+eo; ey2=cy-2; }
        c.fillStyle = 'white';
        c.beginPath(); c.arc(ex1, ey1, 2.2, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(ex2, ey2, 2.2, 0, Math.PI*2); c.fill();
        c.fillStyle = 'black';
        c.beginPath(); c.arc(ex1+dir.x*0.8, ey1+dir.y*0.8, 1.1, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(ex2+dir.x*0.8, ey2+dir.y*0.8, 1.1, 0, Math.PI*2); c.fill();
      }
    });
  }
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }
  function loop() {
    draw();
    raf = requestAnimationFrame(loop);
  }
  function reset() {
    snake = [{x:11, y:11}, {x:10, y:11}, {x:9, y:11}];
    dir = {x:1,y:0}; queuedDir = dir;
    food = randFood();
    score = 0; dead = false; ended = false;
    host.querySelector('#s-score').innerText = score;
  }
  function onKey(e) {
    if (dead && e.key.toLowerCase()==='r') { reset(); return; }
    if (e.key === 'ArrowUp') queuedDir = {x:0,y:-1};
    else if (e.key === 'ArrowDown') queuedDir = {x:0,y:1};
    else if (e.key === 'ArrowLeft') queuedDir = {x:-1,y:0};
    else if (e.key === 'ArrowRight') queuedDir = {x:1,y:0};
    else if (e.key.toLowerCase()==='r') reset();
    if (e.key.startsWith('Arrow')) e.preventDefault();
  }
  addL(window, 'keydown', onKey);
  const pauseCtl = attachPause(host);
  attachTouchControls(host, { directional: 'arrows' });
  reset();
  raf = requestAnimationFrame(loop);
  interval = setInterval(step, 110);
  activeCleanup = () => { if (interval) clearInterval(interval); if (raf) cancelAnimationFrame(raf); };
}

/* ============================================================
   REVERSE SNAKE — you're the food, the AI snake chases you. Survive 60s.
   ============================================================ */
function startSnakeReverse(host) {
  const SIZE = 18, CELL = 28;
  const SURVIVE_MS = 60000;
  // Player is faster than the snake — the challenge comes from the snake GROWING over time
  // and eventually filling enough space to corner you. Pure speed catch-ups would feel cheap.
  const PLAYER_TICK = 130;
  const SNAKE_TICK  = 180;
  const BEST_KEY = 'snake_reverse_best';
  let best = parseInt(localStorage.getItem(BEST_KEY) || '0') || 0;
  let snake;            // AI snake, head first
  let dir;              // AI snake current direction
  let player;           // {x, y}
  let queuedDir;        // player's queued movement
  let pdir;             // player's current direction
  let dead, ended, raf, playerInterval, snakeInterval, growthTimer;
  let startedAt = 0;

  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="display:flex;gap:18px;font-size:14px;color:#cfd2d6;">
        <div>Time left: <b id="rsn-time" style="color:#fbbf24;">${(SURVIVE_MS/1000).toFixed(0)}</b>s</div>
        <div>Best survived: <b id="rsn-best" style="color:#34d399;">${(best/1000).toFixed(1)}</b>s</div>
      </div>
      <canvas class="game-canvas" id="rsn" width="${SIZE*CELL}" height="${SIZE*CELL}"></canvas>
      <div style="font-size:11px;color:var(--sub);">Arrow keys to move • survive ${SURVIVE_MS/1000} seconds — snake grows over time</div>
    </div>`;
  const cv = host.querySelector('#rsn').getContext('2d');

  function reset() {
    snake = [{x:2, y:2}, {x:1, y:2}, {x:0, y:2}];
    dir = {x:1, y:0};
    player = { x: SIZE - 3, y: SIZE - 3 };
    pdir = {x: 0, y: 0};
    queuedDir = {x: 0, y: 0};
    dead = false; ended = false;
    startedAt = performance.now();
    if (growthTimer) clearInterval(growthTimer);
    growthTimer = setInterval(() => {
      if (dead || !snake) return;
      // Grow the snake by extending its tail (no movement) — body just gets longer in place.
      const tail = snake[snake.length - 1];
      snake.push({ x: tail.x, y: tail.y });
    }, 5000);
  }

  function inBounds(p) { return p.x >= 0 && p.y >= 0 && p.x < SIZE && p.y < SIZE; }
  function snakeBodyHas(p, ignoreTail) {
    const end = ignoreTail ? snake.length - 1 : snake.length;
    for (let i = 0; i < end; i++) if (snake[i].x === p.x && snake[i].y === p.y) return true;
    return false;
  }

  function aiPickDir() {
    const head = snake[0];
    const dx = player.x - head.x, dy = player.y - head.y;
    // Preferred axis first, then perpendicular, then current dir, then any non-reverse fallback.
    const prefs = [];
    if (Math.abs(dx) >= Math.abs(dy)) {
      if (dx !== 0) prefs.push({ x: Math.sign(dx), y: 0 });
      if (dy !== 0) prefs.push({ x: 0, y: Math.sign(dy) });
    } else {
      if (dy !== 0) prefs.push({ x: 0, y: Math.sign(dy) });
      if (dx !== 0) prefs.push({ x: Math.sign(dx), y: 0 });
    }
    prefs.push(dir, { x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 });
    for (const d of prefs) {
      if (!d) continue;
      if (d.x === -dir.x && d.y === -dir.y) continue;          // no instant reversal
      const n = { x: head.x + d.x, y: head.y + d.y };
      if (!inBounds(n)) continue;
      if (snakeBodyHas(n, true)) continue;                     // skip self (tail will move)
      return d;
    }
    return dir; // boxed in — will die
  }

  function endWin(elapsed) {
    if (ended) return;
    dead = true;
    ended = true;
    sfx('win');
    if (elapsed > best) { best = elapsed; try { localStorage.setItem(BEST_KEY, String(Math.floor(best))); } catch(e){} }
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'You Survived!', kind: 'win',
        sub: 'The snake never caught you.',
        stat: (SURVIVE_MS/1000).toFixed(0) + 's',
        onRetry: reset
      });
    }, 250);
  }
  function endCaught(elapsed) {
    if (ended) return;
    dead = true;
    ended = true;
    sfx('hit');
    if (elapsed > best) { best = elapsed; try { localStorage.setItem(BEST_KEY, String(Math.floor(best))); } catch(e){} }
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Caught!', kind: 'lose',
        sub: 'The snake got you in ' + (elapsed/1000).toFixed(1) + 's.',
        stat: (elapsed/1000).toFixed(1) + 's',
        onRetry: reset
      });
    }, 250);
  }
  function checkWinTime() {
    if (dead) return true;
    const elapsed = performance.now() - startedAt;
    if (elapsed >= SURVIVE_MS) { endWin(elapsed); return true; }
    return false;
  }
  function playerStep() {
    if (dead || checkWinTime()) return;
    if (queuedDir.x !== 0 || queuedDir.y !== 0) pdir = queuedDir;
    if (pdir.x === 0 && pdir.y === 0) return;
    const np = { x: player.x + pdir.x, y: player.y + pdir.y };
    if (!inBounds(np)) { pdir = { x: 0, y: 0 }; return; }
    // Walking INTO the snake's body (or its head) ends the run.
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === np.x && snake[i].y === np.y) {
        return endCaught(performance.now() - startedAt);
      }
    }
    player = np;
  }
  function snakeStep() {
    if (dead || checkWinTime()) return;
    const newDir = aiPickDir();
    if (!newDir) return;                   // boxed in this tick — sit still
    dir = newDir;
    const newHead = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (newHead.x === player.x && newHead.y === player.y) {
      snake.unshift(newHead);
      return endCaught(performance.now() - startedAt);
    }
    snake.unshift(newHead);
    snake.pop();
  }

  function draw() {
    cv.fillStyle = '#0a0d12'; cv.fillRect(0, 0, SIZE*CELL, SIZE*CELL);
    cv.strokeStyle = 'rgba(255,255,255,0.03)';
    cv.lineWidth = 1;
    for (let i = 1; i < SIZE; i++) {
      cv.beginPath(); cv.moveTo(i*CELL, 0); cv.lineTo(i*CELL, SIZE*CELL); cv.stroke();
      cv.beginPath(); cv.moveTo(0, i*CELL); cv.lineTo(SIZE*CELL, i*CELL); cv.stroke();
    }
    // Player (the food — pulsing apple)
    const px = player.x*CELL + CELL/2, py = player.y*CELL + CELL/2;
    const pulse = 1 + Math.sin(performance.now()/180) * 0.10;
    const pr = (CELL/2 - 3) * pulse;
    const grad = cv.createRadialGradient(px-3, py-3, 1, px, py, pr);
    grad.addColorStop(0, '#ff8b8b'); grad.addColorStop(1, '#dc2626');
    cv.fillStyle = grad;
    cv.beginPath(); cv.arc(px, py, pr, 0, Math.PI*2); cv.fill();
    cv.fillStyle = '#22c55e';
    cv.fillRect(px - 1, py - pr - 3, 2, 4);
    // Snake (greyer/threatening)
    snake.forEach((s, i) => {
      const t = i / Math.max(snake.length, 1);
      const isHead = i === 0;
      const x = s.x*CELL + 1, y = s.y*CELL + 1, w = CELL - 2;
      const r = Math.round(120 + (60 - 120) * t);
      const g = Math.round(40 + (40 - 40) * t);
      const b = Math.round(40 + (50 - 40) * t);
      cv.fillStyle = `rgb(${r},${g},${b})`;
      const radius = isHead ? 8 : Math.max(3, 6 - i*0.1);
      cv.beginPath();
      cv.moveTo(x+radius, y);
      cv.arcTo(x+w, y, x+w, y+w, radius);
      cv.arcTo(x+w, y+w, x, y+w, radius);
      cv.arcTo(x, y+w, x, y, radius);
      cv.arcTo(x, y, x+w, y, radius);
      cv.closePath(); cv.fill();
      if (isHead) {
        const cx = s.x*CELL + CELL/2, cy = s.y*CELL + CELL/2;
        const eo = 5;
        let ex1, ey1, ex2, ey2;
        if (dir.x === 1) { ex1=cx+2; ey1=cy-eo; ex2=cx+2; ey2=cy+eo; }
        else if (dir.x === -1) { ex1=cx-2; ey1=cy-eo; ex2=cx-2; ey2=cy+eo; }
        else if (dir.y === 1) { ex1=cx-eo; ey1=cy+2; ex2=cx+eo; ey2=cy+2; }
        else { ex1=cx-eo; ey1=cy-2; ex2=cx+eo; ey2=cy-2; }
        cv.fillStyle = '#fde68a';
        cv.beginPath(); cv.arc(ex1, ey1, 2.4, 0, Math.PI*2); cv.fill();
        cv.beginPath(); cv.arc(ex2, ey2, 2.4, 0, Math.PI*2); cv.fill();
        cv.fillStyle = '#000';
        cv.beginPath(); cv.arc(ex1+dir.x*0.8, ey1+dir.y*0.8, 1.2, 0, Math.PI*2); cv.fill();
        cv.beginPath(); cv.arc(ex2+dir.x*0.8, ey2+dir.y*0.8, 1.2, 0, Math.PI*2); cv.fill();
      }
    });
    // HUD
    if (!dead) {
      const remaining = Math.max(0, SURVIVE_MS - (performance.now() - startedAt));
      host.querySelector('#rsn-time').innerText = (remaining / 1000).toFixed(1);
    }
  }

  function loop() {
    draw();
    raf = requestAnimationFrame(loop);
  }

  function onKey(e) {
    if (e.key === 'ArrowUp') queuedDir = {x:0,y:-1};
    else if (e.key === 'ArrowDown') queuedDir = {x:0,y:1};
    else if (e.key === 'ArrowLeft') queuedDir = {x:-1,y:0};
    else if (e.key === 'ArrowRight') queuedDir = {x:1,y:0};
    else if (e.key.toLowerCase() === 'r') reset();
    else return;
    if (e.key.startsWith('Arrow')) e.preventDefault();
  }
  addL(window, 'keydown', onKey);
  attachTouchControls(host, { directional: 'arrows' });

  reset();
  raf = requestAnimationFrame(loop);
  playerInterval = setInterval(playerStep, PLAYER_TICK);
  snakeInterval  = setInterval(snakeStep,  SNAKE_TICK);
  activeCleanup = () => {
    if (playerInterval) clearInterval(playerInterval);
    if (snakeInterval)  clearInterval(snakeInterval);
    if (raf) cancelAnimationFrame(raf);
    if (growthTimer) clearInterval(growthTimer);
  };
}

/* ============================================================
   2048
   ============================================================ */
function start2048(host) {
  // Each cell holds { value, tileEl, id } or null. Tiles are absolute-positioned <div>s.
  const PAD = 10, TILE = 102.5, GAP = 10;
  let cells; // 4x4 grid of {v, el, id} or null
  let score, gameOver, tileSeq;
  
  // Cheat code tracker
  const cheatSeq = ['arrowup', 'arrowup', 'arrowdown', 'arrowdown', 'arrowleft', 'arrowright', 'arrowleft', 'arrowright', 'b', 'a', 'enter'];
  let cheatIdx = 0;

  const COLORS = {
    2: '#eee4da', 4: '#ede0c8', 8: '#f2b179',
    16: '#f59563', 32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72',
    256: '#edcc61', 512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
  };
  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="display:flex;gap:18px;align-items:center;">
        <div style="font-size:20px;">Score: <b id="g2048-score">0</b></div>
        <button class="btn" id="g2048-reset">New</button>
      </div>
      <div class="g2048-board" id="g2048-board"></div>
      <div class="game-msg" id="g2048-msg">Arrow keys to play.</div>
    </div>`;
  const boardEl = host.querySelector('#g2048-board');
  const tilesLayer = document.createElement('div');
  tilesLayer.style.cssText = 'position:absolute;inset:0;';
  // Add background cells once
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    const bg = document.createElement('div');
    bg.className = 'g2048-bg';
    bg.style.left = (PAD + c*(TILE+GAP)) + 'px';
    bg.style.top = (PAD + r*(TILE+GAP)) + 'px';
    boardEl.appendChild(bg);
  }
  boardEl.appendChild(tilesLayer);

  function styleTile(el, v) {
    el.style.background = COLORS[v] || '#3c3a32';
    el.style.color = v <= 4 ? '#776e65' : 'white';
    el.style.fontSize = v >= 1024 ? '24px' : v >= 128 ? '28px' : '32px';
    el.textContent = v;
  }
  function placeTile(el, r, c) {
    el.style.left = (PAD + c*(TILE+GAP)) + 'px';
    el.style.top = (PAD + r*(TILE+GAP)) + 'px';
  }
  function makeTile(r, c, v, isNew) {
    const el = document.createElement('div');
    el.className = 'g2048-tile' + (isNew ? ' appear' : '');
    styleTile(el, v);
    placeTile(el, r, c);
    tilesLayer.appendChild(el);
    return { v, el, id: ++tileSeq };
  }
  function reset() {
    tilesLayer.innerHTML = '';
    cells = Array.from({length:4}, () => Array(4).fill(null));
    score = 0; gameOver = false; tileSeq = 0; cheatIdx = 0;
    
    // ADD THIS LINE: Remove the win/loss screen if it exists
    const overlay = host.querySelector('.result-overlay');
    if (overlay) overlay.remove();

    addTile(); addTile();
    updateScore();
    host.querySelector('#g2048-msg').innerText = 'Arrow keys to play.';
  }
  function addTile() {
    const empty = [];
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!cells[r][c]) empty.push([r,c]);
    if (!empty.length) return false;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    const v = Math.random() < 0.9 ? 2 : 4;
    cells[r][c] = makeTile(r, c, v, true);
    return true;
  }
  function updateScore() { host.querySelector('#g2048-score').innerText = score; }

  function move(dir) {
    if (gameOver) return;
    // dir: 'left'|'right'|'up'|'down'
    const dr = dir==='up'?-1:dir==='down'?1:0;
    const dc = dir==='left'?-1:dir==='right'?1:0;
    // Iterate in order: tiles closer to target wall first
    const order = [];
    const rows = dr===1 ? [3,2,1,0] : [0,1,2,3];
    const cols = dc===1 ? [3,2,1,0] : [0,1,2,3];
    for (const r of rows) for (const c of cols) order.push([r,c]);
    let moved = false;
    const toRemove = []; // tiles that get merged away

    for (const [r,c] of order) {
      const cell = cells[r][c];
      if (!cell) continue;
      let nr = r, nc = c;
      while (true) {
        const tr = nr + dr, tc = nc + dc;
        if (tr<0||tr>=4||tc<0||tc>=4) break;
        if (!cells[tr][tc]) { nr = tr; nc = tc; }
        else if (cells[tr][tc].v === cell.v && !cells[tr][tc]._merging) {
          // Merge
          nr = tr; nc = tc;
          const dest = cells[tr][tc];
          dest._merging = true;
          // animate cell to dest position, then remove and pop dest
          placeTile(cell.el, nr, nc);
          toRemove.push({ tile: cell, dest });
          cells[r][c] = null;
          score += cell.v * 2;
          moved = true;
          // we break out — handled below
          cell._absorbed = true;
          break;
        } else break;
      }
      if (cell._absorbed) continue;
      if (nr !== r || nc !== c) {
        cells[nr][nc] = cell;
        cells[r][c] = null;
        placeTile(cell.el, nr, nc);
        moved = true;
      }
    }

    // Clean up merging flags
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (cells[r][c]) cells[r][c]._merging = false;

    if (moved) {
      if (typeof sfx === 'function') sfx('click');
      // After slide animation completes, remove absorbed tiles & pop merged dests
      setTimeout(() => {
        for (const { tile, dest } of toRemove) {
          if (tile.el.parentNode) tile.el.remove();
          dest.v *= 2;
          styleTile(dest.el, dest.v);
          dest.el.classList.add('merged');
          if (typeof sfx === 'function') sfx('merge');
          setTimeout(() => dest.el.classList.remove('merged'), 250);
        }
        addTile();
        updateScore();
        if (!canMove()) {
          gameOver = true;
          const won = anyTile(2048);
          host.querySelector('#g2048-msg').innerText = won ? 'You reached 2048!' : 'Game over!';
          showResult(host.querySelector('.game-region'), {
            title: won ? '2048!' : 'Game Over',
            sub: 'Score: ' + score,
            kind: won ? 'win' : 'lose',
            onRetry: reset
          });
        }
      }, 160);
    }
  }
  function anyTile(v) { for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (cells[r][c] && cells[r][c].v >= v) return true; return false; }
  function canMove() {
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
      if (!cells[r][c]) return true;
      if (c<3 && cells[r][c+1] && cells[r][c].v===cells[r][c+1].v) return true;
      if (r<3 && cells[r+1][c] && cells[r][c].v===cells[r+1][c].v) return true;
    }
    return false;
  }
  host.querySelector('#g2048-reset').addEventListener('click', reset);
  
  function onKey(e) {
    // Check for cheat code progression
    if (e.key.toLowerCase() === cheatSeq[cheatIdx]) {
      cheatIdx++;
      if (cheatIdx === cheatSeq.length) {
        // Clear all blocks
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (cells[r][c]) {
              if (cells[r][c].el.parentNode) cells[r][c].el.remove();
              cells[r][c] = null;
            }
          }
        }
        
        // Spawn the two 1024s
        cells[0][0] = makeTile(0, 0, 1024, true);
        cells[0][3] = makeTile(0, 3, 1024, true);
        
        // Resurrect player if they were dead, hide overlay
        gameOver = false;
        const overlay = host.querySelector('.result-overlay');
        if (overlay) overlay.remove();

        host.querySelector('#g2048-msg').innerHTML = '<b style="color:var(--good);">Cheat Activated!</b>';
        if (typeof sfx === 'function') sfx('win');
        
        cheatIdx = 0;
        return; // Don't do standard movement for the final enter key
      }
    } else {
      // Reset tracker (or set to 1 if they started over with UP)
      cheatIdx = (e.key.toLowerCase() === cheatSeq[0]) ? 1 : 0;
    }

    // Normal movement
    if (e.key === 'ArrowLeft') { move('left'); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { move('right'); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { move('up'); e.preventDefault(); }
    else if (e.key === 'ArrowDown') { move('down'); e.preventDefault(); }
  }

  addL(window, 'keydown', onKey);
  reset();
  activeCleanup = () => {};
}

/* ============================================================
   MINESWEEPER
   ============================================================ */
function startMines(host) {
  const W = 16, H = 16, MINES = 40;
  let mines, revealed, flagged, dead, won;
  function reset() {
    mines = Array.from({length:H}, () => Array(W).fill(false));
    revealed = Array.from({length:H}, () => Array(W).fill(false));
    flagged = Array.from({length:H}, () => Array(W).fill(false));
    dead = false; won = false;
    let placed = 0;
    while (placed < MINES) {
      const r = Math.floor(Math.random()*H), c = Math.floor(Math.random()*W);
      if (!mines[r][c]) { mines[r][c] = true; placed++; }
    }
    render();
  }
  function neighbors(r, c) {
    const out = [];
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      if (!dr && !dc) continue;
      const nr=r+dr, nc=c+dc;
      if (nr>=0 && nr<H && nc>=0 && nc<W) out.push([nr,nc]);
    }
    return out;
  }
  function count(r, c) {
    return neighbors(r,c).filter(([nr,nc]) => mines[nr][nc]).length;
  }
  function reveal(r, c) {
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;
    if (mines[r][c]) { dead = true; return; }
    if (count(r,c) === 0) {
      for (const [nr,nc] of neighbors(r,c)) reveal(nr,nc);
    }
  }
  function checkWin() {
    for (let r=0;r<H;r++) for (let c=0;c<W;c++) {
      if (!mines[r][c] && !revealed[r][c]) return false;
    }
    return true;
  }
  function render() {
    const board = host.querySelector('#ms-board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${W}, 30px)`;
    for (let r=0;r<H;r++) for (let c=0;c<W;c++) {
      const cell = document.createElement('div');
      cell.className = 'ms-cell';
      if (revealed[r][c]) {
        cell.classList.add('revealed');
        if (mines[r][c]) { cell.textContent = '💣'; cell.classList.add('mine'); }
        else {
          const n = count(r,c);
          if (n) {
            cell.textContent = n;
            const colors = ['', '#60a5fa', '#34d399', '#f87171', '#a78bfa', '#fbbf24', '#22d3ee', '#000', '#888'];
            cell.style.color = colors[n];
          }
        }
      } else if (flagged[r][c]) {
        cell.classList.add('flag');
        cell.textContent = '⚑';
      }
      cell.addEventListener('click', () => {
        if (dead || won) return;
        reveal(r,c);
        if (checkWin()) won = true;
        render();
        const msg = host.querySelector('#ms-msg');
        if (dead) {
          msg.innerHTML = '<b style="color:var(--bad);">Boom!</b>';
          sfx('explode');
          setTimeout(() => showResult(host.querySelector('.game-region'), { title: 'Boom!', sub: 'You hit a mine.', kind: 'lose', onRetry: reset }), 350);
        } else if (won) {
          msg.innerHTML = '<b style="color:var(--good);">You win!</b>';
          setTimeout(() => showResult(host.querySelector('.game-region'), { title: 'Cleared!', sub: 'All safe cells revealed.', kind: 'win', onRetry: reset }), 350);
        } else {
          sfx('click');
        }
      });
      cell.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        if (dead || won || revealed[r][c]) return;
        flagged[r][c] = !flagged[r][c];
        render();
      });
      board.appendChild(cell);
    }
  }
  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="display:flex;gap:14px;align-items:center;">
        <div>${MINES} mines</div>
        <button class="btn" id="ms-reset">New</button>
      </div>
      <div class="ms-board" id="ms-board"></div>
      <div class="game-msg" id="ms-msg">Left-click to reveal • Right-click to flag</div>
    </div>
  `;
  host.querySelector('#ms-reset').addEventListener('click', reset);
  reset();
  activeCleanup = () => {};
}

/* ============================================================
   PONG
   ============================================================ */
function startPong(host) {
  const W = 700, H = 460, PW = 12, PH = 80, BR = 7, WIN = 7;
  let py, ay, bx, by, bvx, bvy, ps, as, raf, ended, trail;
  const keys = {};
  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="font-size:14px;color:var(--sub);">First to ${WIN} • W/S or ↑/↓</div>
      <canvas class="game-canvas" id="pong" width="${W}" height="${H}"></canvas>
    </div>
  `;
  const c = host.querySelector('#pong').getContext('2d');
  function fullReset() {
    py = H/2 - PH/2; ay = py;
    ps = 0; as = 0; ended = false; trail = [];
    serve(Math.random() < 0.5 ? -1 : 1);
  }
  function serve(dirX) {
    bx = W/2; by = H/2;
    const ang = (Math.random() - 0.5) * 0.8;
    bvx = dirX * 5;
    bvy = Math.sin(ang) * 4;
    trail = [];
  }
  function endGame(won) {
    if (ended) return;
    ended = true;
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: won ? 'You Win!' : 'AI Wins',
        sub: `${ps} – ${as}`,
        kind: won ? 'win' : 'lose',
        onRetry: fullReset
      });
    }, 350);
  }
  function step() {
    if (pauseCtl.isPaused()) { raf = requestAnimationFrame(step); return; }
    if (!ended) {
      if (keys.up || keys.w) py = Math.max(0, py - 7);
      if (keys.down || keys.s) py = Math.min(H-PH, py + 7);
      const aiSpeed = 4.7;
      if (ay + PH/2 < by - 8) ay = Math.min(H-PH, ay + aiSpeed);
      else if (ay + PH/2 > by + 8) ay = Math.max(0, ay - aiSpeed);

      bx += bvx; by += bvy;
      // Trail
      trail.push({x: bx, y: by});
      if (trail.length > 8) trail.shift();
      // Top/bottom walls — clamp inside frame
      if (by - BR < 0) { by = BR; bvy = -bvy; sfx('wall'); }
      if (by + BR > H) { by = H - BR; bvy = -bvy; sfx('wall'); }
      // Player paddle
      if (bx - BR <= PW && by > py && by < py+PH && bvx < 0) {
        bx = PW + BR;
        bvx = -bvx * 1.04;
        bvy += (by - (py + PH/2)) * 0.07;
        bvx = Math.max(-10, Math.min(10, bvx));
        sfx('paddle');
      }
      // AI paddle
      if (bx + BR >= W - PW && by > ay && by < ay+PH && bvx > 0) {
        bx = W - PW - BR;
        bvx = -bvx * 1.04;
        bvy += (by - (ay + PH/2)) * 0.07;
        bvx = Math.max(-10, Math.min(10, bvx));
        sfx('paddle');
      }
      // Score (clamp to keep inside)
      if (bx + BR < 0) {
        as++; sfx('score');
        if (as >= WIN) { endGame(false); }
        else serve(1);
      } else if (bx - BR > W) {
        ps++; sfx('score');
        if (ps >= WIN) { endGame(true); }
        else serve(-1);
      }
    }

    // Render
    c.fillStyle = '#0a0d12'; c.fillRect(0,0,W,H);
    c.strokeStyle = '#2a3344'; c.setLineDash([8,8]); c.lineWidth = 2;
    c.beginPath(); c.moveTo(W/2, 0); c.lineTo(W/2, H); c.stroke();
    c.setLineDash([]);
    // Score
    c.fillStyle = 'rgba(255,255,255,0.12)';
    c.font = 'bold 80px sans-serif'; c.textAlign = 'center';
    c.fillText(ps, W/2 - 60, H/2 + 28);
    c.fillText(as, W/2 + 60, H/2 + 28);
    // Paddles with glow
    c.shadowBlur = 12; c.shadowColor = '#6ea8fe';
    c.fillStyle = '#6ea8fe'; c.fillRect(0, py, PW, PH);
    c.shadowColor = '#f87171';
    c.fillStyle = '#f87171'; c.fillRect(W-PW, ay, PW, PH);
    c.shadowBlur = 0;
    // Ball trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      c.fillStyle = `rgba(255,255,255,${i / trail.length * 0.4})`;
      c.beginPath(); c.arc(t.x, t.y, BR * (i / trail.length), 0, Math.PI*2); c.fill();
    }
    // Ball with glow
    c.shadowBlur = 14; c.shadowColor = 'white';
    c.fillStyle = 'white';
    c.beginPath(); c.arc(bx, by, BR, 0, Math.PI*2); c.fill();
    c.shadowBlur = 0;

    raf = requestAnimationFrame(step);
  }
  function onDown(e) {
    if (e.key === 'ArrowUp') keys.up = true;
    if (e.key === 'ArrowDown') keys.down = true;
    if (e.key === 'w' || e.key === 'W') keys.w = true;
    if (e.key === 's' || e.key === 'S') keys.s = true;
    if (e.key.startsWith('Arrow')) e.preventDefault();
  }
  function onUp(e) {
    if (e.key === 'ArrowUp') keys.up = false;
    if (e.key === 'ArrowDown') keys.down = false;
    if (e.key === 'w' || e.key === 'W') keys.w = false;
    if (e.key === 's' || e.key === 'S') keys.s = false;
  }
  addL(window, 'keydown', onDown); addL(window, 'keyup', onUp);
  const pauseCtl = attachPause(host);
  attachTouchControls(host, { directional: 'updown' });
  fullReset();
  step();
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

/* ============================================================
   BREAKOUT
   ============================================================ */
function startBreakout(host) {
  const W = 1200, H = 760, BR = 6, PH = 12;
  // Power-up types
  const PU = {
    TRIPLE:  { color: '#a78bfa', glyph: '×3', label: 'Triple' },
    EXTRA:   { color: '#34d399', glyph: '+1', label: 'Extra Ball' },
    SPEED:   { color: '#f87171', glyph: '»',  label: 'Speed Up' }
  };
  const PU_KEYS = Object.keys(PU);
  const PU_DROP_CHANCE = 0.18; // 18% chance per brick break
  let px, pw, balls, bricks, particles, powerups, raf, dead, won, score, ended;
  let toastText = '', toastUntil = 0;
  const keys = {};

  function buildBricks() {
    bricks = [];
    const rows = 21, cols = 30;    // 5x previous: 630 bricks total
    const bw = 36, bh = 12, gap = 2;
    const offsetX = (W - (cols*bw + (cols-1)*gap)) / 2;
    const palette = ['#f87171','#fb923c','#fbbf24','#facc15','#a3e635','#34d399','#22d3ee','#60a5fa','#a78bfa','#f472b6','#fb7185'];
    for (let r=0;r<rows;r++) for (let cc=0;cc<cols;cc++) {
      bricks.push({ x: offsetX + cc*(bw+gap), y: 40 + r*(bh+gap), w: bw, h: bh, alive: true, color: palette[r % palette.length] });
    }
  }
  function makeBall(opts) {
    opts = opts || {};
    const ang = ('ang' in opts) ? opts.ang : (Math.random() - 0.5) * 0.6;
    const speed = opts.speed || 5.4;
    return {
      x: opts.x !== undefined ? opts.x : W/2,
      y: opts.y !== undefined ? opts.y : H - 80,
      vx: Math.sin(ang) * speed,
      vy: opts.vy !== undefined ? opts.vy : -Math.cos(ang) * speed
    };
  }
  function showToast(text) { toastText = text; toastUntil = performance.now() + 1400; }

  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="display:flex;gap:18px;font-family:sans-serif;color:#cfd2d6;font-size:14px;">
        <div>Score: <b id="bo-score">0</b></div>
        <div>Balls: <b id="bo-balls">1</b></div>
      </div>
      <canvas class="game-canvas" id="bo" width="${W}" height="${H}"></canvas>
      <div style="font-size:11px;color:var(--sub);">←/→ or mouse • R restart • Catch power-ups: <span style="color:#a78bfa;">×3 triple</span>, <span style="color:#34d399;">+1 extra</span>, <span style="color:#f87171;">» speed</span></div>
    </div>
  `;
  const canvas = host.querySelector('#bo');
  const c = canvas.getContext('2d');

  function endGame(kind) {
    if (ended) return;
    ended = true;
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: kind === 'win' ? 'You Win!' : 'Game Over',
        sub: 'Score: ' + score,
        kind, onRetry: reset
      });
    }, 350);
  }
  function spawnBurst(x, y, color) {
    for (let i = 0; i < 8; i++) {
      particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1, life: 28, color });
    }
  }
  function maybeDropPowerUp(x, y) {
    if (Math.random() > PU_DROP_CHANCE) return;
    const t = PU_KEYS[Math.floor(Math.random() * PU_KEYS.length)];
    powerups.push({ x, y, vy: 2.4, kind: t });
  }
  function applyPowerUp(kind) {
    if (kind === 'TRIPLE') {
      // Each existing ball clones into 3 (the original + 2 copies at ±20°). NO CAP.
      const newOnes = [];
      for (const b of balls) {
        const sp = Math.hypot(b.vx, b.vy) || 5;
        const baseAng = Math.atan2(b.vy, b.vx);
        for (const da of [-0.35, 0.35]) {
          const a = baseAng + da;
          newOnes.push({ x: b.x, y: b.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp });
        }
      }
      for (const b of newOnes) balls.push(b);
      showToast('×3 TRIPLE!');
      sfx('pop');
    } else if (kind === 'EXTRA') {
      // No cap on extra balls
      balls.push(makeBall({ x: px + pw/2, y: H - 60, ang: (Math.random() - 0.5) * 0.6 }));
      showToast('+1 BALL');
      sfx('pop');
    } else if (kind === 'SPEED') {
      // No speed cap — multiply each time, full chaos
      for (const b of balls) { b.vx *= 1.35; b.vy *= 1.35; }
      showToast('SPEED UP');
      sfx('shoot');
    }
  }

  function step() {
    if (pauseCtl.isPaused()) { raf = requestAnimationFrame(step); return; }
    if (!dead && !won) {
      if (keys.left) px = Math.max(0, px - 8);
      if (keys.right) px = Math.min(W - pw, px + 8);

      // Update each ball — speed is capped, count is not
      const MAX_BALL_SPEED = 13;
      for (const ball of balls) {
        ball.x += ball.vx; ball.y += ball.vy;
        if (ball.x - BR < 0) { ball.x = BR; ball.vx = -ball.vx; sfx('wall'); }
        if (ball.x + BR > W) { ball.x = W - BR; ball.vx = -ball.vx; sfx('wall'); }
        if (ball.y - BR < 0) { ball.y = BR; ball.vy = -ball.vy; sfx('wall'); }
        if (ball.y - BR > H) { ball.dead = true; continue; }
        // Paddle
        if (ball.vy > 0 && ball.y + BR > H - 25 && ball.y < H - 13 && ball.x > px - BR && ball.x < px + pw + BR) {
          ball.y = H - 25 - BR;
          ball.vy = -Math.abs(ball.vy);
          ball.vx += (ball.x - (px + pw/2)) * 0.12;
          sfx('paddle');
        }
        // Speed cap (per-ball magnitude, doesn't limit ball count)
        const sp = Math.hypot(ball.vx, ball.vy);
        if (sp > MAX_BALL_SPEED) { const k = MAX_BALL_SPEED / sp; ball.vx *= k; ball.vy *= k; }
        // Bricks
        for (const b of bricks) {
          if (!b.alive) continue;
          if (ball.x + BR > b.x && ball.x - BR < b.x+b.w && ball.y + BR > b.y && ball.y - BR < b.y+b.h) {
            b.alive = false;
            ball.vy = -ball.vy;
            score += 10;
            spawnBurst(b.x + b.w/2, b.y + b.h/2, b.color);
            maybeDropPowerUp(b.x + b.w/2, b.y + b.h/2);
            sfx('brick');
            break;
          }
        }
      }
      balls = balls.filter(b => !b.dead);
      if (balls.length === 0) { dead = true; sfx('lose'); endGame('lose'); }
      if (bricks.every(b => !b.alive)) { won = true; endGame('win'); }

      // Power-ups fall
      for (const p of powerups) {
        p.y += p.vy;
        if (p.y > H) { p.dead = true; continue; }
        // Catch test against paddle
        if (p.y + 10 > H - 25 && p.y < H - 13 && p.x > px && p.x < px + pw) {
          p.dead = true;
          applyPowerUp(p.kind);
        }
      }
      powerups = powerups.filter(p => !p.dead);

      // HUD
      host.querySelector('#bo-score').innerText = score;
      host.querySelector('#bo-balls').innerText = balls.length;
    }
    // particles update
    for (const p of particles) { p.vy += 0.2; p.x += p.vx; p.y += p.vy; p.life--; }
    particles = particles.filter(p => p.life > 0);

    // Render
    c.fillStyle = '#0a0d12'; c.fillRect(0,0,W,H);
    // Bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      c.fillStyle = b.color; c.fillRect(b.x, b.y, b.w, b.h);
      c.fillStyle = 'rgba(255,255,255,0.25)'; c.fillRect(b.x, b.y, b.w, 3);
      c.fillStyle = 'rgba(0,0,0,0.20)'; c.fillRect(b.x, b.y + b.h - 3, b.w, 3);
    }
    // Power-ups
    for (const p of powerups) {
      const def = PU[p.kind];
      c.fillStyle = def.color;
      c.beginPath(); c.arc(p.x, p.y, 12, 0, Math.PI*2); c.fill();
      c.fillStyle = 'rgba(0,0,0,0.55)'; c.beginPath(); c.arc(p.x, p.y, 10, 0, Math.PI*2); c.fill();
      c.fillStyle = '#fff'; c.font = 'bold 12px sans-serif'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(def.glyph, p.x, p.y + 1);
    }
    // Paddle
    const pgrad = c.createLinearGradient(0, H - 25, 0, H - 25 + PH);
    pgrad.addColorStop(0, '#93c5fd'); pgrad.addColorStop(1, '#3b82f6');
    c.fillStyle = pgrad; c.fillRect(px, H - 25, pw, PH);
    // Balls
    c.shadowBlur = 12; c.shadowColor = 'white';
    c.fillStyle = 'white';
    for (const ball of balls) { c.beginPath(); c.arc(ball.x, ball.y, BR, 0, Math.PI*2); c.fill(); }
    c.shadowBlur = 0;
    // Particles
    for (const p of particles) {
      c.globalAlpha = Math.max(0, p.life / 28);
      c.fillStyle = p.color; c.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    c.globalAlpha = 1;
    // Toast
    if (toastText && performance.now() < toastUntil) {
      const a = Math.max(0, (toastUntil - performance.now()) / 1400);
      c.globalAlpha = a;
      c.fillStyle = '#fff'; c.font = 'bold 26px sans-serif'; c.textAlign = 'center';
      c.fillText(toastText, W/2, H/2);
      c.globalAlpha = 1;
    }
    raf = requestAnimationFrame(step);
  }
  function reset() {
    px = W/2 - 50; pw = 100;
    balls = [makeBall()];
    powerups = [];
    dead = false; won = false; score = 0; ended = false;
    particles = [];
    toastText = '';
    host.querySelector('#bo-score').innerText = 0;
    host.querySelector('#bo-balls').innerText = 1;
    buildBricks();
  }
  addL(window, 'keydown', e => {
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key.toLowerCase() === 'r') reset();
    if (e.key.startsWith('Arrow')) e.preventDefault();
  });
  addL(window, 'keyup', e => {
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
  });
  addL(canvas, 'mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    px = Math.max(0, Math.min(W - pw, (e.clientX - rect.left) * (W / rect.width) - pw/2));
  });
  // Touch: drag finger across canvas to move paddle
  function touchMove(e) {
    if (!e.touches || !e.touches.length) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    px = Math.max(0, Math.min(W - pw, (e.touches[0].clientX - rect.left) * (W / rect.width) - pw/2));
  }
  canvas.addEventListener('touchstart', touchMove, { passive: false });
  canvas.addEventListener('touchmove', touchMove, { passive: false });
  const pauseCtl = attachPause(host);
  attachTouchControls(host, { directional: 'leftright' });
  reset();
  step();
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

/* ============================================================
   TIC-TAC-TOE — mode picker (solo vs perfect minimax / 1v1 MP)
   ============================================================ */
function startTTT(host) {
  showPartyLobby(host, {
    gameId: 'ttt', gameTitle: 'Tic Tac Toe', icon: '⚔️',
    soloLabel: 'Play vs AI',
    onSolo: () => startTTTSolo(host),
    onConnected: (h, shim, settings) => startTTTMP(h, shim)
  });
}

function startTTTSolo(host) {
  let board, turn, gameOver, busy;
  const HUMAN = 'X', AI = 'O';
  function reset() { board = Array(9).fill(''); turn = HUMAN; gameOver = false; busy = false; render(); host.querySelector('#ttt-msg').innerText = "You're X. Try your best."; }
  function check(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (const [a,b1,c] of lines) if (b[a] && b[a]===b[b1] && b[a]===b[c]) return b[a];
    if (b.every(x => x)) return 'tie';
    return null;
  }
  function minimax(b, player) {
    const r = check(b);
    if (r === AI) return { score: 10 };
    if (r === HUMAN) return { score: -10 };
    if (r === 'tie') return { score: 0 };
    let best = player === AI ? { score: -Infinity } : { score: Infinity };
    for (let i = 0; i < 9; i++) {
      if (b[i]) continue;
      b[i] = player;
      const res = minimax(b, player === AI ? HUMAN : AI);
      b[i] = '';
      if (player === AI) {
        if (res.score > best.score) best = { score: res.score, idx: i };
      } else {
        if (res.score < best.score) best = { score: res.score, idx: i };
      }
    }
    return best;
  }
  function aiMove() {
    const m = minimax(board.slice(), AI);
    if (m.idx !== undefined) board[m.idx] = AI;
  }
  function render() {
    const grid = host.querySelector('#ttt');
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'ttt-cell';
      if (board[i] === 'O') cell.classList.add('o');
      cell.textContent = board[i];
      cell.addEventListener('click', () => {
        if (gameOver || busy || board[i] || turn !== HUMAN) return;
        board[i] = HUMAN;
        sfx('click');
        let res = check(board);
        render();
        if (res) { finalize(res); return; }
        busy = true;
        setTimeout(() => { aiMove(); sfx('pop'); render(); busy = false; finalize(check(board)); }, 250);
      });
      grid.appendChild(cell);
    }
  }
  function finalize(res) {
    if (!res) return;
    gameOver = true;
    const msg = host.querySelector('#ttt-msg');
    let title, kind;
    if (res === 'tie') { title = 'Draw'; kind = 'draw'; msg.innerHTML = '<b>Draw.</b>'; }
    else if (res === HUMAN) { title = 'You Win!'; kind = 'win'; msg.innerHTML = '<b style="color:var(--good);">You win!</b>'; }
    else { title = 'AI Wins'; kind = 'lose'; msg.innerHTML = '<b style="color:var(--bad);">AI wins.</b>'; }
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), { title, kind, onRetry: reset });
    }, 350);
  }
  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div class="ttt-board" id="ttt"></div>
      <div class="game-msg" id="ttt-msg">You're X. Try your best.</div>
      <button class="btn" id="ttt-reset">New Game</button>
    </div>`;
  host.querySelector('#ttt-reset').addEventListener('click', reset);
  reset();
  activeCleanup = () => {};
}

function startTTTMP(host, shim) {
  const scope = shim.scope();
  // Wire protocol over shim 'game' channel: {type:'move', idx} (turn-gated by current side)
  // Host plays X and goes first.
  const me = shim.role === 'host' ? 'X' : 'O';
  const them = me === 'X' ? 'O' : 'X';
  let board = Array(9).fill('');
  let turn = 'X';
  let gameEnded = false;
  let rematchUI = null;
  function checkW(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (const [a,b1,c] of lines) if (b[a] && b[a]===b[b1] && b[a]===b[c]) return { winner: b[a], line: [a,b1,c] };
    if (b.every(x => x)) return { winner: 'tie' };
    return null;
  }
  function setMsg() {
    const msg = host.querySelector('#ttt-msg');
    if (gameEnded || !msg) return;
    msg.innerText = turn === me ? `Your turn (${me}).` : `Opponent's turn (${them})…`;
  }
  function render(winLine) {
    const grid = host.querySelector('#ttt');
    if (!grid) return;
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'ttt-cell';
      if (board[i] === 'O') cell.classList.add('o');
      if (winLine && winLine.includes(i)) cell.style.background = 'rgba(95,208,122,0.25)';
      cell.textContent = board[i];
      cell.addEventListener('click', () => {
        if (gameEnded || board[i] || turn !== me) return;
        board[i] = me;
        try { shim.emit('game', { type: 'move', idx: i }); } catch (e) {}
        sfx('click');
        turn = them;
        const res = checkW(board);
        render(res && res.line);
        if (res) finalize(res); else setMsg();
      });
      grid.appendChild(cell);
    }
  }
  function finalize(res) {
    if (gameEnded) return;
    gameEnded = true;
    let title, kind, sub = '';
    if (res.winner === 'tie') { title = 'Draw'; kind = 'draw'; sub = 'Cat\'s game.'; }
    else if (res.winner === me) { title = 'You Win!'; kind = 'win'; sub = `You played ${me}.`; }
    else { title = 'You Lose'; kind = 'lose'; sub = `Opponent played ${them}.`; }
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title, sub, kind, dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 350);
  }
  host.innerHTML = `
    <div class="game-region">
      <div class="mp-layout">
        <div class="mp-side" style="align-items:center;">
          <div class="ttt-board" id="ttt"></div>
          <div class="game-msg" id="ttt-msg"></div>
          <div id="ttt-status"></div>
        </div>
        <div class="mp-side" id="ttt-chat-host"></div>
      </div>
    </div>`;
  const statusBar = makeMpStatusBar(shim);
  host.querySelector('#ttt-status').appendChild(statusBar.element);
  const chat = makeChatPanel(shim);
  host.querySelector('#ttt-chat-host').appendChild(chat.element);
  chat.appendSystem(`You are ${me}. ${me === 'X' ? 'X goes first.' : 'X goes first — wait for opponent.'}`);

  scope.on('game', (m) => {
    if (!m || m.type !== 'move' || gameEnded) return;
    if (turn !== them) return;
    if (typeof m.idx !== 'number' || board[m.idx]) return;
    board[m.idx] = them;
    sfx('pop');
    turn = me;
    const res = checkW(board);
    render(res && res.line);
    if (res) finalize(res); else setMsg();
  });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    // Swap who is X/O each rematch
    shim.role = shim.role === 'host' ? 'guest' : 'host';
    startTTTMP(host, shim);
  });
  scope.on('closed', () => {
    if (gameEnded) return;
    gameEnded = true;
    chat.appendSystem('Opponent disconnected.');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Opponent left the party.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startTTT(host)
      });
    }, 250);
  });

  render();
  setMsg();

  activeCleanup = () => {
    statusBar.destroy(); chat.destroy();
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}


/* ============================================================
   CONNECT 4 — mode picker
   ============================================================ */
function startC4(host) {
  showPartyLobby(host, {
    gameId: 'c4', gameTitle: 'Connect 4', icon: '🔴',
    soloLabel: 'Play vs AI',
    onSolo: () => startC4Solo(host),
    onConnected: (h, shim, settings) => startC4MP(h, shim)
  });
}

function startC4Solo(host) {
  const COLS = 7, ROWS = 6, CELL = 66, GAP = 6, PAD = 12;
  const W = COLS * CELL + (COLS-1) * GAP + PAD * 2;
  const H = ROWS * CELL + (ROWS-1) * GAP + PAD * 2;
  let board, turn, gameOver, animating;
  let canvas, ctx;
  let raf = null;
  let dropAnim = null; // {col, targetRow, color, y, vy} during fall

  function reset() {
    board = Array.from({length:ROWS}, () => Array(COLS).fill(''));
    turn = 'r'; gameOver = false; animating = false; dropAnim = null;
    host.querySelector('#c4-msg').innerHTML = `Your turn. Click a column.`;
    draw();
  }
  function findRow(b, col) {
    for (let r = ROWS-1; r >= 0; r--) if (!b[r][col]) return r;
    return -1;
  }
  function checkWin(b, p) {
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      if (b[r][c] !== p) continue;
      for (const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
        let line = [[r,c]];
        for (let k=1;k<4;k++) {
          const nr=r+dr*k, nc=c+dc*k;
          if (nr<0||nr>=ROWS||nc<0||nc>=COLS) break;
          if (b[nr][nc]===p) line.push([nr,nc]); else break;
        }
        if (line.length>=4) return line;
      }
    }
    return null;
  }
  function isFull(b) { return b[0].every(x => x); }
  function aiPick() {
    function score(b, p) {
      let s = 0;
      for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
        if (b[r][c] !== p) continue;
        for (const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
          let n = 1;
          for (let k=1;k<4;k++) {
            const nr=r+dr*k, nc=c+dc*k;
            if (nr<0||nr>=ROWS||nc<0||nc>=COLS) break;
            if (b[nr][nc]===p) n++; else break;
          }
          s += n*n;
        }
      }
      return s;
    }
    function evalB(b) { return score(b,'y') - score(b,'r'); }
    function neg(b, depth, alpha, beta, p) {
      if (checkWin(b,'y')) return 100000 - (4-depth);
      if (checkWin(b,'r')) return -100000 + (4-depth);
      if (depth === 0 || isFull(b)) return evalB(b);
      const order = [3,2,4,1,5,0,6];
      let best = p === 'y' ? -Infinity : Infinity;
      for (const cc of order) {
        if (b[0][cc]) continue;
        const r = findRow(b, cc); b[r][cc] = p;
        const v = neg(b, depth-1, alpha, beta, p === 'y' ? 'r' : 'y');
        b[r][cc] = '';
        if (p === 'y') { best = Math.max(best, v); alpha = Math.max(alpha, v); }
        else { best = Math.min(best, v); beta = Math.min(beta, v); }
        if (alpha >= beta) break;
      }
      return best;
    }
    let bestCol = 3, bestVal = -Infinity;
    const order = [3,2,4,1,5,0,6];
    for (const c of order) {
      if (board[0][c]) continue;
      const r = findRow(board, c); board[r][c] = 'y';
      const v = neg(board, 4, -Infinity, Infinity, 'r');
      board[r][c] = '';
      if (v > bestVal) { bestVal = v; bestCol = c; }
    }
    return bestCol;
  }

  function cellCenter(r, c) {
    return {
      x: PAD + c * (CELL + GAP) + CELL/2,
      y: PAD + r * (CELL + GAP) + CELL/2
    };
  }
  function draw(highlight) {
    if (!ctx) return;
    // 1) Dark backdrop behind the board so a behind-the-board disk has
    //    something to sit on.
    ctx.fillStyle = '#0a0d12';
    ctx.fillRect(0, 0, W, H);
    // 2) Falling disk — drawn FIRST so the board frame goes on top of it.
    //    The board's circular cutouts (drawn with even-odd next) leave
    //    holes through which the falling disk shows; between rows the disk
    //    is hidden behind the blue, which gives a real "slot" feel.
    if (dropAnim) drawPiece(cellCenter(0, dropAnim.col).x, dropAnim.y, dropAnim.color, false);
    // 3) Blue board with circular cutouts. Even-odd fill makes the inner
    //    circles act as holes that aren't painted.
    ctx.fillStyle = '#2a3a8c';
    ctx.beginPath();
    const _br = 14;
    ctx.moveTo(_br, 0);
    ctx.lineTo(W - _br, 0); ctx.arcTo(W, 0, W, _br, _br);
    ctx.lineTo(W, H - _br); ctx.arcTo(W, H, W - _br, H, _br);
    ctx.lineTo(_br, H); ctx.arcTo(0, H, 0, H - _br, _br);
    ctx.lineTo(0, _br); ctx.arcTo(0, 0, _br, 0, _br);
    ctx.closePath();
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const { x, y } = cellCenter(r, c);
      ctx.moveTo(x + (CELL/2 - 4), y);
      ctx.arc(x, y, CELL/2 - 4, 0, Math.PI * 2);
    }
    ctx.fill('evenodd');
    // 4) Settled pieces sit on top, inside their holes.
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const v = board[r][c];
      if (!v) continue;
      const { x, y } = cellCenter(r, c);
      drawPiece(x, y, v, highlight && highlight.some(([rr,cc]) => rr===r && cc===c));
    }
  }
  function drawPiece(x, y, color, glow) {
    const grad = ctx.createRadialGradient(x-12, y-12, 4, x, y, CELL/2 - 2);
    if (color === 'r') { grad.addColorStop(0, '#ffaaaa'); grad.addColorStop(1, '#d04545'); }
    else { grad.addColorStop(0, '#ffe09a'); grad.addColorStop(1, '#d99a1a'); }
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, CELL/2 - 5, 0, Math.PI*2); ctx.fill();
    if (glow) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(x, y, CELL/2 - 4, 0, Math.PI*2); ctx.stroke();
    }
  }
  function roundRect(c, x, y, w, h, r, fill) {
    c.beginPath();
    c.moveTo(x+r, y);
    c.lineTo(x+w-r, y); c.arcTo(x+w, y, x+w, y+r, r);
    c.lineTo(x+w, y+h-r); c.arcTo(x+w, y+h, x+w-r, y+h, r);
    c.lineTo(x+r, y+h); c.arcTo(x, y+h, x, y+h-r, r);
    c.lineTo(x, y+r); c.arcTo(x, y, x+r, y, r);
    if (fill) c.fill(); else c.stroke();
  }

  function animateDrop(col, color, after) {
    const targetRow = findRow(board, col);
    if (targetRow < 0) return;
    animating = true;
    const targetY = cellCenter(targetRow, col).y;
    dropAnim = { col, color, y: PAD - CELL/2, targetY, vy: 0, bounces: 0 };
    function step() {
      if (!dropAnim) return;
      dropAnim.vy += 1.4;
      dropAnim.y += dropAnim.vy;
      if (dropAnim.y >= dropAnim.targetY) {
        dropAnim.y = dropAnim.targetY;
        if (dropAnim.bounces === 0 && dropAnim.vy > 6) {
          // bounce once
          dropAnim.vy = -dropAnim.vy * 0.32;
          dropAnim.bounces++;
          sfx('bounce');
        } else {
          // settle
          board[targetRow][col] = color;
          dropAnim = null;
          animating = false;
          draw();
          if (after) after(targetRow);
          return;
        }
      }
      draw();
      raf = requestAnimationFrame(step);
    }
    sfx('drop');
    raf = requestAnimationFrame(step);
  }

  function clickCol(c) {
    if (gameOver || animating || turn !== 'r' || board[0][c]) return;
    animateDrop(c, 'r', () => {
      const win = checkWin(board, 'r');
      if (win) return endGame('win', 'You win!', win);
      if (isFull(board)) return endGame('draw', 'Draw.');
      turn = 'y';
      host.querySelector('#c4-msg').innerHTML = 'AI thinking…';
      setTimeout(() => {
        const aiCol = aiPick();
        animateDrop(aiCol, 'y', () => {
          const win = checkWin(board, 'y');
          if (win) return endGame('lose', 'AI wins.', win);
          if (isFull(board)) return endGame('draw', 'Draw.');
          turn = 'r';
          host.querySelector('#c4-msg').innerHTML = `Your turn. Click a column.`;
        });
      }, 240);
    });
  }
  function endGame(kind, msg, winLine) {
    gameOver = true;
    host.querySelector('#c4-msg').innerHTML = `<b>${msg}</b>`;
    draw(winLine);
    showResult(host.querySelector('.game-region'), {
      title: kind === 'win' ? 'Victory!' : kind === 'lose' ? 'Defeat' : 'Draw',
      sub: msg,
      kind,
      onRetry: reset
    });
  }

  host.innerHTML = `
    <div class="game-region">
      <div style="font-size:14px;color:var(--sub);">You're red. Click a column to drop a disc.</div>
      <canvas id="c4-canvas" width="${W}" height="${H}" style="border-radius:14px;cursor:pointer;"></canvas>
      <div class="game-msg" id="c4-msg">Your turn. Click a column.</div>
      <button class="btn secondary" id="c4-reset">New Game</button>
    </div>`;
  canvas = host.querySelector('#c4-canvas');
  ctx = canvas.getContext('2d');
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const col = Math.floor((x - PAD) / (CELL + GAP));
    if (col >= 0 && col < COLS) clickCol(col);
  });
  host.querySelector('#c4-reset').addEventListener('click', reset);
  reset();
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

function startC4MP(host, shim) {
  const scope = shim.scope();
  const COLS = 7, ROWS = 6, CELL = 56, GAP = 5, PAD = 10;
  const W = COLS * CELL + (COLS-1) * GAP + PAD * 2;
  const H = ROWS * CELL + (ROWS-1) * GAP + PAD * 2;
  // Host = red goes first, guest = yellow
  const me = shim.role === 'host' ? 'r' : 'y';
  const them = me === 'r' ? 'y' : 'r';
  let board = Array.from({length:ROWS}, () => Array(COLS).fill(''));
  let turn = 'r';
  let gameEnded = false, animating = false;
  let dropAnim = null;
  let raf = null;
  let rematchUI = null;
  let canvas, ctx;
  // Race fix: opponent's move can arrive while our drop animation is still playing.
  // Queue it instead of dropping it, then process after the animation completes.
  let pendingRemote = null;
  function findRow(b, col) { for (let r = ROWS-1; r >= 0; r--) if (!b[r][col]) return r; return -1; }
  function checkWin(b, p) {
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      if (b[r][c] !== p) continue;
      for (const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
        let line = [[r,c]];
        for (let k=1;k<4;k++) {
          const nr=r+dr*k, nc=c+dc*k;
          if (nr<0||nr>=ROWS||nc<0||nc>=COLS) break;
          if (b[nr][nc]===p) line.push([nr,nc]); else break;
        }
        if (line.length>=4) return line;
      }
    }
    return null;
  }
  function isFull(b) { return b[0].every(x => x); }
  function cellCenter(r, c) { return { x: PAD + c * (CELL + GAP) + CELL/2, y: PAD + r * (CELL + GAP) + CELL/2 }; }
  function roundRect(c, x, y, w, h, r, fill) {
    c.beginPath();
    c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.arcTo(x+w, y, x+w, y+r, r);
    c.lineTo(x+w, y+h-r); c.arcTo(x+w, y+h, x+w-r, y+h, r);
    c.lineTo(x+r, y+h); c.arcTo(x, y+h, x, y+h-r, r);
    c.lineTo(x, y+r); c.arcTo(x, y, x+r, y, r);
    if (fill) c.fill(); else c.stroke();
  }
  function drawPiece(x, y, color, glow) {
    const grad = ctx.createRadialGradient(x-12, y-12, 4, x, y, CELL/2 - 2);
    if (color === 'r') { grad.addColorStop(0, '#ffaaaa'); grad.addColorStop(1, '#d04545'); }
    else { grad.addColorStop(0, '#ffe09a'); grad.addColorStop(1, '#d99a1a'); }
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, CELL/2 - 5, 0, Math.PI*2); ctx.fill();
    if (glow) { ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(x, y, CELL/2 - 4, 0, Math.PI*2); ctx.stroke(); }
  }
  function draw(highlight) {
    if (!ctx) return;
    // Same behind-the-board falling-disk trick as the solo version above.
    ctx.fillStyle = '#0a0d12';
    ctx.fillRect(0, 0, W, H);
    if (dropAnim) drawPiece(cellCenter(0, dropAnim.col).x, dropAnim.y, dropAnim.color, false);
    ctx.fillStyle = '#2a3a8c';
    ctx.beginPath();
    const _br = 14;
    ctx.moveTo(_br, 0);
    ctx.lineTo(W - _br, 0); ctx.arcTo(W, 0, W, _br, _br);
    ctx.lineTo(W, H - _br); ctx.arcTo(W, H, W - _br, H, _br);
    ctx.lineTo(_br, H); ctx.arcTo(0, H, 0, H - _br, _br);
    ctx.lineTo(0, _br); ctx.arcTo(0, 0, _br, 0, _br);
    ctx.closePath();
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const { x, y } = cellCenter(r, c);
      ctx.moveTo(x + (CELL/2 - 4), y);
      ctx.arc(x, y, CELL/2 - 4, 0, Math.PI * 2);
    }
    ctx.fill('evenodd');
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const v = board[r][c];
      if (!v) continue;
      const { x, y } = cellCenter(r, c);
      drawPiece(x, y, v, highlight && highlight.some(([rr,cc]) => rr===r && cc===c));
    }
  }
  function setMsg() {
    if (gameEnded) return;
    const msg = host.querySelector('#c4-msg');
    if (!msg) return;
    msg.innerHTML = turn === me
      ? `Your turn (<b style="color:${me==='r'?'#f87171':'#fbbf24'}">${me==='r'?'Red':'Yellow'}</b>) — click a column.`
      : `Opponent's turn (<b style="color:${them==='r'?'#f87171':'#fbbf24'}">${them==='r'?'Red':'Yellow'}</b>)…`;
  }
  function animateDrop(col, color, after) {
    const targetRow = findRow(board, col);
    if (targetRow < 0) return;
    animating = true;
    const targetY = cellCenter(targetRow, col).y;
    dropAnim = { col, color, y: PAD - CELL/2, targetY, vy: 0, bounces: 0 };
    function step() {
      if (!dropAnim) return;
      dropAnim.vy += 1.4;
      dropAnim.y += dropAnim.vy;
      if (dropAnim.y >= dropAnim.targetY) {
        dropAnim.y = dropAnim.targetY;
        if (dropAnim.bounces === 0 && dropAnim.vy > 6) {
          dropAnim.vy = -dropAnim.vy * 0.32;
          dropAnim.bounces++;
          sfx('bounce');
        } else {
          board[targetRow][col] = color;
          dropAnim = null;
          animating = false;
          draw();
          if (after) after(targetRow);
          return;
        }
      }
      draw();
      raf = requestAnimationFrame(step);
    }
    sfx('drop');
    raf = requestAnimationFrame(step);
  }
  function tryDrop(col, byMe) {
    if (gameEnded || animating) return false;
    const expected = byMe ? me : them;
    if (turn !== expected) return false;
    if (col < 0 || col >= COLS || board[0][col]) return false;
    animateDrop(col, expected, () => {
      const win = checkWin(board, expected);
      if (win) return finalize(byMe ? 'win' : 'lose', win);
      if (isFull(board)) return finalize('draw');
      turn = byMe ? them : me;
      setMsg();
      // Drain a queued remote move that arrived while we were animating.
      if (pendingRemote && !animating && !gameEnded) {
        const m = pendingRemote; pendingRemote = null;
        tryDrop(m.col, false);
      }
    });
    return true;
  }
  function finalize(kind, winLine) {
    if (gameEnded) return;
    gameEnded = true;
    draw(winLine);
    const msg = host.querySelector('#c4-msg');
    if (msg) msg.innerHTML = kind === 'win' ? '<b style="color:var(--good);">You win!</b>' : kind === 'lose' ? '<b style="color:var(--bad);">You lose.</b>' : '<b>Draw.</b>';
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: kind === 'win' ? 'Victory!' : kind === 'lose' ? 'Defeat' : 'Draw',
        sub: kind === 'win' ? 'Four in a row!' : kind === 'lose' ? 'They got four first.' : 'Board full.',
        kind, dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 350);
  }
  host.innerHTML = `
    <div class="game-region">
      <div class="mp-layout">
        <div class="mp-side" style="align-items:center;">
          <div style="font-size:13px;color:var(--sub);">You're <b style="color:${me==='r'?'#f87171':'#fbbf24'}">${me==='r'?'Red':'Yellow'}</b>.</div>
          <canvas id="c4-canvas" width="${W}" height="${H}" style="border-radius:14px;cursor:pointer;"></canvas>
          <div class="game-msg" id="c4-msg"></div>
          <div id="c4-status"></div>
        </div>
        <div class="mp-side" id="c4-chat-host"></div>
      </div>
    </div>`;
  canvas = host.querySelector('#c4-canvas');
  ctx = canvas.getContext('2d');
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const xCSS = e.clientX - rect.left;
    const x = xCSS * (W / rect.width);
    const col = Math.floor((x - PAD) / (CELL + GAP));
    if (col >= 0 && col < COLS && turn === me && tryDrop(col, true)) {
      try { shim.emit('game', { type: 'drop', col }); } catch (e) {}
    }
  });
  const statusBar = makeMpStatusBar(shim);
  host.querySelector('#c4-status').appendChild(statusBar.element);
  const chat = makeChatPanel(shim);
  host.querySelector('#c4-chat-host').appendChild(chat.element);
  chat.appendSystem(`You are ${me==='r'?'Red':'Yellow'}. Red goes first.`);

  scope.on('game', (m) => {
    if (!m || m.type !== 'drop' || gameEnded) return;
    // If we're mid-animation on our own piece, queue rather than reject.
    if (animating) { pendingRemote = m; return; }
    tryDrop(m.col, false);
  });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    shim.role = shim.role === 'host' ? 'guest' : 'host';
    startC4MP(host, shim);
  });
  scope.on('closed', () => {
    if (gameEnded) return;
    gameEnded = true;
    chat.appendSystem('Opponent disconnected.');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Opponent left.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startC4(host)
      });
    }, 250);
  });

  draw();
  setMsg();

  activeCleanup = () => {
    if (raf) cancelAnimationFrame(raf);
    statusBar.destroy(); chat.destroy();
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}

/* ============================================================
