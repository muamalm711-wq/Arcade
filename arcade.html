  } else {
    // Multiplayer wiring
    const oppNameEl = host.querySelector('#mp-opp-name');
    const meNameEl = host.querySelector('#mp-me-name');
    const oppClockEl = host.querySelector('#mp-opp-clock');
    const meClockEl = host.querySelector('#mp-me-clock');
    const drawPrompt = host.querySelector('#mp-draw-prompt');
    oppNameEl.innerText = mp.color === 'w' ? 'Black' : 'White';
    meNameEl.innerText = mp.color === 'w' ? 'White' : 'Black';

    function updateClockDisplay() {
      if (!mpClocks) return;
      const myMs = mpClocks[humanColor];
      const oppMs = mpClocks[humanColor === 'w' ? 'b' : 'w'];
      meClockEl.innerText = fmtClock(myMs);
      oppClockEl.innerText = fmtClock(oppMs);
      // Highlight whoever's turn it is
      const myTurn = state.turn === humanColor;
      meClockEl.style.background = myTurn && !mpGameEnded ? '#1f3a2e' : '#1d2230';
      meClockEl.style.borderColor = myTurn && !mpGameEnded ? 'var(--good)' : 'var(--border)';
      oppClockEl.style.background = !myTurn && !mpGameEnded ? '#3a1f1f' : '#1d2230';
      oppClockEl.style.borderColor = !myTurn && !mpGameEnded ? 'var(--bad)' : 'var(--border)';
    }

    // Local clock interpolation between server ticks
    let lastClockUpdate = Date.now();
    function clockTick() {
      if (mpGameEnded) return;
      const now = Date.now();
      const delta = now - lastClockUpdate;
      lastClockUpdate = now;
      const turnSide = state.turn;
      if (mpClocks[turnSide] > 0) mpClocks[turnSide] = Math.max(0, mpClocks[turnSide] - delta);
      updateClockDisplay();
      mpClockRaf = requestAnimationFrame(clockTick);
    }
    mpClockRaf = requestAnimationFrame(clockTick);

    host.querySelector('#mp-resign-btn').addEventListener('click', () => {
      if (mpGameEnded) return;
      if (!confirm('Resign this game?')) return;
      try { mp.socket.emit('chess:resign', { reason: 'resign' }); } catch (e) {}
    });
    host.querySelector('#mp-draw-btn').addEventListener('click', (ev) => {
      if (mpGameEnded) return;
      try { mp.socket.emit('chess:draw-offer'); } catch (e) {}
      ev.target.disabled = true;
      ev.target.innerText = 'Draw offered';
      setTimeout(() => { try { ev.target.disabled = false; ev.target.innerText = 'Offer Draw'; } catch (e) {} }, 8000);
    });
    host.querySelector('#mp-draw-accept').addEventListener('click', () => {
      try { mp.socket.emit('chess:draw-accept'); } catch (e) {}
      drawPrompt.style.display = 'none';
      mpDrawPending = false;
    });
    host.querySelector('#mp-draw-decline').addEventListener('click', () => {
      try { mp.socket.emit('chess:draw-decline'); } catch (e) {}
      drawPrompt.style.display = 'none';
      mpDrawPending = false;
    });

    // Socket events
    mpListeners.move = (payload) => {
      if (mpGameEnded) return;
      if (!payload || !payload.move) return;
      if (payload.by === humanColor) return; // echo of our own move (server only sends to opponent, but be safe)
      const m = payload.move;
      // Validate it exists in legal moves to avoid corrupt state
      const all = legalMoves(state);
      const found = all.find(lm =>
        lm.from[0] === m.from[0] && lm.from[1] === m.from[1] &&
        lm.to[0] === m.to[0] && lm.to[1] === m.to[1] &&
        (lm.promote || null) === (m.promote || null)
      );
      const moveToApply = found || m;
      const san = moveToSAN(state, moveToApply);
      const wasCapture = !!state.board[moveToApply.to[0]][moveToApply.to[1]] || moveToApply.ep;
      makeMove(state, moveToApply);
      lastMove = moveToApply;
      addHistory(moveToApply, san);
      render();
      animateMove(moveToApply);
      if (inCheck(state, state.turn)) sfx('check');
      else if (wasCapture) sfx('capture');
      else sfx('click');
      if (payload.state) {
        mpClocks.w = payload.state.white ? payload.state.white.timeLeft : mpClocks.w;
        mpClocks.b = payload.state.black ? payload.state.black.timeLeft : mpClocks.b;
        lastClockUpdate = Date.now();
      }
      updateClockDisplay();
      // After applying opponent's move: detect checkmate/stalemate/draw conditions locally,
      // then notify server with a reason (the server has no rules engine).
      const myMoves = legalMoves(state);
      if (myMoves.length === 0) {
        if (inCheck(state, state.turn)) {
          // Checkmate — I lost
          statusEl.innerHTML = '<b style="color:var(--bad);">Checkmate.</b>';
          try { mp.socket.emit('chess:resign', { reason: 'checkmate' }); } catch (e) {}
        } else {
          // Stalemate — draw
          statusEl.innerHTML = '<b style="color:var(--warn);">Stalemate.</b>';
          try { mp.socket.emit('chess:draw-offer', { reason: 'stalemate' }); } catch (e) {}
        }
        return;
      }
      if (state.halfmove >= 100) {
        try { mp.socket.emit('chess:draw-offer', { reason: '50-move-rule' }); } catch (e) {}
      } else if (isInsufficient(state)) {
        try { mp.socket.emit('chess:draw-offer', { reason: 'insufficient' }); } catch (e) {}
      }
      if (inCheck(state, state.turn)) statusEl.innerHTML = '<b style="color:var(--bad);">Check!</b> Your move.';
      else statusEl.innerText = 'Your move.';
    };
    mpListeners.clocks = (st) => {
      if (mpGameEnded || !st) return;
      if (st.white) mpClocks.w = st.white.timeLeft;
      if (st.black) mpClocks.b = st.black.timeLeft;
      lastClockUpdate = Date.now();
      updateClockDisplay();
    };
    mpListeners.gameOver = (payload) => {
      if (mpGameEnded) return;
      mpGameEnded = true;
      if (mpClockRaf) { cancelAnimationFrame(mpClockRaf); mpClockRaf = null; }
      if (payload && payload.state) {
        if (payload.state.white) mpClocks.w = payload.state.white.timeLeft;
        if (payload.state.black) mpClocks.b = payload.state.black.timeLeft;
      }
      updateClockDisplay();
      const kind = payload?.kind || 'draw';
      const reason = payload?.reason || '';
      let title = 'Game over', sub = '', resKind = 'draw';
      if (kind === 'draw') {
        resKind = 'draw';
        if (reason === 'stalemate') { title = 'Stalemate'; sub = 'Neither side has any legal moves.'; }
        else if (reason === 'insufficient') { title = 'Draw'; sub = 'Insufficient material — no checkmate possible.'; }
        else if (reason === '50-move-rule') { title = 'Draw'; sub = '50 moves without a capture or pawn move.'; }
        else if (reason === 'agreement') { title = 'Draw'; sub = 'By mutual agreement.'; }
        else { title = 'Draw'; sub = reason || ''; }
      } else {
        const winnerColor = kind === 'white-wins' ? 'w' : 'b';
        const youWon = winnerColor === humanColor;
        resKind = youWon ? 'win' : 'lose';
        if (reason === 'checkmate') {
          title = youWon ? 'Checkmate!' : 'Checkmated';
          sub = youWon ? 'You delivered checkmate.' : 'You were checkmated.';
        } else if (reason === 'resign') {
          title = youWon ? 'You win!' : 'You resigned';
          sub = youWon ? 'Opponent resigned.' : 'You resigned the game.';
        } else if (reason === 'disconnect') {
          title = youWon ? 'You win!' : 'Disconnected';
          sub = youWon ? 'Opponent disconnected.' : 'Connection lost.';
        } else if (reason === 'timeout') {
          title = youWon ? 'You win on time!' : 'Time out';
          sub = youWon ? "Opponent's clock ran out." : 'Your clock ran out.';
        } else if (reason === 'first-move-timeout') {
          title = youWon ? 'You win!' : 'Forfeit';
          sub = youWon ? "White didn't move within 60s." : "You didn't make your first move within 60s.";
        } else if (reason === 'cancelled') {
          title = youWon ? 'Opponent left' : 'Cancelled';
          sub = '';
        } else {
          title = youWon ? 'You win!' : 'You lose';
          sub = reason || '';
        }
      }
      statusEl.innerHTML = `<b style="color:var(--${resKind === 'win' ? 'good' : resKind === 'lose' ? 'bad' : 'warn'});">${title}</b> ${sub}`;
      // Don't allow rematch on disconnect — the conn is dead
      const canRematch = reason !== 'disconnect' && reason !== 'cancelled';
      setTimeout(() => {
        const rematchOpts = canRematch ? {
          onToggle: (wantRematch) => {
            try { mp.socket.emit(wantRematch ? 'chess:rematch' : 'chess:rematch-cancel'); } catch (e) {}
          },
          register: (cb) => { mpRematchUI = cb; }
        } : null;
        showResult(host.querySelector('.game-region'), {
          title, sub, kind: resKind,
          dismissable: true,
          rematch: rematchOpts,
          retryLabel: 'New Match',
          onRetry: () => { showChessModePicker(host); }
        });
      }, 350);
    };
    mpListeners.drawOffered = () => {
      if (mpGameEnded) return;
      // Auto-accept if the position is unambiguously drawn (stalemate, insufficient material, 50-move rule)
      const oppMoves = legalMoves(state);
      const stalemate = oppMoves.length === 0 && !inCheck(state, state.turn);
      if (stalemate || isInsufficient(state) || state.halfmove >= 100) {
        try { mp.socket.emit('chess:draw-accept'); } catch (e) {}
        return;
      }
      mpDrawPending = true;
      drawPrompt.style.display = 'block';
    };
    mpListeners.drawDeclined = () => {
      // We offered, they declined — feedback in status briefly
      const prev = statusEl.innerHTML;
      statusEl.innerHTML = '<span style="color:var(--warn);">Draw declined.</span>';
      setTimeout(() => { if (statusEl.innerHTML.includes('Draw declined')) statusEl.innerHTML = prev; }, 2000);
    };
    mpListeners.partyCancelled = () => {
      if (mpGameEnded) return;
      mpGameEnded = true;
      if (mpClockRaf) { cancelAnimationFrame(mpClockRaf); mpClockRaf = null; }
      statusEl.innerHTML = '<b style="color:var(--warn);">Party cancelled.</b>';
    };
    mpListeners.rematchUpdate = (info) => {
      if (typeof mpRematchUI === 'function') {
        try { mpRematchUI(info); } catch (e) {}
      }
    };
    mpListeners.rematchStart = (info) => {
      // Both players agreed — restart the same match using the existing connection.
      // Colors swap each rematch (the shim already swapped its own localColor).
      const nextColor = (info && info.newColor) || (mp.color === 'w' ? 'b' : 'w');
      mp.rematching = true;
      // Drop any leftover overlay (in case it wasn't dismissed)
      const ov = host.querySelector('.result-overlay');
      if (ov) ov.remove();
      // Tear down current game listeners (rematching=true makes activeCleanup skip conn teardown)
      if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
      activeCleanup = null;
      // Start a fresh game on the same shim with swapped color
      startChessGame(host, {
        mode: 'mp',
        mpInfo: { socket: mp.socket, color: nextColor, timeMin: mp.timeMin }
      });
    };

    mp.socket.on('chess:move', mpListeners.move);
    mp.socket.on('chess:clocks', mpListeners.clocks);
    mp.socket.on('chess:game-over', mpListeners.gameOver);
    mp.socket.on('chess:draw-offered', mpListeners.drawOffered);
    mp.socket.on('chess:draw-declined', mpListeners.drawDeclined);
    mp.socket.on('chess:party-cancelled', mpListeners.partyCancelled);
    mp.socket.on('chess:rematch-update', mpListeners.rematchUpdate);
    mp.socket.on('chess:rematch-start', mpListeners.rematchStart);

    // Tab close = forfeit
    mpListeners.beforeUnload = () => { try { mp.socket.emit('chess:leave'); } catch (e) {} };
    window.addEventListener('beforeunload', mpListeners.beforeUnload);

    // Start the P2P shim's authoritative clock ticker
    if (typeof mp.socket.startClocks === 'function') {
      try { mp.socket.startClocks(); } catch (e) {}
    }

    updateClockDisplay();
  }

  function sqName(r, c) { return 'abcdefgh'[c] + (8 - r); }
  function moveToSAN(s, m) {
    const piece = s.board[m.from[0]][m.from[1]];
    if (m.castle === 'K') return 'O-O';
    if (m.castle === 'Q') return 'O-O-O';
    let san = '';
    const isCapture = !!s.board[m.to[0]][m.to[1]] || m.ep;
    if (piece.t !== 'P') san += piece.t;
    else if (isCapture) san += 'abcdefgh'[m.from[1]];
    if (isCapture) san += 'x';
    san += sqName(m.to[0], m.to[1]);
    if (m.promote) san += '=' + m.promote;
    return san;
  }

  function render() {
    boardEl.innerHTML = '';
    const flip = humanColor === 'b';
    const checkSq = inCheck(state, state.turn) ? findKing(state, state.turn) : null;
    for (let i = 0; i < 64; i++) {
      const r = flip ? 7 - Math.floor(i/8) : Math.floor(i/8);
      const c = flip ? 7 - (i % 8) : (i % 8);
      const sq = document.createElement('div');
      const light = (r + c) % 2 === 0;
      sq.className = 'chess-sq ' + (light ? 'light' : 'dark');
      sq.dataset.r = r; sq.dataset.c = c;
      const p = state.board[r][c];
      if (p) {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;';
        wrap.innerHTML = pieceSVG(p.c, p.t);
        sq.appendChild(wrap);
      }
      if (selected && selected[0] === r && selected[1] === c) sq.classList.add('sel');
      if (legalForSelected.some(m => m.to[0]===r && m.to[1]===c)) {
        sq.classList.add(state.board[r][c] || legalForSelected.find(m=>m.to[0]===r&&m.to[1]===c).ep ? 'cap' : 'move');
      }
      if (lastMove && ((lastMove.from[0]===r && lastMove.from[1]===c) || (lastMove.to[0]===r && lastMove.to[1]===c))) {
        sq.classList.add('last');
      }
      if (checkSq && checkSq[0]===r && checkSq[1]===c) sq.classList.add('check');
      sq.addEventListener('click', () => onSqClick(r, c));
      boardEl.appendChild(sq);
    }
    historyEl.innerHTML = history.map((pair, i) =>
      `<div class="pair"><span class="num">${i+1}.</span><span>${pair.w || ''}</span><span>${pair.b || ''}</span></div>`
    ).join('');
    historyEl.scrollTop = historyEl.scrollHeight;
  }

  function animateMove(m) {
    // Slide the piece at destination from its previous square
    const flip = humanColor === 'b';
    const sqSize = boardEl.clientWidth / 8;
    const fromDR = flip ? 7 - m.from[0] : m.from[0];
    const fromDC = flip ? 7 - m.from[1] : m.from[1];
    const toDR = flip ? 7 - m.to[0] : m.to[0];
    const toDC = flip ? 7 - m.to[1] : m.to[1];
    const dx = (fromDC - toDC) * sqSize;
    const dy = (fromDR - toDR) * sqSize;
    const destIdx = toDR * 8 + toDC;
    const destSq = boardEl.children[destIdx];
    if (destSq && destSq.firstChild) {
      const prevZ = destSq.style.zIndex;
      destSq.style.zIndex = '20';
      const anim = destSq.firstChild.animate(
        [{ transform: `translate(${dx}px, ${dy}px)` }, { transform: 'translate(0, 0)' }],
        { duration: 220, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' }
      );
      anim.onfinish = () => { destSq.style.zIndex = prevZ; };
    }
    // For castling, also animate rook
    if (m.castle) {
      const rookDR = toDR; // same rank
      const rookFromC = m.castle === 'K' ? 7 : 0;
      const rookToC = m.castle === 'K' ? 5 : 3;
      const rookFromDC = flip ? 7 - rookFromC : rookFromC;
      const rookToDC = flip ? 7 - rookToC : rookToC;
      const rdx = (rookFromDC - rookToDC) * sqSize;
      const rookIdx = rookDR * 8 + rookToDC;
      const rookSq = boardEl.children[rookIdx];
      if (rookSq && rookSq.firstChild) {
        const prevRZ = rookSq.style.zIndex;
        rookSq.style.zIndex = '20';
        const ranim = rookSq.firstChild.animate(
          [{ transform: `translate(${rdx}px, 0)` }, { transform: 'translate(0, 0)' }],
          { duration: 220, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' }
        );
        ranim.onfinish = () => { rookSq.style.zIndex = prevRZ; };
      }
    }
  }

  function onSqClick(r, c) {
    if (botThinking || pendingPromotion) return;
    if (state.turn !== humanColor) return;
    const p = state.board[r][c];
    if (selected) {
      const m = legalForSelected.find(mv => mv.to[0]===r && mv.to[1]===c);
      if (m) {
        if (m.promote) {
          // Show promotion picker
          showPromoPicker(m, (chosen) => {
            const finalMove = { ...m, promote: chosen };
            applyHumanMove(finalMove);
          });
        } else {
          applyHumanMove(m);
        }
        return;
      }
      if (p && p.c === humanColor) {
        selected = [r, c];
        legalForSelected = legalMoves(state).filter(mv => mv.from[0]===r && mv.from[1]===c);
        // de-dup promo moves to one per dest
        const seen = new Set();
        legalForSelected = legalForSelected.filter(mv => {
          const key = mv.to[0]+','+mv.to[1];
          if (seen.has(key)) return false;
          seen.add(key); return true;
        });
        render();
      } else {
        selected = null; legalForSelected = []; render();
      }
    } else if (p && p.c === humanColor) {
      selected = [r, c];
      legalForSelected = legalMoves(state).filter(mv => mv.from[0]===r && mv.from[1]===c);
      const seen = new Set();
      legalForSelected = legalForSelected.filter(mv => {
        const key = mv.to[0]+','+mv.to[1];
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
      render();
    }
  }

  function showPromoPicker(m, cb) {
    pendingPromotion = true;
    promoBox.innerHTML = '';
    const color = state.turn;
    for (const t of ['Q','R','B','N']) {
      const el = document.createElement('div');
      el.className = 'promo-piece ' + (color === 'w' ? 'white' : 'black');
      el.innerHTML = pieceSVG(color, t);
      el.addEventListener('click', () => {
        promoOverlay.classList.add('hidden');
        pendingPromotion = false;
        cb(t);
      });
      promoBox.appendChild(el);
    }
    promoOverlay.classList.remove('hidden');
  }

  function applyHumanMove(m) {
    const san = moveToSAN(state, m);
    const wasCapture = !!state.board[m.to[0]][m.to[1]] || m.ep;
    makeMove(state, m);
    lastMove = m;
    selected = null; legalForSelected = [];
    addHistory(m, san);
    render();
    animateMove(m);
    if (inCheck(state, state.turn)) sfx('check');
    else if (wasCapture) sfx('capture');
    else sfx('click');
    if (isMP) {
      // Send a slim move payload (avoid sending arrays of strange shapes)
      const payload = {
        from: m.from, to: m.to,
        promote: m.promote || null,
        castle: m.castle || null,
        ep: !!m.ep, dbl: !!m.dbl
      };
      try { mp.socket.emit('chess:move', { move: payload }); } catch (e) {}
      mpFirstMoveDeadline = null;
      if (inCheck(state, state.turn)) statusEl.innerHTML = '<b style="color:var(--bad);">Check!</b> Waiting for opponent…';
      else statusEl.innerText = "Waiting for opponent's move…";
      return;
    }
    if (gameOver()) return;
    setTimeout(botMove, 320);
  }

  function addHistory(m, san) {
    const movedPiece = state.board[m.to[0]][m.to[1]];
    const wasWhite = movedPiece && movedPiece.c === 'w' || (m.promote && state.turn === 'b');
    // Easier: figure out by state.turn — after makeMove, state.turn flipped. So if state.turn === 'b' now, white just moved.
    if (state.turn === 'b') {
      history.push({ w: san, b: '' });
    } else {
      if (history.length === 0 || history[history.length-1].b) history.push({ w: '...', b: san });
      else history[history.length-1].b = san;
    }
  }

  function endChess(kind, title, sub) {
    statusEl.innerHTML = `<b style="color:var(--${kind === 'win' ? 'good' : kind === 'lose' ? 'bad' : 'warn'});">${title}</b> ${sub}`;
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title, sub, kind,
        onRetry: () => {
          state = newGame();
          selected = null; legalForSelected = []; lastMove = null;
          history = []; botThinking = false;
          render();
          if (humanColor === 'b') setTimeout(botMove, 200);
        },
        retryLabel: 'New Game'
      });
    }, 350);
  }

  function gameOver() {
    const moves = legalMoves(state);
    if (moves.length === 0) {
      if (inCheck(state, state.turn)) {
        const loser = state.turn;
        const winner = loser === 'w' ? 'Black' : 'White';
        const youWon = loser !== humanColor;
        endChess(youWon ? 'win' : 'lose', 'Checkmate', `${winner} wins.`);
      } else {
        endChess('draw', 'Stalemate', 'Draw.');
      }
      return true;
    }
    if (state.halfmove >= 100) {
      endChess('draw', '50-move rule', 'Draw.');
      return true;
    }
    if (isInsufficient(state)) {
      endChess('draw', 'Insufficient material', 'Draw.');
      return true;
    }
    if (inCheck(state, state.turn)) {
      statusEl.innerHTML = `<b style="color:var(--bad);">Check!</b> ${state.turn === humanColor ? 'Your move.' : (isMP ? 'Opponent to move.' : 'Bot to move.')}`;
    } else {
      statusEl.innerHTML = state.turn === humanColor ? 'Your move.' : (isMP ? "Opponent's move…" : 'Bot is thinking…');
    }
    return false;
  }

  function botMove() {
    if (state.turn === humanColor) return;
    botThinking = true;
    statusEl.innerText = 'Bot is thinking…';
    // Defer to keep UI snappy
    setTimeout(() => {
      const m = pickBotMove(state, elo);
      botThinking = false;
      if (!m) { gameOver(); return; }
      const san = moveToSAN(state, m);
      const wasCapture = !!state.board[m.to[0]][m.to[1]] || m.ep;
      makeMove(state, m);
      lastMove = m;
      addHistory(m, san);
      render();
      animateMove(m);
      if (inCheck(state, state.turn)) sfx('check');
      else if (wasCapture) sfx('capture');
      else sfx('click');
      gameOver();
    }, 250);
  }

  render();
  if (!isMP && humanColor === 'b') setTimeout(botMove, 200);

  activeCleanup = () => {
    if (isMP) {
      if (mpClockRaf) { cancelAnimationFrame(mpClockRaf); mpClockRaf = null; }
      try {
        if (mpListeners.move) mp.socket.off('chess:move', mpListeners.move);
        if (mpListeners.clocks) mp.socket.off('chess:clocks', mpListeners.clocks);
        if (mpListeners.gameOver) mp.socket.off('chess:game-over', mpListeners.gameOver);
        if (mpListeners.drawOffered) mp.socket.off('chess:draw-offered', mpListeners.drawOffered);
        if (mpListeners.drawDeclined) mp.socket.off('chess:draw-declined', mpListeners.drawDeclined);
        if (mpListeners.partyCancelled) mp.socket.off('chess:party-cancelled', mpListeners.partyCancelled);
        if (mpListeners.rematchUpdate) mp.socket.off('chess:rematch-update', mpListeners.rematchUpdate);
        if (mpListeners.rematchStart) mp.socket.off('chess:rematch-start', mpListeners.rematchStart);
      } catch (e) {}
      if (mpListeners.beforeUnload) {
        try { window.removeEventListener('beforeunload', mpListeners.beforeUnload); } catch (e) {}
      }
      // Rematching reuses the same connection — skip the teardown
      if (mp.rematching) return;
      // If the game is still going (user navigated away via Back button), forfeit
      if (!mpGameEnded) {
        try { mp.socket.emit('chess:leave'); } catch (e) {}
      }
      // Tear down the underlying PeerJS DataConnection + Peer broker socket
      try { if (typeof mp.socket.closeConn === 'function') mp.socket.closeConn(); } catch (e) {}
      try { if (mp.socket._peer) mp.socket._peer.destroy(); } catch (e) {}
    }
  };
}

   ============================================================ */
function startTetris(host) {
  showPartyLobby(host, {
    gameId: 'tetris', gameTitle: 'Tetris', icon: '🟦',
    soloLabel: 'Solo (Marathon)',
    onSolo: () => startTetrisSolo(host),
    onConnected: (h, shim, settings) => startTetrisMP(h, shim)
  });
}

function startTetrisSolo(host) {
  const COLS = 10, ROWS = 20, CELL = 28;
  const SHAPES = [
    { c:'#22d3ee', s:[[1,1,1,1]] }, // I
    { c:'#fbbf24', s:[[1,1],[1,1]] }, // O
    { c:'#a78bfa', s:[[0,1,0],[1,1,1]] }, // T
    { c:'#34d399', s:[[0,1,1],[1,1,0]] }, // S
    { c:'#f87171', s:[[1,1,0],[0,1,1]] }, // Z
    { c:'#60a5fa', s:[[1,0,0],[1,1,1]] }, // J
    { c:'#fb923c', s:[[0,0,1],[1,1,1]] }, // L
  ];
  let board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  let cur = null, next = null;
  let score = 0, lines = 0, level = 1;
  let dropTimer = 0;
  let last = 0, raf = null;
  let gameOver = false, ended = false;

  host.innerHTML = `
    <div class="game-region"><div class="tet-wrap">
      <canvas class="tet" id="tet" width="${COLS*CELL}" height="${ROWS*CELL}"></canvas>
      <div class="tet-side">
        <div class="tet-stat"><b id="t-score">0</b><span>Score</span></div>
        <div class="tet-stat"><b id="t-lines">0</b><span>Lines</span></div>
        <div class="tet-stat"><b id="t-level">1</b><span>Level</span></div>
        <div class="tet-stat"><span>Next</span>
          <canvas id="t-next" width="120" height="80" style="background:#0a0d12;border-radius:6px;margin-top:6px;"></canvas>
        </div>
        <div style="font-size:11px;color:var(--sub);line-height:1.6;">
          ←/→ move • ↑ rotate<br>↓ soft drop • Space hard drop<br>R restart
        </div>
      </div>
    </div></div>`;
  const ctx = host.querySelector('#tet').getContext('2d');
  const nextCtx = host.querySelector('#t-next').getContext('2d');

  function rot(s) { return s[0].map((_, i) => s.map(row => row[i]).reverse()); }
  function spawn() {
    cur = next || newPiece();
    next = newPiece();
    cur.r = 0;
    cur.c = Math.floor(COLS/2) - Math.ceil(cur.s[0].length/2);
    if (collide(cur)) {
      gameOver = true;
      if (!ended) {
        ended = true;
        sfx('hit');
        setTimeout(() => {
          showResult(host.querySelector('.game-region'), {
            title: 'Game Over',
            sub: `${lines} lines • Level ${level}`,
            stat: 'Score: ' + score,
            kind: lines >= 10 ? 'win' : 'lose',
            onRetry: reset
          });
        }, 350);
      }
    }
  }
  function newPiece() {
    const t = SHAPES[Math.floor(Math.random()*SHAPES.length)];
    return { s: t.s.map(r => r.slice()), c: 0, r: 0, color: t.c };
  }
  function collide(p) {
    for (let r = 0; r < p.s.length; r++) for (let c = 0; c < p.s[r].length; c++) {
      if (!p.s[r][c]) continue;
      const nr = p.r + r, nc = p.c + c;
      if (nc < 0 || nc >= COLS || nr >= ROWS) return true;
      if (nr >= 0 && board[nr][nc]) return true;
    }
    return false;
  }
  function lock() {
    for (let r = 0; r < cur.s.length; r++) for (let c = 0; c < cur.s[r].length; c++) {
      if (cur.s[r][c]) {
        const nr = cur.r + r, nc = cur.c + c;
        if (nr >= 0) board[nr][nc] = cur.color;
      }
    }
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r].every(x => x)) { board.splice(r, 1); board.unshift(Array(COLS).fill(null)); cleared++; r++; }
    }
    if (cleared) {
      const pts = [0, 100, 300, 500, 800][cleared] * level;
      score += pts; lines += cleared; level = 1 + Math.floor(lines/10);
      updateUI();
      sfx(cleared === 4 ? 'win' : 'score');
    } else {
      sfx('drop');
    }
    spawn();
  }
  function updateUI() {
    host.querySelector('#t-score').innerText = score;
    host.querySelector('#t-lines').innerText = lines;
    host.querySelector('#t-level').innerText = level;
  }
  function draw() {
    ctx.fillStyle = '#0a0d12'; ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawCell(ctx, c, r, board[r][c]);
    }
    if (cur) {
      for (let r = 0; r < cur.s.length; r++) for (let c = 0; c < cur.s[r].length; c++) {
        if (cur.s[r][c]) drawCell(ctx, cur.c+c, cur.r+r, cur.color);
      }
    }
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);
      ctx.fillStyle = 'white'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('Game Over', COLS*CELL/2, ROWS*CELL/2);
      ctx.font = '14px sans-serif';
      ctx.fillText('Press R to restart', COLS*CELL/2, ROWS*CELL/2 + 30);
    }
    drawNext();
  }
  function drawCell(c, x, y, color) {
    c.fillStyle = color;
    c.fillRect(x*CELL, y*CELL, CELL-1, CELL-1);
    c.fillStyle = 'rgba(255,255,255,0.15)';
    c.fillRect(x*CELL, y*CELL, CELL-1, 4);
  }
  function drawNext() {
    nextCtx.fillStyle = '#0a0d12'; nextCtx.fillRect(0,0,120,80);
    if (!next) return;
    const offsetX = (120 - next.s[0].length*20) / 2;
    const offsetY = (80 - next.s.length*20) / 2;
    for (let r = 0; r < next.s.length; r++) for (let c = 0; c < next.s[r].length; c++) {
      if (next.s[r][c]) {
        nextCtx.fillStyle = next.color;
        nextCtx.fillRect(offsetX + c*20, offsetY + r*20, 19, 19);
      }
    }
  }
  function step(t) {
    if (!last) last = t;
    const dt = t - last; last = t;
    if (pauseCtl && pauseCtl.isPaused()) { draw(); raf = requestAnimationFrame(step); return; }
    if (!gameOver) {
      dropTimer += dt;
      const interval = Math.max(80, 600 - (level-1)*60);
      if (dropTimer > interval) {
        dropTimer = 0;
        cur.r++;
        if (collide(cur)) { cur.r--; lock(); }
      }
    }
    draw();
    raf = requestAnimationFrame(step);
  }
  function tryMove(dc, dr) {
    cur.c += dc; cur.r += dr;
    if (collide(cur)) { cur.c -= dc; cur.r -= dr; return false; }
    return true;
  }
  function rotate() {
    const old = cur.s;
    cur.s = rot(cur.s);
    if (collide(cur)) {
      // wall kick
      cur.c++;
      if (collide(cur)) { cur.c -= 2; if (collide(cur)) { cur.c++; cur.s = old; } }
    }
  }
  function hardDrop() {
    while (tryMove(0, 1)) { score += 2; }
    lock();
    updateUI();
  }
  function reset() {
    board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    cur = null; next = null; score = 0; lines = 0; level = 1; gameOver = false; ended = false; dropTimer = 0;
    spawn(); spawn(); updateUI();
  }
  reset();

  function onKey(e) {
    if (gameOver && e.key.toLowerCase() === 'r') { reset(); return; }
    if (gameOver) return;
    if (e.key === 'ArrowLeft') { tryMove(-1, 0); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { tryMove(1, 0); e.preventDefault(); }
    else if (e.key === 'ArrowDown') { if (tryMove(0, 1)) score++; updateUI(); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { rotate(); e.preventDefault(); }
    else if (e.key === ' ') { hardDrop(); e.preventDefault(); }
    else if (e.key.toLowerCase() === 'r') { reset(); }
  }
  addL(window, 'keydown', onKey);
  const pauseCtl = attachPause(host, { onResume: () => { last = 0; } });
  attachTouchControls(host, {
    directional: 'arrows',
    actions: [{ key: ' ', label: 'Drop' }]
  });
  raf = requestAnimationFrame(step);
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

function startTetrisMP(host, shim) {
  // Scope every shim.on(...) below — scope.destroyAll() in activeCleanup
  // wipes them on rematch so re-entry doesn't leak handlers.
  const scope = shim.scope();
  // Versus: own board each. Clear lines → garbage rows to opponent.
  const COLS = 10, ROWS = 20, CELL = 22;
  const MINI_CELL = 9;
  // Attack table: lines cleared → garbage rows sent
  const ATTACK = [0, 0, 1, 2, 4];
  const SHAPES = [
    { c:'#22d3ee', s:[[1,1,1,1]] },
    { c:'#fbbf24', s:[[1,1],[1,1]] },
    { c:'#a78bfa', s:[[0,1,0],[1,1,1]] },
    { c:'#34d399', s:[[0,1,1],[1,1,0]] },
    { c:'#f87171', s:[[1,1,0],[0,1,1]] },
    { c:'#60a5fa', s:[[1,0,0],[1,1,1]] },
    { c:'#fb923c', s:[[0,0,1],[1,1,1]] },
  ];
  let board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  let cur = null, next = null;
  let score = 0, lines = 0, level = 1;
  let dropTimer = 0, last = 0, raf = null;
  let dead = false, ended = false;
  let oppBoard = null; // ROWS x COLS color or null (opponent snapshot)
  let pendingGarbage = 0;
  let lastBoardSent = 0;
  let rematchUI = null;

  function rot(s) { return s[0].map((_, i) => s.map(row => row[i]).reverse()); }
  function newPiece() { const t = SHAPES[Math.floor(Math.random()*SHAPES.length)]; return { s: t.s.map(r => r.slice()), c: 0, r: 0, color: t.c }; }
  function spawn() {
    cur = next || newPiece();
    next = newPiece();
    cur.r = 0;
    cur.c = Math.floor(COLS/2) - Math.ceil(cur.s[0].length/2);
    if (collide(cur)) { gameOver(); }
  }
  function collide(p) {
    for (let r = 0; r < p.s.length; r++) for (let c = 0; c < p.s[r].length; c++) {
      if (!p.s[r][c]) continue;
      const nr = p.r + r, nc = p.c + c;
      if (nc < 0 || nc >= COLS || nr >= ROWS) return true;
      if (nr >= 0 && board[nr][nc]) return true;
    }
    return false;
  }
  function lock() {
    for (let r = 0; r < cur.s.length; r++) for (let c = 0; c < cur.s[r].length; c++) {
      if (cur.s[r][c]) { const nr = cur.r + r, nc = cur.c + c; if (nr >= 0) board[nr][nc] = cur.color; }
    }
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r].every(x => x)) { board.splice(r, 1); board.unshift(Array(COLS).fill(null)); cleared++; r++; }
    }
    if (cleared) {
      const pts = [0, 100, 300, 500, 800][cleared] * level;
      score += pts; lines += cleared; level = 1 + Math.floor(lines/10);
      sfx(cleared === 4 ? 'win' : 'score');
      const attack = ATTACK[cleared] || 0;
      if (attack > 0) try { shim.emit('game', { type: 'tt-attack', n: attack }); } catch (e) {}
    } else { sfx('drop'); }
    // Apply pending garbage AFTER lock (skipped if line cleared this turn — common cancel rule)
    if (cleared === 0 && pendingGarbage > 0) {
      for (let i = 0; i < pendingGarbage; i++) addGarbageRow();
      pendingGarbage = 0;
    } else if (cleared > 0) {
      // Cancel some garbage with cleared lines
      pendingGarbage = Math.max(0, pendingGarbage - cleared);
    }
    updateUI();
    spawn();
  }
  function addGarbageRow() {
    // Push everything up by one
    if (board[0].some(x => x)) { gameOver(); return; }
    board.shift();
    const hole = Math.floor(Math.random() * COLS);
    const newRow = Array(COLS).fill(null).map((_, i) => i === hole ? null : '#6b7280');
    board.push(newRow);
  }
  function gameOver() {
    if (ended) return;
    ended = true; dead = true;
    sfx('hit');
    try { shim.emit('game', { type: 'tt-topout' }); } catch (e) {}
    finalize('lose');
  }
  function finalize(kind) {
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: kind === 'win' ? 'Victory!' : 'Defeat',
        sub: `${lines} lines cleared`,
        kind, dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 350);
  }
  function updateUI() {
    host.querySelector('#tt-score').innerText = score;
    host.querySelector('#tt-lines').innerText = lines;
    host.querySelector('#tt-level').innerText = level;
    host.querySelector('#tt-pending').innerText = pendingGarbage;
  }
  function drawCell(c, x, y, color) {
    c.fillStyle = color;
    c.fillRect(x*CELL, y*CELL, CELL-1, CELL-1);
    c.fillStyle = 'rgba(255,255,255,0.15)';
    c.fillRect(x*CELL, y*CELL, CELL-1, 3);
  }
  function draw() {
    ctx.fillStyle = '#0a0d12'; ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawCell(ctx, c, r, board[r][c]);
    }
    if (cur) for (let r = 0; r < cur.s.length; r++) for (let c = 0; c < cur.s[r].length; c++) {
      if (cur.s[r][c]) drawCell(ctx, cur.c+c, cur.r+r, cur.color);
    }
    if (dead) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);
      ctx.fillStyle = 'white'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('Topped out', COLS*CELL/2, ROWS*CELL/2);
    }
    drawNext();
    drawMini();
  }
  function drawNext() {
    nextCtx.fillStyle = '#0a0d12'; nextCtx.fillRect(0,0,100,72);
    if (!next) return;
    const offsetX = (100 - next.s[0].length*16) / 2;
    const offsetY = (72 - next.s.length*16) / 2;
    for (let r = 0; r < next.s.length; r++) for (let c = 0; c < next.s[r].length; c++) {
      if (next.s[r][c]) { nextCtx.fillStyle = next.color; nextCtx.fillRect(offsetX + c*16, offsetY + r*16, 15, 15); }
    }
  }
  function drawMini() {
    miniCtx.fillStyle = '#0a0d12'; miniCtx.fillRect(0, 0, COLS*MINI_CELL, ROWS*MINI_CELL);
    if (!oppBoard) {
      miniCtx.fillStyle = '#444'; miniCtx.font = '11px sans-serif'; miniCtx.textAlign = 'center';
      miniCtx.fillText('waiting…', COLS*MINI_CELL/2, ROWS*MINI_CELL/2);
      return;
    }
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (oppBoard[r] && oppBoard[r][c]) {
        miniCtx.fillStyle = oppBoard[r][c];
        miniCtx.fillRect(c*MINI_CELL, r*MINI_CELL, MINI_CELL-1, MINI_CELL-1);
      }
    }
  }
  function step(t) {
    if (!last) last = t;
    const dt = t - last; last = t;
    if (pauseCtl.isPaused()) { draw(); raf = requestAnimationFrame(step); return; }
    if (!dead) {
      dropTimer += dt;
      const interval = Math.max(80, 600 - (level-1)*60);
      if (dropTimer > interval) {
        dropTimer = 0;
        cur.r++;
        if (collide(cur)) { cur.r--; lock(); }
      }
      // Throttled board snapshot to opponent (~10Hz)
      if (t - lastBoardSent > 100) {
        lastBoardSent = t;
        try { shim.emit('game', { type: 'tt-board', b: board }); } catch (e) {}
      }
    }
    draw();
    raf = requestAnimationFrame(step);
  }
  function tryMove(dc, dr) { cur.c += dc; cur.r += dr; if (collide(cur)) { cur.c -= dc; cur.r -= dr; return false; } return true; }
  function rotate() {
    const old = cur.s; cur.s = rot(cur.s);
    if (collide(cur)) { cur.c++; if (collide(cur)) { cur.c -= 2; if (collide(cur)) { cur.c++; cur.s = old; } } }
  }
  function hardDrop() { while (tryMove(0, 1)) score += 2; lock(); }

  host.innerHTML = `
    <div class="game-region">
      <div class="mp-layout">
        <div class="mp-side" style="align-items:center;">
          <div class="tet-wrap">
            <canvas class="tet" id="tt-tet" width="${COLS*CELL}" height="${ROWS*CELL}"></canvas>
            <div class="tet-side">
              <div class="tet-stat"><b id="tt-score">0</b><span>Score</span></div>
              <div class="tet-stat"><b id="tt-lines">0</b><span>Lines</span></div>
              <div class="tet-stat"><b id="tt-level">1</b><span>Level</span></div>
              <div class="tet-stat"><b id="tt-pending" style="color:#f87171;">0</b><span>Garbage queued</span></div>
              <div class="tet-stat"><span>Next</span>
                <canvas id="tt-next" width="100" height="72" style="background:#0a0d12;border-radius:6px;margin-top:6px;"></canvas>
              </div>
              <div style="font-size:10px;color:var(--sub);line-height:1.6;">←/→ • ↑ rotate<br>↓ soft • Space hard</div>
            </div>
          </div>
          <div id="tt-status"></div>
        </div>
        <div class="mp-side" style="align-items:center;">
          <div style="font-size:12px;color:var(--sub);">Opponent</div>
          <canvas id="tt-mini" width="${COLS*MINI_CELL}" height="${ROWS*MINI_CELL}" style="background:#0a0d12;border-radius:6px;border:1px solid var(--border);"></canvas>
          <div style="font-size:11px;color:var(--sub);text-align:center;">Clear N lines → send ${ATTACK.slice(2).map((n,i)=>(i+2)+'→'+n).join(', ')} garbage rows.</div>
          <div id="tt-chat-host"></div>
        </div>
      </div>
    </div>`;
  const ctx = host.querySelector('#tt-tet').getContext('2d');
  const nextCtx = host.querySelector('#tt-next').getContext('2d');
  const miniCtx = host.querySelector('#tt-mini').getContext('2d');
  const statusBar = makeMpStatusBar(shim);
  host.querySelector('#tt-status').appendChild(statusBar.element);
  const chat = makeChatPanel(shim);
  host.querySelector('#tt-chat-host').appendChild(chat.element);
  chat.appendSystem('Versus mode! Clear lines to attack.');

  spawn(); spawn(); updateUI();

  scope.on('game', (m) => {
    if (!m || ended) return;
    if (m.type === 'tt-board') { oppBoard = m.b; }
    else if (m.type === 'tt-attack') { pendingGarbage += (m.n|0); updateUI(); }
    else if (m.type === 'tt-topout') {
      ended = true;
      sfx('win');
      finalize('win');
    }
  });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    startTetrisMP(host, shim);
  });
  scope.on('closed', () => {
    if (ended) return;
    ended = true;
    chat.appendSystem('Opponent disconnected.');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Opponent left.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startTetris(host)
      });
    }, 250);
  });

  function onKey(e) {
    if (dead || ended) return;
    if (e.key === 'ArrowLeft') { tryMove(-1, 0); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { tryMove(1, 0); e.preventDefault(); }
    else if (e.key === 'ArrowDown') { if (tryMove(0, 1)) score++; updateUI(); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { rotate(); e.preventDefault(); }
    else if (e.key === ' ') { hardDrop(); updateUI(); e.preventDefault(); }
  }
  addL(window, 'keydown', onKey);
  const pauseCtl = attachPause(host, { onResume: () => { last = 0; } });
  attachTouchControls(host, {
    directional: 'arrows',
    actions: [{ key: ' ', label: 'Drop' }]
  });
  raf = requestAnimationFrame(step);

  activeCleanup = () => {
    if (raf) cancelAnimationFrame(raf);
    statusBar.destroy(); chat.destroy();
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}
