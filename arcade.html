<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23202840'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%E2%96%B6%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --panel: #161c26;
    --panel-2: #1d2533;
    --border: #2a3344;
    --text: #e8eaed;
    --sub: #9aa0a6;
    --accent: #6ea8fe;
    --accent-2: #4f7fda;
    --good: #5fd07a;
    --bad: #f08080;
    --warn: #ffc857;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden;
  }
  .hidden { display: none !important; }

  /* HUB */
  .hub-header {
    padding: 18px 24px;
    padding-top: max(18px, env(safe-area-inset-top));
    padding-left: max(24px, env(safe-area-inset-left));
    padding-right: max(24px, env(safe-area-inset-right));
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .hub-header h1 { font-size: 22px; font-weight: 700; }
  .hub-header .sub { color: var(--sub); font-size: 13px; margin-top: 2px; }
  .hub {
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
  }
  .hub-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    padding: 20px 22px;
    padding-left: max(22px, env(safe-area-inset-left));
    padding-right: max(22px, env(safe-area-inset-right));
    padding-bottom: max(40px, env(safe-area-inset-bottom));
  }
  .game-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    display: flex; flex-direction: column;
    min-height: 130px;
  }
  .game-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 6px 20px rgba(110,168,254,0.15);
  }
  .game-card .gc-icon {
    font-size: 32px;
    width: 56px; height: 56px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    color: white;
  }
  .game-card h3 { font-size: 15px; margin-bottom: 4px; }
  .game-card p { font-size: 12px; color: var(--sub); line-height: 1.4; }

  /* SHADOW MATCH */
  .shadow-stage {
    width: 280px; height: 280px;
    background: radial-gradient(circle at 50% 50%, #1d2533, #0d1117);
    border: 1px solid var(--border);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .shadow-target {
    font-size: 180px;
    line-height: 1;
    /* `brightness(0)` collapses any colour to pure black, giving a clean silhouette. */
    filter: brightness(0) drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    transition: opacity 0.18s, transform 0.18s, filter 0.4s;
    user-select: none;
  }
  .shadow-target.gone { opacity: 0; transform: scale(0.85); }
  .shadow-flash-bar {
    position: absolute; bottom: 0; left: 0; height: 4px;
    background: #fbbf24;
    border-radius: 2px;
    transition: width linear;
  }
  .shadow-choices {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 540px;
  }
  .shadow-choice {
    aspect-ratio: 1 / 1;
    background: var(--panel-2);
    border: 2px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; line-height: 1;
    transition: transform 0.08s, border-color 0.12s, background 0.12s;
    user-select: none;
  }
  .shadow-choice:hover { transform: translateY(-3px); border-color: var(--accent); }
  .shadow-choice.right { background: rgba(52,211,153,0.18); border-color: #34d399; animation: shadow-pop 0.35s ease; }
  .shadow-choice.wrong { background: rgba(239,68,68,0.18); border-color: #ef4444; animation: shadow-shake 0.35s ease; }
  .shadow-choice.disabled { cursor: default; opacity: 0.85; }
  @keyframes shadow-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes shadow-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shadow-life { font-size: 18px; transition: opacity 0.3s, transform 0.3s; }
  .shadow-life.lost { opacity: 0.18; transform: scale(0.85); filter: grayscale(1); }

  /* HUB SEARCH + FILTERS */
  .hub-controls {
    padding: 0 22px;
    padding-left: max(22px, env(safe-area-inset-left));
    padding-right: max(22px, env(safe-area-inset-right));
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 4px;
  }
  .hub-search-wrap {
    position: relative; display: flex; align-items: center;
  }
  .hub-search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    line-height: 1;
    opacity: 0.6;
    pointer-events: none;
  }
  /* Two classes + element so we beat the later-in-source input[type="text"] rule */
  .hub-search-wrap input.hub-search {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 40px 10px 42px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .hub-search:focus { border-color: var(--accent); }
  .hub-search-clear {
    position: absolute; right: 8px;
    background: transparent; border: none; color: var(--sub);
    cursor: pointer; font-size: 18px; padding: 4px 8px;
    display: none;
  }
  .hub-search-clear.visible { display: block; }
  .hub-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .hub-chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .hub-chip:hover { border-color: var(--accent); }
  .hub-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .hub-empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--sub);
    padding: 40px 20px;
    font-size: 14px;
  }
  .game-card.hidden-by-filter { display: none; }

  /* FAVORITES — star in top-right of each card. Hover to reveal, click to toggle. */
  .game-card { position: relative; }
  .gc-star {
    position: absolute;
    top: 8px; right: 8px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    color: #555;
    font-size: 18px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s, transform 0.08s;
    border-radius: 6px;
    line-height: 1;
    padding: 0;
    z-index: 2;
  }
  .game-card:hover .gc-star { opacity: 1; }
  .gc-star:hover { color: #fbbf24; transform: scale(1.18); background: rgba(255,255,255,0.05); }
  .game-card.favorited .gc-star {
    opacity: 1;
    color: #fbbf24;
  }
  .game-card.favorited {
    border-color: rgba(251,191,36,0.4);
    box-shadow: 0 0 0 1px rgba(251,191,36,0.15);
  }

  /* GAME VIEW */
  .game-view {
    display: flex; flex-direction: column;
    height: 100vh;
    height: 100dvh; /* dynamic viewport height — accounts for mobile chrome */
    /* Pad for notches / Dynamic Island. Top and bottom only — left/right rare on phones in portrait. */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    box-sizing: border-box;
  }
  .gv-bar {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .gv-bar h2 { font-size: 16px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn {
    background: var(--accent); color: white; border: none;
    padding: 9px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, transform 0.08s;
  }
  .btn:hover { background: var(--accent-2); }
  .btn:active { transform: scale(0.97); }
  .btn.secondary { background: var(--panel-2); border: 1px solid var(--border); }
  .btn.secondary:hover { background: var(--border); }
  .btn.danger { background: #b34646; }
  .btn.danger:hover { background: #8e3838; }
  .gv-host {
    flex: 1; min-height: 0;
    display: flex; align-items: flex-start; justify-content: center;
    padding: clamp(6px, 1.6vw, 20px);
    overflow: auto;
  }
  /* The inner content centers itself if there's room, otherwise sits at top so the
     header isn't covered and the user can scroll to anything that overflows. */
  .gv-host > * { margin: auto; }
  /* Cap any in-game canvas to the viewport so things don't get clipped on small windows */
  .gv-host canvas {
    max-width: 100%;
    max-height: calc(100vh - 110px);
    max-height: calc(100dvh - 110px);
  }

  /* Generic game elements */
  .game-panel {
    background: var(--panel);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 18px;
  }
  input[type="text"], input[type="number"] {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input:focus { border-color: var(--accent); }

  /* CHESS */
  .chess-wrap { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .chess-board {
    --cb-size: min(560px, calc(100vh - 110px), calc(100vw - 380px));
    width: var(--cb-size); height: var(--cb-size);
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    user-select: none;
  }
  @media (max-width: 760px) {
    .chess-board { --cb-size: min(560px, calc(100vh - 110px), 94vw); }
    .chess-side { flex: 1 1 100% !important; max-width: 94vw; }
  }
  .chess-sq {
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.06s;
  }
  .chess-sq svg.piece {
    width: 86%; height: 86%;
    pointer-events: none;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.35));
  }
  svg.piece .body, svg.piece .body * { fill: currentColor; stroke: var(--ps); stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
  svg.piece .detail, svg.piece .detail * { fill: none; stroke: var(--ps); stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
  svg.piece.white { color: #f8fafc; --ps: #1f2937; }
  svg.piece.black { color: #1f2937; --ps: #f8fafc; }
  .chess-sq.light { background: #ebecd0; }
  .chess-sq.dark  { background: #779556; }
  .chess-sq.sel { background: #f6e87f !important; }
  .chess-sq.move::after {
    content: ''; position: absolute;
    width: 28%; height: 28%; border-radius: 50%;
    background: rgba(0,0,0,0.22);
  }
  .chess-sq.cap::after {
    content: ''; position: absolute;
    inset: 4%;
    border-radius: 50%;
    border: 6px solid rgba(0,0,0,0.3);
    background: transparent;
  }
  .chess-sq.check { background: #f08080 !important; }
  .chess-sq.last { background: rgba(246,232,127,0.45); }
  .chess-side {
    width: 320px; flex: 0 0 320px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .chess-side .row { display: flex; gap: 10px; align-items: center; }
  .chess-side label { font-size: 13px; color: var(--sub); display: block; margin-bottom: 4px; }
  .elo-display {
    font-size: 22px; font-weight: 700; color: var(--accent);
  }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .chess-status {
    background: var(--panel-2);
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    min-height: 44px;
  }
  .chess-history {
    background: var(--panel-2);
    padding: 12px;
    border-radius: 8px;
    height: 220px;
    overflow-y: auto;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 13px;
    line-height: 1.7;
  }
  .chess-history .pair { display: grid; grid-template-columns: 36px 1fr 1fr; gap: 6px; }
  .chess-history .num { color: var(--sub); }
  .promo-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .promo-box {
    background: var(--panel);
    border-radius: 12px;
    padding: 16px;
    display: flex; gap: 8px;
    border: 1px solid var(--border);
  }
  .promo-piece {
    width: 64px; height: 64px;
    background: var(--panel-2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .promo-piece svg { width: 80%; height: 80%; }
  .promo-piece:hover { background: var(--accent); }

  /* TETRIS */
  .tet-wrap { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  canvas.tet { background: #0a0d12; border-radius: 8px; border: 1px solid var(--border); }
  .tet-side { display: flex; flex-direction: column; gap: 14px; min-width: 180px; }
  .tet-stat { background: var(--panel-2); padding: 12px; border-radius: 8px; }
  .tet-stat b { display: block; font-size: 22px; }
  .tet-stat span { color: var(--sub); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* GENERIC CANVAS GAMES */
  canvas.game-canvas {
    background: #0a0d12;
    border-radius: 8px;
    border: 1px solid var(--border);
    display: block;
  }

  /* 2048 */
  .g2048-board {
    position: relative;
    width: 460px; height: 460px;
    background: #232936;
    border-radius: 8px;
    padding: 10px;
    box-sizing: border-box;
  }
  .g2048-bg {
    position: absolute;
    width: 102.5px; height: 102.5px;
    background: #2c3344;
    border-radius: 6px;
  }
  .g2048-tile {
    position: absolute;
    width: 102.5px; height: 102.5px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 32px; color: white;
    transition: left 0.15s ease-in-out, top 0.15s ease-in-out, background 0.12s;
    will-change: left, top;
  }
  .g2048-tile.appear {
    animation: tileAppear 0.18s ease-out;
  }
  .g2048-tile.merged {
    animation: tilePop 0.22s ease-out;
    z-index: 2;
  }
  @keyframes tileAppear {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }
  @keyframes tilePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  /* MINESWEEPER */
  .ms-board {
    display: grid;
    background: var(--panel-2);
    padding: 6px;
    border-radius: 6px;
    gap: 1px;
  }
  .ms-cell {
    width: 30px; height: 30px;
    background: #4a5568;
    border: 1px solid #2d3748;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    user-select: none;
  }
  .ms-cell.revealed { background: #2d3748; cursor: default; }
  .ms-cell.flag { color: #f08080; }
  .ms-cell.mine { background: #b34646; }

  /* TIC TAC TOE */
  .ttt-board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 6px;
    background: var(--border);
    padding: 6px;
    border-radius: 8px;
  }
  .ttt-cell {
    background: var(--panel-2);
    border-radius: 6px;
    cursor: pointer;
    font-size: 60px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    user-select: none;
  }
  .ttt-cell.o { color: var(--warn); }

  /* CONNECT 4 */
  .c4-board {
    background: #2a3a8c;
    padding: 12px;
    border-radius: 12px;
    display: grid;
    grid-template-columns: repeat(7, 60px);
    gap: 6px;
  }
  .c4-cell {
    width: 60px; height: 60px;
    background: #0a0d12;
    border-radius: 50%;
    transition: background 0.15s;
  }
  .c4-cell.r { background: #f08080; }
  .c4-cell.y { background: #ffc857; }
  .c4-col-label {
    text-align: center;
    color: var(--sub);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 0;
  }
  .c4-col-label:hover { color: var(--accent); }

  /* BLACKJACK */
  .bj-area { display: flex; flex-direction: column; gap: 24px; min-width: 460px; }
  .bj-row { background: var(--panel-2); padding: 16px; border-radius: 10px; }
  .bj-row h3 { font-size: 14px; color: var(--sub); margin-bottom: 10px; }
  .bj-cards { display: flex; gap: 8px; flex-wrap: wrap; min-height: 80px; }
  .card {
    width: 56px; height: 78px;
    background: white;
    color: black;
    border-radius: 6px;
    padding: 6px;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .card.r { color: #d33; }
  .card.back {
    background: linear-gradient(135deg, #4f7fda, #2a3a8c);
    color: transparent;
  }
  .card .rank { font-size: 16px; }
  .card .suit { font-size: 22px; align-self: flex-end; }

  /* REVERSI */
  .rev-board {
    display: grid;
    grid-template-columns: repeat(8, 56px);
    grid-template-rows: repeat(8, 56px);
    background: #205729;
    padding: 4px;
    border-radius: 6px;
    gap: 2px;
  }
  .rev-cell {
    background: #2e7a3a;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .rev-cell.legal::after {
    content: '';
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .rev-piece {
    width: 80%; height: 80%;
    border-radius: 50%;
  }
  .rev-piece.w { background: #f5f5f5; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.25); }
  .rev-piece.b { background: #1a1a1a; box-shadow: inset 3px 3px 8px rgba(255,255,255,0.15); }

  /* DRAWING PAD */
  .draw-wrap { display: flex; gap: 14px; }
  .draw-tools { display: flex; flex-direction: column; gap: 10px; min-width: 160px; }
  .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .color-swatch.active { border-color: var(--accent); }

  /* SHARED MESSAGE */
  .game-msg {
    padding: 12px;
    border-radius: 8px;
    background: var(--panel-2);
    text-align: center;
    font-weight: 600;
  }
  .game-msg.win { color: var(--good); }
  .game-msg.lose { color: var(--bad); }

  /* RESULT OVERLAY */
  .result-overlay {
    position: absolute; inset: 0;
    background: rgba(8,12,20,0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 50;
    border-radius: 12px;
  }
  .result-overlay.show { opacity: 1; pointer-events: auto; }
  .result-card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 44px;
    text-align: center;
    transform: scale(0.7) translateY(30px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    min-width: 260px;
  }
  .result-close {
    position: absolute; top: 8px; right: 10px;
    background: transparent; border: none; color: var(--sub);
    font-size: 22px; line-height: 1; cursor: pointer; padding: 4px 8px;
    border-radius: 6px; transition: background 0.15s, color 0.15s;
  }
  .result-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .result-rematch-status {
    margin-top: 10px; font-size: 12px; color: var(--sub);
    min-height: 16px;
  }
  .result-rematch-status.full { color: var(--good); font-weight: 600; }

  /* PAUSE OVERLAY */
  .game-pause-overlay {
    position: absolute; inset: 0;
    background: rgba(8,12,20,0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 60; border-radius: 12px;
  }
  .game-pause-card {
    text-align: center; padding: 24px 36px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .game-pause-card .pp-title { font-size: 28px; font-weight: 800; letter-spacing: 4px; color: #fbbf24; }
  .game-pause-card .pp-hint { font-size: 12px; color: var(--sub); margin-top: 4px; }

  /* PARTY LOBBY CARDS — square, centered both axes */
  .party-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 380px;
    height: 380px;
    max-width: 94vw;
    max-height: calc(100dvh - 120px);
    padding: 26px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-family: sans-serif;
    box-sizing: border-box;
    margin: auto;
  }

  /* TOUCH CONTROLS — fixed at bottom of viewport, only on touch devices */
  .touch-ctl {
    position: fixed;
    left: 0; right: 0;
    bottom: max(8px, env(safe-area-inset-bottom));
    z-index: 70;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 12px;
    pointer-events: none; /* children re-enable */
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .touch-dpad, .touch-actions {
    pointer-events: auto;
    background: rgba(20,28,40,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 16px;
    padding: 8px;
    display: grid;
    gap: 6px;
  }
  .touch-dpad.dpad-cross {
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
  }
  .touch-dpad.dpad-cross .dp-up    { grid-column: 2; grid-row: 1; }
  .touch-dpad.dpad-cross .dp-left  { grid-column: 1; grid-row: 2; }
  .touch-dpad.dpad-cross .dp-right { grid-column: 3; grid-row: 2; }
  .touch-dpad.dpad-cross .dp-down  { grid-column: 2; grid-row: 3; }
  .touch-dpad.dpad-h { grid-template-columns: 60px 60px; }
  .touch-dpad.dpad-v { grid-template-columns: 60px; grid-template-rows: 60px 60px; }
  .touch-actions {
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .touch-actions:has(.touch-action:nth-child(2)) { grid-template-columns: 1fr 1fr; }
  .touch-btn {
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.12);
    color: #fff; border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    font-size: 18px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.1s, transform 0.1s;
    font-family: inherit;
  }
  .touch-btn:active, .touch-btn.active {
    background: rgba(255,215,0,0.35);
    transform: scale(0.92);
  }
  .touch-action {
    background: rgba(110,168,254,0.30);
    border-color: rgba(110,168,254,0.5);
    min-width: 72px;
    width: auto; padding: 0 14px;
    font-size: 13px;
  }

  /* MP CHAT PANEL */
  .mp-chat {
    display: flex; flex-direction: column;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px;
    width: 260px; min-height: 220px; max-height: 360px;
    box-sizing: border-box;
  }
  .mp-chat-title { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .mp-chat-log {
    flex: 1; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px;
    font-size: 12.5px; line-height: 1.5;
    min-height: 140px; max-height: 280px;
    word-break: break-word;
  }
  .mp-chat-line { margin-bottom: 2px; }
  .mp-chat-line.you b { color: #6ea8fe; }
  .mp-chat-line.them b { color: #f472b6; }
  .mp-chat-line.sys { color: var(--sub); font-style: italic; font-size: 11.5px; }
  .mp-chat-line.sys.win { color: var(--good); font-style: normal; font-weight: 600; }
  .mp-chat-line.sys.bad { color: var(--bad); font-style: normal; font-weight: 600; }
  .mp-chat-row { display: flex; gap: 6px; margin-top: 6px; }

  .mp-status-bar {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 10px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 999px;
    font-size: 12px; color: var(--sub);
  }
  .mp-status-bar .mp-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 6px var(--good); }
  .mp-status-bar.bad .mp-dot { background: var(--bad); box-shadow: 0 0 6px var(--bad); }

  /* Generic two-column layout: game on left, chat on right */
  .mp-layout {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: flex-start;
  }
  .mp-layout > .mp-side { display: flex; flex-direction: column; gap: 12px; min-width: 240px; }
  .result-overlay.show .result-card { transform: scale(1) translateY(0); opacity: 1; }
  .result-title { font-size: 32px; font-weight: 800; margin-bottom: 6px; letter-spacing: 0.5px; }
  .result-title.win { color: var(--good); text-shadow: 0 0 20px rgba(95,208,122,0.4); }
  .result-title.lose { color: var(--bad); text-shadow: 0 0 20px rgba(240,128,128,0.4); }
  .result-title.draw { color: var(--warn); }
  .result-sub { color: var(--sub); margin-bottom: 22px; font-size: 14px; }
  .result-stat { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
  .result-buttons { display: flex; gap: 10px; justify-content: center; }

  canvas.result-confetti {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 51;
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 rgba(110,168,254,0); }
    50% { box-shadow: 0 0 24px rgba(110,168,254,0.5); }
  }
  @keyframes shake-x {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes pop-in {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* gv-host needs to be relative for overlay positioning */
  .gv-host { position: relative; }
  /* Inner host wraps so overlay covers just the game */
  .game-region {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  /* Make sure the overlay can't be smaller than its host edges even for inline-flex */
  .game-region > .result-overlay { min-width: 100%; }
</style>
</head>
<body>

<!-- HUB -->

<script>
/* ============================================================
   BOSS KEY — tap Q three times in under a second to swap the page's
   visual to a Math Flashcards disguise (title + favicon + full overlay).
   Tap Q three times again to restore the arcade.
   ============================================================ */
(function setupBossKey() {
  const TRIGGER = 'q', WINDOW_MS = 1000, REQUIRED_TAPS = 3;
  let taps = [];
  let disguised = false;
  let savedTitle = null, savedFaviconHref = null, savedSfxVol = null;
  let overlay = null;

  function buildOverlay() {
    overlay = document.createElement('div');
    overlay.id = 'boss-disguise';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#f6f8fb;color:#1f2937;display:none;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;overflow:auto;';
    overlay.innerHTML = `
      <div style="display:flex;flex-direction:column;min-height:100vh;">
        <header style="background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 32px;display:flex;align-items:center;gap:24px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:32px;height:32px;background:linear-gradient(135deg,#4285f4,#34a853);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;">+−</div>
            <div style="font-size:20px;font-weight:700;color:#4285f4;">Math Flashcards</div>
          </div>
          <div style="margin-left:auto;display:flex;gap:28px;font-size:13px;">
            <div style="text-align:center;"><b style="display:block;font-size:18px;color:#1f2937;">42</b><span style="color:#6b7280;">Streak</span></div>
            <div style="text-align:center;"><b style="display:block;font-size:18px;color:#1f2937;">128</b><span style="color:#6b7280;">Solved</span></div>
            <div style="text-align:center;"><b style="display:block;font-size:18px;color:#34a853;">94%</b><span style="color:#6b7280;">Accuracy</span></div>
          </div>
        </header>
        <main style="flex:1;display:grid;grid-template-columns:240px 1fr 280px;min-height:0;">
          <aside style="background:#fff;border-right:1px solid #e5e7eb;padding:18px 16px;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#6b7280;margin-bottom:8px;padding:0 6px;">Difficulty</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 6px;">
              <div style="padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;">Easy</div>
              <div style="padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;background:#4285f4;color:#fff;border:1px solid #4285f4;">Medium</div>
              <div style="padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;">Hard</div>
              <div style="padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;">Expert</div>
            </div>
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#6b7280;margin:18px 0 8px;padding:0 6px;">Operations</div>
            <div style="display:flex;flex-direction:column;gap:2px;">
              ${[
                ['+','Addition',true],['−','Subtraction',false],['×','Multiplication',true],['÷','Division',false],
                ['x²','Exponents',false],['½','Fractions',false],['.5','Decimals',false],['%','Percents',false]
              ].map(o => `
                <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;font-size:13px;${o[2] ? 'background:#e8f0fe;color:#4285f4;font-weight:600;' : 'color:#1f2937;'}">
                  <div style="width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;${o[2] ? 'background:#4285f4;color:#fff;' : 'background:#f9fafb;color:#6b7280;'}">${o[0]}</div>
                  ${o[1]}
                </div>`).join('')}
            </div>
          </aside>
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;position:relative;">
            <div style="position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;">Multiplication <span style="display:inline-block;margin-left:10px;padding:2px 8px;border-radius:10px;background:#e8f0fe;color:#4285f4;font-size:10px;">Medium</span></div>
            <div style="background:#fff;border-radius:24px;padding:60px 70px;box-shadow:0 4px 24px rgba(0,0,0,0.04);border:1px solid #e5e7eb;min-width:480px;text-align:center;">
              <div style="font-size:64px;font-weight:300;color:#1f2937;letter-spacing:3px;margin-bottom:36px;display:flex;align-items:center;justify-content:center;gap:18px;">
                <span>7</span><span>×</span><span>8</span><span>=</span><span style="color:#4285f4;border-bottom:3px solid #4285f4;padding-bottom:4px;min-width:80px;display:inline-block;">_</span>
              </div>
              <input readonly placeholder="Type your answer…" style="font-size:28px;padding:14px 22px;border:2px solid #e5e7eb;border-radius:12px;text-align:center;width:240px;outline:none;background:#f9fafb;color:#1f2937;font-family:inherit;">
              <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;">
                <button style="padding:10px 22px;border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Skip</button>
                <button style="padding:10px 22px;border-radius:8px;border:1px solid #4285f4;background:#4285f4;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Submit</button>
              </div>
            </div>
            <div style="margin-top:24px;font-size:12px;color:#6b7280;">Press <b>Enter</b> to submit · <b>Tab</b> to skip</div>
          </div>
          <aside style="background:#fff;border-left:1px solid #e5e7eb;padding:18px 16px;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#6b7280;margin-bottom:8px;padding:0 6px;">Recent</div>
            ${[
              ['9 × 7','63'],['12 + 8','20'],['56 ÷ 8','7'],['11 × 11','121'],['15 − 9','6'],['8 × 6','48'],['14 + 27','41'],['9 × 9','81']
            ].map(([q,a]) => `
              <div style="display:flex;justify-content:space-between;padding:8px 10px;border-radius:6px;font-size:13px;">
                <span style="color:#1f2937;">${q} = ${a}</span>
                <span style="color:#34a853;font-weight:700;">✓</span>
              </div>`).join('')}
          </aside>
        </main>
      </div>`;
    document.body.appendChild(overlay);
  }

  function favLink() {
    let link = document.querySelector('link[rel~="icon"]');
    if (!link) {
      link = document.createElement('link');
      link.rel = 'icon';
      document.head.appendChild(link);
    }
    return link;
  }

  function activate() {
    if (!overlay) buildOverlay();
    overlay.style.display = 'block';
    savedTitle = document.title;
    document.title = 'Math Flashcards — Practice Mental Math';
    const link = favLink();
    savedFaviconHref = link.getAttribute('href');
    link.setAttribute('type', 'image/svg+xml');
    link.setAttribute('href', "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%234285f4'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%2B-%3C/text%3E%3C/svg%3E");
    // Mute audio so games running underneath don't leak sound through the disguise.
    if (typeof Settings !== 'undefined') {
      savedSfxVol = Settings.sfxVolume;
      Settings.sfxVolume = 0;
    }
    disguised = true;
  }
  function deactivate() {
    if (overlay) overlay.style.display = 'none';
    if (savedTitle != null) { document.title = savedTitle; savedTitle = null; }
    const link = favLink();
    if (savedFaviconHref != null) { link.setAttribute('href', savedFaviconHref); savedFaviconHref = null; }
    if (typeof Settings !== 'undefined' && savedSfxVol != null) {
      Settings.sfxVolume = savedSfxVol;
      savedSfxVol = null;
    }
    disguised = false;
  }

  document.addEventListener('keydown', (e) => {
    if ((e.key || '').toLowerCase() !== TRIGGER) return;
    if (e.repeat) return;                          // ignore the OS's auto-repeat — holding Q shouldn't trigger
    // When NOT in disguise, ignore Q typed into inputs/textareas (chat, search, etc.).
    // When IN disguise, always allow Q so the user can deactivate even if the disguise's
    // own readonly input has focus.
    if (!disguised) {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    }
    const now = Date.now();
    taps.push(now);
    taps = taps.filter(ts => now - ts <= WINDOW_MS);
    if (taps.length >= REQUIRED_TAPS) {
      taps.length = 0;
      if (disguised) deactivate(); else activate();
    }
  });
})();

/* ============================================================
   PEER-TO-PEER (WebRTC via PeerJS) — for online chess
   ============================================================ */
const PEER_PREFIX = 'fcue-';                      // namespace so we don't collide w/ other PeerJS apps
const CODE_ALPHABET = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // skip O,0,I,1,L
function genCode(len) {
  len = len || 4;
  let out = '';
  for (let i = 0; i < len; i++) out += CODE_ALPHABET[Math.floor(Math.random() * CODE_ALPHABET.length)];
  return out;
}
function isValidCode(code) {
  return typeof code === 'string' && /^[A-Za-z0-9]{3,10}$/.test(code);
}
function normalizeCode(code) { return (code || '').toUpperCase().trim(); }

/* ----------------------------------------------------------------
   APPS SCRIPT TRANSPORT — talks to a Google Apps Script web app
   over plain HTTP. script.google.com is on every school's allowlist
   (schools rely on it for legit Google Workspace stuff), so this
   tends to work where workers.dev / firebaseio.com are blocked.

   Tradeoff: it's HTTP polling, not WebSocket. Each player polls
   the server every ~1.5s. Latency for a move = "your POST" + "their
   next poll" ≈ 1-2s. Fine for chess/c4/wordle/etc. Less great for
   real-time games like Tetris versus.

   The conn objects below mimic the same shape as the old WS shim
   (.on('data'/'open'/'close'/'error'), .send(obj), .close()), so the
   lobby + makeGameShim code keeps working unchanged.
   ---------------------------------------------------------------- */
// Paste your deployed Apps Script web app URL here (the one ending in /exec).
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbhriTMGHXVjQ7UAQ_82joLXUEdv-7-dzLylRsxuCzmkobTqboYxrv_nNfFRtXK5gF/exec';
// Adaptive polling: burst-poll right after activity (your move, opponent's
// move, or pairing), idle-poll otherwise. In an active turn exchange you'll
// see moves in ~200ms; in dead air it falls back to ~1.5s to save quota.
const APPS_SCRIPT_POLL_ACTIVE_MS = 200;     // tightened from 350 — faster in-game response
const APPS_SCRIPT_POLL_IDLE_MS   = 1500;
const APPS_SCRIPT_BURST_WINDOW_MS = 8000;   // stay in active mode a bit longer after activity

// ── Keep-alive: ping Apps Script every 30s so it stays warm ──────────────────
// Apps Script cold-starts take 3-6s. This background ping fires even when no
// game is active, keeping the worker hot so the first real request is instant.
(function startAppsScriptKeepAlive() {
  function keepAlivePing() {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) return;
    fetch(APPS_SCRIPT_URL + '?action=ping', { method: 'GET', cache: 'no-store' })
      .catch(() => {}); // fire and forget — we don't care about the response
  }
  // First ping after 5s (page just loaded, let things settle)
  setTimeout(keepAlivePing, 5000);
  // Then every 30s to keep it warm
  setInterval(keepAlivePing, 30000);
})();

let _appsStatus = 'idle';     // 'idle' | 'connected' | 'error'
function _setAppsStatus(s, detail) {
  _appsStatus = s;
  try {
    if (s === 'connected') console.log('[arcade] Apps Script: reachable ✓');
    if (s === 'error')     console.warn('[arcade] Apps Script: error —', detail);
  } catch (e) {}
}

// One-time ping to verify the script URL is reachable. Lazy — only fires
// the first time someone calls into the transport.
let _appsPingPromise = null;
function _appsScriptPing() {
  if (_appsPingPromise) return _appsPingPromise;
  _appsPingPromise = (async () => {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
      throw new Error('APPS_SCRIPT_URL is not configured. Edit arcade.html and paste your deployed Apps Script /exec URL.');
    }
    const url = APPS_SCRIPT_URL + '?action=ping';
    const ctrl = new AbortController();
    const tm = setTimeout(() => ctrl.abort(), 8000);
    try {
      const r = await fetch(url, { method: 'GET', signal: ctrl.signal });
      clearTimeout(tm);
      const data = await r.json().catch(() => ({}));
      if (data && data.ok) { _setAppsStatus('connected'); return true; }
      _setAppsStatus('error', 'unexpected response');
      throw new Error('Apps Script gave an unexpected response.');
    } catch (e) {
      _setAppsStatus('error', (e && e.message) || String(e));
      throw new Error('Could not reach the Apps Script URL — your network may be blocking it. (' + ((e && e.message) || e) + ')');
    }
  })();
  return _appsPingPromise;
}

function ensurePeerJS() { return Promise.resolve(); }   // legacy stub

window.arcadeFirebaseStatus = function () {
  // Kept for muscle memory — now reports Apps Script status.
  const out = {
    transport: 'apps-script',
    status: _appsStatus,
    url: APPS_SCRIPT_URL,
    configured: APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('PASTE_YOUR') !== 0
  };
  console.table(out);
  return out;
};
window.arcadeTransportStatus = window.arcadeFirebaseStatus;

// Strip our peer-id encoding (`fcue-CODE` or `fcue-game-CODE`) down to the
// bare room code the script keys on.
function _peerIdToRoom(peerId) {
  let s = String(peerId || '');
  if (s.startsWith(PEER_PREFIX)) s = s.slice(PEER_PREFIX.length);
  const lastDash = s.lastIndexOf('-');
  if (lastDash >= 0) s = s.slice(lastDash + 1);
  return s.toUpperCase();
}

// Set arcadeDebug = true in the console to see every Apps Script round-trip.
window.arcadeDebug = window.arcadeDebug || false;

// Tiny helpers for talking to Apps Script. Use POST with text/plain so the
// request is a "simple" CORS request (no preflight, which Apps Script can't
// handle).
async function _appsCall(action, params, body) {
  const usp = new URLSearchParams(Object.assign({ action }, params || {}));
  const url = APPS_SCRIPT_URL + '?' + usp.toString();
  const init = body
    ? { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=UTF-8' }, body: JSON.stringify(body) }
    : { method: 'GET' };
  let r, t0 = performance.now();
  try {
    r = await fetch(init.method === 'POST' ? url : url, init);
  } catch (e) {
    if (window.arcadeDebug) console.warn('[arcade]', action, 'fetch threw:', e.message || e);
    throw e;
  }
  if (!r.ok) {
    if (window.arcadeDebug) console.warn('[arcade]', action, 'HTTP', r.status);
    throw new Error('HTTP ' + r.status);
  }
  let json;
  try { json = await r.json(); }
  catch (e) {
    if (window.arcadeDebug) console.warn('[arcade]', action, 'json parse failed:', e.message);
    throw e;
  }
  if (window.arcadeDebug) {
    const ms = Math.round(performance.now() - t0);
    console.log('[arcade]', action, params || {}, '→', json, '(' + ms + 'ms)');
  }
  return json;
}

// Wrap a polling loop into the conn-shaped API the lobby + shim code expect.
// mySide = 'h' for host, 'g' for guest.
function _appsScriptAsConn(code, mySide, options) {
  options = options || {};
  const handlers = { data: [], close: [], error: [], open: [] };
  let dead = false;
  let opened = !!options.startOpen;
  let everSawOpponent = !!options.startOpen;
  let lastSeq = 0;
  let pollTimer = null;
  let consecutiveErrors = 0;
  let pollStarted = false;
  let polling = false;         // true while a pollOnce is in flight (the await is open)
  let opponentMissCount = 0;   // # of consecutive polls where opponent looked inactive
  let lastActivityT = 0;       // for adaptive polling — burst when there's activity

  function fire(ev, payload) {
    for (const fn of (handlers[ev] || []).slice()) {
      try { fn(payload); } catch (e) {}
    }
  }
  function maybeOpen() { if (!opened && !dead) { opened = true; fire('open'); } }
  function die(reason) {
    if (dead) return;
    dead = true;
    if (pollTimer) clearTimeout(pollTimer);
    if (window.arcadeDebug) console.warn('[arcade] conn[' + mySide + '/' + code + '] dying:', reason);
    fire('close', reason);
  }
  function pokeActivity() { lastActivityT = Date.now(); }
  function nextDelay() {
    return (lastActivityT && Date.now() - lastActivityT < APPS_SCRIPT_BURST_WINDOW_MS)
      ? APPS_SCRIPT_POLL_ACTIVE_MS
      : APPS_SCRIPT_POLL_IDLE_MS;
  }

  async function pollOnce() {
    // CRITICAL: serialize. Without this, send()'s "schedule a fast follow-up
    // poll" can race the in-flight poll's tail-rescheduling — both fire with
    // the same `since=lastSeq`, the server returns the same msgs to both,
    // and the receiver gets every payload twice. That bug presented as both
    // chat messages AND game moves duplicating on the receiver's screen.
    if (dead || polling) return;
    polling = true;
    try {
      try {
        const data = await _appsCall('r-poll', { code, from: mySide, since: lastSeq });
        consecutiveErrors = 0;
        if (data.error) {
          // 'no_room' / 'bad_args' = unrecoverable. Tear down.
          die(data.error);
          return;
        }
        // Pairing transition: opponent newly visible → burst-poll so we catch
        // their first message (e.g. the 'hello' / 'accept') without ~1.5s lag.
        if (data.opponentActive && !everSawOpponent) pokeActivity();
        // 1) Fire 'open' BEFORE processing 'data'. The lobby installs its data
        //    listener inside the 'connection' event (which cascades from 'open'),
        //    so any messages we'd fire before 'open' would be lost.
        if (data.opponentActive) {
          everSawOpponent = true;
          opponentMissCount = 0;
          maybeOpen();
        } else if (everSawOpponent) {
          // Opponent looks inactive THIS poll. On school wifi a single poll
          // can stall for 10–20s, briefly tripping the server's inactivity
          // window. Require 4 consecutive misses (~6s of confirmed silence at
          // active cadence, longer at idle) before declaring them gone — this
          // kills the spurious "Opponent left" right after the game starts.
          opponentMissCount++;
          if (opponentMissCount >= 4) {
            die('opponent_left');
            return;
          }
        }
        // 2) Now safely fire data — the listener is in place.
        if (Array.isArray(data.msgs) && data.msgs.length) {
          pokeActivity();   // we received something — expect more soon, stay snappy
          for (const m of data.msgs) {
            if (typeof m.seq === 'number' && m.seq > lastSeq) lastSeq = m.seq;
            if (m.payload) fire('data', m.payload);
          }
        }
      } catch (e) {
        consecutiveErrors++;
        // A long burst of failures = give up. School wifi can drop fetches
        // for several seconds at a time, so the threshold has to be high
        // enough to ride that out — at idle cadence (1.5s) 20 errors is
        // ~30s of pain before we declare the conn dead.
        if (consecutiveErrors >= 20) {
          die('network');
          return;
        }
      }
    } finally {
      polling = false;
    }
    if (!dead) {
      // Clear any timer send() may have queued during our await — we're about
      // to schedule the canonical next poll ourselves.
      if (pollTimer) clearTimeout(pollTimer);
      // After errors, back off so we don't hammer a flaky server. Otherwise
      // use the adaptive cadence (active right after activity, idle otherwise).
      const delay = consecutiveErrors > 0
        ? Math.min(5000, 500 * (1 << Math.min(3, consecutiveErrors)))
        : nextDelay();
      pollTimer = setTimeout(pollOnce, delay);
    }
  }

  function startPolling() {
    if (pollStarted || dead) return;
    pollStarted = true;
    pollTimer = setTimeout(pollOnce, 50);
  }

  // Host starts polling immediately (slot already claimed). Guest defers polling
  // until its async r-guest claim succeeds, otherwise the first r-poll touches
  // guestT on the server before r-guest does, and r-guest sees "already taken".
  if (!options.deferPoll) startPolling();

  return {
    _isAppsScript: true,
    _code: code,
    _mySide: mySide,
    _startPolling: startPolling,
    on(ev, fn) {
      handlers[ev] = handlers[ev] || [];
      handlers[ev].push(fn);
      if (ev === 'open' && opened) setTimeout(() => { try { fn(); } catch (e) {} }, 0);
    },
    off(ev, fn) { handlers[ev] = (handlers[ev] || []).filter(x => x !== fn); },
    send(obj) {
      if (dead) return;
      pokeActivity();   // sending — we'll likely want a fast reply, stay snappy
      // Fire-and-forget POST. If it fails the next poll's send-error path
      // will eventually surface the disconnect.
      _appsCall('r-send', { code, from: mySide }, { payload: obj }).catch(() => {});
      // Speed up the very next poll after sending, so we catch a quick reply
      // sooner than the regular cadence would. SAFE: the polling guard makes
      // pollOnce a no-op if one's already in flight, so this can't double-poll.
      if (!polling) {
        if (pollTimer) clearTimeout(pollTimer);
        pollTimer = setTimeout(pollOnce, 100);  // tightened from 250 — catch replies faster
      }
    },
    close() {
      if (dead) return;
      // Notify the server we're leaving (best effort), then tear down locally.
      // Use die() so the 'close' event reaches lobby/shim listeners — without
      // it, calling close() externally was silent and the lobby's openTimer
      // would later fire with "Wrong code or host is offline" instead of the
      // real failure.
      _appsCall('r-leave', { code, from: mySide }).catch(() => {});
      die('local');
    }
  };
}

// Host-side peer shim. After claiming a host slot, watches via polling for
// the guest to appear, then fires 'connection' with the conn.
function _makeAppsScriptHostShim(code) {
  const handlers = { connection: [], error: [] };
  let conn = null;          // the actual conn we'll hand out
  let connFired = false;
  let pendingConn = null;
  // The host's own poll loop drives detection of the guest. Once the conn
  // fires 'open' (= guest present), promote it to a 'connection' event.
  conn = _appsScriptAsConn(code, 'h', { startOpen: false });
  conn.on('open', () => {
    if (connFired) return;
    connFired = true;
    if (handlers.connection.length > 0) {
      for (const fn of handlers.connection.slice()) {
        try { fn(conn); } catch (e) {}
      }
    } else {
      pendingConn = conn;
    }
  });
  return {
    on(ev, fn) {
      (handlers[ev] = handlers[ev] || []).push(fn);
      if (ev === 'connection' && pendingConn) {
        const c = pendingConn; pendingConn = null;
        setTimeout(() => { try { fn(c); } catch (e) {} }, 0);
      }
    },
    destroy() {
      if (conn) try { conn.close(); } catch (e) {}
    }
  };
}

async function _appsScriptHostWithRetry(desiredCode) {
  await _appsScriptPing();
  const tries = desiredCode ? [desiredCode] : [];
  for (let i = 0; i < 6; i++) tries.push(genCode(4));
  let lastErr = null;
  for (const code of tries) {
    const room = code.toUpperCase();
    let data;
    try {
      data = await _appsCall('r-host', { code: room }, null);
    } catch (e) {
      lastErr = { error: 'fail', detail: (e && e.message) || String(e) };
      break;
    }
    if (data.ok) return { peer: _makeAppsScriptHostShim(room), code: code };
    if (data.error === 'taken') { lastErr = { error: 'taken' }; continue; }
    lastErr = { error: data.error || 'unknown' };
    break;
  }
  throw new Error(lastErr && lastErr.error === 'fail'
    ? 'Could not reach Apps Script: ' + lastErr.detail
    : 'Could not register a code (' + (lastErr ? lastErr.error : 'unknown') + ').');
}

// =================================================================
// SOCKET.IO TRANSPORT — used when arcade.html is loaded with
// ?transport=socketio (i.e. embedded inside the finallycue chat site).
// Same conn-shape API as _appsScriptAsConn so nothing downstream cares
// which transport actually moved the bytes.
// =================================================================
let _arcadeSocket = null;
let _arcadeSocketReady = null;

function _socketIoEnabled() {
  try {
    const sp = new URLSearchParams(window.location.search);
    return sp.get('transport') === 'socketio';
  } catch (e) { return false; }
}

function _ensureSocketIo() {
  if (_arcadeSocketReady) return _arcadeSocketReady;
  _arcadeSocketReady = (async () => {
    // Pull socket.io client from the chat server. The /api/v2/events/ path
    // matches resources/server.js's `new Server(server, { path: ... })`.
    if (typeof io === 'undefined') {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = '/api/v2/events/socket.io.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Could not load socket.io client.'));
        document.head.appendChild(s);
      });
    }
    if (typeof io === 'undefined') throw new Error('socket.io client never showed up.');
    // Forward the bearer token if the chat session set one in localStorage —
    // server.js requires socket.userId for arcade-host/arcade-join.
    const ioOpts = { path: '/api/v2/events/', transports: ['polling', 'websocket'] };
    try {
      const tok = localStorage.getItem('fc_auth_token');
      if (tok) ioOpts.auth = { token: tok };
    } catch (e) {}
    _arcadeSocket = io(ioOpts);
    await new Promise((resolve) => {
      if (_arcadeSocket.connected) return resolve();
      _arcadeSocket.once('connect', resolve);
    });
    return _arcadeSocket;
  })();
  return _arcadeSocketReady;
}

// Conn-shaped wrapper around the socket.io transport. Mirrors
// _appsScriptAsConn's interface: { on, off, send, close } + 'open'/'data'/'close'/'error'.
function _socketIoAsConn(code, mySide, options) {
  options = options || {};
  const handlers = { data: [], close: [], error: [], open: [] };
  let dead = false;
  let opened = !!options.startOpen;
  const sock = _arcadeSocket;
  if (!sock) throw new Error('socket.io not initialized — call _ensureSocketIo() first.');

  function fire(ev, payload) {
    for (const fn of (handlers[ev] || []).slice()) {
      try { fn(payload); } catch (e) {}
    }
  }
  function maybeOpen() { if (!opened && !dead) { opened = true; fire('open'); } }
  function die(reason) {
    if (dead) return;
    dead = true;
    sock.off('arcade-msg', onMsg);
    sock.off('arcade-paired', onPaired);
    sock.off('arcade-peer-left', onPeerLeft);
    fire('close', reason);
  }

  function onMsg(d) {
    if (!d || d.code !== code) return;
    if (d.payload) fire('data', d.payload);
  }
  function onPaired(d) {
    if (!d || d.code !== code) return;
    maybeOpen();
  }
  function onPeerLeft(d) {
    if (!d || d.code !== code) return;
    die('opponent_left');
  }

  sock.on('arcade-msg', onMsg);
  sock.on('arcade-paired', onPaired);
  sock.on('arcade-peer-left', onPeerLeft);

  if (options.startOpen) maybeOpen();

  return {
    _isSocketIo: true,
    _code: code,
    _mySide: mySide,
    on(ev, fn) {
      handlers[ev] = handlers[ev] || [];
      handlers[ev].push(fn);
      if (ev === 'open' && opened) setTimeout(() => { try { fn(); } catch (e) {} }, 0);
    },
    off(ev, fn) { handlers[ev] = (handlers[ev] || []).filter(x => x !== fn); },
    send(obj) {
      if (dead) return;
      sock.emit('arcade-msg', { code, payload: obj });
    },
    close() {
      if (dead) return;
      try { sock.emit('arcade-leave', { code }); } catch (e) {}
      die('local');
    }
  };
}

// Host: claim a slot via arcade-host, return a peer-shim that fires
// 'connection' when the guest pairs.
async function _socketIoHostWithRetry(desiredCode) {
  await _ensureSocketIo();
  const tries = desiredCode ? [desiredCode] : [];
  for (let i = 0; i < 6; i++) tries.push(genCode(4));
  let lastErr = null;
  for (const code of tries) {
    const room = code.toUpperCase();
    const ack = await new Promise((resolve) => {
      let done = false;
      _arcadeSocket.emit('arcade-host', { code: room });
      const onAck = (d) => { if (done) return; done = true; _arcadeSocket.off('arcade-host-ack', onAck); resolve(d); };
      _arcadeSocket.on('arcade-host-ack', onAck);
      setTimeout(() => { if (done) return; done = true; _arcadeSocket.off('arcade-host-ack', onAck); resolve({ ok: false, error: 'timeout' }); }, 5000);
    });
    if (ack.ok) {
      // Build a peer shim that will fire 'connection' once the guest pairs.
      return { peer: _makeSocketIoHostShim(room), code };
    }
    if (ack.error === 'taken') { lastErr = { error: 'taken' }; continue; }
    lastErr = { error: ack.error || 'unknown' };
    break;
  }
  throw new Error('Could not register a code (' + (lastErr ? lastErr.error : 'unknown') + ').');
}

function _makeSocketIoHostShim(code) {
  const handlers = { connection: [], error: [] };
  let conn = null;
  let connFired = false;
  let pendingConn = null;
  conn = _socketIoAsConn(code, 'h', { startOpen: false });
  conn.on('open', () => {
    if (connFired) return;
    connFired = true;
    if (handlers.connection.length > 0) {
      for (const fn of handlers.connection.slice()) {
        try { fn(conn); } catch (e) {}
      }
    } else {
      pendingConn = conn;
    }
  });
  return {
    on(ev, fn) {
      (handlers[ev] = handlers[ev] || []).push(fn);
      if (ev === 'connection' && pendingConn) {
        const c = pendingConn; pendingConn = null;
        setTimeout(() => { try { fn(c); } catch (e) {} }, 0);
      }
    },
    destroy() {
      if (conn) try { conn.close(); } catch (e) {}
    }
  };
}

async function createHostPeer(desiredCode) {
  if (_socketIoEnabled()) return _socketIoHostWithRetry(desiredCode);
  return _appsScriptHostWithRetry(desiredCode);
}

async function createJoinerPeer() {
  if (_socketIoEnabled()) {
    await _ensureSocketIo();
    return {
      connect(peerId /*, opts */) {
        const room = _peerIdToRoom(peerId);
        const conn = _socketIoAsConn(room, 'g', { startOpen: false });
        // Claim the guest slot. arcade-paired will fire 'open' once accepted.
        _arcadeSocket.emit('arcade-join', { code: room });
        const onAck = (d) => {
          _arcadeSocket.off('arcade-join-ack', onAck);
          if (!d.ok) {
            // Surface as 'close' so the lobby's openTimer treats it as failure.
            try { conn.close(); } catch (e) {}
          }
          // On success the server immediately emits arcade-paired, which the
          // conn already listens for — no extra step needed here.
        };
        _arcadeSocket.on('arcade-join-ack', onAck);
        return conn;
      },
      destroy() { /* each conn owns its own listeners */ }
    };
  }
  await _appsScriptPing();
  return {
    connect(peerId /*, opts */) {
      const room = _peerIdToRoom(peerId);
      // deferPoll: don't start hitting r-poll until we've actually claimed
      // the guest slot. Otherwise our first poll touches `guestT` on the
      // server, and the subsequent r-guest sees "already taken" — even
      // though it's our own request that updated it.
      const conn = _appsScriptAsConn(room, 'g', { startOpen: false, deferPoll: true });
      (async () => {
        // 'no_host' on the first attempt is common on slow networks (school
        // wifi): the host's r-host call hasn't finished propagating to the
        // cache by the time the guest hits r-guest. Retry a few times with
        // backoff before giving up — the user used to have to manually click
        // Join twice and have it work the second time.
        const delays = [0, 800, 1500, 2500, 4000];
        let lastErr = null;
        for (let i = 0; i < delays.length; i++) {
          if (delays[i]) await new Promise(r => setTimeout(r, delays[i]));
          let data;
          try {
            data = await _appsCall('r-guest', { code: room }, null);
          } catch (e) {
            lastErr = 'fetch';
            continue;
          }
          if (data && data.ok) {
            conn._startPolling();
            return;
          }
          lastErr = (data && data.error) || 'unknown';
          if (lastErr !== 'no_host') break;   // permanent error — stop retrying
        }
        conn.close();
      })();
      return conn;
    },
    destroy() { /* each conn owns its own polling loop */ }
  };
}

/* ============================================================
   P2P SHIM — exposes a socket.io-style API over a PeerJS DataConnection.
   The shim runs the clocks locally on each side (no server arbiter):
     - Each side debits the active player's clock via a 250ms ticker
     - On move, the sender includes a clock snapshot the opponent trusts
     - Local clock-zero or first-move-timeout auto-emits a 'gameover' to the peer
   ============================================================ */
function makeP2PShim(conn, localColor, timeMin) {
  const listeners = {};
  function fire(ev) {
    const args = Array.prototype.slice.call(arguments, 1);
    const fns = (listeners[ev] || []).slice();
    for (const fn of fns) { try { fn.apply(null, args); } catch (e) {} }
  }
  const localClocks = { w: timeMin * 60 * 1000, b: timeMin * 60 * 1000 };
  let firstMoveDeadline = Date.now() + 60 * 1000;
  let currentTurn = 'w';
  let moveCount = 0;
  let gameEnded = false;
  let lastTickAt = Date.now();
  let clockTimer = null;
  let pendingDrawFromLocal = null;   // reason of the offer WE sent
  let pendingDrawFromRemote = null;  // reason of the offer THEY sent
  let rematchLocal = false;
  let rematchRemote = false;

  function rematchCount() { return (rematchLocal ? 1 : 0) + (rematchRemote ? 1 : 0); }
  function fireRematchUpdate() {
    fire('chess:rematch-update', { local: rematchLocal, remote: rematchRemote, count: rematchCount() });
  }
  function maybeStartRematch() {
    if (rematchLocal && rematchRemote) {
      // Reset state for a fresh game and swap colors
      rematchLocal = false;
      rematchRemote = false;
      localColor = localColor === 'w' ? 'b' : 'w';
      localClocks.w = timeMin * 60 * 1000;
      localClocks.b = timeMin * 60 * 1000;
      firstMoveDeadline = Date.now() + 60 * 1000;
      currentTurn = 'w';
      moveCount = 0;
      gameEnded = false;
      pendingDrawFromLocal = null;
      pendingDrawFromRemote = null;
      lastTickAt = Date.now();
      if (clockTimer) { clearInterval(clockTimer); clockTimer = null; }
      fire('chess:rematch-start', { newColor: localColor });
    }
  }

  function snapshotState() {
    return { white: { timeLeft: localClocks.w }, black: { timeLeft: localClocks.b }, currentTurn, moveCount };
  }
  function endGame(kind, reason, sendToPeer) {
    if (gameEnded) return;
    gameEnded = true;
    if (clockTimer) { clearInterval(clockTimer); clockTimer = null; }
    if (sendToPeer) { try { conn.send({ type: 'gameover', kind, reason, clocks: { w: localClocks.w, b: localClocks.b } }); } catch (e) {} }
    fire('chess:game-over', { kind, reason, state: snapshotState() });
  }
  function startClockTicker() {
    if (clockTimer || gameEnded) return;
    lastTickAt = Date.now();
    clockTimer = setInterval(() => {
      if (gameEnded) return;
      const now = Date.now();
      const dt = now - lastTickAt;
      lastTickAt = now;
      // First-move enforcement: only the WHITE player auto-resigns;
      // the black player's view will get the 'gameover' message from white.
      if (moveCount === 0 && firstMoveDeadline && now >= firstMoveDeadline) {
        if (localColor === 'w') {
          return endGame('black-wins', 'first-move-timeout', true);
        }
        // black just waits — white will tell us
      }
      // Tick the active player's clock
      localClocks[currentTurn] = Math.max(0, localClocks[currentTurn] - dt);
      if (localClocks[currentTurn] <= 0 && currentTurn === localColor) {
        return endGame(localColor === 'w' ? 'black-wins' : 'white-wins', 'timeout', true);
      }
      fire('chess:clocks', snapshotState());
    }, 250);
  }
  conn.on('data', (data) => {
    if (!data || typeof data !== 'object') return;
    // Rematch messages are allowed AFTER the game ends
    if (data.type === 'rematch') {
      if (!rematchRemote) { rematchRemote = true; fireRematchUpdate(); maybeStartRematch(); }
      return;
    }
    if (data.type === 'rematch-cancel') {
      if (rematchRemote) { rematchRemote = false; fireRematchUpdate(); }
      return;
    }
    if (gameEnded) return;
    switch (data.type) {
      case 'move': {
        if (data.clocks) {
          if (typeof data.clocks.w === 'number') localClocks.w = data.clocks.w;
          if (typeof data.clocks.b === 'number') localClocks.b = data.clocks.b;
          lastTickAt = Date.now();
        }
        moveCount += 1;
        currentTurn = currentTurn === 'w' ? 'b' : 'w';
        firstMoveDeadline = null;
        // Any move clears a pending draw offer in either direction
        pendingDrawFromLocal = null;
        pendingDrawFromRemote = null;
        fire('chess:move', { move: data.move, by: data.by, state: snapshotState() });
        fire('chess:clocks', snapshotState());
        break;
      }
      case 'resign': {
        const kind = data.by === 'w' ? 'black-wins' : 'white-wins';
        endGame(kind, data.reason || 'resign', false);
        break;
      }
      case 'gameover': {
        if (data.clocks) {
          if (typeof data.clocks.w === 'number') localClocks.w = data.clocks.w;
          if (typeof data.clocks.b === 'number') localClocks.b = data.clocks.b;
        }
        endGame(data.kind, data.reason || 'unknown', false);
        break;
      }
      case 'draw-offer': {
        pendingDrawFromRemote = data.reason || 'agreement';
        fire('chess:draw-offered', { by: data.by, reason: data.reason });
        break;
      }
      case 'draw-accept': {
        const reason = pendingDrawFromLocal || 'agreement';
        pendingDrawFromLocal = null;
        endGame('draw', reason, false);
        break;
      }
      case 'draw-decline': {
        pendingDrawFromLocal = null;
        fire('chess:draw-declined');
        break;
      }
      case 'leave': {
        const kind = localColor === 'w' ? 'white-wins' : 'black-wins';
        endGame(kind, 'disconnect', false);
        break;
      }
    }
  });
  conn.on('close', () => {
    if (gameEnded) return;
    const kind = localColor === 'w' ? 'white-wins' : 'black-wins';
    endGame(kind, 'disconnect', false);
  });
  conn.on('error', () => {
    if (gameEnded) return;
    const kind = localColor === 'w' ? 'white-wins' : 'black-wins';
    endGame(kind, 'disconnect', false);
  });
  return {
    startClocks() { startClockTicker(); },
    closeConn() { try { conn.close(); } catch (e) {} },
    emit(ev, payload) {
      if (ev === 'chess:rematch') {
        if (rematchLocal) return;
        rematchLocal = true;
        try { conn.send({ type: 'rematch' }); } catch (e) {}
        fireRematchUpdate();
        maybeStartRematch();
        return;
      }
      if (ev === 'chess:rematch-cancel') {
        if (!rematchLocal) return;
        rematchLocal = false;
        try { conn.send({ type: 'rematch-cancel' }); } catch (e) {}
        fireRematchUpdate();
        return;
      }
      if (gameEnded && ev !== 'chess:leave') return;
      if (ev === 'chess:move') {
        // The ticker has been debiting our clock; just flip turn and send snapshot.
        const now = Date.now();
        const dt = now - lastTickAt;
        lastTickAt = now;
        localClocks[currentTurn] = Math.max(0, localClocks[currentTurn] - dt);
        moveCount += 1;
        currentTurn = currentTurn === 'w' ? 'b' : 'w';
        firstMoveDeadline = null;
        pendingDrawFromLocal = null;
        pendingDrawFromRemote = null;
        try { conn.send({ type: 'move', move: payload && payload.move, by: localColor, clocks: { w: localClocks.w, b: localClocks.b } }); } catch (e) {}
        fire('chess:clocks', snapshotState());
      } else if (ev === 'chess:resign') {
        const reason = (payload && payload.reason) || 'resign';
        try { conn.send({ type: 'resign', by: localColor, reason }); } catch (e) {}
        const kind = localColor === 'w' ? 'black-wins' : 'white-wins';
        endGame(kind, reason, false);
      } else if (ev === 'chess:draw-offer') {
        const reason = (payload && payload.reason) || 'agreement';
        pendingDrawFromLocal = reason;
        try { conn.send({ type: 'draw-offer', by: localColor, reason }); } catch (e) {}
      } else if (ev === 'chess:draw-accept') {
        const reason = pendingDrawFromRemote || 'agreement';
        pendingDrawFromRemote = null;
        try { conn.send({ type: 'draw-accept' }); } catch (e) {}
        endGame('draw', reason, false);
      } else if (ev === 'chess:draw-decline') {
        pendingDrawFromRemote = null;
        try { conn.send({ type: 'draw-decline' }); } catch (e) {}
      } else if (ev === 'chess:leave') {
        try { conn.send({ type: 'leave' }); } catch (e) {}
        try { conn.close(); } catch (e) {}
      }
    },
    on(ev, fn) { (listeners[ev] = listeners[ev] || []).push(fn); },
    off(ev, fn) { if (listeners[ev]) listeners[ev] = listeners[ev].filter(x => x !== fn); }
  };
}

const hub = document.getElementById('hub');

let activeCleanup = null;
let activeListeners = [];

function addL(target, ev, fn, opt) {
  target.addEventListener(ev, fn, opt);
  activeListeners.push({ target, ev, fn, opt });
}

function showGame(id) {
  const g = GAMES.find(x => x.id === id);
  if (!g) return;
  document.getElementById('game-title').innerText = g.title;
  hub.classList.add('hidden');
  gv.classList.remove('hidden');
  gvHost.innerHTML = '';
  try { g.start(gvHost); } catch (e) { console.error(e); gvHost.innerText = 'Game crashed: ' + e.message; }
}

function back() {
  if (activeCleanup) { try { activeCleanup(); } catch (e) {} activeCleanup = null; }
  for (const l of activeListeners) { l.target.removeEventListener(l.ev, l.fn, l.opt); }
  activeListeners = [];
  gvHost.innerHTML = '';
  gv.classList.add('hidden');
  hub.classList.remove('hidden');
}

// When this page unloads (modal close, tab close, navigation), run cleanup so
// the multiplayer conn fires its 'close' on the way out — this is what tells
// the opponent "your peer left" without waiting on socket.io's heartbeat
// timeout (~25s default). Both pagehide and beforeunload, since browsers
// don't all fire one or the other reliably for iframe.src changes.
function _unloadCleanup() {
  if (activeCleanup) { try { activeCleanup(); } catch (e) {} activeCleanup = null; }
}
window.addEventListener('beforeunload', _unloadCleanup);
window.addEventListener('pagehide', _unloadCleanup);

// Parent (the chat website) postMessages 'arcade-shutdown' just before
// closing the iframe; we run the same cleanup so the opponent's screen
// flips to "Opponent disconnected" instantly.
window.addEventListener('message', (e) => {
  if (e.origin !== window.location.origin) return;
  if (e.data && e.data.type === 'arcade-shutdown') _unloadCleanup();
});

let _audioCtx = null;
function ensureAudio() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

const Settings = (function () {
  let sfxVolume = 0.5;
  let playerName = '';
  let groqKey = '';
  try {
    const v = parseFloat(localStorage.getItem('fcue_sfxVolume'));
    if (!isNaN(v)) sfxVolume = Math.max(0, Math.min(1, v));
  } catch (e) {}
  try {
    const n = localStorage.getItem('fcue_playerName');
    if (typeof n === 'string') playerName = n.slice(0, 20);
  } catch (e) {}
  try {
    const k = localStorage.getItem('fcue_groqKey');
    if (typeof k === 'string') groqKey = k.slice(0, 200);
  } catch (e) {}
  return {
    get sfxVolume() { return sfxVolume; },
    set sfxVolume(v) {
      sfxVolume = Math.max(0, Math.min(1, v));
      try { localStorage.setItem('fcue_sfxVolume', String(sfxVolume)); } catch (e) {}
    },
    get playerName() { return playerName; },
    set playerName(v) {
      playerName = (typeof v === 'string' ? v : '').trim().slice(0, 20);
      try { localStorage.setItem('fcue_playerName', playerName); } catch (e) {}
    },
    get groqKey() { return groqKey; },
    set groqKey(v) {
      groqKey = (typeof v === 'string' ? v : '').trim().slice(0, 200);
      try { localStorage.setItem('fcue_groqKey', groqKey); } catch (e) {}
    }
  };
})();

      // Dump all localStorage as a JSON object. Same-origin only, so this captures
      // every key the arcade has ever written (settings, best scores, progress, favorites).
      const out = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k == null) continue;
        out[k] = localStorage.getItem(k);
      }
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = 'arcade-settings-' + stamp + '.json';

      setTimeout(() => URL.revokeObjectURL(url), 4000);
      setMsg('Exported ' + Object.keys(out).length + ' keys.', 'var(--accent)');

  const fileInp = overlay.querySelector('#fset-import-file');
  overlay.querySelector('#fset-import').addEventListener('click', () => fileInp.click());

    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result || ''));
        if (!obj || typeof obj !== 'object' || Array.isArray(obj)) throw new Error('not a settings object');
        let imported = 0;
        for (const k of Object.keys(obj)) {
          const v = obj[k];
          if (typeof v !== 'string') continue;
          try { localStorage.setItem(k, v); imported++; } catch (er) {}
        }
        setMsg('Imported ' + imported + ' keys. Reloading…', 'var(--accent)');
        setTimeout(() => location.reload(), 600);
      } catch (er) { setMsg('Invalid file: ' + (er.message || er), 'var(--bad)'); }
    };
    reader.onerror = () => setMsg('Could not read that file.', 'var(--bad)');
    reader.readAsText(f);
    fileInp.value = '';   // allow re-importing the same filename
  });
  document.addEventListener('keydown', function escClose(e) {
    if (e.key === 'Escape') { close(); document.removeEventListener('keydown', escClose); }
  });
}

function tone(freq, dur, type='sine', vol=0.15, when=0) {
  const ctx = ensureAudio(); if (!ctx) return;
  const v = vol * Settings.sfxVolume;
  if (v <= 0.0005) return;
  const t = ctx.currentTime + when;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(v, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sweep(f1, f2, dur, type='sine', vol=0.15, when=0) {
  const ctx = ensureAudio(); if (!ctx) return;
  const v = vol * Settings.sfxVolume;
  if (v <= 0.0005) return;
  const t = ctx.currentTime + when;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f1, t);
  o.frequency.exponentialRampToValueAtTime(f2, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(v, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function noise(dur, vol=0.1, when=0) {
  const ctx = ensureAudio(); if (!ctx) return;
  const v = vol * Settings.sfxVolume;
  if (v <= 0.0005) return;
  const t = ctx.currentTime + when;
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2 - 1) * (1 - i / d.length);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const g = ctx.createGain();
  g.gain.setValueAtTime(v, t);
  src.connect(g).connect(ctx.destination);
  src.start(t);
}
