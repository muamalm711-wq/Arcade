      card.disabled = locked;
      card.innerHTML = `
        <div style="font-size:11px;color:var(--sub);">Level ${i + 1}${locked ? ' 🔒' : (i < progress ? ' ✓' : '')}</div>
        <div style="font-size:14px;font-weight:bold;">${L.name}</div>
        <div style="font-size:11px;color:var(--sub);">${L.n}×${L.n} · max ${L.max}</div>`;
      if (!locked) card.addEventListener('click', () => loadLevel(i));
      grid.appendChild(card);
    });
    host.querySelector('#ph-editor-btn').addEventListener('click', showEditor);
  }

  // ------ LEVEL EDITOR (visual only, not playable) -------
  // Lets the user lay out a level and screenshot it. Not connected to the trace/play loop.
  let editor = null;
  function newEditorLevel(n) {
    return { n: Math.max(4, Math.min(14, n|0 || 8)), name: 'Custom', emitters: [], targets: [], walls: [], fixed: [], max: 3 };
  }

  function showEditor() {
    view = 'editor';
    if (!editor) editor = newEditorLevel(8);
    editor.tool = editor.tool || 'wall';
    editor.emitDir = editor.emitDir || 'R';

    host.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:640px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;">
          <span style="font-size:14px;font-weight:bold;">🛠 Editor</span>
          <span style="color:var(--sub);font-size:11px;">screenshot when done</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;font-size:13px;">
          <label>Name <input type="text" id="ed-name" value="${editor.name}" style="width:120px;"></label>
          <label>Size <input type="number" id="ed-n" min="4" max="14" value="${editor.n}" style="width:54px;"></label>
          <label>Max mirrors <input type="number" id="ed-max" min="0" max="20" value="${editor.max}" style="width:54px;"></label>
          <button class="btn" id="ed-play" style="background:#34d399;">▶ Play</button>
          <button class="btn secondary" id="ed-clear">Clear</button>
          <button class="btn secondary" id="ed-back">Back</button>
        </div>
        <div id="ed-tools" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></div>
        <canvas id="ed-canvas" style="border-radius:14px;border:1px solid var(--border);background:#0d1117;cursor:crosshair;touch-action:none;"></canvas>
        <div style="color:var(--sub);font-size:11px;text-align:center;max-width:540px;">
          Click a tool, then click a cell. Eraser removes anything in a cell. Emitter direction sets how the beam fires.
        </div>
      </div>`;

    const tools = [
      { id: 'emit',     label: 'Emit ▶', emit: true },
      { id: 'target',   label: '◎ Target' },
      { id: 'wall',     label: '▣ Wall' },
      { id: 'fixslash', label: '/ Fixed' },
      { id: 'fixback',  label: '\\ Fixed' },
      { id: 'erase',    label: '✕ Eraser' },
    ];
    const dirArrow = { R: '▶', D: '▼', L: '◀', U: '▲' };
    const toolsEl = host.querySelector('#ed-tools');
    function renderTools() {
      toolsEl.innerHTML = '';
      tools.forEach(t => {
        const b = document.createElement('button');
        const active = editor.tool === t.id;
        b.className = 'btn ' + (active ? '' : 'secondary');
        b.style.cssText = 'font-size:12px;padding:6px 10px;';
        if (t.emit) b.innerText = 'Emit ' + dirArrow[editor.emitDir];
        else b.innerText = t.label;
        b.addEventListener('click', () => {
          if (t.emit && editor.tool === 'emit') {
            // cycle direction
            const order = ['R', 'D', 'L', 'U'];
            editor.emitDir = order[(order.indexOf(editor.emitDir) + 1) % order.length];
          } else {
            editor.tool = t.id;
          }
          renderTools();
        });
        toolsEl.appendChild(b);
      });
    }
    renderTools();

    const canvas = host.querySelector('#ed-canvas');
    const ctx = canvas.getContext('2d');

    function cs() { return Math.floor(540 / editor.n); }
    function eCenter(x, y) { const s = cs(); return { x: (x + 0.5) * s, y: (y + 0.5) * s }; }

    function renderEditor() {
      const s = cs();
      const W = s * editor.n, H = s * editor.n;
      canvas.width = W; canvas.height = H;
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, W, H);
      // Grid
      ctx.strokeStyle = '#1c2435';
      ctx.lineWidth = 1;
      for (let i = 0; i <= editor.n; i++) {
        ctx.beginPath(); ctx.moveTo(i * s, 0); ctx.lineTo(i * s, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * s); ctx.lineTo(W, i * s); ctx.stroke();
      }
      // Coord labels (faint) — useful for me to read off positions from a screenshot
      ctx.fillStyle = '#3a4459';
      ctx.font = '10px monospace';
      ctx.textBaseline = 'top';
      for (let i = 0; i < editor.n; i++) {
        ctx.fillText(i, i * s + 3, 2);
        ctx.fillText(i, 2, i * s + 12);
      }
      // Walls
      ctx.fillStyle = '#3a4459';
      for (const w of editor.walls) ctx.fillRect(w.x * s + 2, w.y * s + 2, s - 4, s - 4);
      // Targets (always shown unlit in editor)
      for (const t of editor.targets) {
        const c = eCenter(t.x, t.y);
        const r = s * 0.32;
        ctx.strokeStyle = '#5a6a82'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1.5; ctx.strokeStyle = '#3a4459';
        ctx.beginPath(); ctx.arc(c.x, c.y, r * 0.5, 0, Math.PI * 2); ctx.stroke();
      }
      // Emitters
      for (const e of editor.emitters) {
        const c = eCenter(e.x, e.y);
        ctx.fillStyle = '#1d2533';
        ctx.fillRect(e.x * s + 4, e.y * s + 4, s - 8, s - 8);
        ctx.strokeStyle = '#6ea8fe'; ctx.lineWidth = 2;
        ctx.strokeRect(e.x * s + 4, e.y * s + 4, s - 8, s - 8);
        ctx.save();
        ctx.translate(c.x, c.y);
        const ang = ({ R: 0, D: Math.PI/2, L: Math.PI, U: -Math.PI/2 })[e.dir] || 0;
        ctx.rotate(ang);
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.moveTo(s * 0.28, 0);
        ctx.lineTo(-s * 0.18, -s * 0.18);
        ctx.lineTo(-s * 0.05, 0);
        ctx.lineTo(-s * 0.18, s * 0.18);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      // Fixed mirrors (gold)
      function drawMirror(mx, my, type, locked) {
        const c = eCenter(mx, my);
        ctx.save();
        ctx.translate(c.x, c.y);
        const half = s * 0.36;
        ctx.shadowBlur = 8;
        ctx.shadowColor = locked ? '#fbbf24' : '#a8c9ff';
        ctx.strokeStyle = locked ? '#fbbf24' : '#e8eaed';
        ctx.lineWidth = 5; ctx.lineCap = 'round';
        ctx.beginPath();
        if (type === '/') { ctx.moveTo(half, -half); ctx.lineTo(-half, half); }
        else { ctx.moveTo(-half, -half); ctx.lineTo(half, half); }
        ctx.stroke();
        ctx.restore();
      }
      for (const f of editor.fixed) drawMirror(f.x, f.y, f.type, true);
    }

    function clearCell(x, y) {
      editor.emitters = editor.emitters.filter(e => !(e.x === x && e.y === y));
      editor.targets  = editor.targets.filter(t => !(t.x === x && t.y === y));
      editor.walls    = editor.walls.filter(w => !(w.x === x && w.y === y));
      editor.fixed    = editor.fixed.filter(f => !(f.x === x && f.y === y));
    }
    function trimToBounds() {
      const n = editor.n;
      const inB = (p) => p.x >= 0 && p.y >= 0 && p.x < n && p.y < n;
      editor.emitters = editor.emitters.filter(inB);
      editor.targets  = editor.targets.filter(inB);
      editor.walls    = editor.walls.filter(inB);
      editor.fixed    = editor.fixed.filter(inB);
    }

    function onClick(e) {
      const rect = canvas.getBoundingClientRect();
      const s = cs();
      const cx = Math.floor(((e.clientX - rect.left) * (canvas.width / rect.width)) / s);
      const cy = Math.floor(((e.clientY - rect.top) * (canvas.height / rect.height)) / s);
      if (cx < 0 || cy < 0 || cx >= editor.n || cy >= editor.n) return;
      clearCell(cx, cy);
      switch (editor.tool) {
        case 'emit':     editor.emitters.push({ x: cx, y: cy, dir: editor.emitDir }); break;
        case 'target':   editor.targets.push({ x: cx, y: cy }); break;
        case 'wall':     editor.walls.push({ x: cx, y: cy }); break;
        case 'fixslash': editor.fixed.push({ x: cx, y: cy, type: '/' }); break;
        case 'fixback':  editor.fixed.push({ x: cx, y: cy, type: '\\' }); break;
        case 'erase':    /* already cleared */ break;
      }
      sfx('click');
      renderEditor();
    }

    addL(canvas, 'click', onClick);
    host.querySelector('#ed-name').addEventListener('input', (e) => { editor.name = e.target.value.slice(0, 30); });
    host.querySelector('#ed-max').addEventListener('input', (e) => { editor.max = Math.max(0, Math.min(20, parseInt(e.target.value) || 0)); });
    host.querySelector('#ed-n').addEventListener('change', (e) => {
      const n = Math.max(4, Math.min(14, parseInt(e.target.value) || 8));
      editor.n = n;
      e.target.value = n;
      trimToBounds();
      renderEditor();
    });
    host.querySelector('#ed-clear').addEventListener('click', () => {
      editor.emitters = []; editor.targets = []; editor.walls = []; editor.fixed = [];
      renderEditor();
    });
    host.querySelector('#ed-back').addEventListener('click', showSelect);
    host.querySelector('#ed-play').addEventListener('click', () => {
      // Quick sanity checks before launching into play mode
      if (editor.emitters.length === 0) { alert('Add an emitter first (the laser source).'); return; }
      if (editor.targets.length === 0) { alert('Add at least one target.'); return; }
      // Build a snapshot of the editor's level so further edits don't mutate the playable copy
      const snapshot = {
        name: editor.name || 'Custom',
        n: editor.n,
        emitters: editor.emitters.map(e => ({ x: e.x, y: e.y, dir: e.dir })),
        targets: editor.targets.map(t => ({ x: t.x, y: t.y })),
        walls: editor.walls.map(w => ({ x: w.x, y: w.y })),
        fixed: editor.fixed.map(f => ({ x: f.x, y: f.y, type: f.type })),
        max: editor.max
      };
      loadLevel(snapshot);   // passing an object switches into custom-play mode
    });

    renderEditor();
  }

  showSelect();
  activeCleanup = () => {
    if (raf) cancelAnimationFrame(raf);
  };
}

/* ============================================================
   SLIDING PUZZLE — pick 3x3 / 4x4 / 5x5
   ============================================================ */
function startSliding(host) {
  host.innerHTML = `
    <div class="party-card">
      <div style="font-size:28px;font-weight:bold;">🧩 Sliding Puzzle</div>
      <div style="color:var(--sub);font-size:13px;text-align:center;">Pick a difficulty</div>
      <button class="btn" id="sl-3" style="width:100%;">Easy — 3×3 (8-puzzle)</button>
      <button class="btn" id="sl-4" style="width:100%;">Medium — 4×4 (15-puzzle)</button>
      <button class="btn secondary" id="sl-5" style="width:100%;">Hard — 5×5 (24-puzzle)</button>
    </div>`;
  host.querySelector('#sl-3').onclick = () => startSlidingGame(host, 3);
  host.querySelector('#sl-4').onclick = () => startSlidingGame(host, 4);
  host.querySelector('#sl-5').onclick = () => startSlidingGame(host, 5);
}

function startSlidingGame(host, n) {
  const TILE = n === 3 ? 110 : n === 4 ? 90 : 72;
  const GAP = 6;
  const BOARD = TILE * n + GAP * (n - 1);
  const TOTAL = n * n;
  const BLANK = TOTAL - 1;                    // value at the bottom-right when solved
  const BEST_KEY = 'slider_best_' + n;
  let bestMoves = parseInt(localStorage.getItem(BEST_KEY) || '0') || 0;

  // tiles[i] = the value displayed at flat-index i (0..TOTAL-1).
  // The blank is the value (TOTAL - 1). The "solved" state is [0,1,2,...,TOTAL-1].
  let tiles, moves, won;

  function isSolved() {
    for (let i = 0; i < TOTAL; i++) if (tiles[i] !== i) return false;
    return true;
  }

  // Generate a solvable shuffle by performing many random *valid* moves from the solved state.
  // This guarantees solvability regardless of n.
  function shuffle() {
    tiles = [];
    for (let i = 0; i < TOTAL; i++) tiles.push(i);
    let blankIdx = TOTAL - 1;
    const STEPS = n === 3 ? 80 : n === 4 ? 200 : 400;
    let lastMoved = -1;
    for (let s = 0; s < STEPS; s++) {
      const br = Math.floor(blankIdx / n), bc = blankIdx % n;
      const opts = [];
      if (br > 0)     opts.push(blankIdx - n);
      if (br < n - 1) opts.push(blankIdx + n);
      if (bc > 0)     opts.push(blankIdx - 1);
      if (bc < n - 1) opts.push(blankIdx + 1);
      // Avoid undoing the previous move so we don't sit in place
      const filtered = opts.filter(i => i !== lastMoved);
      const chosen = (filtered.length ? filtered : opts)[Math.floor(Math.random() * (filtered.length ? filtered.length : opts.length))];
      tiles[blankIdx] = tiles[chosen];
      tiles[chosen] = BLANK;
      lastMoved = blankIdx;
      blankIdx = chosen;
    }
    // Edge case: shuffle accidentally landed on solved — bump it.
    if (isSolved()) {
      const a = 0, b = 1;
      const ta = tiles[a]; tiles[a] = tiles[b]; tiles[b] = ta;
      // Note: a single swap on a solved board may produce an unsolvable position for some n.
      // To avoid that, just redo the shuffle.
      shuffle();
    }
  }

  function blankAt() {
    for (let i = 0; i < TOTAL; i++) if (tiles[i] === BLANK) return i;
    return -1;
  }

  function tryMove(idx) {
    if (won) return;
    const blank = blankAt();
    const br = Math.floor(blank / n), bc = blank % n;
    const tr = Math.floor(idx / n),   tc = idx % n;
    const adj = (br === tr && Math.abs(bc - tc) === 1) || (bc === tc && Math.abs(br - tr) === 1);
    if (!adj) return;
    tiles[blank] = tiles[idx];
    tiles[idx] = BLANK;
    moves++;
    sfx('click');
    render();
    if (isSolved()) {
      won = true;
      sfx('win');
      const newBest = !bestMoves || moves < bestMoves;
      if (newBest) { bestMoves = moves; try { localStorage.setItem(BEST_KEY, String(bestMoves)); } catch(e){} }
      setTimeout(() => {
        showResult(host, {
          title: 'Solved!', kind: 'win',
          stat: moves + ' moves' + (newBest ? ' (best!)' : ''),
          sub: bestMoves ? 'Best for ' + n + '×' + n + ': ' + bestMoves : '',
          retryLabel: 'Shuffle again',
          onRetry: () => startSlidingGame(host, n)
        });
      }, 250);
    }
  }

  function buildUI() {
    host.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
        <div style="display:flex;gap:24px;font-size:14px;color:#cfd2d6;align-items:center;">
          <div>Size: <b style="color:#fff;">${n}×${n}</b></div>
          <div>Moves: <b id="sl-moves" style="color:#fbbf24;">0</b></div>
          <div>Best: <b style="color:#34d399;">${bestMoves || '—'}</b></div>
        </div>
        <div id="sl-board" style="position:relative;width:${BOARD}px;height:${BOARD}px;background:#0d1117;border:1px solid var(--border);border-radius:14px;padding:0;"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn secondary" id="sl-shuffle">Shuffle</button>
          <button class="btn secondary" id="sl-back">Difficulty</button>
        </div>
        <div style="color:var(--sub);font-size:11px;text-align:center;max-width:480px;">
          Click any tile next to the blank to slide it in. Get the numbers in order, blank in the bottom-right.
        </div>
      </div>`;
    host.querySelector('#sl-shuffle').onclick = () => startSlidingGame(host, n);
    host.querySelector('#sl-back').onclick = () => startSliding(host);
  }

  function render() {
    const board = host.querySelector('#sl-board');
    board.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const v = tiles[i];
      const r = Math.floor(i / n), c = i % n;
      const x = c * (TILE + GAP);
      const y = r * (TILE + GAP);
      if (v === BLANK) continue;
      const t = document.createElement('div');
      t.style.cssText = `
        position:absolute; left:${x}px; top:${y}px; width:${TILE}px; height:${TILE}px;
        background:linear-gradient(135deg, #2a3a55, #1a2535);
        border:1px solid #3a4a6a; border-radius:10px;
        display:flex;align-items:center;justify-content:center;
        font-size:${Math.floor(TILE * 0.4)}px;font-weight:bold;color:#e8eaed;
        cursor:pointer; user-select:none;
        transition:transform 0.05s;
      `;
      // tiles display 1..TOTAL-1; the blank slot just isn't drawn.
      t.innerText = v + 1;
      // Highlight tiles that are already in their final spot.
      if (v === i) {
        t.style.background = 'linear-gradient(135deg, #2a4a3a, #1a3525)';
        t.style.borderColor = '#34d39955';
      }
      t.addEventListener('click', () => tryMove(i));
      board.appendChild(t);
    }
    host.querySelector('#sl-moves').innerText = moves;
  }

  buildUI();
  shuffle();
  moves = 0;
  won = false;
  render();
  activeCleanup = () => {};
}

/* ============================================================
   SHADOW MATCH — silhouette flashes; pick the matching emoji.
   ============================================================ */
function startShadow(host) {
  // Pools by category so distractors can be drawn from the same theme (harder = more similar).
  const POOLS = {
    fruit:   ['🍎','🍌','🍇','🍉','🍓','🍑','🍐','🍒','🥝','🥭','🍍','🥥','🍊','🍋'],
    veg:     ['🥕','🌽','🥦','🍆','🥒','🫑','🫒','🧄','🧅','🍄','🥔','🌶️'],
    animal:  ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🦄','🐔','🦉','🦅','🐺','🐗'],
    sea:     ['🐠','🐟','🐡','🦈','🐙','🦑','🦐','🦞','🦀','🐚','🐳','🐬','🦭'],
    bug:     ['🐝','🐞','🦋','🐛','🐌','🦗','🕷️','🦂','🪲'],
    sport:   ['⚽','🏀','🏈','⚾','🎾','🏐','🎱','🏓','🥊','🥋','🎯','🎳','🥏','🏹'],
    vehicle: ['🚗','🚕','🚙','🚌','🚓','🚒','🚑','🚜','🚲','🛵','🚀','✈️','🚁','⛵','🚤','🚢','🚂','🚆'],
    tool:    ['🔨','🪓','🔧','🪛','🪚','🪜','🧲','🧯','🔑','🗝️','🔒','🛡️','⚔️','🪤','🧰'],
    food:    ['🍕','🍔','🌭','🌮','🌯','🥪','🥗','🍣','🍜','🍱','🍦','🍩','🧁','🍰','🍪','🍿','🥨','🥐','🥯'],
    plant:   ['🌹','🌻','🌼','🌷','🌺','🌵','🌳','🌲','🍀','🍁','🍂','🌱','🌿','🌾'],
    object:  ['☂️','🎩','👑','👞','👜','👓','🎒','💼','🎁','💎','🔔','🕯️','🪞','📷','🎮','💡','📦']
  };
  const ALL_POOLS = Object.keys(POOLS);

  let level = 1, score = 0, lives = 3, ended = false;
  let target = null, choices = [], category = null;
  let flashTimer = null, chooseTimer = null, lockClicks = false;

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildUI() {
    host.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:600px;">
        <div style="display:flex;gap:18px;align-items:center;font-size:14px;color:#cfd2d6;width:100%;justify-content:space-between;">
          <div>Score: <b id="sh-score" style="color:#fbbf24;">0</b></div>
          <div id="sh-lives" style="display:flex;gap:6px;font-size:18px;">
            <span class="shadow-life">❤️</span>
            <span class="shadow-life">❤️</span>
            <span class="shadow-life">❤️</span>
          </div>
          <div>Level: <b id="sh-level" style="color:#34d399;">1</b></div>
        </div>
        <div class="shadow-stage" id="sh-stage">
          <div class="shadow-target" id="sh-target"></div>
          <div class="shadow-flash-bar" id="sh-flash" style="width:0%;"></div>
        </div>
        <div id="sh-msg" style="height:18px;color:var(--sub);font-size:13px;">Watch the shape — pick its match below.</div>
        <div class="shadow-choices" id="sh-choices"></div>
      </div>`;
  }

  function updateLives() {
    const livesEl = host.querySelector('#sh-lives');
    if (!livesEl) return;
    [...livesEl.children].forEach((el, i) => el.classList.toggle('lost', i >= lives));
  }
  function setMsg(text, color) {
    const el = host.querySelector('#sh-msg');
    if (!el) return;
    el.style.color = color || 'var(--sub)';
    el.innerText = text;
  }

  function diffCurves() {
    // Flash time: how long the silhouette is visible. Choose time: hard time limit after it disappears.
    // Both shrink with level; stop at a floor so it doesn't become impossible.
    const flash  = Math.max(380, 1500 - (level - 1) * 50);
    const choose = Math.max(1800, 5000 - (level - 1) * 120);
    // Distractor difficulty: at higher levels, force same-category distractors.
    const sameCategoryChance = Math.min(0.95, 0.25 + level * 0.06);
    return { flash, choose, sameCategoryChance };
  }

  function nextRound() {
    if (ended) return;
    lockClicks = false;
    const { flash, choose, sameCategoryChance } = diffCurves();
    category = pick(ALL_POOLS);
    const pool = POOLS[category];
    target = pick(pool);
    // Build distractor list — same category if dice rolls high, otherwise mix
    const distractors = [];
    while (distractors.length < 3) {
      const useSame = Math.random() < sameCategoryChance && pool.length > 4;
      const p = useSame ? pool : POOLS[pick(ALL_POOLS)];
      const e = pick(p);
      if (e !== target && !distractors.includes(e)) distractors.push(e);
    }
    choices = shuffle([target, ...distractors]);
    renderRound();
    // Show silhouette, then hide; choices clickable both during and after.
    const flashBar = host.querySelector('#sh-flash');
    const tgtEl = host.querySelector('#sh-target');
    tgtEl.innerText = target;
    tgtEl.classList.remove('gone');
    flashBar.style.transition = 'none';
    flashBar.style.width = '100%';
    void flashBar.offsetWidth;
    flashBar.style.transition = `width ${flash}ms linear`;
    flashBar.style.width = '0%';

    flashTimer = setTimeout(() => {
      tgtEl.classList.add('gone');
      setMsg('Pick the match!', '#fbbf24');
    }, flash);
    chooseTimer = setTimeout(() => {
      onMiss('Time up.');
    }, flash + choose);
  }

  function renderRound() {
    const ch = host.querySelector('#sh-choices');
    ch.innerHTML = '';
    choices.forEach(emoji => {
      const b = document.createElement('div');
      b.className = 'shadow-choice';
      b.innerText = emoji;
      b.addEventListener('click', () => onChoose(b, emoji));
      ch.appendChild(b);
    });
    setMsg('Watch the shape…');
  }

  function clearTimers() {
    if (flashTimer) clearTimeout(flashTimer);
    if (chooseTimer) clearTimeout(chooseTimer);
    flashTimer = chooseTimer = null;
  }

  function onChoose(buttonEl, emoji) {
    if (ended || lockClicks) return;
    lockClicks = true;
    clearTimers();
    // Show the answer (so they see what it actually was, even if they guessed wrong).
    const tgtEl = host.querySelector('#sh-target');
    if (tgtEl) tgtEl.classList.remove('gone');

    if (emoji === target) {
      buttonEl.classList.add('right');
      score += 100 + (level - 1) * 10;
      level += 1;
      sfx('pop');
      host.querySelector('#sh-score').innerText = score;
      host.querySelector('#sh-level').innerText = level;
      setMsg('Right!', '#34d399');
      setTimeout(nextRound, 550);
    } else {
      buttonEl.classList.add('wrong');
      // Highlight the actual answer so the player learns it.
      [...host.querySelectorAll('.shadow-choice')].forEach(el => {
        if (el.innerText === target) el.classList.add('right');
        el.classList.add('disabled');
      });
      onMiss('Wrong — that was ' + target);
    }
  }

  function onMiss(msg) {
    if (ended) return;
    clearTimers();
    lockClicks = true;
    lives -= 1;
    sfx('hit');
    updateLives();
    setMsg(msg || 'Miss', '#ef4444');
    if (lives <= 0) {
      gameOver();
    } else {
      setTimeout(nextRound, 900);
    }
  }

  function gameOver() {
    ended = true;
    const bestKey = 'shadow_best';
    const best = parseInt(localStorage.getItem(bestKey) || '0') || 0;
    const newBest = score > best;
    if (newBest) try { localStorage.setItem(bestKey, String(score)); } catch (e) {}
    sfx('lose');
    setTimeout(() => {
      showResult(host, {
        title: 'Game Over', kind: 'lose',
        sub: newBest ? 'New best — sharp eyes.' : 'Reached level ' + level,
        stat: score + (newBest ? ' (best!)' : ''),
        retryLabel: 'Play Again',
        onRetry: () => startShadow(host)
      });
    }, 700);
  }

  buildUI();
  updateLives();
  setTimeout(nextRound, 350);
  activeCleanup = () => { clearTimers(); };
}

/* ============================================================

   /c/<CODE> endpoint. Pick a username + code, anyone joining the

function startChat(host) {
  // Prefer the global Settings username; fall back to the per-chat one we used to save separately.
  let savedName = Settings.playerName || '';
  if (!savedName) {

  }
  const defaultCode = genCode(4);

  host.innerHTML = `

          <button class="btn secondary" id="ch-rand" style="padding:0 12px;font-size:12px;" title="Random code">🎲</button>
        </div>

  host.querySelector('#ch-go').onclick = () => {
    const errEl = host.querySelector('#ch-err');
    errEl.innerText = '';
    const name = (host.querySelector('#ch-name').value || '').trim();

      if (e.key === 'Enter') host.querySelector('#ch-go').click();
    });
  });
  host.querySelector('#ch-name').focus();
}

function startChatRoom(host, code, username) {
  // users is a Map of memberId -> displayName so we can correctly remove a
  // single occurrence on disconnect even if two participants share a name.
  const usersByKey = new Map();
  let myMemberKey = null;     // server-assigned id for this client's membership
  let dead = false;
  let pollTimer = null;
  let lastSeq = 0;
  // Adaptive polling — same pattern as _appsScriptAsConn. Burst-poll for ~6s
  // after any activity (sending, receiving, joining), idle-poll otherwise.
  // Without this, the poll cadence variable was undefined (renamed during the
  // adaptive-polling rewrite) and setTimeout(fn, undefined) ≡ setTimeout(fn, 0)
  // — chat hammered the server as fast as it could respond.
  let lastActivityT = Date.now();
  function pokeActivity() { lastActivityT = Date.now(); }
  function nextDelay() {
    return (Date.now() - lastActivityT < APPS_SCRIPT_BURST_WINDOW_MS)
      ? APPS_SCRIPT_POLL_ACTIVE_MS
      : APPS_SCRIPT_POLL_IDLE_MS;
  }

  function escapeHtml(s) {
    return String(s).replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
  }
  function userColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
    return 'hsl(' + (h % 360) + ', 70%, 70%)';
  }
  function timestamp() {
    const d = new Date();
    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }
  function appendLine(html) {
    const log = host.querySelector('#chr-log');
    if (!log) return;
    const line = document.createElement('div');
    line.style.cssText = 'padding:3px 0;line-height:1.45;font-size:14px;word-wrap:break-word;';
    line.innerHTML = html;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }
  function appendSystem(text) {
    appendLine(`<span style="color:var(--sub);font-style:italic;font-size:12px;">[${timestamp()}] ${escapeHtml(text)}</span>`);
  }
  function appendMsg(from, text, mine) {
    appendLine(
      `<span style="color:var(--sub);font-size:11px;">[${timestamp()}]</span> ` +
      `<b style="color:${userColor(from)};">${escapeHtml(from)}${mine ? ' (you)' : ''}:</b> ` +
      `<span>${escapeHtml(text)}</span>`
    );
  }
  function renderUsers() {
    const el = host.querySelector('#chr-users');
    if (!el) return;
    el.innerHTML = '';
    for (const [key, name] of usersByKey) {
      const u = document.createElement('div');
      u.style.cssText = 'padding:4px 8px;font-size:13px;color:' + userColor(name) + ';';
      u.innerText = '● ' + name + (key === myMemberKey ? ' (you)' : '');
      el.appendChild(u);
    }
    const count = host.querySelector('#chr-count');
    if (count) count.innerText = usersByKey.size;
  }

  function buildUI() {
    host.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:stretch;gap:10px;width:100%;max-width:760px;">
        <div style="display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;font-size:13px;">
          <div>Code: <b style="font-family:monospace;letter-spacing:2px;color:#fbbf24;">${code}</b></div>
          <div>Users: <b id="chr-count" style="color:#34d399;">0</b></div>
          <div style="display:flex;gap:6px;">
            <button class="btn secondary" id="chr-copy" style="padding:6px 12px;font-size:12px;">Copy code</button>
            <button class="btn secondary" id="chr-leave" style="padding:6px 12px;font-size:12px;">Leave</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:160px 1fr;gap:10px;height:calc(100vh - 220px);min-height:380px;">
          <div style="background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:8px;overflow-y:auto;">
            <div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;padding:4px 8px;">In room</div>
            <div id="chr-users"></div>
          </div>
          <div style="display:flex;flex-direction:column;background:var(--panel-2);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:0;">
            <div id="chr-log" style="flex:1;padding:10px 14px;overflow-y:auto;min-height:0;"></div>
            <div style="display:flex;gap:6px;padding:8px;border-top:1px solid var(--border);">
              <input id="chr-input" maxlength="500" placeholder="Type a message…" style="flex:1;padding:9px 12px;background:var(--panel);color:#fff;border:1px solid var(--border);border-radius:6px;font-size:14px;min-width:0;">
              <button class="btn" id="chr-send" style="padding:9px 16px;font-size:13px;">Send</button>
            </div>
          </div>
        </div>
      </div>`;

    host.querySelector('#chr-leave').onclick = () => {
      teardown();
      startChat(host);
    };
    host.querySelector('#chr-copy').onclick = (e) => {
      try { navigator.clipboard.writeText(code); e.target.innerText = 'Copied!'; setTimeout(() => { try { e.target.innerText = 'Copy code'; } catch (er) {} }, 1500); } catch (er) {}
    };

    const input = host.querySelector('#chr-input');
    const send = () => {
      const text = (input.value || '').trim();
      if (!text || dead || !myMemberKey) return;
      input.value = '';
      // Local echo so the sender sees their message instantly without
      // waiting for the next poll round-trip to bring it back.
      appendMsg(username, text, true);
      pokeActivity();   // we sent — burst-poll so we catch a quick reply fast
      _appsCall('c-send', { code, id: myMemberKey }, { text }).catch(() => {});
    };
    host.querySelector('#chr-send').onclick = send;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    input.focus();
  }

  function teardown() {
    if (dead) return;
    dead = true;
    if (pollTimer) clearTimeout(pollTimer);
    if (myMemberKey) {
      _appsCall('c-leave', { code, id: myMemberKey }).catch(() => {});
    }
  }

  buildUI();
  appendSystem('Connecting to ' + code + '…');

  (async () => {
    try { await _appsScriptPing(); }
    catch (e) { appendSystem('Could not reach the chat server: ' + (e.message || e)); return; }
    if (dead) return;

    let joinResp;
    try {
      joinResp = await _appsCall('c-join', { code, name: username }, null);
    } catch (e) {
      appendSystem('Could not join the room: ' + (e.message || e));
      return;
    }
    if (!joinResp || !joinResp.ok) {
      appendSystem('Could not join the room: ' + (joinResp && joinResp.error || 'unknown'));
      return;
    }
    myMemberKey = joinResp.id;
    appendSystem('You joined as ' + username + '. Share the code: ' + code);

    // Polling loop: members + new messages
    let consecutiveErrors = 0;
    let polling = false;   // serialize pollOnce — same race as _appsScriptAsConn
    async function pollOnce() {
      if (dead || polling) return;
      polling = true;
      try {
        try {
          const data = await _appsCall('c-poll', { code, id: myMemberKey, since: lastSeq });
          consecutiveErrors = 0;
          if (data.error === 'not_member') {
            appendSystem('You were dropped from the room (timed out).');
            dead = true;
            return;
          }
          if (data.error) {
            appendSystem('Server error: ' + data.error);
            dead = true;
            return;
          }
          // Update member list (rebuild from scratch — server is the source of truth)
          const seenIds = new Set();
          if (Array.isArray(data.members)) {
            for (const m of data.members) {
              if (!usersByKey.has(m.id)) {
                usersByKey.set(m.id, m.name);
                if (m.id !== myMemberKey) appendSystem('→ ' + m.name + ' joined');
              }
              seenIds.add(m.id);
            }
          }
          // Anyone missing from data.members has left
          for (const [id, name] of [...usersByKey]) {
            if (!seenIds.has(id)) {
              usersByKey.delete(id);
              if (id !== myMemberKey) appendSystem('← ' + name + ' left');
            }
          }
          renderUsers();
          // Process new messages
          if (Array.isArray(data.msgs) && data.msgs.length) {
            pokeActivity();   // got something — expect more soon, stay snappy
            for (const m of data.msgs) {
              if (typeof m.seq === 'number' && m.seq > lastSeq) lastSeq = m.seq;
              if (m.fromId === myMemberKey) continue;   // skip our own (already echoed)
              appendMsg(m.from || '?', m.text || '', false);
            }
          }
        } catch (e) {
          consecutiveErrors++;
          if (consecutiveErrors >= 20) {
            appendSystem('Connection lost. Try again later.');
            dead = true;
            return;
          }
        }
      } finally {
        polling = false;
      }
      if (!dead) {
        if (pollTimer) clearTimeout(pollTimer);
        // Same backoff pattern as _appsScriptAsConn — be patient on a flaky
        // school connection instead of hammering and giving up.
        const delay = consecutiveErrors > 0
          ? Math.min(5000, 500 * (1 << Math.min(3, consecutiveErrors)))
          : nextDelay();
        pollTimer = setTimeout(pollOnce, delay);
      }
    }
    pollTimer = setTimeout(pollOnce, 50);
  })();

  activeCleanup = teardown;
}

        border: 1px solid var(--border);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 220px;
      }
      .ask-history-item:hover { color: var(--text); border-color: var(--accent); }
    </style>
    <div style="display:flex;flex-direction:column;width:100%;max-width:720px;gap:14px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:24px;">🔎</span>
        <h2 style="font-size:22px;">Ask</h2>
      </div>
      <div style="display:flex;gap:8px;">
        <input id="ask-input" type="text" placeholder="What's the boiling point of mercury?" maxlength="800" style="flex:1;padding:12px 14px;background:var(--panel-2);color:#fff;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;outline:none;">
        <button class="btn" id="ask-go" style="padding:0 22px;font-size:14px;">Ask</button>
      </div>
      <div id="ask-history" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      <div id="ask-result" style="min-height:60px;"></div>
      <div style="font-size:11px;color:var(--sub);text-align:center;">
        Powered by Groq + Llama 3.1. Answers are AI-generated and may be wrong — verify if it matters.
      </div>
    </div>`;

  const input = host.querySelector('#ask-input');
  const goBtn = host.querySelector('#ask-go');
  const resultEl = host.querySelector('#ask-result');
  const historyEl = host.querySelector('#ask-history');

  function renderHistory() {
    historyEl.innerHTML = '';
    if (!history.length) return;
    const label = document.createElement('div');
    label.style.cssText = 'font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;align-self:center;margin-right:4px;';
    label.innerText = 'Recent:';
    historyEl.appendChild(label);
    for (const q of history.slice(0, 6)) {
      const chip = document.createElement('button');
      chip.className = 'ask-history-item';
      chip.title = q;
      chip.innerText = q;
      chip.addEventListener('click', () => { input.value = q; ask(); });
      historyEl.appendChild(chip);
    }
  }

  function setLoading() {
    resultEl.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'ask-result-card';
    card.style.display = 'flex';
    card.style.alignItems = 'center';
    card.style.gap = '10px';
    card.style.color = 'var(--sub)';
    card.innerHTML = '<div class="ask-spinner"></div> Thinking…';
    resultEl.appendChild(card);
  }
  function setError(msg) {
    resultEl.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'ask-result-card';
    card.style.borderColor = '#ef4444';
    card.style.color = '#ef4444';
    card.style.background = 'rgba(239,68,68,0.08)';
    card.innerText = msg;
    resultEl.appendChild(card);
  }
  function setAnswer(q, answer) {
    resultEl.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'ask-result-card';
    const qDiv = document.createElement('div');
    qDiv.className = 'ask-q';
    qDiv.innerText = 'Q: ' + q;
    const aDiv = document.createElement('div');
    aDiv.innerText = answer;
    card.appendChild(qDiv);
    card.appendChild(aDiv);
    resultEl.appendChild(card);
  }

  async function ask() {
    if (asking) return;
    const q = (input.value || '').trim();
    if (!q) { input.focus(); return; }
    if (q.length > 800) { setError('Question too long (max 800 characters).'); return; }
    const key = (Settings.groqKey || '').trim();
    if (!key) {
      setError('Set your Groq API key in ⚙ Settings first. Free key at console.groq.com.');
      return;
    }
    asking = true;
    goBtn.disabled = true;
    setLoading();
    try {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + key,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          // Fast & free; swap to llama-3.3-70b-versatile for smarter answers if you don't mind ~3x latency.
          model: 'llama-3.1-8b-instant',
          messages: [
            { role: 'system', content: 'You are a concise, helpful answer engine. Reply in 1-3 short paragraphs of plain prose. No headings, no markdown lists unless really helpful. If unsure, say so briefly.' },
            { role: 'user', content: q }
          ],
          max_tokens: 600,
          temperature: 0.3
        })
      });
      if (!r.ok) {
        let detail = '';
        try { const errJson = await r.json(); detail = (errJson && errJson.error && errJson.error.message) || JSON.stringify(errJson); }
        catch (e) { try { detail = (await r.text()).slice(0, 300); } catch (er) {} }
        if (r.status === 401) setError('Groq rejected your API key (401). Check the key in ⚙ Settings.');
        else if (r.status === 429) setError('Rate limited by Groq (429). Wait a bit and try again.');
        else setError('Groq returned ' + r.status + ': ' + detail);
        return;
      }
      const data = await r.json();
      const answer = (data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
      if (!answer) { setError('Empty response from Groq.'); return; }
      setAnswer(q, answer.trim());
      // Bump to the top of history (dedupe)
      history = [q, ...history.filter(x => x !== q)].slice(0, 20);
      saveHistory();
      renderHistory();
    } catch (e) {
      setError('Network error: ' + (e && e.message ? e.message : 'check your connection'));
    } finally {
      asking = false;
      goBtn.disabled = false;
    }
  }

  goBtn.addEventListener('click', ask);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); ask(); }
  });
  renderHistory();
  input.focus();
  activeCleanup = () => {};
}

</script>
</body>
</html>
