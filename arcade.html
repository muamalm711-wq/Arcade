function startPictionaryMP(host, shim) {
  const scope = shim.scope();
  // Skribbl-style heads-up: alternate turns (you draw, opponent guesses).
  // 4 rounds total (each player draws twice).
  const isHost = shim.role === 'host';
  const W = 720, H = 480;
  const COLORS = [
    '#000000','#7f7f7f','#ffffff','#ef4444','#fbbf24','#34d399','#22d3ee','#3b82f6','#a78bfa','#f472b6','#fb923c','#78350f'
  ];
  const SIZES = [{label:'S',v:3},{label:'M',v:7},{label:'L',v:14},{label:'XL',v:24}];
  const ROUND_TIME = 75; // seconds per round
  const PICK_TIME = 15;  // seconds to pick a word
  const NUM_ROUNDS = 4;  // each player draws twice
  const MAX_HINTS = 2;   // letter reveals per round

  // Host owns the word list. Sends to guest at session start.
  let pool = null;
  let usedWords = new Set();

  // Game state
  let roundNum = 0;            // 1..NUM_ROUNDS
  let drawerSide = 'host';     // 'host' or 'guest' — alternates
  let myScore = 0, theirScore = 0;
  let phase = 'lobby';         // 'lobby' | 'pick' | 'draw' | 'reveal' | 'final'
  let currentWord = '';        // only the drawer knows
  let mask = '';               // what the guesser sees: e.g. "_ _ _ _" (with spaces every char)
  let revealedIdx = new Set(); // letter indices the guesser has been hinted
  let timeLeft = ROUND_TIME;
  let pickChoices = [];
  let pickTimeLeft = PICK_TIME;
  let iGuessed = false;
  let theyGuessed = false;
  let timerHandle = null;
  let chatLog = []; // local log

  // Drawing state
  let color = '#000000', brushSize = 7, currentTool = 'brush';
  let drawing = false, lastPt = null, drawStart = null;
  let cv, ctx;

  // ---------- helpers ----------
  function maskFor(word) {
    return word.split('').map(ch => ch === ' ' ? ' ' : '_').join(' ');
  }
  function wordWithReveals(word, revealed) {
    return word.split('').map((ch, i) => revealed.has(i) || ch === ' ' ? ch : '_').join(' ');
  }
  function pickThreeWords() {
    const choices = [];
    while (choices.length < 3) {
      const w = pool[Math.floor(Math.random() * pool.length)];
      if (!usedWords.has(w) && !choices.includes(w)) choices.push(w);
    }
    return choices;
  }

  function renderRoot() {
    host.innerHTML = `
      <div class="game-region">
        <div class="mp-layout">
          <div class="mp-side" style="align-items:stretch;min-width:540px;">
            <div id="pic-header" style="display:flex;justify-content:space-between;align-items:center;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:#fff;">
              <div>Round <b id="pic-round">0</b>/${NUM_ROUNDS}</div>
              <div id="pic-word-display" style="font-family:monospace;letter-spacing:4px;font-size:18px;font-weight:bold;color:#fbbf24;text-align:center;flex:1;"></div>
              <div>Time: <b id="pic-timer" style="color:#34d399;">${ROUND_TIME}</b>s</div>
            </div>
            <div style="display:flex;gap:14px;align-items:center;font-size:12px;color:var(--sub);">
              <div>You: <b id="pic-my-score" style="color:#34d399;">0</b></div>
              <div>Them: <b id="pic-their-score" style="color:#f472b6;">0</b></div>
              <div id="pic-role" style="margin-left:auto;font-weight:bold;color:#6ea8fe;"></div>
            </div>
            <div id="pic-canvas-wrap" style="position:relative;background:white;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
              <canvas id="pic-canvas" width="${W}" height="${H}" style="display:block;cursor:crosshair;max-width:100%;height:auto;"></canvas>
              <div id="pic-overlay" style="position:absolute;inset:0;background:rgba(8,12,20,0.85);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#fff;text-align:center;padding:20px;"></div>
            </div>
            <div id="pic-tools" style="display:none;flex-wrap:wrap;gap:6px;align-items:center;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px;">
              <div id="pic-colors" style="display:flex;gap:3px;"></div>
              <div style="width:1px;height:24px;background:var(--border);"></div>
              <div id="pic-sizes" style="display:flex;gap:3px;"></div>
              <div style="width:1px;height:24px;background:var(--border);"></div>
              <button class="btn secondary" data-pic-tool="brush" style="padding:4px 10px;font-size:12px;">✏️ Brush</button>
              <button class="btn secondary" data-pic-tool="erase" style="padding:4px 10px;font-size:12px;">🧽 Erase</button>
              <button class="btn secondary" data-pic-tool="fill" style="padding:4px 10px;font-size:12px;">🪣 Fill</button>
              <button class="btn secondary" id="pic-clear" style="padding:4px 10px;font-size:12px;">Clear</button>
            </div>
            <div id="pic-status"></div>
          </div>
          <div class="mp-side" id="pic-chat-host" style="min-width:280px;">
            <div class="mp-chat" id="pic-chat" style="min-height:380px;max-height:480px;">
              <div class="mp-chat-title">Guess &amp; Chat</div>
              <div class="mp-chat-log" id="pic-log" style="min-height:280px;max-height:400px;"></div>
              <div class="mp-chat-row">
                <input id="pic-input" maxlength="60" placeholder="Type your guess…" style="flex:1;padding:7px 10px;background:var(--panel);color:#fff;border:1px solid var(--border);border-radius:6px;font-size:13px;">
                <button class="btn" id="pic-send" style="padding:6px 12px;font-size:12px;">Send</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    cv = host.querySelector('#pic-canvas');
    ctx = cv.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, W, H);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    // Build palette
    const colorRow = host.querySelector('#pic-colors');
    for (const c of COLORS) {
      const el = document.createElement('div');
      el.style.cssText = `width:22px;height:22px;border-radius:4px;background:${c};border:2px solid ${c===color?'#6ea8fe':'transparent'};cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.2);`;
      el.dataset.color = c;
      el.onclick = () => { color = c; refreshPaletteSel(); };
      colorRow.appendChild(el);
    }
    const sizeRow = host.querySelector('#pic-sizes');
    for (const s of SIZES) {
      const el = document.createElement('button');
      el.className = 'btn secondary';
      el.style.cssText = `padding:4px 9px;font-size:11px;${s.v===brushSize?'border-color:var(--accent);':''}`;
      el.innerText = s.label;
      el.dataset.size = s.v;
      el.onclick = () => { brushSize = s.v; refreshSizeSel(); };
      sizeRow.appendChild(el);
    }
    function refreshPaletteSel() {
      colorRow.querySelectorAll('div').forEach(d => d.style.borderColor = d.dataset.color === color ? '#6ea8fe' : 'transparent');
    }
    function refreshSizeSel() {
      sizeRow.querySelectorAll('button').forEach(b => b.style.borderColor = Number(b.dataset.size) === brushSize ? 'var(--accent)' : 'var(--border)');
    }
    // Tool buttons
    host.querySelectorAll('[data-pic-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTool = btn.dataset.picTool;
        host.querySelectorAll('[data-pic-tool]').forEach(b => b.style.borderColor = b.dataset.picTool === currentTool ? 'var(--accent)' : 'var(--border)');
      });
    });
    host.querySelector('#pic-clear').onclick = () => {
      if (!isMyDrawTurn()) return;
      ctx.fillStyle = 'white'; ctx.fillRect(0,0,W,H);
      try { shim.emit('game', { type: 'pic-clear' }); } catch (e) {}
    };
    // Canvas events
    function pos(e) {
      const rect = cv.getBoundingClientRect();
      const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
      return [(t.clientX - rect.left) * (W/rect.width), (t.clientY - rect.top) * (H/rect.height)];
    }
    function startStroke(ev) {
      if (!isMyDrawTurn() || phase !== 'draw') return;
      if (ev.cancelable) ev.preventDefault();
      const p = pos(ev);
      if (currentTool === 'fill') { floodFill(p[0], p[1], color); try { shim.emit('game', { type: 'pic-fill', x: p[0], y: p[1], color }); } catch (e) {} return; }
      drawing = true; lastPt = p; drawStart = p;
      strokeDot(p[0], p[1], color, brushSize, currentTool === 'erase');
      try { shim.emit('game', { type: 'pic-stroke', kind: 'dot', x: p[0], y: p[1], c: color, s: brushSize, e: currentTool === 'erase' ? 1 : 0 }); } catch (e) {}
    }
    function moveStroke(ev) {
      if (!drawing || !isMyDrawTurn()) return;
      if (ev.cancelable) ev.preventDefault();
      const p = pos(ev);
      strokeLine(lastPt[0], lastPt[1], p[0], p[1], color, brushSize, currentTool === 'erase');
      try { shim.emit('game', { type: 'pic-stroke', kind: 'line', x1: lastPt[0], y1: lastPt[1], x2: p[0], y2: p[1], c: color, s: brushSize, e: currentTool === 'erase' ? 1 : 0 }); } catch (e) {}
      lastPt = p;
    }
    function endStroke() { drawing = false; lastPt = null; }
    cv.addEventListener('mousedown', startStroke);
    cv.addEventListener('mousemove', moveStroke);
    cv.addEventListener('mouseup', endStroke);
    cv.addEventListener('mouseleave', endStroke);
    cv.addEventListener('touchstart', startStroke, { passive: false });
    cv.addEventListener('touchmove', moveStroke, { passive: false });
    cv.addEventListener('touchend', endStroke);
    cv.addEventListener('touchcancel', endStroke);
    // Chat / guess input
    host.querySelector('#pic-send').addEventListener('click', sendChatOrGuess);
    host.querySelector('#pic-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); sendChatOrGuess(); }
    });
    // Restore chat log
    for (const entry of chatLog) appendLog(entry.cls, entry.html);
  }
  function strokeDot(x, y, c, s, erase) {
    ctx.fillStyle = erase ? 'white' : c;
    ctx.beginPath(); ctx.arc(x, y, s/2, 0, Math.PI*2); ctx.fill();
  }
  function strokeLine(x1, y1, x2, y2, c, s, erase) {
    ctx.strokeStyle = erase ? 'white' : c;
    ctx.lineWidth = s; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  function floodFill(sx, sy, fillColor) {
    sx = sx|0; sy = sy|0;
    if (sx < 0 || sx >= W || sy < 0 || sy >= H) return;
    const img = ctx.getImageData(0, 0, W, H);
    const d = img.data;
    function getRGBA(hex) {
      if (hex.length === 4) hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16), 255];
    }
    const fr = getRGBA(fillColor);
    const i0 = (sy * W + sx) * 4;
    const sr = d[i0], sg = d[i0+1], sb = d[i0+2], sa = d[i0+3];
    if (sr === fr[0] && sg === fr[1] && sb === fr[2] && sa === fr[3]) return;
    const stack = [[sx, sy]];
    while (stack.length) {
      const [px, py] = stack.pop();
      if (px < 0 || px >= W || py < 0 || py >= H) continue;
      const i = (py * W + px) * 4;
      if (d[i] !== sr || d[i+1] !== sg || d[i+2] !== sb || d[i+3] !== sa) continue;
      d[i] = fr[0]; d[i+1] = fr[1]; d[i+2] = fr[2]; d[i+3] = fr[3];
      stack.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
    }
    ctx.putImageData(img, 0, 0);
  }
  function clearCanvas() {
    if (!ctx) return;
    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, W, H);
  }

  function isMyDrawTurn() { return phase === 'draw' && drawerSide === (isHost ? 'host' : 'guest'); }
  function isMyGuessTurn() { return phase === 'draw' && drawerSide !== (isHost ? 'host' : 'guest'); }

  // ---------- chat / guesses ----------
  function appendLog(cls, html) {
    const log = host.querySelector('#pic-log'); if (!log) return;
    const line = document.createElement('div');
    line.className = 'mp-chat-line ' + (cls || '');
    line.innerHTML = html;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }
  function logSystem(text, kind) {
    const cls = 'sys' + (kind === 'win' ? ' win' : kind === 'bad' ? ' bad' : '');
    chatLog.push({ cls, html: escapeHtml(text) });
    appendLog(cls, escapeHtml(text));
  }
  function logChat(from, text) {
    const cls = from === 'you' ? 'you' : 'them';
    const html = `<b>${from === 'you' ? 'You' : 'Them'}:</b> ${escapeHtml(text)}`;
    chatLog.push({ cls, html });
    appendLog(cls, html);
  }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function sendChatOrGuess() {
    const inp = host.querySelector('#pic-input');
    const v = (inp.value || '').trim();
    if (!v) return;
    inp.value = '';
    if (isMyGuessTurn() && !iGuessed) {
      // Treat as a guess
      const guess = v.toLowerCase();
      if (guess === currentWordOrEmpty()) return; // shouldn't happen — guesser doesn't know
      try { shim.emit('game', { type: 'pic-guess', text: v }); } catch (e) {}
      logChat('you', v);
    } else {
      // Free chat (drawer or after guessed)
      try { shim.emit('chat', v); } catch (e) {}
    }
  }
  function currentWordOrEmpty() { return iGuessed ? currentWord : ''; }

  // ---------- round flow ----------
  function setHeader() {
    const r = host.querySelector('#pic-round'); if (r) r.innerText = roundNum;
    const ms = host.querySelector('#pic-my-score'); if (ms) ms.innerText = myScore;
    const ts = host.querySelector('#pic-their-score'); if (ts) ts.innerText = theirScore;
    const role = host.querySelector('#pic-role');
    if (role) {
      if (phase === 'draw') role.innerText = isMyDrawTurn() ? '✏️ You\'re drawing' : '🤔 They\'re drawing';
      else if (phase === 'pick') role.innerText = drawerSide === (isHost ? 'host' : 'guest') ? '✏️ Pick a word' : '⏳ Waiting…';
      else role.innerText = '';
    }
    const wd = host.querySelector('#pic-word-display');
    if (wd) {
      if (phase === 'draw') {
        if (isMyDrawTurn()) wd.innerHTML = `Draw: <span style="color:#fff;">${escapeHtml(currentWord.toUpperCase())}</span>`;
        else wd.innerText = mask;
      } else if (phase === 'reveal') {
        wd.innerHTML = `Word was: <span style="color:#fff;">${escapeHtml(currentWord.toUpperCase())}</span>`;
      } else wd.innerText = '';
    }
    const tEl = host.querySelector('#pic-timer');
    if (tEl) tEl.innerText = Math.max(0, Math.ceil(timeLeft));
  }
  function showOverlay(html) {
    const ov = host.querySelector('#pic-overlay');
    if (!ov) return;
    if (html === false) { ov.style.display = 'none'; return; }
    ov.style.display = 'flex';
    ov.innerHTML = html;
  }
  function setToolsVisible(yes) {
    const tools = host.querySelector('#pic-tools');
    if (tools) tools.style.display = yes ? 'flex' : 'none';
  }

  function nextRound() {
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    if (roundNum >= NUM_ROUNDS) { finalizeMatch(); return; }
    roundNum++;
    drawerSide = (roundNum % 2 === 1) ? 'host' : 'guest';
    iGuessed = false; theyGuessed = false;
    revealedIdx = new Set();
    currentWord = ''; mask = '';
    clearCanvas();
    phase = 'pick';
    setHeader();
    setToolsVisible(false);
    if (isHost && drawerSide === 'host' || !isHost && drawerSide === 'guest') {
      // I'm the drawer — pick a word
      pickChoices = pickThreeWords();
      pickTimeLeft = PICK_TIME;
      showOverlay(`<div style="font-size:20px;font-weight:bold;">Pick a word to draw</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
          ${pickChoices.map((w, i) => `<button class="btn" data-pick="${i}" style="font-size:16px;text-transform:capitalize;">${escapeHtml(w)}</button>`).join('')}
        </div>
        <div style="font-size:13px;color:#fbbf24;">Auto-picks in <b id="pic-picktime">${PICK_TIME}</b>s</div>`);
      host.querySelectorAll('[data-pick]').forEach(b => b.onclick = () => chooseWord(pickChoices[Number(b.dataset.pick)]));
      // pick countdown
      timerHandle = setInterval(() => {
        pickTimeLeft -= 1;
        const pt = host.querySelector('#pic-picktime'); if (pt) pt.innerText = Math.max(0, pickTimeLeft);
        if (pickTimeLeft <= 0) { chooseWord(pickChoices[Math.floor(Math.random()*pickChoices.length)]); }
      }, 1000);
    } else {
      // I'm the guesser
      showOverlay(`<div style="font-size:18px;">Round ${roundNum}/${NUM_ROUNDS}</div><div>Opponent is picking a word…</div>`);
    }
  }
  function chooseWord(word) {
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    currentWord = word.toLowerCase();
    usedWords.add(currentWord);
    mask = maskFor(currentWord);
    try { shim.emit('game', { type: 'pic-word', len: currentWord.length, mask }); } catch (e) {}
    startDrawingPhase();
  }
  function startDrawingPhase() {
    phase = 'draw';
    timeLeft = ROUND_TIME;
    showOverlay(false);
    setToolsVisible(isMyDrawTurn());
    setHeader();
    if (timerHandle) clearInterval(timerHandle);
    let elapsed = 0;
    timerHandle = setInterval(() => {
      timeLeft -= 1; elapsed += 1;
      if (timeLeft <= 0) { endRound('timeout'); return; }
      // Hint reveals at ROUND_TIME*0.4 and ROUND_TIME*0.7
      if (isMyDrawTurn()) {
        const reveals = revealedIdx.size;
        if (reveals < MAX_HINTS) {
          const threshold = ROUND_TIME - (ROUND_TIME * (reveals + 1) / (MAX_HINTS + 1));
          if (timeLeft <= threshold) revealHint();
        }
      }
      setHeader();
    }, 1000);
  }
  function revealHint() {
    const indices = [];
    for (let i = 0; i < currentWord.length; i++) if (currentWord[i] !== ' ' && !revealedIdx.has(i)) indices.push(i);
    if (!indices.length) return;
    const idx = indices[Math.floor(Math.random() * indices.length)];
    revealedIdx.add(idx);
    try { shim.emit('game', { type: 'pic-hint', idx }); } catch (e) {}
  }
  function endRound(reason, opts) {
    if (phase === 'reveal' || phase === 'final') return;
    // capture BEFORE the phase change because isMyDrawTurn() requires phase==='draw'
    const iWasDrawer = drawerSide === (isHost ? 'host' : 'guest');
    phase = 'reveal';
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    // The drawer broadcasts the round-end so the guesser can sync to 'reveal'.
    if (iWasDrawer && (!opts || !opts.fromWire)) {
      try { shim.emit('game', { type: 'pic-end', reason: reason || 'timeout', word: currentWord, myScore, theirScore }); } catch (e) {}
    }
    setHeader();
    showOverlay(`<div style="font-size:24px;font-weight:bold;">${reason==='guessed'?'Correct!':'Time\'s up!'}</div>
      <div style="font-size:18px;">The word was <span style="color:#fbbf24;font-weight:bold;text-transform:capitalize;">${escapeHtml(currentWord)}</span></div>
      <div style="font-size:14px;color:var(--sub);">You: ${myScore} · Them: ${theirScore}</div>
      <div style="font-size:13px;color:var(--sub);">Next round in 4s…</div>`);
    setToolsVisible(false);
    setTimeout(() => { if (phase === 'reveal') nextRound(); }, 4000);
  }
  function finalizeMatch() {
    phase = 'final';
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    setHeader();
    const kind = myScore > theirScore ? 'win' : myScore < theirScore ? 'lose' : 'draw';
    const title = kind === 'win' ? 'You win!' : kind === 'lose' ? 'You lose' : 'Tie';
    showOverlay(`<div style="font-size:28px;font-weight:bold;">${title}</div>
      <div style="font-size:18px;">Final · You: ${myScore} · Them: ${theirScore}</div>`);
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title, sub: `You: ${myScore} · Them: ${theirScore}`, kind, dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 800);
  }
  let rematchUI = null;

  // ---------- wire handlers ----------
  scope.on('game', (m) => {
    if (!m) return;
    if (m.type === 'pic-pool' && Array.isArray(m.list)) {
      if (!pool) {
        pool = m.list.slice();
        // Both ready — host starts the first round
        if (isHost) nextRound();
      }
      return;
    }
    if (m.type === 'pic-ready') {
      // Guest is ready; if host has pool, start
      if (isHost && pool) nextRound();
      return;
    }
    if (m.type === 'pic-word') {
      // Guesser side — drawer just chose a word
      mask = m.mask || '';
      currentWord = ''; // unknown to guesser
      // Phase becomes 'draw' on guesser side too
      revealedIdx = new Set();
      iGuessed = false; theyGuessed = false;
      phase = 'draw';
      timeLeft = ROUND_TIME;
      showOverlay(false);
      setToolsVisible(false);
      setHeader();
      if (timerHandle) clearInterval(timerHandle);
      timerHandle = setInterval(() => {
        timeLeft -= 1;
        if (timeLeft <= 0) { /* drawer will declare end */ if (timerHandle) { clearInterval(timerHandle); timerHandle = null; } }
        setHeader();
      }, 1000);
      return;
    }
    if (m.type === 'pic-stroke') {
      if (isMyDrawTurn()) return; // ignore — I'm the drawer (shouldn't receive)
      if (m.kind === 'dot') strokeDot(m.x, m.y, m.c, m.s, !!m.e);
      else if (m.kind === 'line') strokeLine(m.x1, m.y1, m.x2, m.y2, m.c, m.s, !!m.e);
      return;
    }
    if (m.type === 'pic-fill') {
      if (isMyDrawTurn()) return;
      floodFill(m.x, m.y, m.color);
      return;
    }
    if (m.type === 'pic-clear') { clearCanvas(); return; }
    if (m.type === 'pic-hint') {
      // Guesser side — reveal letter index
      if (typeof m.idx === 'number' && currentWord) {
        // Drawer side already knows
      }
      // For guesser, mask gets letter inserted
      if (typeof m.idx === 'number') {
        revealedIdx.add(m.idx);
        // We need to know what letter — but guesser doesn't know the word; drawer must include the letter
      }
      return;
    }
    if (m.type === 'pic-hint-letter') {
      // Drawer sends {idx, letter} so guesser can update the mask in place
      if (typeof m.idx === 'number' && typeof m.letter === 'string') {
        revealedIdx.add(m.idx);
        const arr = mask.split(' ');
        if (arr[m.idx] !== undefined) {
          arr[m.idx] = m.letter.toUpperCase();
          mask = arr.join(' ');
          setHeader();
          logSystem(`Hint: a letter was revealed.`);
        }
      }
      return;
    }
    if (m.type === 'pic-guess') {
      // Drawer side — receive guess from guesser
      if (!isMyDrawTurn() || phase !== 'draw') return;
      const text = String(m.text || '').trim();
      const isCorrect = text.toLowerCase() === currentWord;
      if (isCorrect) {
        // Award points: guesser gets 100 + speed bonus, drawer 50 + speed bonus
        const speedBonus = Math.max(0, Math.round(timeLeft * 1.5));
        // Drawer's "their" is guesser
        theirScore += 100 + speedBonus;
        myScore += 50 + Math.round(speedBonus / 2);
        try { shim.emit('game', { type: 'pic-correct', guesserPts: 100 + speedBonus, drawerPts: 50 + Math.round(speedBonus/2), word: currentWord }); } catch (e) {}
        logSystem(`✓ Opponent guessed it! "${currentWord}" — they +${100+speedBonus}, you +${50+Math.round(speedBonus/2)}`, 'win');
        endRound('guessed');
      } else {
        // Forward "incorrect guess" to chat as them: text
        logChat('them', text);
      }
      return;
    }
    if (m.type === 'pic-correct') {
      // Guesser side — I got it!
      iGuessed = true;
      currentWord = String(m.word || '');
      myScore += Number(m.guesserPts) || 0;
      theirScore += Number(m.drawerPts) || 0;
      logSystem(`✓ You guessed it! +${m.guesserPts} (drawer +${m.drawerPts})`, 'win');
      setHeader();
      // drawer will follow up with pic-end
    }
    if (m.type === 'pic-end') {
      // Guesser side — drawer announced round end (timeout or guessed)
      currentWord = String(m.word || currentWord);
      // Reconcile scores from authoritative drawer (drawer's perspective is mirrored:
      // their `myScore` is our `theirScore` and vice versa)
      if (typeof m.myScore === 'number' && typeof m.theirScore === 'number') {
        theirScore = m.myScore; myScore = m.theirScore;
      }
      endRound(m.reason || 'timeout', { fromWire: true });
    }
  });
  // Re-route the chat channel from the shim to OUR log too
  scope.on('chat', (p) => { if (p && p.text) logChat(p.from, p.text); });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    startPictionaryMP(host, shim);
  });
  scope.on('closed', () => {
    if (phase === 'final') return;
    phase = 'final';
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    logSystem('Opponent disconnected.', 'bad');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Opponent left.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startDraw(host)
      });
    }, 250);
  });

  // Override revealHint to also send the letter (drawer knows the word)
  const originalRevealHint = revealHint;
  revealHint = function () {
    const indices = [];
    for (let i = 0; i < currentWord.length; i++) if (currentWord[i] !== ' ' && !revealedIdx.has(i)) indices.push(i);
    if (!indices.length) return;
    const idx = indices[Math.floor(Math.random() * indices.length)];
    revealedIdx.add(idx);
    try { shim.emit('game', { type: 'pic-hint-letter', idx, letter: currentWord[idx] }); } catch (e) {}
    logSystem(`Hint sent: ${currentWord[idx].toUpperCase()} at position ${idx+1}.`);
  };

  // Build UI
  renderRoot();
  showOverlay('<div style="font-size:18px;">Connecting…</div>');
  // Bootstrap
  if (isHost) {
    // Send word pool to guest
    const list = [];
    for (let i = 0; i < 50; i++) {
      const w = PICTIONARY_WORDS[Math.floor(Math.random() * PICTIONARY_WORDS.length)];
      if (!list.includes(w)) list.push(w);
    }
    pool = list;
    try { shim.emit('game', { type: 'pic-pool', list }); } catch (e) {}
    // Guest's pic-ready will trigger nextRound, but guest may already be loaded — start after small delay
    setTimeout(() => { if (pool && roundNum === 0) nextRound(); }, 800);
  } else {
    try { shim.emit('game', { type: 'pic-ready' }); } catch (e) {}
    showOverlay('<div style="font-size:18px;">Waiting for host to start…</div>');
  }

  activeCleanup = () => {
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}

/* ============================================================
   FRUIT MERGE (Suika) — drop fruits, same-tier merge into next
   ============================================================ */
function startFruit(host) {
  const W = 420, H = 600;
  const TOP_LIMIT = 80;     // y above which is the "drop zone" (no game-over)
  const DEATH_Y = 90;       // if a settled fruit's top is above this for a while: game over
  // 11 tiers
  const TIERS = [
    { r: 14, color: '#ef4444', emoji: '🍒', name: 'Cherry' },
    { r: 19, color: '#f43f5e', emoji: '🍓', name: 'Strawberry' },
    { r: 25, color: '#a855f7', emoji: '🍇', name: 'Grape' },
    { r: 31, color: '#fb923c', emoji: '🍊', name: 'Orange' },
    { r: 37, color: '#facc15', emoji: '🍋', name: 'Lemon' },
    { r: 45, color: '#dc2626', emoji: '🍎', name: 'Apple' },
    { r: 54, color: '#84cc16', emoji: '🍐', name: 'Pear' },
    { r: 64, color: '#fb7185', emoji: '🍑', name: 'Peach' },
    { r: 76, color: '#eab308', emoji: '🍍', name: 'Pineapple' },
    { r: 92, color: '#22c55e', emoji: '🍈', name: 'Melon' },
    { r: 110, color: '#16a34a', emoji: '🍉', name: 'Watermelon' }
  ];
  const G = 0.42;          // base gravity
  const REST = 0.14;       // wall bounce restitution
  const FRICTION = 0.985;
  // Per-tier physics: bigger fruits feel heavier — more gravity, less air damp,
  // less bounciness. Mass = r² (area).
  function massOf(tier) { const r = TIERS[tier].r; return r * r; }
  // Bigger fruit falls noticeably harder (up to ~2.2× base gravity at watermelon)
  function gravityOf(tier) { const r = TIERS[tier].r; return G * (1 + (r - 14) / 80); }
  // Smaller fruit has more air drag (settles & dances around big fruit);
  // big fruit is mostly drag-free.
  function dampOf(tier) { const r = TIERS[tier].r; return 0.990 + (r / 110) * 0.009; }
  let fruits, nextTier, hoverX, score, raf, dead, ended, dropCooldown, flashes;

  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:row;gap:18px;align-items:flex-start;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <canvas id="fm" width="${W}" height="${H}" style="background:#fef9c3;border-radius:12px;cursor:none;border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,0.35);"></canvas>
        <div style="font-size:11px;color:var(--sub);">Move mouse, click to drop. Same fruits merge.</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;min-width:170px;">
        <div class="game-panel" style="background:var(--panel-2);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;">Score</div>
          <div id="fm-score" style="font-size:28px;font-weight:800;">0</div>
        </div>
        <div class="game-panel" style="background:var(--panel-2);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Next</div>
          <canvas id="fm-next" width="80" height="80" style="display:block;margin:0 auto;"></canvas>
        </div>
        <div class="game-panel" style="background:var(--panel-2);padding:10px;border-radius:10px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--sub);margin-bottom:6px;">Tiers</div>
          <div id="fm-tiers" style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;font-size:18px;text-align:center;"></div>
        </div>
        <button class="btn" id="fm-reset">Reset</button>
      </div>
    </div>
  `;
  const cv = host.querySelector('#fm');
  const ctx = cv.getContext('2d');
  const nextCv = host.querySelector('#fm-next');
  const nextCtx = nextCv.getContext('2d');
  // Tiers display
  const tiersEl = host.querySelector('#fm-tiers');
  TIERS.forEach((t, i) => {
    const d = document.createElement('div');
    d.style.cssText = 'padding:4px;background:var(--panel);border-radius:6px;';
    d.textContent = t.emoji;
    d.title = `Tier ${i+1}: ${t.name}`;
    tiersEl.appendChild(d);
  });

  function reset() {
    fruits = [];
    score = 0; dead = false; ended = false; dropCooldown = 0; flashes = [];
    nextTier = randSpawnTier();
    hoverX = W/2;
    updateScore();
    drawNext();
  }
  function randSpawnTier() {
    // Spawn one of the smallest 4 tiers
    return Math.floor(Math.random() * 4);
  }
  function updateScore() { host.querySelector('#fm-score').innerText = score; }
  function drawNext() {
    nextCtx.clearRect(0, 0, 80, 80);
    const t = TIERS[nextTier];
    const r = Math.min(34, t.r);
    drawFruit(nextCtx, 40, 40, r, t);
  }
  function drawFruit(c, x, y, r, t, rot = 0) {
    c.save();
    c.translate(x, y);
    c.rotate(rot);
    // Soft body with radial gradient
    const grad = c.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, lightenColor(t.color, 0.4));
    grad.addColorStop(1, t.color);
    c.fillStyle = grad;
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.strokeStyle = darkenColor(t.color, 0.4);
    c.lineWidth = 2;
    c.stroke();
    // Highlight
    c.fillStyle = 'rgba(255,255,255,0.35)';
    c.beginPath(); c.ellipse(-r*0.35, -r*0.4, r*0.25, r*0.15, -0.5, 0, Math.PI*2); c.fill();
    // Emoji center
    c.font = `${Math.floor(r*1.15)}px serif`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(t.emoji, 0, r*0.05);
    c.restore();
  }
  function lightenColor(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, ((n>>16)&255) + 255*amt);
    const g = Math.min(255, ((n>>8)&255) + 255*amt);
    const b = Math.min(255, (n&255) + 255*amt);
    return `rgb(${r|0},${g|0},${b|0})`;
  }
  function darkenColor(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, ((n>>16)&255) * (1-amt));
    const g = Math.max(0, ((n>>8)&255) * (1-amt));
    const b = Math.max(0, (n&255) * (1-amt));
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  function drop(x) {
    if (dead || dropCooldown > 0) return;
    const t = TIERS[nextTier];
    fruits.push({
      x: Math.max(t.r + 2, Math.min(W - t.r - 2, x)),
      y: TOP_LIMIT - t.r - 4,
      vx: 0, vy: 0,
      tier: nextTier,
      rot: 0, vrot: 0,
      settledTime: 0,
      birth: performance.now()
    });
    sfx('drop');
    nextTier = randSpawnTier();
    drawNext();
    dropCooldown = 18;
  }

  function step() {
    if (pauseCtl.isPaused()) { raf = requestAnimationFrame(step); return; }
    if (!dead) {
      if (dropCooldown > 0) dropCooldown--;
      // Physics integration — heavier fruits get more gravity & less air drag
      for (const f of fruits) {
        f.vy += gravityOf(f.tier);
        const d = dampOf(f.tier);
        f.vx *= d; f.vy *= d;
        f.x += f.vx; f.y += f.vy;
        f.rot += f.vrot;
        f.vrot *= 0.94;
        const r = TIERS[f.tier].r;
        // Walls — bigger fruits bounce less (heavier feels duller)
        const wallRest = REST * (1 - Math.min(0.6, r / 200));
        if (f.x - r < 0) { f.x = r; f.vx = -f.vx * wallRest; f.vrot += 0.02; }
        if (f.x + r > W) { f.x = W - r; f.vx = -f.vx * wallRest; f.vrot -= 0.02; }
        // Floor
        if (f.y + r > H - 8) {
          f.y = H - 8 - r;
          if (f.vy > 0) f.vy = -f.vy * wallRest;
          // Bigger fruits have more friction with the floor (settle faster)
          f.vx *= FRICTION - r * 0.0006;
        }
      }
      // Collision resolve (multiple iterations for stability)
      for (let iter = 0; iter < 4; iter++) {
        for (let i = 0; i < fruits.length; i++) {
          for (let j = i+1; j < fruits.length; j++) {
            const a = fruits[i], b = fruits[j];
            if (!a || !b || a._dead || b._dead) continue;
            const ar = TIERS[a.tier].r, br = TIERS[b.tier].r;
            let dx = b.x - a.x, dy = b.y - a.y;
            let dist = Math.hypot(dx, dy);
            const minDist = ar + br;
            // Coincident centers — nudge apart along arbitrary axis
            if (dist < 0.001) {
              dx = (Math.random() - 0.5) * 0.5;
              dy = -1; // prefer pushing up
              dist = Math.hypot(dx, dy);
            }
            if (dist < minDist) {
              // Same-tier merge
              if (a.tier === b.tier && performance.now() - Math.max(a.birth, b.birth) > 60) {
                if (a.tier < TIERS.length - 1) {
                  // Merge into next tier
                  const nt = a.tier + 1;
                  const nx = (a.x + b.x) / 2, ny = (a.y + b.y) / 2;
                  flashes.push({ x: nx, y: ny, r: TIERS[nt].r, life: 24, color: TIERS[nt].color });
                  a._dead = true; b._dead = true;
                  fruits.push({
                    x: nx, y: ny,
                    vx: (a.vx + b.vx) / 2,
                    vy: (a.vy + b.vy) / 2 - 1.5,
                    tier: nt,
                    rot: 0, vrot: 0,
                    birth: performance.now()
                  });
                  score += (nt + 1) * 10;
                  updateScore();
                  sfx('merge');
                } else {
                  // Watermelon + Watermelon = special big bonus, both vanish
                  flashes.push({ x: (a.x+b.x)/2, y: (a.y+b.y)/2, r: 80, life: 40, color: '#fde047' });
                  a._dead = true; b._dead = true;
                  score += 1000;
                  updateScore();
                  sfx('win');
                }
                continue;
              }
              const mA = massOf(a.tier), mB = massOf(b.tier);
              const totalM = mA + mB;
              const overlap = (minDist - dist);
              const nx = dx / dist, ny = dy / dist;
              // Position separation: split nearly equally with a slight bias
              // toward the lighter fruit. Equal split keeps stability — extreme
              // mass ratios (98:2) push small fruit through walls.
              const aShare = 0.35 + 0.30 * (mB / totalM); // [0.35, 0.65]
              const bShare = 1 - aShare;
              a.x -= nx * overlap * aShare;
              a.y -= ny * overlap * aShare;
              b.x += nx * overlap * bShare;
              b.y += ny * overlap * bShare;
              // Re-clamp to walls/floor immediately so nothing escapes the box
              if (a.x - ar < 0) a.x = ar;
              if (a.x + ar > W) a.x = W - ar;
              if (a.y + ar > H - 8) a.y = H - 8 - ar;
              if (b.x - br < 0) b.x = br;
              if (b.x + br > W) b.x = W - br;
              if (b.y + br > H - 8) b.y = H - 8 - br;
              // Velocity exchange along normal. Apply ONLY when fruits are
              // closing (va - vb > 0 with n pointing a→b). When already
              // separating, leave velocities alone so contacts don't pump
              // energy back in (that's what made them "magnetic" before).
              const va = a.vx * nx + a.vy * ny;
              const vb = b.vx * nx + b.vy * ny;
              if (va - vb > 0) {
                const e = 0.30; // restitution — soft fruit bounce
                const vaNew = (mA * va + mB * vb - mB * (va - vb) * e) / totalM;
                const vbNew = (mA * va + mB * vb + mA * (va - vb) * e) / totalM;
                const dva = vaNew - va;
                const dvb = vbNew - vb;
                a.vx += nx * dva; a.vy += ny * dva;
                b.vx += nx * dvb; b.vy += ny * dvb;
              }
            }
          }
        }
      }
      // No collision-driven spin. Spin only comes from wall hits + initial
      // drop. With many neighbors, contact rotation accumulates into a frenzy
      // — fruits don't need to spin to look good (they're round).
      fruits = fruits.filter(f => !f._dead);
      // Game over check: any fruit settled with top above DEATH_Y
      for (const f of fruits) {
        const r = TIERS[f.tier].r;
        const speed = Math.hypot(f.vx, f.vy);
        if (speed < 0.3 && f.y - r < DEATH_Y && performance.now() - f.birth > 800) {
          f.settledTime = (f.settledTime || 0) + 1;
          if (f.settledTime > 60) {
            dead = true;
            if (!ended) {
              ended = true;
              setTimeout(() => {
                showResult(host.querySelector('.game-region'), {
                  title: 'Overflow!',
                  sub: 'Score: ' + score,
                  kind: score >= 1000 ? 'win' : 'lose',
                  onRetry: reset
                });
              }, 350);
            }
          }
        } else {
          f.settledTime = 0;
        }
      }
    }
    // Flashes update
    for (const fl of flashes) fl.life--;
    flashes = flashes.filter(fl => fl.life > 0);

    // Render
    ctx.fillStyle = '#fef9c3';
    ctx.fillRect(0, 0, W, H);
    // Death line
    ctx.strokeStyle = 'rgba(220,38,38,0.5)';
    ctx.setLineDash([6, 4]); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, DEATH_Y); ctx.lineTo(W, DEATH_Y); ctx.stroke();
    ctx.setLineDash([]);
    // Container walls (visual)
    ctx.strokeStyle = '#a16207'; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(2, 0); ctx.lineTo(2, H - 4);
    ctx.lineTo(W - 2, H - 4); ctx.lineTo(W - 2, 0);
    ctx.stroke();
    // Aim line + ghost preview
    if (!dead) {
      const t = TIERS[nextTier];
      const aimX = Math.max(t.r + 2, Math.min(W - t.r - 2, hoverX));
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.setLineDash([4, 4]); ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(aimX, 0); ctx.lineTo(aimX, H); ctx.stroke();
      ctx.setLineDash([]);
      // Ghost preview at top
      ctx.globalAlpha = 0.6;
      drawFruit(ctx, aimX, TOP_LIMIT - t.r - 4, t.r, t);
      ctx.globalAlpha = 1;
    }
    // Fruits
    for (const f of fruits) {
      const t = TIERS[f.tier];
      drawFruit(ctx, f.x, f.y, t.r, t, f.rot);
    }
    // Flashes
    for (const fl of flashes) {
      ctx.globalAlpha = fl.life / 24;
      ctx.strokeStyle = fl.color;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(fl.x, fl.y, fl.r * (1 + (24 - fl.life) / 24), 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    raf = requestAnimationFrame(step);
  }

  function updateHoverFromEvent(e) {
    const rect = cv.getBoundingClientRect();
    const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
    hoverX = (t.clientX - rect.left) * (W / rect.width);
  }
  cv.addEventListener('mousemove', updateHoverFromEvent);
  cv.addEventListener('click', () => drop(hoverX));
  // Touch: tap to set hover and drop. Drag to reposition before lift.
  cv.addEventListener('touchstart', (e) => { e.preventDefault(); updateHoverFromEvent(e); }, { passive: false });
  cv.addEventListener('touchmove', (e) => { e.preventDefault(); updateHoverFromEvent(e); }, { passive: false });
  cv.addEventListener('touchend', (e) => { e.preventDefault(); drop(hoverX); }, { passive: false });
  host.querySelector('#fm-reset').addEventListener('click', reset);

  const pauseCtl = attachPause(host);
  reset();
  step();
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

/* ============================================================
   SPIN CLICK — pin spins, click when on target. Gets faster.
   ============================================================ */
function startBeat(host) {
  const W = 520, H = 520;
  const targetArc = 0.18;     // half-width of the yellow arc, in radians
  const baseSpeed = 0.7;      // rad/s at level 0 — about 9 sec/revolution
  const speedStep = 0.12;     // rad/s added per successful hit
  const minNewArc = 1.0;      // min angular distance pin must travel to next target
  let raf = null;
  let playing = false;
  let dead = false;
  let level = 0;
  let combo = 0, maxCombo = 0;
  let pinAngle = -Math.PI / 2;
  let pinDir = 1;             // +1 or -1
  let speed = baseSpeed;
  let targetAngle = 0;
  let lives = 3;
  let popups = [];
  let flashes = [];           // hit ripples
  let lastT = 0;
  let armed = false;          // before first click; pin doesn't move

  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="display:flex;gap:24px;align-items:center;font-size:14px;">
        <div>Level: <b id="bt-level" style="color:var(--good);">0</b></div>
        <div>Combo: <b id="bt-combo">0</b></div>
        <div>Lives: <b id="bt-lives" style="color:#f87171;">♥♥♥</b></div>
        <div>Best: <b id="bt-best">—</b></div>
      </div>
      <canvas id="bt" width="${W}" height="${H}" style="background:#0f1623;border-radius:50%;border:2px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,0.5);cursor:pointer;"></canvas>
      <div id="bt-info" style="font-size:12px;color:var(--sub);text-align:center;max-width:480px;">
        Click anywhere or press Space when the red pin lands on the yellow target. Each hit makes it faster — and the direction flips.
      </div>
    </div>
  `;
  const cv = host.querySelector('#bt');
  const ctx = cv.getContext('2d');

  // Persist best across sessions in this tab
  let best = 0;
  try { const s = localStorage.getItem('finallycue_spinclick_best'); if (s) best = parseInt(s, 10) || 0; } catch (e) {}

  function angDiff(a, b) {
    let d = a - b;
    while (d > Math.PI) d -= 2 * Math.PI;
    while (d < -Math.PI) d += 2 * Math.PI;
    return d;
  }

  function newTarget() {
    // Pick a random angle that is at least minNewArc rad from the pin
    let cand;
    for (let i = 0; i < 12; i++) {
      cand = (Math.random() * 2 - 1) * Math.PI;
      if (Math.abs(angDiff(cand, pinAngle)) >= minNewArc) break;
    }
    targetAngle = cand;
  }

  function reset() {
    level = 0;
    combo = 0; maxCombo = 0;
    speed = baseSpeed;
    pinAngle = -Math.PI / 2;
    pinDir = 1;
    lives = 3;
    popups = [];
    flashes = [];
    armed = false;
    dead = false;
    playing = true;
    newTarget();
    updateStats();
  }

  function updateStats() {
    host.querySelector('#bt-level').innerText = level;
    host.querySelector('#bt-combo').innerText = combo;
    host.querySelector('#bt-lives').innerText = '♥'.repeat(Math.max(0, lives)) || '—';
    host.querySelector('#bt-best').innerText = best || '—';
  }

  function gameOver() {
    dead = true;
    playing = false;
    if (level > best) {
      best = level;
      try { localStorage.setItem('finallycue_spinclick_best', String(best)); } catch (e) {}
    }
    updateStats();
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Game Over',
        sub: `Combo: ${maxCombo}  •  Best ever: ${best}`,
        stat: 'Lvl ' + level,
        kind: level >= 30 ? 'win' : level >= 10 ? 'draw' : 'lose',
        onRetry: reset
      });
    }, 350);
  }

  function tryHit() {
    if (!playing || dead) return;
    if (!armed) {
      // First click arms the pin — picks a direction, target was already placed
      armed = true;
      lastT = performance.now() / 1000;
      // Don't score this click
      return;
    }
    const err = Math.abs(angDiff(pinAngle, targetAngle));
    if (err < targetArc + 0.06) {
      // HIT
      level++;
      combo++; maxCombo = Math.max(maxCombo, combo);
      speed += speedStep;
      pinDir *= -1;
      const quality = err < 0.05 ? 'PERFECT' : err < 0.12 ? 'GOOD' : 'OK';
      const color = quality === 'PERFECT' ? '#fbbf24' : quality === 'GOOD' ? '#34d399' : '#6ea8fe';
      popups.push({ text: quality, life: 30, color, x: W/2, y: H/2 - 70 });
      flashes.push({ angle: targetAngle, life: 24, color });
      if (quality === 'PERFECT') {
        tone(880, 0.05, 'square', 0.20);
        tone(1320, 0.06, 'triangle', 0.16, 0.02);
      } else if (quality === 'GOOD') {
        tone(660, 0.06, 'square', 0.18);
      } else {
        tone(440, 0.05, 'square', 0.16);
      }
      newTarget();
      updateStats();
    } else {
      // MISS
      lives--;
      combo = 0;
      popups.push({ text: 'MISS', life: 28, color: '#f87171', x: W/2, y: H/2 - 70 });
      sfx('wall');
      updateStats();
      if (lives <= 0) gameOver();
    }
  }

  function loop() {
    const now = performance.now() / 1000;
    const dt = Math.min(0.05, now - (lastT || now));
    lastT = now;
    if (playing && armed && !dead) {
      pinAngle += pinDir * speed * dt;
      // wrap to [-π, π]
      while (pinAngle > Math.PI) pinAngle -= 2 * Math.PI;
      while (pinAngle < -Math.PI) pinAngle += 2 * Math.PI;
    }
    for (const p of popups) p.life--;
    popups = popups.filter(p => p.life > 0);
    for (const f of flashes) f.life--;
    flashes = flashes.filter(f => f.life > 0);

    // Render
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f1623'; ctx.fillRect(0, 0, W, H);
    const cx = W/2, cy = H/2;
    const ringR = Math.min(W, H) / 2 - 30;

    // Outer accent ring (color shifts hot as level rises)
    const heat = Math.min(1, level / 60);
    const r = Math.round(110 + heat * 145);
    const g = Math.round(168 - heat * 100);
    const b = Math.round(254 - heat * 180);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
    ctx.lineWidth = 5 + heat * 4;
    ctx.beginPath(); ctx.arc(cx, cy, ringR + 10, 0, Math.PI*2); ctx.stroke();

    // Track ring
    ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 14;
    ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI*2); ctx.stroke();

    // Yellow target
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 16;
    ctx.beginPath();
    ctx.arc(cx, cy, ringR, targetAngle - targetArc, targetAngle + targetArc);
    ctx.stroke();
    // Glow on target if pin near it
    const onTarget = Math.abs(angDiff(pinAngle, targetAngle)) < targetArc;
    if (onTarget) {
      ctx.strokeStyle = 'rgba(251,191,36,0.45)';
      ctx.lineWidth = 28;
      ctx.beginPath();
      ctx.arc(cx, cy, ringR, targetAngle - targetArc, targetAngle + targetArc);
      ctx.stroke();
    }

    // Hit flash ripples
    for (const fl of flashes) {
      const tflash = (24 - fl.life) / 24;
      ctx.globalAlpha = 1 - tflash;
      ctx.strokeStyle = fl.color;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(
        cx + Math.cos(fl.angle) * ringR,
        cy + Math.sin(fl.angle) * ringR,
        10 + tflash * 40, 0, Math.PI*2
      );
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Pin (red) at pinAngle
    const px = cx + Math.cos(pinAngle) * ringR;
    const py = cy + Math.sin(pinAngle) * ringR;
    ctx.shadowBlur = 18; ctx.shadowColor = '#f87171';
    ctx.fillStyle = '#f87171';
    ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
    ctx.stroke();

    // Center text
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (!armed) {
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText('Click to start', cx, cy - 8);
      ctx.font = '13px sans-serif';
      ctx.fillStyle = '#a3a8b1';
      ctx.fillText('then click on the yellow', cx, cy + 18);
    } else {
      ctx.font = 'bold 38px sans-serif';
      ctx.fillText('Lvl ' + level, cx, cy - 8);
      ctx.font = '13px sans-serif';
      ctx.fillStyle = '#a3a8b1';
      ctx.fillText(combo + 'x combo', cx, cy + 22);
    }

    // Popups
    for (const p of popups) {
      ctx.globalAlpha = Math.min(1, p.life / 22);
      ctx.fillStyle = p.color;
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y - (30 - p.life) * 1.6);
    }
    ctx.globalAlpha = 1;

    raf = requestAnimationFrame(loop);
  }

  cv.addEventListener('click', tryHit);
  function onKey(e) {
    if (e.key === ' ') { tryHit(); e.preventDefault(); }
  }
  addL(window, 'keydown', onKey);

  reset();
  loop();
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

function startAimSolo(host, mode) {
  mode = mode || 'standard';
  const W = 600, H = 480, DUR = 30;
  let raf=null, target=null, hits=0, misses=0, timeLeft=DUR, lastT=0, started=false, ended=false;
  // Tracking-mode state
  let onTargetTime = 0; // total seconds the cursor was inside the target (tracking mode)
  let cursorIn = false;
  let mouseX = -1, mouseY = -1;
  const best = parseInt(localStorage.getItem(mode === 'tracking' ? 'aim_track_best' : 'aim_best') || '0');

  const isTracking = mode === 'tracking';
  host.innerHTML = `
    <div class="game-region" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="display:flex;gap:20px;font-family:sans-serif;color:#cfd2d6;font-size:14px;">
        <div>Mode: <span style="color:${isTracking ? '#a78bfa' : '#34d399'};font-weight:bold;">${isTracking ? 'Tracking' : 'Standard'}</span></div>
        <div>Time: <span id="t" style="color:#fff;font-weight:bold;">${DUR.toFixed(1)}</span></div>
        ${isTracking
          ? `<div>Tracked: <span id="trk" style="color:#34d399;font-weight:bold;">0.0s</span></div>`
          : `<div>Hits: <span id="h" style="color:#34d399;font-weight:bold;">0</span></div>
             <div>Acc: <span id="a" style="color:#6ea8fe;font-weight:bold;">100%</span></div>`}
        <div>Best: <span style="color:#fbbf24;font-weight:bold;">${best}</span></div>
      </div>
      <canvas id="cv" width="${W}" height="${H}" style="background:#1a1d22;border-radius:10px;cursor:crosshair;"></canvas>
    </div>`;
  const cv = host.querySelector('#cv'), ctx = cv.getContext('2d');
  const tEl = host.querySelector('#t');

  function spawn() {
    const r = isTracking ? (18 + Math.random() * 8) : (16 + Math.random() * 14);
    target = { x: r + Math.random()*(W-2*r), y: r + Math.random()*(H-2*r), r, life: 0 };
    if (isTracking) {
      // Random velocity ~80-150 px/s
      const ang = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 70;
      target.vx = Math.cos(ang) * sp;
      target.vy = Math.sin(ang) * sp;
    }
  }
  function reset() {
    hits=0; misses=0; timeLeft=DUR; started=false; ended=false;
    onTargetTime = 0; cursorIn = false;
    spawn(); update();
  }
  function update() {
    tEl.innerText = timeLeft.toFixed(1);
    if (isTracking) {
      const trk = host.querySelector('#trk');
      if (trk) trk.innerText = onTargetTime.toFixed(1) + 's';
    } else {
      const hEl = host.querySelector('#h'); if (hEl) hEl.innerText = hits;
      const aEl = host.querySelector('#a');
      if (aEl) { const total = hits + misses; aEl.innerText = (total ? Math.round(hits/total*100) : 100) + '%'; }
    }
  }
  function end() {
    ended = true;
    if (isTracking) {
      const score = Math.round(onTargetTime * 10) / 10;
      const bestNum = parseFloat(best) || 0;
      if (score > bestNum) localStorage.setItem('aim_track_best', score);
      showResult(host.querySelector('.game-region'), {
        title: 'Time!', kind: 'win',
        stat: score.toFixed(1) + 's tracked',
        sub: 'Stay on the moving target',
        onRetry: () => { reset(); loop(); }
      });
    } else {
      if (hits > best) localStorage.setItem('aim_best', hits);
      showResult(host.querySelector('.game-region'), {
        title: 'Time!', kind: 'win', stat: hits + ' hits',
        sub: 'Accuracy ' + (hits+misses ? Math.round(hits/(hits+misses)*100) : 100) + '%',
        onRetry: () => { reset(); loop(); }
      });
    }
  }

  cv.addEventListener('mousedown', (e) => {
    if (ended) return;
    const rect = cv.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W/rect.width);
    const my = (e.clientY - rect.top) * (H/rect.height);
    if (!started) { started = true; lastT = performance.now()/1000; }
    if (isTracking) return; // clicks are no-op in tracking
    if (target) {
      const d = Math.hypot(mx - target.x, my - target.y);
      if (d < target.r) { hits++; sfx('pop'); spawn(); }
      else { misses++; sfx('wall'); }
    }
    update();
  });
  cv.addEventListener('mousemove', (e) => {
    const rect = cv.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W/rect.width);
    mouseY = (e.clientY - rect.top) * (H/rect.height);
  });

  function loop() {
    const now = performance.now()/1000;
    const dt = Math.min(0.05, now - lastT);
    lastT = now;
    if (started && !ended) {
      timeLeft -= dt;
      if (timeLeft <= 0) { timeLeft = 0; update(); end(); return; }
      if (target) {
        target.life += dt;
        if (isTracking) {
          target.x += target.vx * dt;
          target.y += target.vy * dt;
          // Bounce off walls
          if (target.x - target.r < 0) { target.x = target.r; target.vx *= -1; }
          if (target.x + target.r > W) { target.x = W - target.r; target.vx *= -1; }
          if (target.y - target.r < 0) { target.y = target.r; target.vy *= -1; }
          if (target.y + target.r > H) { target.y = H - target.r; target.vy *= -1; }
          // Check cursor inside
          const wasIn = cursorIn;
          cursorIn = mouseX >= 0 && Math.hypot(mouseX - target.x, mouseY - target.y) < target.r;
          if (cursorIn) onTargetTime += dt;
          if (cursorIn && !wasIn) sfx('pop');
        }
      }
    }
    ctx.fillStyle = '#1a1d22';
    ctx.fillRect(0,0,W,H);
    if (target) {
      const pulse = 1 + Math.sin(target.life * 6) * 0.06;
      const lockedColor = isTracking && cursorIn ? '#34d399' : '#ef4444';
      ctx.fillStyle = lockedColor;
      ctx.beginPath(); ctx.arc(target.x, target.y, target.r*pulse, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(target.x, target.y, target.r*pulse*0.55, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = lockedColor;
      ctx.beginPath(); ctx.arc(target.x, target.y, target.r*pulse*0.25, 0, Math.PI*2); ctx.fill();
    }
    if (!started) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(isTracking ? 'Click anywhere to start' : 'Click any target to start', W/2, H/2 - 20);
      ctx.fillStyle = '#a3a8b1';
      ctx.font = '13px sans-serif';
      ctx.fillText(isTracking ? '30s. Keep your cursor on the moving target.' : '30 seconds. Click as many as you can.', W/2, H/2 + 8);
    }
    update();
    raf = requestAnimationFrame(loop);
  }
  reset(); loop();
  activeCleanup = () => { if (raf) cancelAnimationFrame(raf); };
}

function startAimMP(host, shim) {
  const scope = shim.scope();
  // Both race the same 30s, click as many targets as possible.
  // Each side runs its own targets — the shared score is what matters.
  const W = 520, H = 400, DUR = 30;
  let raf = null, target = null, myHits = 0, myMisses = 0, theirHits = 0, timeLeft = DUR;
  let lastT = 0, started = false, ended = false;
  let opponentReady = false, myReady = false, starting = false;
  let rematchUI = null;

  host.innerHTML = `
    <div class="game-region">
      <div class="mp-layout">
        <div class="mp-side" style="align-items:center;">
          <div style="display:flex;gap:18px;font-family:sans-serif;color:#cfd2d6;font-size:13px;">
            <div>Time: <b id="aim-t">${DUR.toFixed(1)}</b></div>
            <div>You: <b id="aim-my" style="color:#34d399;">0</b></div>
            <div>Them: <b id="aim-their" style="color:#f87171;">0</b></div>
            <div>Acc: <b id="aim-acc" style="color:#6ea8fe;">100%</b></div>
          </div>
          <canvas id="aim-cv" width="${W}" height="${H}" style="background:#1a1d22;border-radius:10px;cursor:crosshair;"></canvas>
          <div id="aim-status"></div>
        </div>
        <div class="mp-side" id="aim-chat-host"></div>
      </div>
    </div>`;
  const cv = host.querySelector('#aim-cv');
  const ctx = cv.getContext('2d');
  const statusBar = makeMpStatusBar(shim);
  host.querySelector('#aim-status').appendChild(statusBar.element);
  const chat = makeChatPanel(shim);
  host.querySelector('#aim-chat-host').appendChild(chat.element);
  chat.appendSystem('Race: 30s. Most hits wins.');

  function spawn() {
    const r = 16 + Math.random() * 14;
    target = { x: r + Math.random()*(W-2*r), y: r + Math.random()*(H-2*r), r, life: 0 };
  }
  function update() {
    const tEl = host.querySelector('#aim-t');
    const myEl = host.querySelector('#aim-my');
    const theirEl = host.querySelector('#aim-their');
    const accEl = host.querySelector('#aim-acc');
    if (tEl) tEl.innerText = Math.max(0, timeLeft).toFixed(1);
    if (myEl) myEl.innerText = myHits;
    if (theirEl) theirEl.innerText = theirHits;
    const total = myHits + myMisses;
    if (accEl) accEl.innerText = (total ? Math.round(myHits/total*100) : 100) + '%';
  }
  function finish() {
    if (ended) return;
    ended = true;
    try { shim.emit('game', { type: 'aim-final', score: myHits }); } catch (e) {}
    const kind = myHits > theirHits ? 'win' : myHits < theirHits ? 'lose' : 'draw';
    const title = kind === 'win' ? 'You win!' : kind === 'lose' ? 'You lose' : 'Tie';
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title, sub: `You: ${myHits} hits · Them: ${theirHits} hits`, kind, dismissable: true,
        rematch: {
          onToggle: (want) => { try { shim.emit(want ? 'rematch' : 'rematch-cancel'); } catch (e) {} },
          register: (cb) => { rematchUI = cb; }
        }
      });
    }, 350);
  }
  cv.addEventListener('mousedown', (e) => {
    if (ended || !started) return;
    const rect = cv.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W/rect.width);
    const my = (e.clientY - rect.top) * (H/rect.height);
    if (target) {
      const d = Math.hypot(mx - target.x, my - target.y);
      if (d < target.r) {
        myHits++; sfx('pop'); spawn();
        try { shim.emit('game', { type: 'aim-score', score: myHits }); } catch (e) {}
      } else { myMisses++; sfx('wall'); }
      update();
    }
  });
  function loop() {
    const now = performance.now()/1000;
    const dt = Math.min(0.05, now - lastT);
    lastT = now;
    if (started && !ended) {
      timeLeft -= dt;
      if (timeLeft <= 0) { timeLeft = 0; update(); finish(); return; }
      if (target) target.life += dt;
    }
    ctx.fillStyle = '#1a1d22'; ctx.fillRect(0,0,W,H);
    if (target && started) {
      const pulse = 1 + Math.sin(target.life * 6) * 0.06;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.arc(target.x, target.y, target.r*pulse, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(target.x, target.y, target.r*pulse*0.55, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.arc(target.x, target.y, target.r*pulse*0.25, 0, Math.PI*2); ctx.fill();
    }
    if (!started) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(starting ? 'Get ready…' : 'Waiting for opponent…', W/2, H/2);
    }
    update();
    raf = requestAnimationFrame(loop);
  }
  function startCountdown() {
    if (starting) return;
    starting = true;
    let n = 3;
    const tick = () => {
      ctx.fillStyle = '#1a1d22'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(n > 0 ? String(n) : 'GO!', W/2, H/2 + 20);
      if (n === 0) {
        spawn();
        started = true; lastT = performance.now()/1000;
        return;
      }
      n--; setTimeout(tick, 800);
    };
    tick();
  }
  function maybeBegin() { if (myReady && opponentReady) startCountdown(); }

  scope.on('game', (m) => {
    if (!m) return;
    if (m.type === 'aim-ready') { opponentReady = true; maybeBegin(); }
    else if (m.type === 'aim-score') { theirHits = m.score|0; update(); }
    else if (m.type === 'aim-final' && !ended) { theirHits = m.score|0; update(); /* wait for own timer */ }
  });
  scope.on('rematch-update', (info) => { if (rematchUI) rematchUI(info); });
  scope.on('rematch-start', () => {
    const ov = host.querySelector('.result-overlay'); if (ov) ov.remove();
    shim._suppressTeardown = true;
    if (activeCleanup) { try { activeCleanup(); } catch (e) {} }
    activeCleanup = null;
    shim._suppressTeardown = false;
    startAimMP(host, shim);
  });
  scope.on('closed', () => {
    if (ended) return;
    ended = true;
    chat.appendSystem('Opponent disconnected.');
    setTimeout(() => {
      showResult(host.querySelector('.game-region'), {
        title: 'Disconnected', sub: 'Opponent left.', kind: 'lose',
        dismissable: true, retryLabel: 'Back to menu',
        onRetry: () => startAim(host)
      });
    }, 250);
  });

  myReady = true;
  try { shim.emit('game', { type: 'aim-ready' }); } catch (e) {}
  loop();
  maybeBegin();

  activeCleanup = () => {
    if (raf) cancelAnimationFrame(raf);
    statusBar.destroy(); chat.destroy();
    scope.destroyAll();
    if (!shim._suppressTeardown) {
      try { shim.closeConn(); } catch (e) {}
      try { if (shim._peer) shim._peer.destroy(); } catch (e) {}
    }
  };
}

  const keys = {};
