/* ============================================================
   TOUCH CONTROLS — virtual D-pad + action buttons that synthesize
   keyboard events for existing key handlers. Shows only on touch
   devices. Floats above the game and respects safe-area-inset-bottom.

   Usage:
     attachTouchControls(host, {
       directional: 'arrows' | 'leftright' | 'updown' | null,
       actions: [{key: ' ', label: 'Fire'}, {key: 'r', label: 'Restart'}]
     });
   Buttons fire `keydown` on press and `keyup` on release.
   For 'space' use `' '`, for arrows use `'ArrowLeft'` etc.
   ============================================================ */
function isTouchDevice() {
  return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}
function attachTouchControls(host, opts) {
  if (!isTouchDevice()) return null;
  opts = opts || {};
  const overlay = document.createElement('div');
  overlay.className = 'touch-ctl';
  // Build directional pad
  const dpad = document.createElement('div');
  dpad.className = 'touch-dpad';
  function makeBtn(key, label, cls) {
    const b = document.createElement('button');
    b.className = 'touch-btn ' + (cls || '');
    b.innerHTML = label;
    b.dataset.key = key;
    // Prevent default so iOS Safari doesn't trigger context menu / selection
    let pressed = false;
    function down(e) {
      e.preventDefault();
      if (pressed) return;
      pressed = true;
      b.classList.add('active');
      window.dispatchEvent(new KeyboardEvent('keydown', { key, code: keyToCode(key) }));
    }
    function up(e) {
      e.preventDefault();
      if (!pressed) return;
      pressed = false;
      b.classList.remove('active');
      window.dispatchEvent(new KeyboardEvent('keyup', { key, code: keyToCode(key) }));
    }
    b.addEventListener('touchstart', down, { passive: false });
    b.addEventListener('touchend', up, { passive: false });
    b.addEventListener('touchcancel', up, { passive: false });
    b.addEventListener('mousedown', down);
    b.addEventListener('mouseup', up);
    b.addEventListener('mouseleave', up);
    return b;
  }
  function keyToCode(key) {
    if (key === ' ') return 'Space';
    if (key === 'ArrowLeft') return 'ArrowLeft';
    if (key === 'ArrowRight') return 'ArrowRight';
    if (key === 'ArrowUp') return 'ArrowUp';
    if (key === 'ArrowDown') return 'ArrowDown';
    return 'Key' + (key.length === 1 ? key.toUpperCase() : '');
  }
  if (opts.directional === 'arrows') {
    const up = makeBtn('ArrowUp', '▲', 'dp-up');
    const down = makeBtn('ArrowDown', '▼', 'dp-down');
    const left = makeBtn('ArrowLeft', '◀', 'dp-left');
    const right = makeBtn('ArrowRight', '▶', 'dp-right');
    dpad.classList.add('dpad-cross');
    dpad.appendChild(up); dpad.appendChild(left); dpad.appendChild(right); dpad.appendChild(down);
  } else if (opts.directional === 'leftright') {
    const left = makeBtn('ArrowLeft', '◀', 'dp-left');
    const right = makeBtn('ArrowRight', '▶', 'dp-right');
    dpad.classList.add('dpad-h');
    dpad.appendChild(left); dpad.appendChild(right);
  } else if (opts.directional === 'updown') {
    const up = makeBtn('ArrowUp', '▲', 'dp-up');
    const down = makeBtn('ArrowDown', '▼', 'dp-down');
    dpad.classList.add('dpad-v');
    dpad.appendChild(up); dpad.appendChild(down);
  }
  if (opts.directional) overlay.appendChild(dpad);
  // Action buttons
  if (opts.actions && opts.actions.length) {
    const acts = document.createElement('div');
    acts.className = 'touch-actions';
    for (const a of opts.actions) {
      const b = makeBtn(a.key, a.label, a.cls || 'touch-action');
      if (a.color) b.style.background = a.color;
      acts.appendChild(b);
    }
    overlay.appendChild(acts);
  }
  // Attach to game-region so it sits inside the game (not the whole page)
  function attach() {
    const region = host.querySelector('.game-region');
    if (!region) return false;
    region.style.position = region.style.position || 'relative';
    region.appendChild(overlay);
    return true;
  }
  if (!attach()) requestAnimationFrame(attach);
  return overlay;
}

/* ============================================================
   PAUSE HELPER — drop-in pause for any action game.
   Press P (or Esc) to toggle. Returns { isPaused, pause, resume, button }.
   The host's loop should bail early when isPaused() is true:
     if (pauseCtl.isPaused()) { raf = requestAnimationFrame(loop); return; }
   onResume callback is the perfect place to reset lastT/dt anchors.
   ============================================================ */
function attachPause(host, opts) {
  opts = opts || {};
  let paused = false;
  // Build overlay (added once .game-region exists)
  const overlay = document.createElement('div');
  overlay.className = 'game-pause-overlay';
  overlay.innerHTML = `<div class="game-pause-card"><div class="pp-title">PAUSED</div><div class="pp-hint">P or Esc to resume</div></div>`;
  overlay.style.display = 'none';
  // Defer until DOM ready
  function attach() {
    const region = host.querySelector('.game-region');
    if (!region) return false;
    region.style.position = region.style.position || 'relative';
    region.appendChild(overlay);
    return true;
  }
  // Try synchronously (most callers innerHTML before calling attachPause)
  if (!attach()) requestAnimationFrame(attach);

  function setPaused(p) {
    if (paused === p) return;
    paused = p;
    overlay.style.display = paused ? 'flex' : 'none';
    if (paused) { if (opts.onPause) try { opts.onPause(); } catch (e) {} }
    else { if (opts.onResume) try { opts.onResume(); } catch (e) {} }
  }
  function toggle() { setPaused(!paused); }
  function onKey(e) {
    if (e.repeat) return;
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') { e.preventDefault(); toggle(); }
  }
  addL(window, 'keydown', onKey);

  return {
    isPaused: () => paused,
    pause: () => setPaused(true),
    resume: () => setPaused(false),
    toggle
  };
}

function showResult(host, opts) {
  // opts: { title, sub, kind, stat, onRetry, retryLabel,
  //         dismissable, rematch: { onToggle, register } }
  const overlay = document.createElement('div');
  overlay.className = 'result-overlay';
  const hasRematch = !!(opts.rematch && typeof opts.rematch.onToggle === 'function');
  overlay.innerHTML = `
    <div class="result-card">
      ${opts.dismissable ? '<button class="result-close" data-act="close" title="Hide (look at the board)">✕</button>' : ''}
      <div class="result-title ${opts.kind || 'win'}">${opts.title}</div>
      ${opts.stat ? `<div class="result-stat">${opts.stat}</div>` : ''}
      ${opts.sub ? `<div class="result-sub">${opts.sub}</div>` : ''}
      <div class="result-buttons">
        ${hasRematch ? `<button class="btn" data-act="rematch">Rematch</button>` : ''}
        ${!hasRematch ? `<button class="btn" data-act="retry">${opts.retryLabel || 'Play Again'}</button>` : ''}
        <button class="btn secondary" data-act="back">Back</button>
      </div>
      ${hasRematch ? `<div class="result-rematch-status" data-rs>0/2 players rematching</div>` : ''}
    </div>
  `;
  if (!hasRematch) {
    overlay.querySelector('[data-act=retry]').addEventListener('click', () => {
      overlay.remove();
      if (opts.onRetry) opts.onRetry();
    });
  } else {
    const rematchBtn = overlay.querySelector('[data-act=rematch]');
    const rsEl = overlay.querySelector('[data-rs]');
    let localRequested = false;
    rematchBtn.addEventListener('click', () => {
      localRequested = !localRequested;
      rematchBtn.innerText = localRequested ? 'Cancel rematch' : 'Rematch';
      rematchBtn.classList.toggle('secondary', localRequested);
      try { opts.rematch.onToggle(localRequested); } catch (e) {}
    });
    if (typeof opts.rematch.register === 'function') {
      opts.rematch.register((info) => {
        if (!rsEl) return;
        const c = info && typeof info.count === 'number' ? info.count : 0;
        rsEl.innerText = c + '/2 players rematching';
        rsEl.classList.toggle('full', c >= 2);
      });
    }
  }
  overlay.querySelector('[data-act=back]').addEventListener('click', () => {
    overlay.remove();
    back();
  });
  if (opts.dismissable) {
    overlay.querySelector('[data-act=close]').addEventListener('click', () => {
      overlay.classList.remove('show');
      setTimeout(() => { try { overlay.remove(); } catch (e) {} }, 250);
      if (typeof opts.onClose === 'function') { try { opts.onClose(); } catch (e) {} }
    });
  }
  host.appendChild(overlay);
  // Trigger transition
  requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('show')));
  if (opts.kind === 'win') { sfx('win'); confettiBurst(host); }
  else if (opts.kind === 'lose') sfx('lose');
  else sfx('draw');
  return overlay;
}

function confettiBurst(host) {
  const cv = document.createElement('canvas');
  cv.className = 'result-confetti';
  const rect = host.getBoundingClientRect();
  cv.width = rect.width; cv.height = rect.height;
  host.appendChild(cv);
  const c = cv.getContext('2d');
  const colors = ['#6ea8fe','#34d399','#fbbf24','#f87171','#a78bfa','#22d3ee','#f472b6'];
  const ps = [];
  for (let i = 0; i < 120; i++) {
    ps.push({
      x: cv.width / 2,
      y: cv.height / 2,
      vx: (Math.random() - 0.5) * 16,
      vy: (Math.random() - 1) * 18,
      g: 0.5,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.4,
      life: 100
    });
  }
  let frame = 0;
  function tick() {
    c.clearRect(0, 0, cv.width, cv.height);
    for (const p of ps) {
      p.vy += p.g;
      p.x += p.vx; p.y += p.vy;
      p.rot += p.spin; p.life--;
      c.save();
      c.translate(p.x, p.y); c.rotate(p.rot);
      c.fillStyle = p.color;
      c.globalAlpha = Math.max(0, Math.min(1, p.life / 30));
      c.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.4);
      c.restore();
    }
    frame++;
    if (frame < 180) requestAnimationFrame(tick);
    else cv.remove();
  }
  tick();
}

// Easing helpers
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutBounce(t) {
  const n1 = 7.5625, d1 = 2.75;
  if (t < 1/d1) return n1 * t * t;
  if (t < 2/d1) return n1 * (t -= 1.5/d1) * t + 0.75;
  if (t < 2.5/d1) return n1 * (t -= 2.25/d1) * t + 0.9375;
  return n1 * (t -= 2.625/d1) * t + 0.984375;
}
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

const FAV_KEY = 'fcue_favorites';
function loadFavs() {
  try {
    const raw = localStorage.getItem(FAV_KEY);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    return new Set(Array.isArray(arr) ? arr : []);
  } catch (e) { return new Set(); }
}
function saveFavs(s) {
  try { localStorage.setItem(FAV_KEY, JSON.stringify([...s])); } catch (e) {}
}
let favorites = loadFavs();

// Render order: favorites first (in the original GAMES order), then everything else.
function orderedGames() {
  const fav = [], rest = [];
  for (const g of GAMES) {
    if (favorites.has(g.id)) fav.push(g);
    else rest.push(g);
  }
  return fav.concat(rest);
}

function makeCard(g) {
  const el = document.createElement('div');
  el.className = 'game-card' + (favorites.has(g.id) ? ' favorited' : '');
  el.innerHTML = `<div class="gc-icon">${g.icon}</div>
                  <h3>${g.title}</h3>
                  <p>${g.desc}</p>`;
  // Star button — placed via JS so we can attach click handler with stop-prop.
  const star = document.createElement('button');
  star.className = 'gc-star';
  star.title = favorites.has(g.id) ? 'Unfavorite' : 'Favorite';
  star.innerText = '★';
  star.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleFavorite(g.id);
  });
  el.appendChild(star);
  el.addEventListener('click', () => showGame(g.id));
  return el;
}

function renderHub() {
  // Wipe existing cards (keep emptyEl reference for reuse)
  for (const el of cardEls.values()) el.remove();
  cardEls.clear();
  for (const g of orderedGames()) {
    const el = makeCard(g);
    grid.insertBefore(el, emptyEl);
    cardEls.set(g.id, el);
  }
  applyHubFilter();
}

function toggleFavorite(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  saveFavs(favorites);
  renderHub();
}

// ============================================================
// URL AUTO-JOIN: if loaded with ?join=CODE&game=ID (i.e. from a chat
// invite click), jump straight into that game's join flow with the code
// pre-filled. Only acts when transport=socketio is also set, since that's
// the only flow that goes through the chat server.
// ============================================================
(function () {
  try {
    const sp = new URLSearchParams(window.location.search);
    const joinCode = (sp.get('join') || '').toUpperCase();
    const gameId = (sp.get('game') || '').toLowerCase();
    if (!joinCode || !gameId) return;
    const g = GAMES.find(x => x.id === gameId);
    if (!g) return;
    // Render the game's lobby, then click through to the join screen and
    // submit the code. setTimeout breaks happen because each step
    // re-renders the host element; the next step needs to wait for the
    // new DOM to exist.
    showGame(gameId);
    setTimeout(() => {
      const joinBtn = gvHost.querySelector('#lb-join');
      if (!joinBtn) return;   // not an MP-lobby game (chat/ask/solo-only)
      joinBtn.click();
      setTimeout(() => {
        const codeInp = gvHost.querySelector('#lb-jn-code');
        const goBtn = gvHost.querySelector('#lb-jn-go');
        if (!codeInp || !goBtn) return;
        codeInp.value = joinCode;
        goBtn.click();
      }, 60);
    }, 60);
  } catch (e) { /* ignore — auto-join is best-effort */ }
})();

    applyHubFilter();

});

function gameMatches(g, q, cat) {
  if (cat !== 'all' && !(g.cats || []).includes(cat)) return false;
  if (!q) return true;
  const hay = (g.title + ' ' + g.desc + ' ' + g.id + ' ' + (g.keywords || []).join(' ')).toLowerCase();
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  return terms.every(t => hay.includes(t));
}

function applyHubFilter() {
  let shown = 0;
  GAMES.forEach(g => {
    const el = cardEls.get(g.id);
    if (!el) return;
    const ok = gameMatches(g, searchQuery, activeFilter);
    el.classList.toggle('hidden-by-filter', !ok);
    if (ok) shown++;
  });
  emptyEl.style.display = shown === 0 ? 'block' : 'none';
}

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  applyHubFilter();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  applyHubFilter();
  searchInput.focus();
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && searchQuery) {
    searchInput.value = ''; searchQuery = '';
    searchClear.classList.remove('visible');
    applyHubFilter();
  }
});

      <div style="font-size:13px;color:var(--sub);">click anywhere to close</div>
    </div>
    <style>@keyframes cc-spin { to { transform: rotate(360deg); } }</style>`;
  let cancelled = false;
  let activeConn = null;
  const statusEl = host.querySelector('#wt-status');
  const bigOverlay = host.querySelector('#wt-bigcode-overlay');
  host.querySelector('#wt-copy').onclick = () => {
    try { navigator.clipboard.writeText(info.code); host.querySelector('#wt-copy').innerText = 'Copied!'; setTimeout(() => { try { host.querySelector('#wt-copy').innerText = 'Copy code'; } catch (e) {} }, 1500); } catch (e) {}
  };
  // Same JS-fit logic as the generic waiting room — sizes the code to fill
  // ~88% of viewport width and ≤45% of viewport height so it never overflows.
  function fitBigCode() {
    const t = host.querySelector('#wt-bigcode-text');
    if (!t) return;
    const codeLen = (info.code || '').length || 1;
    const charFactor = 0.66;
    const fromW = (window.innerWidth * 0.88) / (codeLen * charFactor);
    const fromH = window.innerHeight * 0.45;
    const fontSize = Math.max(80, Math.min(fromW, fromH));
    t.style.fontSize = fontSize + 'px';
  }
  let _bigCodeResize = null;
  host.querySelector('#wt-bigcode').onclick = () => {
    bigOverlay.style.display = 'flex';
    fitBigCode();
    _bigCodeResize = () => fitBigCode();
    window.addEventListener('resize', _bigCodeResize);
  };
  bigOverlay.onclick = () => {
    bigOverlay.style.display = 'none';
    if (_bigCodeResize) {
      window.removeEventListener('resize', _bigCodeResize);
      _bigCodeResize = null;
    }
  };
  host.querySelector('#wt-cancel').onclick = () => {
    cancelled = true;
    try { peer.destroy(); } catch (e) {}
    showChessModePicker(host);
  };

  peer.on('connection', (conn) => {
    if (cancelled) { try { conn.close(); } catch (e) {} return; }
    if (activeConn) {
      // Already accepted someone; reject newcomers
      conn.on('open', () => { try { conn.send({ type: 'reject', reason: 'busy' }); } catch (e) {} setTimeout(() => { try { conn.close(); } catch (e) {} }, 300); });
      return;
    }
    statusEl.innerText = 'Someone is joining…';
    let helloTimer = setTimeout(() => { try { conn.send({ type: 'reject', reason: 'no_hello' }); conn.close(); } catch (e) {} }, 8000);
    conn.on('data', (data) => {
      if (!data || typeof data !== 'object') return;
      if (data.type !== 'hello') return;
      clearTimeout(helloTimer);
      activeConn = conn;
      try { conn.send({ type: 'accept', timeMin: info.timeMin }); } catch (e) {}
      // Tear down peer's listening role; we only need this one connection now
      // (peer.destroy() would close the conn, so just stop accepting more)
      const shim = makeP2PShim(conn, 'w', info.timeMin);
      // Detach the make-menu peer so the chess code's cleanup can manage the conn
      shim._peer = peer;
      startChessGame(host, {
        mode: 'mp',
        mpInfo: {
          socket: shim, color: 'w',
          timeMin: info.timeMin
        }
      });
    });
    conn.on('close', () => {
      if (activeConn !== conn) return;
      // pre-game cancel — back to picker handled by game's own cleanup
    });
  });
  peer.on('error', (err) => {
    if (cancelled) return;
    statusEl.innerText = 'Connection error: ' + (err && err.type || 'unknown');
  });
}

function showChessJoinMenu(host) {
  host.innerHTML = `
    <div class="party-card">
      <div style="font-size:22px;font-weight:bold;">Join Party</div>
      <div style="font-size:11px;color:var(--sub);text-align:center;line-height:1.5;">Enter the code your friend shared with you.</div>
      <div style="display:flex;flex-direction:column;gap:10px;width:100%;">

          <input id="jn-code" maxlength="10" placeholder="ABCD" style="width:100%;padding:9px;background:var(--panel);color:#fff;border:1px solid var(--border);border-radius:6px;margin-top:4px;box-sizing:border-box;font-size:18px;font-family:monospace;letter-spacing:3px;text-transform:uppercase;text-align:center;">
        </label>
      </div>
      <div style="display:flex;gap:10px;width:100%;">
        <button class="btn secondary" id="jn-back" style="flex:1;">← Back</button>
        <button class="btn" id="jn-go" style="flex:2;">Join</button>
      </div>
      <div id="jn-err" style="font-size:11px;color:var(--bad);text-align:center;min-height:14px;width:100%;"></div>
    </div>`;
  const errEl = host.querySelector('#jn-err');
  host.querySelector('#jn-back').onclick = () => showChessModePicker(host);
  host.querySelector('#jn-code').focus();
  host.querySelector('#jn-go').onclick = async () => {
    const goBtn = host.querySelector('#jn-go');
    const codeRaw = normalizeCode(host.querySelector('#jn-code').value);
    if (!isValidCode(codeRaw)) { errEl.innerText = 'Enter a valid code (3-10 letters/digits).'; return; }
    goBtn.disabled = true;
    errEl.innerText = 'Connecting…';
    let peer;
    try {
      peer = await createJoinerPeer();
    } catch (e) {
      errEl.innerText = e.message || 'Connection failed.';
      goBtn.disabled = false;
      return;
    }
    errEl.innerText = 'Connecting to host…';
    const conn = peer.connect(PEER_PREFIX + codeRaw, { reliable: true });
    let helloAcked = false;
    // 30s — same reason as the generic join below: school wifi + r-guest
    // retries can take ~15s before the host conn fires 'open'.
    let openTimer = setTimeout(() => {
      if (helloAcked) return;
      try { conn.close(); } catch (e) {}
      try { peer.destroy(); } catch (e) {}
      errEl.innerText = 'Could not reach that party. Wrong code, or host is offline.';
      goBtn.disabled = false;
    }, 30000);
    conn.on('open', () => {
      try { conn.send({ type: 'hello' }); } catch (e) {}
    });
    conn.on('data', (data) => {
      if (!data || typeof data !== 'object') return;
      if (data.type === 'reject') {
        helloAcked = true; clearTimeout(openTimer);
        const reason = data.reason || 'unknown';
        if (reason === 'busy') errEl.innerText = 'Party is already full.';
        else errEl.innerText = 'Join was rejected (' + reason + ').';
        try { conn.close(); } catch (e) {}
        try { peer.destroy(); } catch (e) {}
        goBtn.disabled = false;
        return;
      }
      if (data.type !== 'accept') return;
      helloAcked = true; clearTimeout(openTimer);
      const timeMin = parseInt(data.timeMin, 10) || 10;
      const shim = makeP2PShim(conn, 'b', timeMin);
      shim._peer = peer;
      startChessGame(host, {
        mode: 'mp',
        mpInfo: {
          socket: shim, color: 'b',
          timeMin
        }
      });
    });
    conn.on('error', () => {
      if (helloAcked) return;
      clearTimeout(openTimer);
      try { peer.destroy(); } catch (e) {}
      errEl.innerText = 'Connection error — host may be offline.';
      goBtn.disabled = false;
    });
    conn.on('close', () => {
      if (helloAcked) return;
      clearTimeout(openTimer);
      try { peer.destroy(); } catch (e) {}
      if (errEl.innerText === 'Connecting to host…') errEl.innerText = 'Host closed the connection.';
      goBtn.disabled = false;
    });
  };
}

/* ============================================================
   GENERIC P2P INFRA — used by every multiplayer game except chess
   (chess uses its own shim because it has clocks/draw-offers).
   Codes are namespaced PER game so two games can share the same code.
   Wire envelope: {type:'hello', game}, {type:'accept', game, cfg?},
                  {type:'reject', reason},
                  {type:'chat', text}, {type:'rematch'}, {type:'rematch-cancel'},
                  {type:'g', m: <game-specific payload>}
   The shim exposes a tiny socket-style API: emit('chat', text),
   emit('game', payload), emit('rematch'/'rematch-cancel'),
   on('chat', fn) / on('game', fn) / on('rematch-update'|'rematch-start'/'closed', fn).
   ============================================================ */
// gameId is no longer used for room separation (the lobby's hello/accept
// handshake validates game match), but the param stays for call-site compat.
// IMPORTANT: must dispatch on the transport flag the same way createHostPeer
// does, otherwise inside the chat website the host stays on Apps Script
// while the guest uses socket.io and they never find each other — guest
// sees "Host closed the connection" instantly.
async function createGameHostPeer(gameId, desiredCode) {
  return createHostPeer(desiredCode);
}

function gamePeerId(gameId, code) { return PEER_PREFIX + gameId + '-' + code; }

function makeGameShim(conn, gameId, role) {
  const listeners = {};
  let rematchLocal = false, rematchRemote = false, dead = false;
  function fire(ev, payload) {
    const fns = (listeners[ev] || []).slice();
    for (const fn of fns) { try { fn(payload); } catch (e) {} }
  }
  function rematchCount() { return (rematchLocal?1:0) + (rematchRemote?1:0); }
  function fireRematchUpdate() {
    fire('rematch-update', { local: rematchLocal, remote: rematchRemote, count: rematchCount() });
  }
  function maybeStartRematch() {
    if (rematchLocal && rematchRemote) {
      rematchLocal = false; rematchRemote = false;
      fire('rematch-start', {});
    }
  }
  conn.on('data', (data) => {
    if (!data || typeof data !== 'object') return;
    if (data.type === 'chat') {
      const text = typeof data.text === 'string' ? data.text.slice(0, 200) : '';
      // The sender includes their display name (if they set one in Settings); fall back to "Them".
      const name = typeof data.name === 'string' ? data.name.slice(0, 20).trim() : '';
      if (text) fire('chat', { from: 'them', text, name });
      return;
    }
    if (data.type === 'rematch') {
      if (!rematchRemote) { rematchRemote = true; fireRematchUpdate(); maybeStartRematch(); }
      return;
    }
    if (data.type === 'rematch-cancel') {
      if (rematchRemote) { rematchRemote = false; fireRematchUpdate(); }
      return;
    }
    if (data.type === 'g') { fire('game', data.m); return; }
    // hello/accept/reject are intercepted by the lobby flow before the shim is in charge
  });
  conn.on('close', () => { if (dead) return; dead = true; fire('closed', { reason: 'closed' }); });
  conn.on('error', () => { if (dead) return; dead = true; fire('closed', { reason: 'error' }); });
  return {
    role, // 'host' | 'guest'
    _peer: null,
    _conn: conn,
    closeConn() { try { conn.close(); } catch (e) {} },
    isDead() { return dead; },
    emit(ev, payload) {
      if (ev === 'game') { try { conn.send({ type: 'g', m: payload }); } catch (e) {} return; }
      if (ev === 'chat') {
        const text = typeof payload === 'string' ? payload.slice(0, 200) : '';
        if (!text) return;
        const name = (Settings.playerName || '').trim().slice(0, 20);
        try { conn.send({ type: 'chat', text, name }); } catch (e) {}
        fire('chat', { from: 'you', text, name });
        return;
      }
      if (ev === 'rematch') {
        if (rematchLocal) return;
        rematchLocal = true;
        try { conn.send({ type: 'rematch' }); } catch (e) {}
        fireRematchUpdate();
        maybeStartRematch();
        return;
      }
      if (ev === 'rematch-cancel') {
        if (!rematchLocal) return;
        rematchLocal = false;
        try { conn.send({ type: 'rematch-cancel' }); } catch (e) {}
        fireRematchUpdate();
        return;
      }
    },
    on(ev, fn) { (listeners[ev] = listeners[ev] || []).push(fn); },
    off(ev, fn) { if (listeners[ev]) listeners[ev] = listeners[ev].filter(x => x !== fn); },
    // Scoped listeners — every startXxxMP opens one and calls scope.destroyAll()
    // in its cleanup, so re-running startXxxMP on rematch doesn't leak handlers.
    // Without this, every rematch leaves the previous game's 'game' / 'rematch-*' /
    // 'closed' / (in pictionary) 'chat' subscriptions in place — and the receiver
    // sees each opponent message duplicated once per stale handler (3x after two
    // rematches, etc.). makeChatPanel / makeMpStatusBar don't need the scope —
    // they manage their own .destroy() and call shim.off directly.
    scope() {
      const tracked = [];
      return {
        on(ev, fn) {
          tracked.push([ev, fn]);
          (listeners[ev] = listeners[ev] || []).push(fn);
        },
        off(ev, fn) {
          const i = tracked.findIndex(p => p[0] === ev && p[1] === fn);
          if (i >= 0) tracked.splice(i, 1);
          if (listeners[ev]) listeners[ev] = listeners[ev].filter(x => x !== fn);
        },
        destroyAll() {
          for (const [ev, fn] of tracked) {
            if (listeners[ev]) listeners[ev] = listeners[ev].filter(x => x !== fn);
          }
          tracked.length = 0;
        }
      };
    }
  };
}

function showPartyLobby(host, cfg) {
  // cfg: { gameId, gameTitle, icon, onSolo, extraOptions? }
  // DM mode: when this arcade is loaded inside a finallycue DM (i.e. with
  // ?dm=1 in the URL but no ?join=...), replace the Make/Join party flow
  // with a single "Request Multiplayer" button. Clicking it claims a host
  // slot and postMessages the parent chat page so it can send the invite
  // card to the DM partner. Receivers (with ?join= in the URL) take the
  // normal lobby path so the auto-join click-through still works.
  const _u = new URLSearchParams(window.location.search);
  const _dmMode = _u.get('dm') === '1' && !_u.get('join');
  if (_dmMode) {
    host.innerHTML = `
      <div class="party-card">
        <div style="font-size:28px;font-weight:bold;">${cfg.icon || ''} ${cfg.gameTitle}</div>
        <div style="color:var(--sub);font-size:13px;text-align:center;line-height:1.5;">
          Send an invite to your DM partner. They'll be able to join with one click.
        </div>
        ${cfg.onSolo ? `<button class="btn secondary" id="lb-solo" style="width:100%;">${cfg.soloLabel || 'Play Solo'}</button>` : ''}
        <button class="btn" id="lb-request" style="width:100%;">Request Multiplayer</button>
        <div id="lb-err" style="font-size:11px;color:var(--bad);text-align:center;min-height:14px;"></div>
      </div>`;
    if (cfg.onSolo) host.querySelector('#lb-solo').onclick = () => cfg.onSolo();
    host.querySelector('#lb-request').onclick = () => requestDmMatch(host, cfg);
    return;
  }
  host.innerHTML = `
    <div class="party-card">
      <div style="font-size:28px;font-weight:bold;">${cfg.icon || ''} ${cfg.gameTitle}</div>
      <div style="color:var(--sub);font-size:13px;text-align:center;">Pick a mode</div>
      ${cfg.onSolo ? `<button class="btn" id="lb-solo" style="width:100%;">${cfg.soloLabel || 'Play Solo'}</button>` : ''}
      <button class="btn ${cfg.onSolo ? 'secondary' : ''}" id="lb-make" style="width:100%;">Make Party</button>
      <button class="btn secondary" id="lb-join" style="width:100%;">Join Party</button>
      <div id="lb-err" style="font-size:11px;color:var(--bad);text-align:center;min-height:14px;"></div>
    </div>`;
  if (cfg.onSolo) host.querySelector('#lb-solo').onclick = () => cfg.onSolo();
  host.querySelector('#lb-make').onclick = () => showPartyMakeMenu(host, cfg);
  host.querySelector('#lb-join').onclick = () => showPartyJoinMenu(host, cfg);
}

// DM-mode: claim a host slot with default settings, post the invite info
// up to the parent chat page (which will send the chat message), and hand
// off to the existing waiting-room flow so the game starts when the guest
// joins via the invite card.
async function requestDmMatch(host, cfg) {
  const errEl = host.querySelector('#lb-err');
  const btn = host.querySelector('#lb-request');
  if (btn) { btn.disabled = true; btn.innerText = 'Creating room…'; }
  // Default settings come straight from cfg.extraFields' .default values.
  const settings = {};
  for (const f of (cfg.extraFields || [])) {
    settings[f.id] = (f.type === 'number') ? Number(f.default) : f.default;
  }
  try {
    const result = await createGameHostPeer(cfg.gameId, null);
    // Tell the parent chat page to send the invite card to the DM partner.
    try {
      window.parent.postMessage({
        type: 'game-invite-request',
        game: cfg.gameId,
        gameTitle: cfg.gameTitle,
        code: result.code
      }, window.location.origin);
    } catch (e) {}
    showPartyWaitingRoom(host, result.peer, { code: result.code, settings }, cfg);
  } catch (e) {
    if (errEl) errEl.innerText = e.message || 'Could not create match.';
    if (btn) { btn.disabled = false; btn.innerText = 'Request Multiplayer'; }
  }
}

        ${extras.map(f => `<label style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;">${f.label}

          ${f.type === 'number' ? `<input type="number" id="lb-mk-${f.id}" value="${f.default}" min="${f.min || ''}" max="${f.max || ''}" style="width:100%;padding:9px;background:var(--panel);color:#fff;border:1px solid var(--border);border-radius:6px;margin-top:4px;box-sizing:border-box;font-size:14px;">` : ''}
        </label>`).join('')}
      </div>
      <div style="display:flex;gap:10px;width:100%;">
        <button class="btn secondary" id="lb-mk-back" style="flex:1;">← Back</button>
        <button class="btn" id="lb-mk-go" style="flex:2;">Create</button>
      </div>
      <div id="lb-mk-err" style="font-size:11px;color:var(--bad);text-align:center;min-height:14px;width:100%;"></div>
    </div>`;
  host.querySelector('#lb-mk-back').onclick = () => showPartyLobby(host, cfg);
  host.querySelector('#lb-mk-rand').onclick = (e) => { e.preventDefault(); host.querySelector('#lb-mk-code').value = genCode(4); };
  host.querySelector('#lb-mk-go').onclick = async () => {
    const errEl = host.querySelector('#lb-mk-err');
    const goBtn = host.querySelector('#lb-mk-go');
    errEl.innerText = '';
    const codeRaw = normalizeCode(host.querySelector('#lb-mk-code').value);
    if (!isValidCode(codeRaw)) { errEl.innerText = 'Code must be 3-10 letters/digits.'; return; }
    const settings = {};
    for (const f of extras) {
      const v = host.querySelector('#lb-mk-' + f.id).value;
      settings[f.id] = (f.type === 'number') ? Number(v) : v;
    }
    goBtn.disabled = true;
    errEl.innerText = 'Connecting…';
    try {
      const result = await createGameHostPeer(cfg.gameId, codeRaw);
      showPartyWaitingRoom(host, result.peer, { code: result.code, settings }, cfg);
    } catch (e) {
      errEl.innerText = e.message || 'Could not create party.';
      goBtn.disabled = false;
    }
  };
}

function showPartyWaitingRoom(host, peer, info, cfg) {
  host.innerHTML = `
    <div class="party-card">
      <div style="font-size:22px;font-weight:bold;">Waiting for opponent</div>
      <div style="color:var(--sub);font-size:12px;text-align:center;">${cfg.gameTitle} · share this code so they can join.</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;">
        <div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;">Party code</div>
        <div id="wt-code" style="font-size:42px;font-weight:bold;color:#fff;font-family:monospace;letter-spacing:6px;">${info.code}</div>
        <button class="btn secondary" id="wt-copy" style="font-size:12px;padding:6px 14px;">Copy code</button>
        <button id="wt-bigcode" title="Show code large"
          style="position:absolute;top:10px;right:10px;background:var(--panel-2,#1a2030);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px;line-height:1;">⛶</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;color:#fbbf24;">
        <div style="width:14px;height:14px;border:2px solid #fbbf24;border-top-color:transparent;border-radius:50%;animation:cc-spin 1s linear infinite;"></div>
        <span id="wt-status" style="font-size:13px;">Waiting for someone to join…</span>
      </div>
      <button class="btn secondary" id="wt-cancel" style="width:100%;">Cancel</button>
    </div>
    <!-- Fullscreen code overlay: doesn't actually take the browser fullscreen,
         just zooms the code so it's readable across the room. The code's
         font-size is computed in JS based on its length so it always fills
         most of the screen without overflowing. Auto-dismisses when an
         opponent joins (the parent host.innerHTML gets replaced). -->
    <div id="wt-bigcode-overlay" style="display:none;position:fixed;inset:0;background:#000;z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:24px;cursor:pointer;padding:30px;text-align:center;overflow:hidden;">
      <div id="wt-bigcode-title" style="font-size:clamp(28px,7vw,72px);font-weight:900;color:#fff;line-height:1.1;">${cfg.icon || ''} ${cfg.gameTitle}</div>
      <div style="font-size:clamp(12px,1.6vw,18px);color:var(--sub);text-transform:uppercase;letter-spacing:6px;font-weight:bold;">Party code</div>
      <div id="wt-bigcode-text" style="font-weight:900;color:#fff;font-family:monospace;letter-spacing:0.08em;line-height:1;width:100%;text-align:center;white-space:nowrap;">${info.code}</div>
      <div style="font-size:13px;color:var(--sub);">click anywhere to close</div>
    </div>
    <style>@keyframes cc-spin { to { transform: rotate(360deg); } }</style>`;
  let cancelled = false, accepted = false;
  const statusEl = host.querySelector('#wt-status');
  const bigOverlay = host.querySelector('#wt-bigcode-overlay');
  host.querySelector('#wt-copy').onclick = () => {
    try { navigator.clipboard.writeText(info.code); host.querySelector('#wt-copy').innerText = 'Copied!'; setTimeout(() => { try { host.querySelector('#wt-copy').innerText = 'Copy code'; } catch (e) {} }, 1500); } catch (e) {}
  };
  // Compute a font-size for the code that fills ~88% of the viewport width
  // and at most ~50% of the viewport height. Without this, long codes (8+
  // chars) overflowed the screen and short codes were smaller than they
  // could be. Re-runs on window resize while the overlay is open.
  function fitBigCode() {
    const t = host.querySelector('#wt-bigcode-text');
    if (!t) return;
    const codeLen = (info.code || '').length || 1;
    // Empirical char-advance for monospace font + 0.08em letter-spacing.
    const charFactor = 0.66;
    const fromW = (window.innerWidth * 0.88) / (codeLen * charFactor);
    const fromH = window.innerHeight * 0.45;
    const fontSize = Math.max(80, Math.min(fromW, fromH));
    t.style.fontSize = fontSize + 'px';
  }
  let _bigCodeResize = null;
  host.querySelector('#wt-bigcode').onclick = () => {
    bigOverlay.style.display = 'flex';
    fitBigCode();
    _bigCodeResize = () => fitBigCode();
    window.addEventListener('resize', _bigCodeResize);
  };
  bigOverlay.onclick = () => {
    bigOverlay.style.display = 'none';
    if (_bigCodeResize) {
      window.removeEventListener('resize', _bigCodeResize);
      _bigCodeResize = null;
    }
  };
  host.querySelector('#wt-cancel').onclick = () => {
    cancelled = true;
    try { peer.destroy(); } catch (e) {}
    activeCleanup = null;
    showPartyLobby(host, cfg);
  };
  // If user navigates away via global Back, tear down the peer
  activeCleanup = () => { if (!accepted) { try { peer.destroy(); } catch (e) {} } };
  peer.on('connection', (conn) => {
    if (cancelled) { try { conn.close(); } catch (e) {} return; }
    if (accepted) { conn.on('open', () => { try { conn.send({ type: 'reject', reason: 'busy' }); } catch (e) {} setTimeout(() => { try { conn.close(); } catch (e) {} }, 300); }); return; }
    statusEl.innerText = 'Someone is joining…';
    let helloTimer = setTimeout(() => { try { conn.send({ type: 'reject', reason: 'no_hello' }); conn.close(); } catch (e) {} }, 8000);
    conn.on('data', (data) => {
      if (!data || typeof data !== 'object') return;
      if (data.type !== 'hello') return;
      // Idempotency: a duplicate 'hello' (e.g. from a transport-level redelivery
      // on flaky wifi) must NOT spawn a second shim and a second
      // cfg.onConnected call. Without this guard, two parallel game instances
      // run on the same conn — every move is processed twice and the UI
      // appears to "reset" as the second instance overwrites the first.
      if (accepted) {
        // Re-acknowledge so a redelivered hello doesn't leave the guest
        // hanging on its hello-ack timeout.
        try { conn.send({ type: 'accept', game: cfg.gameId, settings: info.settings }); } catch (e) {}
        return;
      }
      clearTimeout(helloTimer);
      if (data.game !== cfg.gameId) {
        try { conn.send({ type: 'reject', reason: 'wrong_game' }); } catch (e) {}
        setTimeout(() => { try { conn.close(); } catch (e) {} }, 300);
        statusEl.innerText = 'Mismatched game — still waiting…';
        return;
      }
      accepted = true;
      try { conn.send({ type: 'accept', game: cfg.gameId, settings: info.settings }); } catch (e) {}
      const shim = makeGameShim(conn, cfg.gameId, 'host');
      shim._peer = peer;
      cfg.onConnected(host, shim, info.settings);
    });
  });
  peer.on('error', (err) => {
    if (cancelled) return;
    statusEl.innerText = 'Connection error: ' + (err && err.type || 'unknown');
  });
}

function showPartyJoinMenu(host, cfg) {
  host.innerHTML = `
    <div class="party-card">
      <div style="font-size:22px;font-weight:bold;">Join Party · ${cfg.gameTitle}</div>
      <div style="font-size:11px;color:var(--sub);text-align:center;line-height:1.5;">Enter the code your friend shared.</div>
      <label style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;width:100%;">Party code
        <input id="lb-jn-code" maxlength="10" placeholder="ABCD" style="width:100%;padding:9px;background:var(--panel);color:#fff;border:1px solid var(--border);border-radius:6px;margin-top:4px;box-sizing:border-box;font-size:18px;font-family:monospace;letter-spacing:3px;text-transform:uppercase;text-align:center;">
      </label>
      <div style="display:flex;gap:10px;width:100%;">
        <button class="btn secondary" id="lb-jn-back" style="flex:1;">← Back</button>
        <button class="btn" id="lb-jn-go" style="flex:2;">Join</button>
      </div>
      <div id="lb-jn-err" style="font-size:11px;color:var(--bad);text-align:center;min-height:14px;width:100%;"></div>
    </div>`;
  host.querySelector('#lb-jn-back').onclick = () => showPartyLobby(host, cfg);
  const errEl = host.querySelector('#lb-jn-err');
  host.querySelector('#lb-jn-code').focus();
  host.querySelector('#lb-jn-go').onclick = async () => {
    const goBtn = host.querySelector('#lb-jn-go');
    const codeRaw = normalizeCode(host.querySelector('#lb-jn-code').value);
    if (!isValidCode(codeRaw)) { errEl.innerText = 'Enter a valid code (3-10 letters/digits).'; return; }
    goBtn.disabled = true;
    errEl.innerText = 'Connecting…';
    let peer;
    try { peer = await createJoinerPeer(); }
    catch (e) { errEl.innerText = e.message || 'Connection failed.'; goBtn.disabled = false; return; }
    errEl.innerText = 'Connecting to host…';
    const conn = peer.connect(gamePeerId(cfg.gameId, codeRaw), { reliable: true });
    let helloAcked = false;
    // 30s timeout (was 10s). The Apps Script joiner now retries r-guest up
    // to 5 times with backoff (~9s of retries) when the host hasn't shown up
    // yet on slow networks; pile on first-poll latency and hello/accept
    // round trips and the original 10s window was firing before the join
    // had a chance to succeed, leaving the user with a "wrong code" toast
    // even though the next click would work.
    let openTimer = setTimeout(() => {
      if (helloAcked) return;
      try { conn.close(); } catch (e) {}
      try { peer.destroy(); } catch (e) {}
      errEl.innerText = 'Could not reach that party. Wrong code, or host is offline.';
      goBtn.disabled = false;
    }, 30000);
    conn.on('open', () => { try { conn.send({ type: 'hello', game: cfg.gameId }); } catch (e) {} });
    conn.on('data', (data) => {
      if (!data || typeof data !== 'object') return;
      if (data.type === 'reject') {
        helloAcked = true; clearTimeout(openTimer);
        const reason = data.reason || 'unknown';
        if (reason === 'wrong_game') errEl.innerText = 'That party is hosting a different game.';
        else if (reason === 'busy') errEl.innerText = 'Party is already full.';
        else errEl.innerText = 'Join was rejected (' + reason + ').';
        try { conn.close(); } catch (e) {}
        try { peer.destroy(); } catch (e) {}
        goBtn.disabled = false;
        return;
      }
      if (data.type !== 'accept') return;
      // Idempotency: ignore a redelivered 'accept'. Without this, a duplicate
      // would create a second shim on the same conn (every game message would
      // dispatch to two shims) and call cfg.onConnected twice, so the UI
      // would re-render mid-game and look like a reset.
      if (helloAcked) return;
      helloAcked = true; clearTimeout(openTimer);
      const shim = makeGameShim(conn, cfg.gameId, 'guest');
      shim._peer = peer;
      cfg.onConnected(host, shim, data.settings || {});
    });
    conn.on('error', () => { if (helloAcked) return; clearTimeout(openTimer); try { peer.destroy(); } catch (e) {} errEl.innerText = 'Connection error — host may be offline.'; goBtn.disabled = false; });
    conn.on('close', () => { if (helloAcked) return; clearTimeout(openTimer); try { peer.destroy(); } catch (e) {} if (errEl.innerText === 'Connecting to host…') errEl.innerText = 'Host closed the connection.'; goBtn.disabled = false; });
  };
}

/* ============================================================
   REUSABLE CHAT PANEL — sits next to every MP game.
   Renders "You: …" / "Them: …" lines, an input row, and 200ms
   send rate-limit. Returns { element, destroy }.
   ============================================================ */
function makeChatPanel(shim, opts) {
  opts = opts || {};
  const wrap = document.createElement('div');
  wrap.className = 'mp-chat';
  wrap.innerHTML = `
    <div class="mp-chat-title">Chat</div>
    <div class="mp-chat-log" id="mc-log"></div>
    <div class="mp-chat-row">
      <input id="mc-input" maxlength="200" placeholder="Say something…" style="flex:1;padding:7px 10px;background:var(--panel);color:#fff;border:1px solid var(--border);border-radius:6px;font-size:13px;">
      <button class="btn" id="mc-send" style="padding:6px 12px;font-size:12px;">Send</button>
    </div>`;
  const logEl = wrap.querySelector('#mc-log');
  const inEl = wrap.querySelector('#mc-input');
  const sendBtn = wrap.querySelector('#mc-send');
  function append(from, text, name) {
    const line = document.createElement('div');
    line.className = 'mp-chat-line ' + (from === 'you' ? 'you' : 'them');
    // If a username is set (locally for "you", over-the-wire for "them"), use it instead of the generic label.
    let label;
    if (from === 'you') label = (Settings.playerName || 'You');
    else                label = (name && name.length ? name : 'Them');
    const b = document.createElement('b');
    b.innerText = label + ':';
    line.appendChild(b);
    line.appendChild(document.createTextNode(' '));
    const sp = document.createElement('span');
    sp.innerText = text;
    line.appendChild(sp);
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function appendSystem(text) {
    const line = document.createElement('div');
    line.className = 'mp-chat-line sys';
    line.innerText = text;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  let lastSend = 0;
  function send() {
    const v = inEl.value.trim();
    if (!v) return;
    const now = Date.now();
    if (now - lastSend < 150) return;
    lastSend = now;
    inEl.value = '';
    try { shim.emit('chat', v); } catch (e) {}
  }
  sendBtn.addEventListener('click', send);
  inEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); send(); } });
  function onChat(p) { if (p && p.text) append(p.from, p.text, p.name); }
  shim.on('chat', onChat);
  return {
    element: wrap,
    appendSystem,
    destroy() { try { shim.off('chat', onChat); } catch (e) {} }
  };
}

/* Small helper: a one-line opponent presence indicator (status text) */
function makeMpStatusBar(shim, opts) {
  opts = opts || {};
  const el = document.createElement('div');
  el.className = 'mp-status-bar';
  el.innerHTML = `<span class="mp-dot"></span> <span class="mp-status-text">Connected · waiting…</span>`;
  function setText(t) { el.querySelector('.mp-status-text').innerText = t; }
  function setBad(bad) { el.classList.toggle('bad', !!bad); }
  function onClosed() { setBad(true); setText('Opponent disconnected.'); }
  shim.on('closed', onClosed);
  return { element: el, setText, setBad, destroy() { try { shim.off('closed', onClosed); } catch (e) {} } };
}

    ],
    R: [
      [ 0, 0, 0, 0, 0, 0, 0, 0],
      [ 5,10,10,10,10,10,10, 5],
      [-5, 0, 0, 0, 0, 0, 0,-5],
      [-5, 0, 0, 0, 0, 0, 0,-5],
      [-5, 0, 0, 0, 0, 0, 0,-5],
      [-5, 0, 0, 0, 0, 0, 0,-5],
      [-5, 0, 0, 0, 0, 0, 0,-5],
      [ 0, 0, 0, 5, 5, 0, 0, 0]
    ],
    Q: [
      [-20,-10,-10,-5,-5,-10,-10,-20],
      [-10, 0, 0, 0, 0, 0, 0,-10],
      [-10, 0, 5, 5, 5, 5, 0,-10],
      [ -5, 0, 5, 5, 5, 5, 0, -5],
      [  0, 0, 5, 5, 5, 5, 0, -5],
      [-10, 5, 5, 5, 5, 5, 0,-10],
      [-10, 0, 5, 0, 0, 0, 0,-10],
      [-20,-10,-10,-5,-5,-10,-10,-20]
    ],
    K: [
      [-30,-40,-40,-50,-50,-40,-40,-30],
      [-30,-40,-40,-50,-50,-40,-40,-30],
      [-30,-40,-40,-50,-50,-40,-40,-30],
      [-30,-40,-40,-50,-50,-40,-40,-30],
      [-20,-30,-30,-40,-40,-30,-30,-20],
      [-10,-20,-20,-20,-20,-20,-20,-10],
      [ 20, 20,  0,  0,  0,  0, 20, 20],
      [ 20, 30, 10,  0,  0, 10, 30, 20]
    ],
    K_END: [
      [-50,-40,-30,-20,-20,-30,-40,-50],
      [-30,-20,-10,  0,  0,-10,-20,-30],
      [-30,-10, 20, 30, 30, 20,-10,-30],
      [-30,-10, 30, 40, 40, 30,-10,-30],
      [-30,-10, 30, 40, 40, 30,-10,-30],
      [-30,-10, 20, 30, 30, 20,-10,-30],
      [-30,-30,  0,  0,  0,  0,-30,-30],
      [-50,-30,-30,-30,-30,-30,-30,-50]
    ]
  };

  function newGame() {
    const b = Array.from({length:8}, () => Array(8).fill(null));
    const back = ['R','N','B','Q','K','B','N','R'];
    for (let c = 0; c < 8; c++) {
      b[0][c] = { t: back[c], c: 'b' };
      b[1][c] = { t: 'P', c: 'b' };
      b[6][c] = { t: 'P', c: 'w' };
      b[7][c] = { t: back[c], c: 'w' };
    }
    return {
      board: b, turn: 'w',
      castle: { wK:true, wQ:true, bK:true, bQ:true },
      ep: null,
      halfmove: 0, fullmove: 1,
      history: []
    };
  }

  function isAttacked(s, r, c, by) {
    const b = s.board;
    // pawns
    const pdir = (by === 'w') ? 1 : -1;
    for (const dc of [-1,1]) {
      const pr = r + pdir, pc = c + dc;
      if (inB(pr,pc)) { const p = b[pr][pc]; if (p && p.c===by && p.t==='P') return true; }
    }
    // knights
    for (const [dr,dc] of KNIGHT) {
      const nr=r+dr, nc=c+dc;
      if (inB(nr,nc)) { const p = b[nr][nc]; if (p && p.c===by && p.t==='N') return true; }
    }
    // king
    for (const [dr,dc] of QUEEN) {
      const nr=r+dr, nc=c+dc;
      if (inB(nr,nc)) { const p = b[nr][nc]; if (p && p.c===by && p.t==='K') return true; }
    }
    // diagonals (B/Q)
    for (const [dr,dc] of BISH) {
      let nr=r+dr,nc=c+dc;
      while (inB(nr,nc)) {
        const p = b[nr][nc];
        if (p) { if (p.c===by && (p.t==='B'||p.t==='Q')) return true; break; }
        nr+=dr; nc+=dc;
      }
    }
    // ranks/files (R/Q)
    for (const [dr,dc] of ROOK) {
      let nr=r+dr,nc=c+dc;
      while (inB(nr,nc)) {
        const p = b[nr][nc];
        if (p) { if (p.c===by && (p.t==='R'||p.t==='Q')) return true; break; }
        nr+=dr; nc+=dc;
      }
    }
    return false;
  }

  function findKing(s, color) {
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const p = s.board[r][c];
      if (p && p.t==='K' && p.c===color) return [r,c];
    }
    return null;
  }
  function inCheck(s, color) {
    const k = findKing(s, color);
    if (!k) return false;
    return isAttacked(s, k[0], k[1], color==='w'?'b':'w');
  }

  function genPseudo(s, color) {
    const moves = [];
    const b = s.board;
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const p = b[r][c];
      if (!p || p.c !== color) continue;
      pieceMoves(s, r, c, p, moves);
    }
    return moves;
  }

  function pieceMoves(s, r, c, p, moves) {
    const b = s.board;
    if (p.t === 'P') {
      const dir = p.c === 'w' ? -1 : 1;
      const start = p.c === 'w' ? 6 : 1;
      const last = p.c === 'w' ? 0 : 7;
      // forward
      const fr = r + dir;
      if (inB(fr,c) && !b[fr][c]) {
        if (fr === last) for (const pr of ['Q','R','B','N']) moves.push({from:[r,c],to:[fr,c],promote:pr});
        else moves.push({from:[r,c],to:[fr,c]});
        // double from start
        if (r === start && !b[r+2*dir][c]) moves.push({from:[r,c],to:[r+2*dir,c],dbl:true});
      }
      // captures
      for (const dc of [-1,1]) {
        const nr=r+dir, nc=c+dc;
        if (!inB(nr,nc)) continue;
        const tgt = b[nr][nc];
        if (tgt && tgt.c !== p.c) {
          if (nr === last) for (const pr of ['Q','R','B','N']) moves.push({from:[r,c],to:[nr,nc],promote:pr});
          else moves.push({from:[r,c],to:[nr,nc]});
        }
        if (s.ep && s.ep[0]===nr && s.ep[1]===nc) moves.push({from:[r,c],to:[nr,nc],ep:true});
      }
    } else if (p.t === 'N') {
      for (const [dr,dc] of KNIGHT) {
        const nr=r+dr, nc=c+dc;
        if (!inB(nr,nc)) continue;
        const t = b[nr][nc];
        if (!t || t.c !== p.c) moves.push({from:[r,c],to:[nr,nc]});
      }
    } else if (p.t === 'B' || p.t === 'R' || p.t === 'Q') {
      const dirs = p.t==='B'?BISH:p.t==='R'?ROOK:QUEEN;
      for (const [dr,dc] of dirs) {
        let nr=r+dr,nc=c+dc;
        while (inB(nr,nc)) {
          const t = b[nr][nc];
          if (!t) moves.push({from:[r,c],to:[nr,nc]});
          else { if (t.c !== p.c) moves.push({from:[r,c],to:[nr,nc]}); break; }
          nr+=dr; nc+=dc;
        }
      }
    } else if (p.t === 'K') {
      for (const [dr,dc] of QUEEN) {
        const nr=r+dr, nc=c+dc;
        if (!inB(nr,nc)) continue;
        const t = b[nr][nc];
        if (!t || t.c !== p.c) moves.push({from:[r,c],to:[nr,nc]});
      }
      // castling (rights + empty squares only here; check-pass-through filtered later)
      if (p.c === 'w' && r === 7 && c === 4) {
        if (s.castle.wK && !b[7][5] && !b[7][6] && b[7][7] && b[7][7].t==='R' && b[7][7].c==='w')
          moves.push({from:[r,c],to:[7,6],castle:'K'});
        if (s.castle.wQ && !b[7][3] && !b[7][2] && !b[7][1] && b[7][0] && b[7][0].t==='R' && b[7][0].c==='w')
          moves.push({from:[r,c],to:[7,2],castle:'Q'});
      }
      if (p.c === 'b' && r === 0 && c === 4) {
        if (s.castle.bK && !b[0][5] && !b[0][6] && b[0][7] && b[0][7].t==='R' && b[0][7].c==='b')
          moves.push({from:[r,c],to:[0,6],castle:'K'});
        if (s.castle.bQ && !b[0][3] && !b[0][2] && !b[0][1] && b[0][0] && b[0][0].t==='R' && b[0][0].c==='b')
          moves.push({from:[r,c],to:[0,2],castle:'Q'});
      }
    }
  }

  function makeMove(s, m) {
    const undo = {
      move: m, captured: null, epCap: null,
      ep: s.ep, castle: {...s.castle},
      halfmove: s.halfmove, fullmove: s.fullmove
    };
    const [fr,fc] = m.from, [tr,tc] = m.to;
    const piece = s.board[fr][fc];
    let captured = s.board[tr][tc];
    if (m.ep) {
      const capR = piece.c === 'w' ? tr+1 : tr-1;
      captured = s.board[capR][tc];
      s.board[capR][tc] = null;
      undo.epCap = [capR, tc];
    }
    undo.captured = captured;
    s.board[tr][tc] = m.promote ? { t: m.promote, c: piece.c } : piece;
    s.board[fr][fc] = null;
    if (m.castle === 'K') { s.board[tr][5] = s.board[tr][7]; s.board[tr][7] = null; }
    if (m.castle === 'Q') { s.board[tr][3] = s.board[tr][0]; s.board[tr][0] = null; }
    // castling rights
    if (piece.t === 'K') {
      if (piece.c === 'w') { s.castle.wK = false; s.castle.wQ = false; }
      else { s.castle.bK = false; s.castle.bQ = false; }
    }
    if (piece.t === 'R') {
      if (fr===7 && fc===0) s.castle.wQ = false;
      if (fr===7 && fc===7) s.castle.wK = false;
      if (fr===0 && fc===0) s.castle.bQ = false;
      if (fr===0 && fc===7) s.castle.bK = false;
    }
    if (tr===7 && tc===0) s.castle.wQ = false;
    if (tr===7 && tc===7) s.castle.wK = false;
    if (tr===0 && tc===0) s.castle.bQ = false;
    if (tr===0 && tc===7) s.castle.bK = false;
    // ep target
    s.ep = m.dbl ? [(fr+tr)/2, fc] : null;
    // clocks
    if (piece.t === 'P' || captured) s.halfmove = 0; else s.halfmove++;
    if (piece.c === 'b') s.fullmove++;
    s.turn = s.turn === 'w' ? 'b' : 'w';
    return undo;
  }
  function unmake(s, u) {
    const m = u.move;
    const [fr,fc] = m.from, [tr,tc] = m.to;
    s.turn = s.turn === 'w' ? 'b' : 'w';
    s.fullmove = u.fullmove; s.halfmove = u.halfmove;
    s.ep = u.ep; s.castle = u.castle;
    let movedPiece = s.board[tr][tc];
    if (m.promote) movedPiece = { t: 'P', c: movedPiece.c };
    s.board[fr][fc] = movedPiece;
    if (m.ep) {
      s.board[tr][tc] = null;
      s.board[u.epCap[0]][u.epCap[1]] = u.captured;
    } else {
      s.board[tr][tc] = u.captured;
    }
    if (m.castle === 'K') { s.board[tr][7] = s.board[tr][5]; s.board[tr][5] = null; }
    if (m.castle === 'Q') { s.board[tr][0] = s.board[tr][3]; s.board[tr][3] = null; }
  }

  function legalMoves(s, color) {
    color = color || s.turn;
    const enemy = color === 'w' ? 'b' : 'w';
    const moves = genPseudo(s, color);
    const out = [];
    for (const m of moves) {
      if (m.castle) {
        const r = m.from[0];
        if (isAttacked(s, r, 4, enemy)) continue;
        const path = m.castle === 'K' ? [5,6] : [3,2];
        if (path.some(c => isAttacked(s, r, c, enemy))) continue;
      }
      const u = makeMove(s, m);
      if (!inCheck(s, color)) out.push(m);
      unmake(s, u);
    }
    return out;
  }

  function isInsufficient(s) {
    // Count non-king pieces
    const pieces = [];
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const p = s.board[r][c];
      if (p && p.t !== 'K') pieces.push({...p, r, c});
    }
    if (pieces.length === 0) return true;
    if (pieces.length === 1 && (pieces[0].t === 'B' || pieces[0].t === 'N')) return true;
    if (pieces.length === 2 && pieces.every(p => p.t === 'B')) {
      const sq1 = (pieces[0].r + pieces[0].c) % 2;
      const sq2 = (pieces[1].r + pieces[1].c) % 2;
      if (sq1 === sq2) return true;
    }
    return false;
  }

  function evalPos(s) {
    // Detect endgame
    let nonPawnMaterial = 0;
    let pieceCount = 0;
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const p = s.board[r][c];
      if (!p) continue;
      pieceCount++;
      if (p.t !== 'P' && p.t !== 'K') nonPawnMaterial += PV[p.t];
    }
    const endgame = nonPawnMaterial < 1300;
    let score = 0;
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const p = s.board[r][c];
      if (!p) continue;
      const sign = p.c === 'w' ? 1 : -1;
      score += sign * PV[p.t];
      const pstR = p.c === 'w' ? r : 7 - r;
      let table = PST[p.t];
      if (p.t === 'K' && endgame) table = PST.K_END;
      score += sign * table[pstR][c];
    }
    return s.turn === 'w' ? score : -score;
  }

  // Negamax with alpha-beta + simple move ordering
  let nodeCount = 0;
  function search(s, depth, alpha, beta, rootDepth) {
    if (depth === 0) { nodeCount++; return { score: evalPos(s), move: null }; }
    const moves = legalMoves(s);
    if (moves.length === 0) {
      if (inCheck(s, s.turn)) return { score: -100000 + (rootDepth - depth), move: null };
      return { score: 0, move: null };
    }
    // 50-move
    if (s.halfmove >= 100) return { score: 0, move: null };
    // ordering: captures first, prom, then quiet
    moves.sort((a,b) => scoreMove(s, b) - scoreMove(s, a));
    let best = -Infinity, bestM = moves[0];
    for (const m of moves) {
      const u = makeMove(s, m);
      const r = search(s, depth - 1, -beta, -alpha, rootDepth);
      const sc = -r.score;
      unmake(s, u);
      if (sc > best) { best = sc; bestM = m; }
      if (best > alpha) alpha = best;
      if (alpha >= beta) break;
    }
    return { score: best, move: bestM };
  }
  function scoreMove(s, m) {
    const tgt = s.board[m.to[0]][m.to[1]];
    const mover = s.board[m.from[0]][m.from[1]];
    let s1 = 0;
    if (tgt) s1 += 10 * PV[tgt.t] - PV[mover.t];
    if (m.promote) s1 += PV[m.promote];
    return s1;
  }

  // ELO scaling: returns {depth, randomness, blunderProb}
  function eloProfile(elo) {
    if (elo < 400)  return { depth: 1, randomness: 0.85, blunder: 0.40 };
    if (elo < 700)  return { depth: 1, randomness: 0.55, blunder: 0.25 };
    if (elo < 1000) return { depth: 1, randomness: 0.30, blunder: 0.12 };
    if (elo < 1300) return { depth: 2, randomness: 0.18, blunder: 0.06 };
    if (elo < 1600) return { depth: 2, randomness: 0.08, blunder: 0.02 };
    if (elo < 1900) return { depth: 3, randomness: 0.04, blunder: 0 };
    if (elo < 2200) return { depth: 3, randomness: 0,    blunder: 0 };
    if (elo < 2500) return { depth: 4, randomness: 0,    blunder: 0 };
    if (elo < 2900) return { depth: 4, randomness: 0,    blunder: 0 };
    if (elo < 3300) return { depth: 5, randomness: 0,    blunder: 0 };
    return                  { depth: 5, randomness: 0,    blunder: 0 };
  }

  function pickBotMove(s, elo) {
    const moves = legalMoves(s);
    if (moves.length === 0) return null;
    const prof = eloProfile(elo);
    if (Math.random() < prof.randomness) return moves[Math.floor(Math.random() * moves.length)];
    if (Math.random() < prof.blunder) {
      // pick from bottom half by quick eval
      const scored = moves.map(m => ({ m, s: scoreMove(s, m) + Math.random() * 20 }));
      scored.sort((a,b) => a.s - b.s);
      const half = scored.slice(0, Math.max(1, Math.floor(scored.length / 2)));
      return half[Math.floor(Math.random() * half.length)].m;
    }
    nodeCount = 0;
    const r = search(s, prof.depth, -Infinity, Infinity, prof.depth);
    return r.move;
  }

  /* ===== UI ===== */
  let state = newGame();
  let selected = null;
  let legalForSelected = [];
  let lastMove = null;
  let humanColor = isMP ? mp.color : 'w';
  let elo = 1200;
  let botThinking = false;
  let pendingPromotion = null;
  let history = []; // [{w,b}, ...]
  // MP state
  let mpClocks = isMP ? { w: mp.timeMin * 60 * 1000, b: mp.timeMin * 60 * 1000 } : null;
  let mpFirstMoveDeadline = isMP ? Date.now() + 60 * 1000 : null;
  let mpDrawPending = false; // they offered us a draw
  let mpGameEnded = false;
  let mpClockRaf = null;
  const mpListeners = {};
  let mpRematchUI = null; // callback registered by the result overlay to receive {local, remote, count}

  function fmtClock(ms) {
    if (ms < 0) ms = 0;
    const totalSec = Math.ceil(ms / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  const sidePanelHTML = isMP

  host.innerHTML = `
    <div class="game-region">

    </div>
  `;

  const boardEl = host.querySelector('#chess-board');

  const promoOverlay = host.querySelector('#promo-overlay');
  const promoBox = host.querySelector('#promo-box');
  const eloSlider = host.querySelector('#elo-slider');

  if (!isMP) {
